body:
  text: 吳興偹志卷二十三明董斯張撰遺書徴第十九記吳興始韋曜氏談鑰志所載僅一則耳踵起數十家都已佚顔魯公地記録集中幸不泯泯焉張𤣥之山墟名吳均入東地舊志猶存一二謙之記散見藝文類聚初學記太平御覽後漢書注談鑰志說郛諸書余取録之庶嘗鼎一臠耳儻有藏諸書之全者乎慰我飢山謙之吳興記二十一則謙之棘陽令好學多著述又有南徐州記丹陽記宋書載隋經籍志及沈約自叙郡廨署舊在烏程縣治烏程縣有穴圓三丈內轉寬大有鐘乳云通包山烏程縣南百里有桐墟又百五十里有栁墟又有栁河烏程縣東南三十里有桑墟九乳山在烏程縣西南三十一里有九峯如乳狀石城山在烏程縣西三十里昔烏程人嚴白虎于此壘石為城與吕䝉戰卞山峻極非清秋爽月不見其巔蓋雲霧常封耳卞山洞中有石如玉人謂之瑤琨石卞山有項王走馬埒洗馬池卞山有項王繫馬樹石間有項王馬蹄吳興本無楊梅太史慈葬卞山三州來祭越有楊梅因種號卞山楊梅按容齊三筆云孫權使慈為建昌都尉葬於新吳今洪府奉新縣也邑中立廟敬事乾道中封靈惠侯似與此左然名士爭借為重其墓兩處載之恆也或墓原在辨山而于彼靈應因廟而遂以墓附會耶元衢吳景帝鈕皇后父葬卞山令百姓兼丁三千人開之按吳志孫休薨諡景皇帝夫人朱據女休即阼立為皇后休卒尊為皇太后别無鈕皇后但顔魯公石柱記烏程縣有吳景帝鈕皇后陵而此記陵墓無之未知何據談志東遷縣有孺子山徐孺子入吳哭友人嘗登之因以為名闞山以其山峯在闞神祠南蓋吳丞相闞澤所居也烏山烏巾居此故也含山在縣東南一百八里震澤東望蒼然茭葦煙蔚之中髙邱卓然因以名焉烏程有梅墟梅林梅亭衡山一名橫山車溪出美魚烏程溫山出御荈荈勞與談作芹烏程縣北壟山有紫石英甚光明但小黑其山東臨大溪西帶長瀆烏程縣西北有項籍祠興平二年太守許貢奏分縣為永安縣吳興偹志卷二十三
