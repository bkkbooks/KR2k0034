body:
  text: 吳興備志卷十九明董斯張撰戰守徵第十五黃武五年丹陽會稽吳興山冦攻沒郡縣乃分三郡要害地置東安郡居富春以抗扼之吳志寶鼎元年冬十月永安山賊施但等聚衆數千人劫皓庶弟永安侯謙出烏程取孫和陵上鼓吹曲蓋比至建業衆萬餘人丁固諸葛靚逆之於牛屯大戰但等敗走獲謙謙自殺吳志沈充之走吳興也假庾亮持節都督東征諸軍事追充事平以功封永昌縣開國公晉書太寧二年十二月沈充故將顧揚反於武康攻燒城邑州縣討斬之王舒字處明成帝時將徵蘇峻出舒為外援授會稽內史峻作逆假節都督行揚州刺史事時吳國內史庾氷棄郡奔舒舒移告屬縣渡浙江遣前鋒進據無錫吳興太守虞潭率所領屯烏包亭不敢進時暴雨大水賊管商乘船旁出襲之潭敗還吳興于是賊轉攻吳興潭諸軍復退賊掠東遷餘杭武康諸縣舒遣子允之以精鋭三千邀賊于武康破之賊委舟走允之收其器械進兵助潭時賊韓晃既破宣城轉入故鄣長城允之遣朱燾等擊之斬首千餘級納降二千人孫恩之亂劉牢之率衆東討拜表輒行至吳與衛將軍謝琰擊賊屢勝殺傷甚衆徑臨浙江進拜前將軍都督吳郡諸軍事時謝琰屯烏程遣司馬髙素助牢之牢之率衆軍濟浙江恩懼逃于海謝琰督吳興義興二郡軍事討孫恩至義興斬賊許允之進討吳興賊邱尫破之並上泰始二年春正月乙未晉安王子勛即偽位于潯陽丙午吳郡太守顧琛吳興太守王曇生並舉兵反二月壬申吳興太守張永右將軍東討丁亥建武將軍吳嘉公率諸軍破賊于吳興宋書梁王清臨沂人厯南安將軍承聖末陳武帝殺太尉王僧辨遣文帝攻僧辨壻杜龕龕告于清引兵援龕大敗文帝于吳興追奔至晉陵時廣州刺史歐陽顔亦同清援中更改異殺清而歸武帝梁書初杜龕恃王僧辨之勢不禮于陳霸先在吳興每以法繩其宗族霸先深怨之及將圖僧辨密使兄子蒨還長城立柵以備龕僧辨死龕據吳興拒霸先義興太守韋載以郡應之僧辨弟僧智為吳郡太守亦據城拒守蒨至長城收兵才數百人龕遣其將杜泰將兵攻之數旬不克而退霸先使周文育攻義興不利自表東討留侯安都杜稜宿衛至義興拔其水柵譙秦刺史徐嗣徽從弟嗣先僧辨之甥也亡就嗣徽以州入于齊嗣徽密結南豫州刺史任約將兵乘虛襲建康據石頭遊騎至闕下侯安都閉門令城中登陴窺賊者斬及夕嗣徽等還安都夜為戰備將旦嗣徽等又至安都出戰大破之嗣徽等奔還石頭霸先以書諭韋載載降霸先引與謀議卷甲還建康使周文育裴忌攻吳郡忌輕行夜至城下鼓譟薄之僧智奔吳興忌入據郡及龕敗王僧智與僧愔遂奔齊綱目通鑑陳遂興侯詳髙祖踈屬也髙祖東征杜龕詳别下安吉原鄉故鄣三縣龕平以功授散騎侍郎假節雄信將軍青州刺史陳書韋沖京兆人開皇中檢校括州事時吳興賊帥羅慧方聚衆為亂攻圍烏程諸縣沖率兵擊破之封義豐縣侯隋書輔公祏據江南李孝恭李靖討之公祏敗乘勝逐北轉戰百餘里公祏棄城東走宿常州其將吳騷等謀執之公祏覺之棄妻子斬關走孝恭命騎將追之至武康擒公祏及其偽僕射西門君儀等致麾下江南悉平是役也李績亦從舊唐書李孝恭李靖李績三傳參浙江通志上元元年十二月劉展將孫待封陷湖州展以待封領湖州事二年春待封自武康出將會張景超攻杭州溫朝據險擊敗之待封脫身奔烏程展死詣李藏用降資治通鑑按待封他日寧死不肯附成藏用反狀可稱不逺復矣元衢李錡貞元中纍至湖杭二州刺史遷潤州刺史兼鹽鐵使積財進奉以結恩澤德宗甚寵之錡恃恩驕恣遣心腹五人為所部五州鎮將姚志安處蘇州李深處常州趙惟忠處湖州邱自昌處杭州髙肅處睦州各有兵數千伺察刺史動靜至是錡遂稱兵置五劔分授管內鎮將各令殺其刺史常州嚴防用客李雲計矯制稱詔討副使斬李深傳檄蘇杭湖睦請同進討是時辛祕為湖州刺史賊黨以祕儒者甚易之祕潛募鄉閭子弟數百人遣衙門將邱知二襲惟忠營破之知二中流矢墜馬起而復戰斬惟忠焚其營一州遂安蘇州刺史李素為姚志安所繫釘于船舷生致于錡未至而錡敗得免資治通鑑參舊唐書李錡辛祕二傳乾符五年夏四月王仙芝别將曹師雄冦湖州鎮海節度使裴璩遣兵擊破之資治通鑑乾寧二年六月以錢鏐為浙東招討使封郡王鏐發兵擊董昌九月昌求救于楊行密十月行密遣田頵安仁義攻杭州鎮戍以救昌昌使湖州將徐淑會淮南將魏約共圍嘉興鏐遣其將顧全武救嘉興破烏墩三年正月安仁義以舟師至湖州欲渡江應董昌錢鏐遣武勇都指揮使顧全武等守西陵仁義不能渡四年四月鏐遣顧全武等將兵三千自海道救嘉興至城下擊淮南兵大破之淮南將田頵屯驛亭埭全武等乘勝逐之甲戌頵至自湖州奔還復追敗之上乾寧三年江淮巨賊張雄犯烏墩燒劫幾盡烏青志唐昭宗時韓守盛以功拜池州刺史楊行密表徙湖州刺史以兵護送而李師悅在湖州與杭州刺史錢鏐戰不解于是蘇湖常潤亂甚西吳里語宋髙宗建炎戊申五月嘉興州軍士徐明等作亂道經烏墩僧性寶見賊説諭之賊乃斂兵而去得免焚掠烏青志穆陵既正九五之位皇兄濟王竑出封宛陵辭不就史丞相同叔以其有逼近之嫌遂徙寓于霅城之西寶慶元年乙酉正月八日含山狂士潘甫與弟壬丙率太湖亡命數十人各以紅半袖為號乘夜踰墻而入至邸索王聲義舉推戴王聞變易敝衣匿水匱中久而得之擁至州治旋往東嶽行祠取龍椅置設廳以黃袍加之王號泣不從脅之以兵不獲已與之約曰汝能勿傷太后官家否衆諾遂發軍資庫出金幣楮券犒軍命守臣謝周卿率見任及寄居立班且揭李全榜於州門聲言史丞相私意援立等罪且稱見率精兵二十萬水陸並進皆聳動以為山東狡謀比曉則執兵者大半皆太湖漁人巡校司彎卒輩多識之始疑其偽王乃與羣將謀帥州兵𠞰之其數原不滿百也潘壬竟逸去後獲之楚州河岸寓公王元春遂以輕舟告變於朝急調殿司將彭忳赴之兵至賊已就誅矣主兵官茍統領者堅欲入城意在乘時劫掠舟抵南關張王祠下忽若有方巾白袍人擠之入水於是亟聞之朝廷亦以事平俾班師焉使非有此一城必大擾矣越一日史相遣其客余天錫來且頒宣醫視疾之旨時王本無疾實使之自為計遂縊於州治之便室舁歸故第治喪始欲治喪西余山寺其後遂藳葬西溪焉初朝廷得報謂出山東謀史揆懼甚既而事敗李全亦自通於朝以為初不預聞疑慮始釋遂下詔貶王為巴陵縣公夫人吳氏賜度牒為女冠移居紹興改湖州為安吉州王元春以告變功遂知鄉郡時秀王第十三子師彌逃難菁山園廟亦奬其能守園陵躐升嗣襲甚者以潘閬嘗從秦王為記室有同謀之嫌亦黜其先賢之配焉先是天台宋濟中楫為守日更立諸坊扁其左題曰守臣宋濟立未幾變作或以為先讖云齊東野語元兵入建康臨安震恐遣張濡戍獨松關郁天興戍四安鎮趙淮戍銀杏浦壩張世傑遣閻順進軍廣德後閻順戰安吉縣復取鳯平張濡部曲害元行人嚴忠範於獨松關執廉希賢送臨安因免安吉縣租宋史元兵發建康參政阿婁罕四萬户總管鄂囉齊將右軍出四安鎮趣獨松關遂破四安鎮正將吳明死之破獨松關馮驥死之張濡遁鄰邑宋史至正十六年二月張士誠遣兵陷湖州路八年太祖命元帥費子賢總管張德守安吉築城固守士誠出兵來攻别將廖永安與戰於太湖乘舟深入後軍不繼為所獲士誠欲降之永安不屈遂拘囚之太祖念其守義遙封楚國公後竟囚死二十五年十二月士誠兵寇安吉守將費子賢擊却之二十六年八月徐逹等受命將發太祖問諸將曰爾等此行用師孰先常遇春對曰逐梟者必覆其巢去鼠者必熏其穴此行當直搗姑蘇姑蘇既破其餘諸郡可不勞而下矣太祖曰不然士誠起鹽徒與張天騏潘元明等皆強梗之徒相為手足士誠苟至窮蹙天騏輩懼俱斃必併力救之今不先分其勢而遽攻姑蘇若天騏出湖州元明出杭州援兵四合難以取勝莫若出兵先攻湖州使其疲于奔命羽翼既疲然後移兵姑蘇取之必矣遇春猶執前議太祖作色曰湖州失利吾自任之若先攻蘇州而失利吾不汝貸也遇春不復敢言于是逹等率諸軍發龍江至太湖遇春擊敗士誠兵于湖州港口禽其將尹義陳旺遂次洞庭山進至湖州之毗山又擊敗其將石清汪海擒之張士誠駐軍湖上不敢戰而退師至湖州之三里橋士誠兵分三路來拒參政黃寶當南路院判陶子實當中路左丞張天騏自當北路同僉唐侃為後繼達進攻之遣遇春攻寶王弼攻天騏達自中路攻子實别遣驍將王國寶率長鎗軍直扼其城寶敗走欲入城城下釣橋已斷不得入復還力戰被擒并獲其元帥胡貴以下官二百餘人天騏子實皆不敢戰斂兵而退士誠又遣司徒李伯升來援由荻港入城被圍伯升及天騏閉户拒守達遣國寶攻其南門自以大軍繼之其同僉余得全院判張德義及陶子實出戰復敗走士誠又遣平章朱進王晟同僉戴茂吕珍院判李茂及其第五子號五太子者率兵六萬來援號三十萬屯城東之舊館築五寨自固達與遇春湯和等分兵營于東阡鎮南姑嫂橋連築十壘以絶舊館之援李茂唐傑王晟懼不敵皆遁去士誠壻潘元紹時駐兵于烏鎮之東為吕珍等聲援乘夜擊之亦遁遂填塞河港絶其糧道士誠知事急乃親率兵來援達等與戰于皂林之外又敗之虜其戴元帥及甲士三千餘人九月士誠復遣其同僉徐志堅以輕舟出東阡鎮覘我師欲攻姑嫂橋遇春遇之與戰會大風雨天晦甚遇春令勇士乘剗船數百突擊之擒志堅得兵二千餘人士誠自徐志堅敗甚懼遣其右丞徐義至舊館覘形勢將還報遇春以兵扼其歸路義不得出乃隂遣人約士信出兵與舊館兵合力來戰士誠又遣赤龍船親兵援之義始得脫潘元紹率赤龍船兵屯于平望復别乘小舟潛至烏鎮欲援舊館遇春由别港追襲之至平望縱火焚其赤龍船軍資器械一時俱盡衆軍散走自是舊館兵援絶饋餉不繼多出降者十月達以所獲將士徇于湖州城下城中大震遇春兵攻烏鎮徐義潘元紹及甘院判樞戰不勝退走遇春追至辨山遂攻破其平章王晟陸寨餘軍奔入舊館之東壁其同僉戴茂乞降是夕晟亦降達復攻辨山水寨顧時引數舟繞士誠兵船船上人俯視而笑時覺其懈率壯士數人躍入其舟大呼奮擊餘舟競進薄之士誠五太子盛兵來援遇春稍却薛顯率舟師直前奮擊衆大敗五太子及朱暹吕珍以舊館降得兵六萬人遇春謂顯曰今日之戰將軍之力居多吾固不如也五太子者士誠養子本姓梁短小精悍能平地躍起丈餘又善沒水暹珍亦善戰士誠倚之至是皆降士誠為之奪氣十一月舊館捷至父老進賀太祖曰此民之福也自此東南可定轉輸之勞亦可少蘇矣舊館既降達遣馮國勝以降將徇湖州城下語李伯升出降伯升在城上對曰張太尉養吾厚吾不忍背之抽刀欲自刎為左右抱持得不死左右語之曰援絶勢孤久困城中不如降伯升俯首不能言其左丞張天騏總管陳昧以城降伯升遂亦降于是逹引兵向姑蘇至南潯元帥王勝降以上俱平吳録是役也華髙康才于光皆從宋學士集按宋濂開平王神道碑云師攻湖州時偽丞相張士信悉發國中兵為援屯於舊館出我師之背王統竒兵由大錢港入結營東阡復出敵背則大錢港亦州之要害地張士誠下湖州改元天祐以其壻潘原明為在丞鎮吳興原明在郡以郡城廣大難守規而小之以人依橋髙不可過馬剗而平之潘驕侈名娼數十人有蘇氏者才色兼美酒後尋其罪斬之以金盤薦其首於客宴王師下湖州潘伏誅臺城投其首於溷西吳里話按平吳録云李文忠進兵杭州平章潘原明懼遣貟外方彛詣軍門請納欵文忠宣上命慰諭之遣原明以下入朝太祖以原明全城歸附仍授平章官屬皆仍舊職又黃金原明傳云洪武十四年以原明署雲南布政事其後賜葬鍾山當王師入湖時李伯升為政何關原明宋君巷説乃爾丁酉二月耿炳文自廣德取長興張士誠將趙打虎以兵三千迎戰敗之追至城西門打虎走湖州遂克長興獲戰船三百餘艘擒士誠守將李福安達實密等義兵萬户蔣義率所部二百人降有儒士溫祥卿者避亂挈家來歸炳文與語竒之遂留贊軍事用其策分兵據要害設戰具為守禦計三月改長興州為長安州立永興翼元帥府以炳文為總兵都元帥守之五月士誠遣其左丞潘原明元帥嚴再興入寇屯上新橋炳文擊敗之生擒數百人斬首甚衆原明等遁去踰四年辛丑十月士誠復遣司徒李伯升率衆十餘萬寇城下城中兵僅七千上命帳前都先鋒陳德等率建康兵元帥華髙等率宜興兵萬户費聚等率廣德安吉兵往援之比至寇兵夜擊營諸軍皆潰炳文嬰城固守明日遣副元帥劉成出西門迎擊敗之敵軍下瞰城中運土石填濠隍燒水關攻城益急炳文晝夜應敵凡月餘既而援兵至伯升棄營遁甲辰九月改永興翼元帥府為永興衛親軍指揮使司以炳文為指揮使十月士誠丞相張士信以兵來侵炳文破之獲其元帥宋興祖士信憤怒復益兵圍城炳文復與指揮同知費聚出戰敗之自是士誠奪氣不敢復圗長興矣炳文守長興凡十年孤城血戰卒保無虞其功最大丙午八月上命將伐士誠先取湖州調炳文從事十一月湖州平黃金開國功臣録丙午秋天興右翼副元帥吳楨從大將軍逹率馬步走師由港口取湖州公勒竒兵出舊館扼之戰以大捷劉嵩吳襄毅神道碑辛丑嵗常遇春從上破江州冬十有一月張士誠寇長興命遇春往援士誠兵敗俘殺五千餘人宋濓開平王神道碑國初偽漢陳友諒為徑敵偽吳張士誠次之吳能西擾建業我則不敢越鄱陽而取武昌矣是時以長興侯耿炳文守長興江隂侯吳良守江隂長興守則陸騎不能出徽歙所以斷平江之掌股江隂守則舟師不敢窺通泰所以扼平江之襟喉吳不我擾而陳氏滅張氏繼之矣見聞雜記永樂二十一年陽武侯薛祿奉命討捕湖州叛冦楊士竒薛公神道碑王晉溪在本兵時適湖州孝豐縣湯麻九反勢頗猖獗浙江巡按御史解冕奏聞朝廷下兵部議晉溪呼賫本人至兵部大言數之曰湯麻九不過一毛賊只消本處差數十火夫縛之此何足奏報欲朝廷發兵殊傷國體此御史不職即當考察論罷矣賫本人回浙江傳説此語一時皆以為湖州江南地朝廷不肯處分豈置之度外耶倘賊勢蔓延猝不可撲滅本兵甚為失䇿賊亦偵知此語恣意劫掠不設隄備先是户部為查錢糧差都御史許延光在浙江晉溪即請密敕許公討之且授以方略即命憲副彭姓者潛提民兵數千餘出其不意乘夜而往賊方虜掠回相聚酣飲兵適至即時擒斬無一人得脫者爾時若朝廷命將遣兵彼必負固拒命淹頓日久不但勝負未可必縱勝而兵勞財費亦已甚矣晉溪此舉蓋不煩一旅不損一財而地方尋定謀之廟堂之上而定難于數千里之外若身履其地所謂折衝于樽俎者非耶四友齋叢説與石淙碑微異考杭志斯時無憲副彭姓者湖有白包巾之變妖人馬道師煽衆騙財無他志有司捕之急適民兵三月不給糧乃相搆而亂先生馳入府請速追原捕差因諭安亂者并散補民兵應得已而議報諸司申檄先生力勸緩抑其辭時有欲窮詰之者先生白當事者曰衆逞其情而隂德歸損于公公則愚矣又白承勘者曰一字千命舉筆神知乃以前後事由遍白諸司曰寧失不經古聖人良法于是全活甚衆唐樞木鍾臺集梅溪有江天祥之亂公私戒嚴兵無可衛調者部使及監司議撫以托于先生先生遂入其巢諭之曰汝之仇趙吾甚憐其情乃忿發轉仇于國法其為計左矣江曰大人言則過乎先生曰法度乃國家法度有仇許汝自白有司不公許汝并白有司并白而不行直咎命而已敢與國家敵國家合四海之力如繭絲牛毛國家法度能治汝鮮隱國家存恤不辜之仁誰能照汝隱情吾甚為汝憐之今為汝計莫若急卸刀備吾能保汝待以不死江曰大人何自而來先生曰部使監司屬之來江曰其屬之來何故先生曰亦為兵力不足江曰既不足兵力何以謂國家能治我先生曰兵力不足者于湖于浙言之合四海之力而于汝謂之不足耶江曰信以何術貸我先生曰諸司不可憑只吾不欺一念可以獻信江曰大人何以信諸司先生曰諸司圖之急乘其急而應之即赴戎所可全信也江曰設諸兵力足以謀大人大人何指先生曰吾安肯欺汝始唐三府謀于吾吾以急請兵告吾幾中汝江曰公誠神人也語唐三府計已牒知之吾謹任公進止遂撒凶防散黨與出領讞罰上浙之三司方伯王紹何天衢憲長梁材都指揮陳璠暨同官以書抵豫請曰湖之孝豐有湯許二姓者恃險為亂不受約束不輸賦稅潛納亡命時出殺掠人而奪其貨財焚人室廬劫庫藏拒敵官軍有司不能制守土者以為憂然莫敢任其事巡按監察御史解冕議曰寇賊姦宄為民大蠧滋不可長乃具疏以聞上命巡撫南直𨽻都御史張津督師討之既受敕乃率三司長二各簡精鋭分路進勦部署已定躬率大軍直臨冦境賊欲戰不敵欲竄不能旋伏道旁延頸就縛間有奔佚山林下令必生致之不遺寸鏃而三十年之患一旦悉平上聞捷嘉賞楊一清平冦碑嘉靖三十六年九月有烏鎮李道人之亂放火劫掠鎮民逃竄兵憲天津劉公濤發兵擒之旬五而定先于二十六年間有烏鎮西柵雙陽村李道人名松身短面黃三鬚約年三十餘嵗來遊本鎮托住鎮民沈松家設立道場持齋諷經自言諳曉道法呼風喚雨稱為白蓮教主善度衆生妄刻江山水石保命長生天福印記多製白巾為號妖言末劫之年地方大災太湖水乾五十餘里現出金寶不久洪水泛漲民將魚鱉從吾齋戒給與印信白巾臨期免死使沈松與同鎮隂陽生郭震傳教煽惑人心震又言道士左手有山河右手有社稷腳底有乾坤二字實係真命主由是四逺村愚北面受戒者不知幾千百人因而分為大乘苦空等七十二教名色在七十二處起兵救度十三布政司九十二億人歸我遂有拳教李南蔣朋稱為李把總蔣先鋒尊李道人為師待招兵衆多一時起兵先占湖州候各處兵到共成大事更有嘉湖兵道水兵把總武生毛筌及陸兵隊長薑緯拳教髙仙秀水縣胥江叔約同張龍等亦投李道人為師道人言天下該換吾已各處招兵你門亦各處招兵助我明年三月內起兵成事俱有大官筌等各歸謡言暗地結義招兵俄有武生胡亮為筌招拉作逆言兵馬俱齊有李道人為主各處將白巾號布分散準在九月十四甲子日甲子時起兵攻城約于城外五里亭取齊各分兵圍繞四門放囚劫庫云云亮知大逆佯許潛歸密發于劉兵憲急督把總王彥忠千户崔丹金廷潤鎮撫劉欽等發兵勦捕須臾毛筌髙仙薑緯受縛于張龍樓上獲妖印一顆號布三匹白巾三頂妖書二本一面督行湖州所領兵指揮蔡茂思千户李鉞到鎮擒捕兵到止擒沈松一人李道人同沈林沈乾蔣朋俱各逃脫更欲乘機作亂劫奪沈松蔣朋等遂舉火為號至雙林朋𥪡起青旗桑四家𥪡起白旗意圖二路起兵接應不至更聞筌等已擒隨即緣賊黨五百餘人并李南張濟等駕船至鎮將房屋焚燒口稱隨我歸死鎮民皆逃朋見嘉興兵至朋故身穿紅袍張青絹傘虜掠居民駕舟前往雙林屯住又言毛兵即來助我吳江宜興等兵不時就到衆可安心及見官兵有旗招撫朋等傳令不許聼從違者斬首然見勢孤各各先竄李南夜投唐氏千户崔丹督兵圍捉南出拒敵殺傷兵士朱森塢江戮死李成王恩等南即就縳各賊旋遁雙林迤西官兵追至西漾適與湖州兵合蔣朋等遂率衆上岸拒敵兩軍夾擊奔走不及就陳擒獲朋震等五十八名送道研審得姚吳等四十六名被虜搖船當即釋放惟李南蔣朋等十有二名從賊分有印信白布從賊梟斬餘俱不問此誠村市一大變也嵗壬辰有以同州白蓮黨變密告開府而沈公率以善巧默散之為德厚矣適見舊案節録以為白蓮村社之戒見只編霅川自唐末五代以來不經兵火此非天幸蓋其地險可守者二十不當孔道非必爭之地一也陂澤瀰望塗泥沮洳舟車皆阻二也環城無駐足之地難下寨難施炮架難用綽路馬難推鵝車洞車雲梯之屬三也城外居民屋宇不過數十家臨時拆毁容易四也地薄數尺即水不可穿穴地道五也塘路多有水港間斷六也陸行不可並馬七也城上非沙難頺八也舟楫輕捷人人能投水九也油泥可用澆潑塘路及近城去處去一二尺乾土以油泥實之油泥厚尺許非一兩月不能實馬與人踏踐無不蹶陷十也釘樁犬牙相錯多下暗樁舟載稍重則為暗樁所礙舟稍大則不能入樁進退不可十一也茭葑堆積以覆陷穽誘之陷沒放水浸田使不可行十二也城中多大家有資力可召募群不逞羣不逞為官收拾既可免竊發又多趫勇可用十三也去山逺無以髙臨下之勢十四也水流不湍峻不可引以灌城十五也敵竒正兵不敢來不過偏師到此已是冬末春初不能久留十六也兩溪灌注無渴乏之患十七也家家近水火攻易救十八也西南北水面濶雖閉門久氣不欎壅不致生病十九也有魚蝦螺蜆菰茭鳬茈藕根可以助食二十也大凡守城須先逺守城外險處南門陸路當守何山嶺水路當守衡山東門當守舊館升山水路當守河口毗山青塘門西門當守法華仁王山路水路當守永夀北門水路當守大錢等處險不能拒然後退而守城盡拆橋梁輦去石若不輦去彼作炮用環城港汊皆施樁陸路當掘坑用油泥茭葑暗施鐵蒺藜苦竹槍使之川陸無路舟馬皆不可近城先之以守遠險次之以守近險然後守城是三重城也又守處在逺城中人少驚恐人心自安敵至則又當撓之或劫其火頭輜重或夜劫其寨敵睡重易劫或放火或決水或出竒兵于其後及其左右近城村落隔水抄掠亦難不過一月乏食遁矣然而尾而襲之常逺而勿迫自然陷溺非惟可保性命亦且立峻功矣然必人心一部分定號令明斥堠逺賞罰信權出于一勿有二三禁虛驚禁妄言禁喧笑主謀者不怯畏處之恬然雖破城猶可巷戰死鬬也若其積糧積薪及守城器具自有常度不必詳述至于臨時機變隨機而應又難預言經鋤堂雜志吾郡武備自漢而下或設營以團練或保伍以從戎其制雖不可考而都督之設護軍之名建威將軍之立晉王獻之宋謝莊何戢梁信都遵皆嘗以前官帥湖軍平內難矣而蘇峻之逼遷天子也虞潭得起兵于三吳折衝禦侮之士見于史書者炳炳有謂湖兵不亞關中之語矣降至于唐無聞焉蓋其始有府兵而天下無兵其既也有藩鎮之強而李師悅無取兵之策故也錢鏐始重其地以錢偡為節度使鎮之制兩廂設禁衛宋設禁軍營有四元平江南以禁廂八營并為四領以録事司𨽻江浙行省自宋至元將之設有專官兵屯之數有定額而教閲不嫻講武無地食粟而已偽吳罷録事司以禁廂分屬二縣烏程歸安我師克長興置元帥府士誠改千户所移于郡操兵二百八十八人運兵六百二十七人屯兵五百二俱舊額新附者殆不可計居之以官房優之以廪餼弛之以差徭今之馭將可謂渥以殊禮矣而卒流于將驕卒惰何哉亦曰教之不素耳嘗試籌之郡西南多山且平衍可以弓亦可以騎東北多水可以舟當春夏水盛以具區為江漢之境或以附近碧浪湖一帶亦可聫以大艦其戰也以水教秋冬移之廣苕或以附近辨山一帶亦可示之陳教之騎二法行又選以民兵夾以軍伍厚優恤濃賞勞水戰三日則休之日以十陸戰三日則休之日以七其當戰也號令必嚴賞罰必信器械必精甲胄必鮮坐作進退必齊以一起伏合散必舒以徐夫然後可兵可民可吏可將可川陸可水火持此豫教之衆以備不虞而武事立王道隆野史吳興備志卷十九
