body:
  text: 吳興備志卷二十明董斯張撰賑恤徵第十六漢陽嘉二年春二月甲申詔以吳郡饑荒貸人種糧後漢書吳赤烏十三年秋八月故鄣寧國諸山崩鴻水溢詔原逋責給貸種食吳志晉咸安二年三吳大旱人多餓死詔所在賑給晉書宋泰始二年曲赦吳吳興義興晉陵四郡宋書元嘉七年吳興晉陵義興大水遣使巡行賑恤十二年六月丹陽淮南吳興義興大水京邑乘船己酉以徐豫南兖三州㑹稽宣城二郡米數百萬斛賜五郡遭水民孝武孝建二年秋八月三吳民饑詔所在賑貸大明元年五月吳興大水人饑乙卯遣使開倉賑恤廢帝永光元年八月丙戌原除吳吳興義興郡大明八年以前逋租並上齊建元六年九月辛丑詔二吳義興三郡遭水减今年田租南齊書永明五年八月乙亥詔今夏雨水吳興義興二郡田農多傷詳蠲租調永明六年八月乙卯詔吳興義興二郡水潦被水之鄉賜痼疾篤癃口二斛老疾二斛小口五斗永明八年詔吳興水淹過度開所在倉賑賜永明九年都下大水吳興偏劇竟陵王子良開倉賑救貧病不能立者於第北立廨收養給衣及藥並上太和二年六月戊寅蘇湖二州水賑米二十二萬石以本州常平義倉斛斗給舊唐書宋太平興國六年四月丙戌罷湖州織羅放女工通鑑皇祐四年二月庚子蠲湖州民所貸官米上嘉祐六年秋七月詔賑恤浙江灾宋史政和七年詔罷浙江花石綱宋史建中靖國元年自七月雨至於十月蘇湖秀三州水賑之紹興二十三年湖秀二州大水賑之紹興二十八年九月癸闕蠲平江紹興湖州被水民逋賦紹興二十九年湖秀諸州饑賑之紹興三十一年正月丁亥免湖州增丁所輸絹孝宗時湖州安吉夏租繭絲之征既輸細絲又輸細綾又輸細絹御史謝諤請蠲其一從之楊誠齊謝昌國神道碑慶元元年正月乙巳蠲嚴台湖三州貧民身丁折帛錢一年九月己酉蠲嚴台湖三州被灾民丁絹宋史紹定六年詔兩浙轉運司臨安府嘉興府安吉州竹木之徵再蠲三月續文獻通考寶祐三年二月都省言臨安安吉嘉興屬縣水潦溺死頗衆詔各部守臣給錢埋瘞時馬光祖知榮王與苪府有積粟三往見之王以他辭光祖乃臥於客次王不得已見焉光祖厲聲曰天下誰不知儲君為大王子今民饑欲死不以此時收人心乎王以廩虛辭光祖探懷中出片紙曰某莊某倉若干王語塞遂許以三十萬光祖遣吏分給活饑民甚衆景定二年九月辛酉詔湖秀二郡水灾令其亟勸分監司申嚴荒政景定三年二月丁亥朔臨安安吉嘉興屬邑水民溺死甚衆詔守臣給槥瘞之並上咸淳六年閏十月己酉安吉州水免公田稅四萬四千八十石宋通鑑德祐元年十一月賜長興武康縣民錢并免今年田租宋史元至元二十五年夏四月癸酉尚書省臣言杭蘇湖秀四州大水民鬻妻女易食請輟上供米二十萬石審其貧者賑之帝是其言元史大德六年六月杭嘉湖等路饑賑糧二十五萬一千餘石續文獻通考天厯二年江浙行省言常州湖州諸路饑民當賑糧一十四萬三千餘石從之續文獻通考至順元年江浙大水民饑詔行省以入粟補官鈔三千錠及勸出粟十萬石賑之至順二年湖州安吉太湖溢漂民居二千八百九十户溺死一百五十七人命江浙行省賑恤之中統二十四年正月蘇湖常秀四州俱饑十二月免浙江魚課三千錠聽民自漁至正元年以兩浙水灾免嵗辦餘鹽三萬引並上洪武二年十二月賑應天杭湖蘇松諸郡貧民人給米一石棉布一匹松江新志厲子溫青田人國初以明經擢監察御史洪武癸丑命踏湖州水荒以實復命上曰先曰無爾獨曰有莫不知所以者乎對曰天知地知臣知君獨不知帝忿其言不遜斬之後果如其言因榜書於午門曰豪傑御史厲子溫括倉彚紀洪武戊午八月詔免長興安吉兩縣今年秋糧通紀洪武庚申春三月减蘇州松江嘉興湖州四府稅額先是張士誠竊據其地而蘇州尤稱富庶徐逹常遇春等統精兵二十萬攻之數年始下太祖怒其附寇持城不降乃取諸豪族租簿俾有司加稅故蘇賦特重而松江嘉湖次之蓋以懲一時云至是命户部裁其額凡一畝科七斗五升至四斗五升者减十之二四斗三升至三斗六升者止徵三斗若五升以下仍舊上永樂二年六月命太子少師姚廣孝往蘇湖等府賑濟資治通鑑永樂二年十一月以蘇松杭嘉湖等府水灾蠲其今年糧六十萬九千九百餘石松江新志永樂三年浙西大水右僉都御史象山俞士吉與户部尚書夏原吉通政趙居任大理少理袁復奉敕往治兼督農務時湖州被灾尤極虧糧五六十萬同事者以所虧之數反十倍於所輸欲損其數以上士吉力爭曰欺君病民吾不忍為也雖重得罪吾自任之竟以實聞上允納悉蠲其輸仍刺發廩賑之民賴以蘇寧波府志四年九月賑蘇松常杭嘉湖六府流徙復業民户十二萬二千九百有竒給粟十五萬七千二百石有竒松江新志永樂九年湖州府無徵糧米十七萬二千四百餘石所司一概催徵民日逃亡浙江按察司周新奏乞遣官覆驗上即命户部核實蠲免雙槐嵗鈔十二年十一月蠲蘇松嘉湖杭五府水灾田租四十七萬九千七百餘石初有司請减半徵之上謂户部尚書夏原吉等曰民田被水無收未有以賑之又可徵稅耶悉蠲之松江新志吳興備志卷二十
