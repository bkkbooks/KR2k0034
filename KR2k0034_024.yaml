body:
  text: 吳興偹志卷二十四明董斯張撰金石徵第二十凡郡人墓志附烏程禪幽寺有式道人碑南宋時見談志德清大中乾元寺釋伽寳殿四字梁武帝書大中乾元之寺六字唐栁公權書談志天目紫陽觀梁昭明太子勒碑記勞志陳始興昭烈王碑沈烱撰藝文𩔖聚陳新蔡王墓志沈志道撰吳興叢錄報徳寺在長興五峯山有陳博士虞寄碑勞志陳吳興郡廬陵王德政碑江總撰藝文𩔖聚沈傅師墓志姪堯章書鄭樵金石畧羅池廟碑記韓愈撰沈𫝊師書趙明誠金石錄栁州井銘栁宗元撰䝉泉詩宇文鼎撰俱沈傅師書西臺舍人贈泗州刺史徐府君碑張說撰文苑英華天下放生池碑在魯公祠唐肅宗御書題額銀青光祿大夫使持節昇州諸州軍事昇州刺史充浙西節度使兼江寧軍使柱國丹陽縣開國侯臣顔真卿撰并書大厯八年于州駱駝橋北建談志白蘋亭記在墨妙亭唐殿中侍御史内供奉李直方撰前太僕寺主簿史鎬書并篆額後䟦元和元年夏節度判官侍御史王澹獲覽此作談志鄭樵金石畧云鎬分書故光祿大夫右散騎常侍集賢院學士贈太子少保東海徐文公神道碑張九齡撰曲江集章后坊有唐經幢十數刻尼名談志歸安永興寺唐進士吕行周記顔真卿篆額即鹿苑寺也已載郡志寺觀𩔖今出之明月峽有唐人書顔真卿蚕頭鼠尾碑尤巨長興志長興廣惠教寺唐尚書王繕撰碑長興志報恩光孝禪寺文殊堂額顔魯公書又有謝安石碑裴清撰談志唐丞相李紳墓碑在烏程乾寧三年立勞志寳相寺在德清唐漢陽王張柬之為碑又靜林寺張柬之碑談志烏程有唐興善寺碑宋瑞相院碑見勞志名宦𩔖大唐興善寺碑字徑三尺體勢壯逸相傳燕公張說書寺在新市今號覺海故令陳子方龕于乾元寺後置墨亭談志勅書褒戰功記在甲仗庫前唐憲宗賜刺史辛秘及慰問将士詔也長興有崔祐甫銘崔植誥崔趙村在罨畫溪之右崔即唐相祐甫後也家藏韓愈所作祐甫墓銘雖蟬腐而精彩如新又藏崔植崔逖等誥數軸吏部尚書真卿吏部侍郎說尚書上柱國邕知制誥揆吏部尚書林甫平章事墀筆跡並存其家寳之官為蠲其丁錢並上東林祗園寺石經幢唐大中五年五月二十一日卞歡沈暹等奉勑建沈𢎞斌書東林山志碧瀾堂有杜牧𨽻書扁三大字吳越王錢鏐嘗題詩于壁大明一統志華藏寺有錢王䕶戒牒談志武康學大成殿徽宗御書題額談志歸安天申介福宫在東林山髙宗御書額已載郡志寺觀𩔖今出之武康昇元報德觀髙宗御書額武康顯忠崇孝資福禪寺髙宗御書寺額李氏南園在霅川有懷岷閣宋理宗御書癸辛襍識名掌故已載園𩔖今出之黄龍洞有真宗朝金字牌上太子右師御率府副率沈君墓志銘曽鞏撰南豐集德清縣君周氏墓志銘在卞山尚書都官員外郎陳君墓志銘在雉山並曾鞏撰上孝豐縣百福院記宋知懷州孔叔詹撰勞志安定先生胡瑗墓表歐陽修撰并書有舊榻本在予家慈感寺超覽閣三字蔡京書詳瑮徵重修至聖文宣王廟記宋直史舘陳堯佐記刻置德清學重修孔子廟碑宋德清令竇充撰刻石在學鄭閒靖留題月泉壁宋鄭如幾與沈彦居吳子常周美中同遊慈相寺月泉訪東坡題壁重修德清縣宇記宋邑人鄭如幾撰并書重修德清社壇記宋縣尉張逸民撰刻置壇内增修德清學記宋縣尉張逸民撰并書德清縣學贍士田碑宋知縣黄耕撰立石在學重修德清學記宋知縣趙伯摶撰刻之學中德清義庄賑濟田碑宋知縣黄耕立石在學仙潭二大字宋狀元吳潛書牓于仙潭灣上已上並德清縣志獅子吼寺宋編修沈瀛記勞志鹿苑寺重修隆興中侍郎葛立方宗丞沈詢進士吳椿有詩並記刻石青蓮院劉一止記覺海寺有法鑒講師若愚塔銘並上特進陳與義墓銘禮部侍郎張嵲撰在廣德鄉謝安墓在長興三鵶村大觀三年縣尉周邦積題其墓柱曰普太𫝊文靖謝公之墓長興志長興梵惠教寺江東汪用汝記長興澄心教寺宋祥符中有碑記吳季子廟在長興合溪紹興中重修祝鑑記長興大雄教寺治平中石曼卿書額元趙孟頫記長興玉竇泉宋侍郎錢伯言記並上靈濟廟碑焦絡撰談志湖州貢院記狀元張孝祥書額大諌劉度記司業芮曄書談志劉燾稽古閣三字在州學厯年圖碑晝錦堂碑並在安吉縣學韓磊刻磊安吉令眞武畫像碑在佑聖宫丞相沈該贊曹孝子祠堂劉燾記趙直講祠堂記在魯公堂乾道中仲并撰孺子山徐孺子廟紹興中重修江都唐法記並上太府少卿福建運判直寶謨閣李浃墓志銘翰林醫痊王克明墓志銘葉適撰姜安禮墓志銘在武康上栢岩山福建運使直顯謨閣少卿趙彦倓墓銘在武康上栢山大宗丞兼權度支郎中高子潤墓志銘在武康上栢山袁聲史墓志銘在烏桯厲山俱葉適撰尚書禮部侍郎致仕贈大中大夫衛公膚敏神道碑烏程戴塢汪藻撰浮溪集安吉州烏程縣南林報國寺碑記奉議郎秘書省著作佐郎兼四川制置副使司參議官李心傳撰朝散大夫起居郎兼侍講李性傳書朝奉郎試中書舍人兼權吏部侍郎兼同修國史院實録院仝修撰洪咨䕫題額宋嘉熈元年立碑見在寺中潯溪祗園寺莊田碑記左朝奉郎簽書江隂軍判官㕔公事賜緋魚袋丁昌朝撰右通直郎前福州懷安縣主管學事兼勸農公事練汝舟題額紹興二十一年立碑存寺中沈東老祠堂碑記元豐七年吳興知州軍事朝奉大夫集賢院大學士提舉南京鴻慶宫賜紫金魚袋里人陸元光撰東林山志東林山靈應廟碑紹興十六年前進士左承直郎權通判常州軍州主管學事兼管勸農事借緋魚袋里人沈長卿撰左廸功郎新嚴州分水縣尉兼主簿主管學事巡捉私茶塩􅈨里人倪偁書進士沈繹之立石囬仙人祠堂記紹興二十二年左朝奉大夫檢校中書事直史館編修賜紫金魚袋邑人劉一止撰敷文閣直學士左朝議大夫知史舘編修兼侍講勸農事俞俟書囬仙館記程公許撰楊棟書李性傳篆額張按棟字元極青神人歴參知政事玲瓏山張謙中篆歸雲洞三大字端禪師行業記郡人劉燾撰并書端師子語録湖州常炤院記開禧三年陸游撰渭南集沈賔王山記開禧乙丑楊萬里撰誠齋集安吉州朱夫人墓志銘建炎己酉沈與求撰在鳳亭山龜溪集朝請郎陶旐墓表建炎二十五年汪藻撰在法華山浮溪集湖州勝賞樓記嘉定十五年葉適撰水心集沈德和北村記葉適撰上萬鍾南園記慶元二年煥章閣學士洪邁撰談志玲瓏山有唐杜牧題名又紹興癸夘葛魯卿林彦政劉無言莫彦平葉少藴題名談志此已載掌故山墟今出之德清縣㕔壁記宋吳永叔撰事文𩔖聚朱吉甫墓碑記文及翁撰在安吉縣移風鄉孝豐志提幹文林趙崇禪墓志銘咸淳戊辰黄震撰在武康金龍山黄氏日抄長興縣主學㕔題名記咸淳七年黃震撰上安吉仁濟廟兩廊記魯伯能撰安吉州志宋安吉縣令題名記劉希仁撰上按希仁莆人位編修劉克莊之弟也朝散郎致仕胡君墓志銘汪藻撰浮溪集即胡仔之祖也墓在安吉縣管城之原資政殿學士牟子才墓志銘高斯得撰在菁山勞志貢院記在貢院中上吳興封山資敬寺記釋大訢撰訢笑隱語録湖州路資福寺鐘銘釋大訢撰上湖州總管郝侯祠記天目圓照菴記俱釋本明撰中峯廣録管公樓孝思院記元封贈吳興郡公趙公碑先侍郎阡表魏國夫人管氏墓誌銘俱趙孟頫撰松雪齋集大雄寺閣記重修觀堂記眞人杜道堅碑俱趙孟頫撰上天聖寺有古檜趙子昂題曰古檜堂勞志𤣥妙觀趙子昂書額金婆樓迎眞道院趙子昂題額上牟巘墓誌銘趙子昂撰在三碑鄉湖州路總管府題名記皇慶元年集賢侍講學士中奉大夫趙孟頫撰并書推官㕔題名記至大二年四明袁裒撰趙孟頫書并篆額長興縣修建東嶽行宫記資善大夫徽州路摠管孟淳撰集賢侍講學士中奉大夫趙孟頫書重修飛英舍利塔記資善大夫常州路摠管孟淳撰文林郎江浙等處儒學提舉趙孟籲書元故中奉大夫嶺北湖南道肅政亷訪使鄧公神道碑在德清千秋鄉百寮山吳澄撰重建䕶聖萬壽禪寺記斷崖和尚塔銘虞集撰道園學古録史氏程夫人墓志銘虞集撰上牟應龍墓銘虞集撰在三碑郷至正五年特賜趙孟頫墓道之碑勅翰林學士歐陽𤣥為文集賢侍講學士蘇天爵書丹翰林學士承㫖張起巖篆額松雪齋集德清縣學祭噐記沈氏義庄記俱黃溍撰黃學士集奉訓大夫婺源州知州程郇墓志銘在烏程永新鄉桃塢承務郎杭州路富陽縣尹倪淵墓志銘在昆山信州路摠管府判官謝公墓志銘德清永和鄉方山並上陳子中墓碣烏程菁山上紫芝亭記敷山記俱戴表元撰剡溪集𤣥妙觀重建玉皇殿記東湖書院修造田記長興州重建學宫記俱楊維楨撰勞志湖州路安定書院夫子燕居堂碑銘富珠哩翀撰湖州路歸安縣修學記儲惟賢撰新復徳清塘隄岸記程郇撰並上重建錦峰塔院碑記大德四年漢東孟淳記昭武謝公麟書前進士三山唐垕題東林山志東林山觀魚亭至正庚子魏人趙彦徴籀書題其楣張師古撰記上南潯重修城記南潯鎮儒學教諭楊天顯書至正辛丑立碑在垂虹橋勞志愛山臺記元張世昌撰上安吉縣唐李衛公廟石記元范文輔撰安吉州志湖州孔子廟碑揭雲撰勞志莫月鼎碑宋濓撰宋學士集元故湖州路德清縣君陳府君墓銘宋濓撰並上在三碑郷吳孟思墓志銘劉基撰在武康封禺山慈感寺毘羅閣記郡人楊復撰重修峴山顯化禪寺記楊復撰峴山志太常司丞張來儀墓銘童冀撰在九里岡靜居集湖州府屬縣義倉記黃淮撰勞志重建府治記重修碧瀾堂記張亷撰湖州府重修廟學記魏驥撰烏程縣學明倫堂記周忱撰烏程縣儒學重修記李旻撰並上湖州府新置孝豐縣記程敏政撰篁墩文粹明封刑部主事浩齋陸君墓碑在焚澤王文成集重修安定先生墓記陸麟撰清惠集湖州府學尊經閣記袁袠撰袁永之集逸老堂碑文夀承書筆師聖教序當為山中碑刻第一峴山志毗山漢夀亭侯關公廟碑浙直分署碑俱董潯陽撰泌園集唐一菴先生祠堂記許孚遠撰敬和堂集重修天聖寺碑秀水沈思孝撰平湖陸光祖篆額郡人董嗣成書萬厯癸巳年立千松禪院二碑一四明屠隆撰一歸安沈桐撰碑存寺中吴興偹志卷二十四
