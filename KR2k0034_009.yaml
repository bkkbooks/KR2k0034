body:
  text: 吳興偹志卷九明董斯張撰人物徵第五之二沈曇慶懷文從父兄也父發員外散騎侍郎曇慶仕宋位尚書左丞時嵗有水旱曇慶議立常平倉以救人急文帝納其言而事不行大明元年為徐州刺史時殿中員外將軍裴景仁助戍彭城景仁本北人多悉關中事使撰秦紀十卷敘苻氏事其書傳於世曇慶謹實清正所蒞有稱績嘗謂子弟曰吾處世無才能圖作大老子耳世以長者稱之終祠部尚書南齊書沈儼之字士恭徐州刺史曇慶子亦不仕永明元年徵中書郎沈文季字仲達文叔弟也以寬雅正直見知尤善博及彈碁在宋封山陽縣五等伯位中書郎父慶之遇害諸子見收文叔謂之曰我能死爾能報遂自殺文季揮刀馳馬去收者不敢追遂免明帝立為黃門郎沈攸之起義齊髙帝加文季冠軍將軍督吳興錢唐軍事改封西豐縣侯文季風采稜岸善於進止厯尚書右僕射王晏嘗戲文季為吳興僕射文季答曰琅琊執法似不出卿門建武二年魏軍南伐明帝以為憂制文季鎮壽春文季入城嚴加偹守魏軍尋退百姓無所損後東昏屢行殺戮尚書令徐孝嗣深懷憂慮欲與文季論時事文季輒引以他辭終不得及文季以時方昏亂託老疾不預朝機兄子昭略謂文季曰阿父年六十為員外僕射欲求免乎文季笑而不答未幾見害先被召便知敗舉動如常登車顧曰此行恐往而不反於華林省死朝野寃之中興元年贈司空諡曰忠憲公世祖在東宫於玄圃宴會朝臣文季數舉酒勸禇淵淵甚不平啓世祖曰沈文季謂淵經為其郡數加淵酒文季曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆遂言及兵事淵曰陳顯達沈文季當今將略足委以邊事文季諱稱將門因是發怒啓世祖曰禇淵自謂是忠臣未知身死之日何面目見宋明帝世祖笑曰沈率醉也中丞劉休舉其事見原後豫章王北宅後堂集會文季與淵並善琵琶酒闌淵取樂器為明君曲文季便下席大唱曰沈文季不能作妓兒沈麟士父虔之宋樂安令麟士幼而俊敏年七嵗聽叔父嶽言玄賓散言無所遺失嶽撫其背曰若斯文不絶其在爾乎及長有髙尚之志作玄散賦太守孔山士辟不應宗人徐州刺史曇慶侍中懷文左率勃來候之未嘗答也會稽孔源休輩皆從學焉年過入十耳目猶聰明家故被火災乃手抄故所燬亡書成二三千卷滿數十篋人以為飬身靜默之所致也卒年八十五遺令祭奠惟清水一盂子孫奉而行之上沈憲字彥璋演之從祖弟子也憲少有幹局為駕部郎宋明帝與憲碁謂曰卿廣州刺史材也補烏程令甚著政績太守禇彥回嘆以為方圓可施以吏能纍遷少府卿武陵王曄為會稽以憲為左軍司馬帶山隂令政聲大著孔稚圭請假東歸謂人曰沈令料事特有天才南齊書沈沖字景綽懷文子也懷文得罪被繫沖兄弟行謝情哀貌苦見者傷之入齊屢遷御史中丞五兵尚書沖與兄淡淵名譽有優劣世號為腰鼓兄弟淡淵並厯御史中丞兄弟三人皆為司直晉宋未有也永明中淵彈吳興太守袁彖建武中彖從弟昂為中丞到官數日奏彈淵子繢父在僦白幰車免官禁錮沖母孔氏在東鄰家失火疑為人所焚爇大呼曰我三兒皆為御史中丞與人豈有善者方恐肌分骨散何但焚如兄弟後並厯侍中武帝方欲任沖尋卒追贈太常諡曰恭子邱靈鞠烏程人父道真護軍長史纍遷員外郎後為烏程令不得志泰始初坐事禁錮數年禇淵為吳興太守謂人曰此郡才士惟有邱靈鞠及沈勃耳乃啓申之武帝即位尋領東觀祭酒靈鞠曰人居官願數遷使吾終身為祭酒不恨也靈鞠好飲酒臧否人物在沈淵坐見王儉詩淵曰王令文章大進靈鞠曰何如我未進時上齊竟陵王子良開西邸招文學王僧孺與太學生邱國賓邱令楷輩並以善詞藻遊焉國賓吳興人以才志不遇著書以譏揚雄令楷亦吳興人南史太學生會稽魏準以才學為王融所賞融欲奉竟陵王子良準鼓成其事虞羲邱國賓私相謂曰竟陵才弱王中書無斷敗在眼中矣後如其言王融傳吳興邱仲起字子震為晉平郡清亷自立禇淵嘆曰見可欲心不亂此楊公所以遺子孫也元徽中官至廷尉上吳興沈徽孚以士流通書舍人而已無權利徽孚粗有筆札建武中文詔多其辭也官至黃門郎南齊書始安王遙光勸上併誅髙武子孫於是並敕竟陵王昭胄等六十餘人入永福省令太醫煮椒二斛謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之會上暫卧主書單景雋啓依旨斃之徽孚堅執曰事須當更審爾子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命耶徽孚以答上撫床曰遙光幾誤朕事及見子恪顧問流涕諸侯悉賜供饌子恪傳沈瑀字伯瑜武康人父昶事宋建平王景素景素謀反昶先去之後繫獄瑀詣臺陳請得免罪由是知名為奉朝請初瑀在竟陵王家素與范雲善齊末嘗就雲宿夢坐屋梁柱上仰見天中有字曰范氏宅至是瑀謂帝説之帝曰雲得不死此夢可驗及帝即位雲深薦瑀自暨陽令擢兼尚書右丞瑀薦族人沈僧隆僧照並有吏幹帝並納之厯潯陽太守為信成蕭頴達長史瑀性倔強每忤頴達頴達銜之天監八年因入咨事辭又激厲頴達作色曰朝廷用君作行事耶瑀出謂人曰吾死而後已終不能側傾面從是日於路為人所殺多以為頴達害焉子續纍訟之遇頴達尋卒事不窮究續乃布衣疏食終其身梁書沈瑀為建德令教民一丁種桑十五株柿四株及梨栗女丁半之頃之成林矣合璧事類沈瑀為揚州部從事時建康令沈徽孚恃勢傲瑀瑀以法繩之衆憚其強沈瑀傳沈約字休文性不飲酒雖遇隆重而居處儉素立宅東田矚望郊阜嘗為郊居賦以序其事左目重瞳子腰有紫志聰明過人好墳籍聚書至二萬卷京師莫比少時孤貧丐於宗黨得米數百斛為宗人所侮覆米而去及貴不以為憾裴子野祖松之宋元嘉中受詔續修何承天宋史未成而卒子野嘗欲繼承先業及齊永明末沈約所撰宋書稱松之已後無聞焉子野更撰為宋史略二十篇云戮淮南太守沈璞以其不從義師故也約懼徒跣往謝之請兩釋焉約削宋史子野亦削宋略南史參楊休玠八代談藪沈顗字處默齊永明中徵拜著作郎太子舍人通直郎並不起梁天監四年大舉北侵南陽樂藏為武康令以顗從役到建業揚州别駕陸任以書與吳興太守桞惲責其不能甄善别賢惲大慙即表薦之所著文章數十篇沈峻字士嵩武康人家世農夫至峻好學與舅太史叔明師事宗人沈麟士在門下積年晝夜自課睡則以杖自擊其篤志如此遂博通五經尢長三禮為國子助教兼五經博士於館講授聽者常數百人及中書舍人賀琛奉敕撰梁官乃啓峻同補西省學士助撰録書成入兼中書舍人出為武康令邱遲字希範靈鞠子八嵗便屬文靈鞠常謂氣質似我梁武帝平建業引為驃騎主簿甚被禮遇時勸進梁王及殊禮皆遲文也及踐阼遷中書郎待詔文德殿時帝著連珠詔羣臣繼作者數十人遲文最美坐事免乃獻責躬詩上優辭答之後出為永嘉太守在郡不稱職為有司所糾帝愛其才寢其奏天監四年臨川王宏北侵魏以為咨議參軍領記室時陳伯子在北與魏軍來拒遲以書喻之伯子遂降邱仲孚字公信靈鞠從孫少好學讀書常以中宵鐘鳴為限靈鞠嘗稱為千里駒齊永明初為國子生王儉曰東南之美復見邱生舉髙第未調還鄉里家貧乃結羣盜為之計劫掠三吳仲孚聰明有智略羣盜畏服所行皆果故亦不發復為衛尉卿領大匠纍遷豫章內史在郡更厲清節頃之卒贈黃門侍郎梁書吳興邱師施以亷潔稱罷臨安縣還惟有二十籠簿書並是倉庫劵帖當事比以范述曾位至臺郎南史沈崇傃字思整懷明子也太守桞惲辟為主簿崇傃從惲到郡還迎其母母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號哭旬日殆將氣絶兄弟謂之曰殯葬未申遽自毁滅非全孝之道也崇傃之瘞所不避雨雪倚墳哀慟每夜恆有猛獸來望之有聲如嘆息者家貧無以遷窆乃行乞經年始獲葬焉郡縣舉其至孝經年為永寧令自以祿不及養怛恨愈甚至縣卒時年三十九梁書沈旋字士規襲爵建昌侯位司徒右長史以母憂去官因疏食辟穀服除猶絶粳粱諡曰恭旋弟趨字孝鯉亦知名位黃門郎旋子實嗣侯實弟衆沈衆字仲興好學有文詞仕梁纍遷太子中允侯景之亂表求還吳興召募故義部曲以討賊梁武許之及景圍臺城衆率宗黨及義附五千餘人入援軍容甚整景深憚之梁武於城內遙授太子右衛率臺城陷乃降景景平元帝以為司徒左長史魏克江陵見掠尋亦逃歸陳武帝受命厯中書令起部尚書衆性狷急厯詆公卿非毁朝政帝怒因其休暇還武康於吳中賜死吳均欲撰齊書求借齊起居注及羣臣行狀武帝不許遂私撰奏之稱帝為齊明帝佐命帝惡其書實録使中書舍人劉之遴詰問數十條竟支離無對敕付省焚之免職上按此均史筆不讓南董舊志何沒沒耶沈浚字叔源侯景之亂避難來歸吳興太守張嵊往見之謂曰賊臣憑陵人臣效命之日今欲收集兵刃保據貴鄉雖復萬死誠亦無恨浚因勸嵊起義時邵陵王綸東奔至錢唐聞之遣前舍人陸邱公板授嵊征東將軍嵊曰天子蒙塵今日何情復受榮號留板而已侯景乃遣其中軍侯子鑒擊嵊嵊敗死之南史沈炯字初明祖瑀潯陽太守父續王府記室參軍侯景之亂宋子仙據吳興使召炯委以書記炯固辭子仙怒命斬之或救之僅而獲免及子仙敗王僧辨搆得之羽檄書皆出於炯武帝南下與僧辨登壇設盟炯為其文及景東奔至吳獲炯妻虞及子行簡並殺之景平元帝愍炯爵原鄉侯魏克荆州炯被禽尋來歸厯司農卿御史中丞入陳位明威將軍諡恭子陳書江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其人才恆閉門却掃無所交遊時有文章隨即毁棄不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意奏訖其夜炯夢見宫禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一日內見出關此恐不復由我寤而異之當時以為恍惚十餘日便有命放還遂與王充等東歸三國典略章昭達字伯通武康人祖道蓋齊廣平太守父法尚揚州議曹從事侯景之亂昭達悉募鄉人入援臺城後厯建大功官至開府儀同三司初陳世祖嘗夢昭達升於臺鉉及旦以夢告之至是侍宴世祖顧昭達曰卿憶夢否何以償吾昭達對曰當竭犬馬之用以盡臣節自餘無以奉償陳書湘州刺史華皎叛奉蕭巋為主士馬甚盛嶽陽太守章昭裕等並𨽻於皎髙宗遣徐度討之皎敗奔江陵皎黨詣軍請降俘獲萬餘人皎黨並誅惟任蠻奴章昭裕等獲免昭裕昭達之弟也上沈君理字仲倫吳興人祖僧畟父巡君理美風儀博學有識鑒陳武帝鎮南徐州巡遣君理致謁命尚會稽長公主帝受禪拜駙馬都尉封永安亭侯為吳郡太守時兵革未寧百姓荒散君理總集士卒修飾器械深以幹理見稱大建中厯吏部尚書宣帝以君理女為皇太子妃賜爵望蔡亭侯位侍中右僕射諡貞憲陳書君理子遵儉早卒以弟君髙子遵禮為後沈邁君理叔方正有幹局厯散騎常侍南史沈君髙字季髙君理弟廣州刺史嶺南俚獠世相攻殺君髙本文吏無武幹推心撫御甚得民和諡曰祁子沈君公君理弟自梁元帝敗後常在江陵禎江中與蕭瓛蕭岩叛隋歸陳後主擢為太子詹事君公博學有才辨善談論後主深器之陳亡入隋文帝以其叛亡命斬於建康上沈洙字𢎞道少方雅好學不妄交遊通三禮春秋左氏傳精識強記仕梁為祠部尚書郎侯景之亂洙竄於臨安時文帝在焉親就習業及武帝入輔除國子博士與沈文阿同掌儀禮武帝受禪加員外散騎常侍厯大匠卿陳書徐整吳興人梁直閣將軍慈源侯整生綜陳始安太守綜生方貴隋延州臨真令方貴生唐采州刺史孝德即齊𣆀之父也張九齡徐文公碑沈文阿字國衛峻子也性剛強有膂力少習父業研精章句紹泰元年入為國子博士尋領步兵校尉兼掌儀禮自太清之亂臺閣故事無有在者文阿父峻梁武時嘗掌朝儀頗有遺稿乃斟酌裁撰禮度皆自出之及陳武帝受禪文阿輒棄官還武康帝大怒發使往誅之時文阿宗人沈恪為郡請使者寬其死即面縳鎖致於上前上視而笑之曰腐儒復何為者遂赦之陳書貞觀十四年詔以沈重沈文阿等前代名儒學徒多行其義命求其後舊唐書沈恪字子恭深沉有幹局侯景圍臺城起東西二土山以逼城城內亦作土山應之恪為東土山主晝夜拒戰以功封東興侯入陳厯特進金紫光祿大夫諡曰光子法深嗣按德清有東主山沈恪以拒侯景功封侯即家焉東主二字本陳書文皇后兄沈欽武康人父法深梁安前中録事參軍贈光祿大夫建成侯欽襲封位尚書左僕射素無伎能奉已而已諡曰成子觀嗣頗有學識厯御史中丞隋髙祖開皇九年以陳都官尚書孔範御史中丞沈觀等邪佞於其主以致滅亡北投邊裔沈不害字孝和舉明經天嘉初除嘉德殿學士自梁季喪亂至是國學未立不害上書詔嘉答之又表改定樂章詔使製三朝樂歌八首合二十八曲行之樂府太建中轉員外散騎常侍光祿卿尋為戎昭將軍武陵王長史行吳興郡事俄入為尚書左丞不害通經術善屬文雖博綜墳典而家無卷軸每製文撡茟立成曾無尋檢周𢎞正嘗稱之曰沈生可謂意聖人乎子志道字崇基少知名位安東新蔡王記室參軍沈重字德厚武康人弱嵗而孤居喪合禮及長專心儒學從師不逺千里遂博覽羣書尤明詩禮及左氏春秋大同二年除五經博士梁元帝之在藩也甚嘆異之及即位遣主史何武迎重西上及江陵平重乃留事梁主蕭察為中書侍郎纍遷廷尉卿察又令重於合歡亭講周禮周髙祖以重經明行修遣上士桞裘至梁徵之天和中於紫極殿講三教義樞機明辨咸為諸儒所推後周書沈君遊吳興人祖君畟父巡君遊博學有詞采仕蕭巋位至散騎常侍有文集十卷後周書姚僧垣字法衛吳興武康人吳太常信八世孫曾祖郢宋員外散騎常侍五城矦父菩提梁髙平令嘗嬰疾厯年乃留心醫藥梁武帝心又好之每召菩提討論方術言多會意由是頗禮之太清元年轉湘東王記室參軍僧垣少好文史不留意於章句時商略今古則為學者所稱及侯景圍建業僧垣乃棄妻子赴難武帝嘉之授戎昭將軍湘東王府記室參軍及宫城陷百官逃散僧垣假道歸至吳興謁郡守張嵊嵊見僧垣流涕曰吾過荷朝恩今報之死君是此邦大族又朝廷舊臣今日得君吾事辦矣俄而景兵大至攻戰纍日郡城遂陷僧垣竄避久之乃被拘執景將侯子鑒素聞其名深相器遇因此獲免及簡文嗣位僧垣還建業以本官兼中書舍人元帝平侯景召僧垣赴荆州改授晉王府咨議其時雖平大亂而任用匪才朝廷混雜無復綱紀僧垣每深憂之謂故人曰吾觀此禍敗不久今時上策莫若近關聞者皆竊笑及周克荆州僧垣猶侍元帝不離左右為軍人所止方涕泣而去有梁後略十卷行於世後周書按僧垣棄妻子赴建業之難及荆州陷猶侍元帝真義士也李延壽以僧垣入藝術郡志因之不著其大節何耶吳興章華字仲宗家本農夫至華獨好學與士君子遊處頗通經史善屬文侯景之亂遊嶺南居羅浮山寺專精習業歐陽頠為廣州刺史署為南海太守頠子紇敗乃還都後主時除大市令非其所好乃辭以病禎明初上書極諫書奏後主怒即日斬之陳書章華已載典故此特詳之姚察字伯審六嵗誦書萬餘言十二能屬文年十三梁簡文時在東宫引於宣猷堂聽講論語仕陳厯度支吏部尚書入隋大為文帝所重帝謂侍臣曰平陳之後惟得此人封北絳郡公煬帝即位拜太子內舍人南史察自居顯要一不交通常有門生不敢厚餉送南布一端花練一匹察謂曰吾所衣者止是麻布蒲練此物於吾無用既欲相欵接幸不煩爾此人遜謝察厲色驅出自是莫敢餽遺沈光字總持吳興人也父君道仕陳吏部侍郎陳滅家於長安皇太子勇引署學士光少驍捷善戲馬為天下之最略綜書記微有詞藻嘗慕立功名不拘小節家甚貧寠父兄並以傭書為事光獨跅􅕟交通輕俠為京師惡少年之所比附人多贍遺得以養親每致甘食美服未嘗困匱煬帝以為折衝郎將賞遇優重帝每解衣推食以賜之同輩莫與為比光自以荷恩深重思懷竭節及江都之難潛搆義勇將為帝復仇先是帝寵眤宫奴名為給使宇文化及以光驍勇方任之令其總統營於禁內時麥孟才錢傑等隂圖化及謂光曰吾等荷國厚恩不能死難以衛社稷斯則古人之所恥也今又俯首事仇受其驅率有靦面目何用生為必欲殺之死無所恨公義士也肯從吾乎光泣下沾襟曰是所望於將軍也僕領給使數百人並荷先帝恩遇今在化及內營以此復仇如膺鸇之逐鳥雀萬世之功在此一舉願將軍勉之孟才為將軍領江淮之衆數千人期以營將發時晨起襲化及光語泄陳謙告其事化及大懼曰此麥鐵杖子也及沈光者並勇決不可當須避其鋒是夜即與腹心走出營外留人告司馬德戡等遣領兵馬逮捕孟才光聞營內喧聲知事發不及披甲即襲化及營空無所獲值舍人元敏數而斬之遇德戡兵入四面圍合光大呼潰圍給使齊奮斬首數十級賊皆披靡德戡輒復遣騎持弓翼而射之光身無介胄遂為所害麾下數百人皆鬪而死一無降者壯士聞之莫不為之隕涕隋書光載郡志不詳故全録沈法興恪子也隋季起兵發自東陽將趨江都下餘杭郡北至烏程精兵六萬毗陵通守路道德拒之法興請與和因襲殺道德據有江表十餘郡後聞越王侗立乃上表自稱大司馬録尚書事天門公承制置百官頗依陳氏故事是時杜伏威據厯陽陳稜據江都李子通據海陵法興三面受敵軍數挫陳稜尋為李子通所圍送質求救法興使其子綸帥兵救之子通率衆攻綸大敗乘勝濟江陷其江口法興使蔣元超拒之于慶亭元超戰死法興左右數百人投吳郡賊帥聞人遂安遣其將葉孝辨迎之法興至中路而悔欲殺孝辨更向會稽孝辨覺之法興懼赴江死舊唐書按楊廣弒父賊也大業之末民生塗炭羣雄並起使法興好謀而成安知江左不太原乎要其人與錢鳯沈充不倫矣吳興偹志卷九
