body:
  text: 吳興備志卷十四明董斯張撰象緯徵第九晉成帝咸和四年冬天裂西北時蘇峻之子以萬人入吳興天下有兵太平御覽安帝隆安五年三月甲寅流星赤色衆多西行徑牽牛虛危占曰星庶人類衆多西行衆將西流之象其年五月孫恩至京口內外戒嚴劉裕追破之元興元年七月大飢人相食吳郡吳興戶口減半又流奔而西者萬計晉書咸平二年正月己卯月入南斗奎占曰吳分飢疫明年兩浙大飢民疫死宋史皇祐元年六月己巳星出匏瓜赤黃有尾迹向南速行至建星沒占曰吳分有謀紹興十七年五月壬戌水順行入東井占天下有川瀆之事於是浙西大水乾道三年庚辰月復入南斗奎是嵗兩浙水旱開禧九年正月丙寅月入東井兩浙有水災並上建置徵第十郡縣沿革城郭公廨學書院亭館郵傳倉庫營寨市橋坊巷祠觀附張按郡縣沿革其名有相淆者後魏以襄州有洞庭湖改為湖州西吳里語混載之如樂遜兾俊席固皇甫道為湖州刺史李夀湖州户曹從事李叔讓湖州長史是也吳永安二年分侯官為吳興縣江淹自序云吳興地在東南嶠外閩越之舊境圖經云晉尚書郎陸邁宋賀道力梁尚書郎江淹王琰皆為吳興令宋檀道濟封吳興縣侯沈懷明吳興縣子是也又長興舊名長城武康舊名永安唐武德三年以武康為安州四年復改為武州考隋書及宋史地里志三州縣舊名長城百泉縣後魏置長城郡黃石縣西魏改曰長城如北齊信都芳後周令狐整封長城縣子是也陽安縣西魏置武康郡如西魏崔士謙隋令狐熙封武康郡公是也洋州趙宋置武康軍如福王與苪及韓琦姚麟俱武康軍節度使畢再遇武康軍承宣使是也浠水舊置永安郡黃岡亦名永安普安郡梁改為安州武陵郡梁改為武州又宋史云開德府有德清軍保安軍又有德清寨盛𢎞之云荆州有烏程鄉不諳九域之書幾何不眯目耶晉分天下為十九郡𨽻揚州隋初𨽻揚州行臺大業末𨽻徐州總管見統紀唐分道置使屬江南東道宋領縣六屬浙西路談志舊圖經統記諸書據通典元和郡國志皆曰梁改為震州陳後為吳興郡紹興中續圖經辨之曰自秦置郡至陳未嘗改革隋氏一統始改郡為州太守為刺史按梁書杜龕傳龕為震州刺史吳興太守後遂以郡兵拒陳文帝軍是梁分浙西數郡為震州治吳興非改郡也其説亦未審自秦置郡漢元封中已分十三州置刺史至梁天監十年有州二十三郡三百五十縣千二十二後又恢拓土宇以舊州遐濶多所析置大同中有州一百七郡縣亦稱此謂隋始改郡非也以隋志考之自梁以來往往以郡為州以縣為郡又別置諸縣紛紛不一故自天監官多兼領蓋當時以吳興郡為震州而烏程為吳興郡初未嘗廢郡名也舊唐志曰梁置震州取震澤為名是矣舊傳晉郭璞欲移郡於東遷每立輒為飛鳥銜去其女亦善地理啓璞無徙因舊址損益之可以永無殘破之虞璞從之其女今號遷城小娘子從璞廟食續圖經云即置于吳而璞當晉惠懷之際避地東南事不相類乃于菰城云秦改縣為烏程至晉始移治于苕霅之上烏程縣治即古郡治又自相抵牾竊詳烏程治所當秦漢間已徙于今之郡中故吳寶鼎置郡詔謂永安故鄣等水悉注于烏程若在菰城豈得云此故知吳已前已在今處既以縣為郡則必即縣治為郡治而縣治為他徙矣璞隨元帝渡江仕為尚書郎損益古城之制相隂陽審向背庸有是理也今羅城之內苕水入西門餘不溪入南門至江子滙合流為霅水以出北門趨太湖西南諸山回環拱揖屏列于前北有辨峰以踞于後子城居中面二水之衝挹衆山之秀又四面多大溪廣澤故立郡以來無兵革之患意非璞不能定不必引飛鳥以神其事也上晉太康三年平吳以平陽郡有永安縣改曰永康惠帝永元九年改元永康以年號同始改曰武康唐武德三年李子通攻陷郡縣以武康置安州四年八月吳王杜伏威遣其將王雄誕平子通改安州為武州舊唐書參餘英志湖州五湖之表州以為名郡國志湖州上吳興郡昭慶軍節度寶慶初改安吉州縣六烏程歸安安州長興望德清緊武康上貢白紵漆器宋史故長州在長興縣隋大業末沈法興置此州後廢一統志故安州在武康縣唐志云李子通立安州又曰武州唐初因之尋廢上吳興在景德初有管鎮二十四其八已廢止有施渚大錢東林烏墩東遷市山巡莫安吉長興德清武康新市四安梅溪水口合溪共一十六所至熙豐間王存修九域志所載止存其六烏程有烏墩歸安有施渚安吉有梅溪長興有四安水口德清有新市至嘉泰中又廢水口置和平國朝設後潘大錢璉市四安臯塘獨松天目松坑口新市下塘巡檢司凡十所又商賈聚集之處今皆稱為市鎮其處一十有七勞志以下城郭郡城唐時開九門放生池側有閶門定安門東西各有甕門並廢宋門六今因之談志古户城統記云在烏程縣西一十九里吳孫皓時置文皇帝陵户二百家城于此古卜城統記云在烏程縣西南六十里宋略云龍驤將軍益州刺史卜天與所築因名古卜城後府城在郡西北二十五里吳地志云吳大帝所築一云太子和築上南潯城在縣東七十二里周三里元至正十三年張士誠築洪武二年十月拆其石修築蘇州城勞志穆王城在鳳亭鄉昔嶽飛于此壘土結營後封鄂王諡武穆遂以穆王城呼之其將壇猶在安吉志長城縣治內有子城外七門東曰朝宗西曰宜興南曰長城北曰吉祥東南曰迎恩西南曰廣德東北曰茹菰勞志九里城在縣西南一百九十里東林城在縣西南四十九里西林城在縣西南四十八里已上二城吳時所築大騎城小騎城並在縣西南一百二十里吳王濞所築朱城在縣東南二十五里輿地志云嚴白虎壻朱叔亷所築四安城元季武萬户重築城有四門東曰長安西曰廣安南曰吉安北曰宜安址尚存以上俱長興按談志安吉舊無城郭有六門惟西北二門有名西曰齊雲門北曰迎恩門古桃志又載東曰迎春南曰崇陽東北曰沙井西南曰教場德清縣城舊在餘英溪北隋仁夀二年中使蘇倫徙于溪南並上以下公廨沙墀在郡廳事前墀外皆甃砌獨此方濶鋪以沙久莫之改紹興中太守王會命砌合之忽夜得夢翌早亟去新甃至今如故談志舊傳郡治大廨居其中譙門翼其前卞蒼翼其後清風會景銷暑蜿蜒于左有青龍象明月一樓獨峙西南隅為虎踞之形合隂陽家之説卞蒼樓名元馬煦牧吳興重建府治堂曰帥正右曰公生明兩推官之所居也左曰思無邪衆郡幕之所舍也湖州重建府治記浙西道院在郡治廳西即舊吏隱堂也徐仲謀為記宣和中葛勝仲易為道院談志添差通判廳事側舊號山齋知州事陳之茂改曰無倦有記通判廳在譙門內西偏舊司法廳紹興七年始為添差通判廳題名有記刻石僉判廳在衙東門內天聖中章侁作廳壁記治平中狀元許將建亭城上徐仲謀名曰桂香亭添差僉判廳在子城外西淳熙中趙師臯始居于此趙善臨創廳事鄭鎮修許開仲啓為記節度掌書記廳在僉判廳西有集虛堂元豐三年陳師錫為記録事參軍廳在子城外之西司理參軍廳在子城外之西司理院在焉司法參軍廳寶元初李惟甫請于郡建于子城西偏劉異為記後為添差通判廳司户參軍廳在司理院內兵馬鈐轄廳寓𢎞禧寺路分都監廳在添差僉判廳西舊兵馬司也兵馬司在路分廳南兵馬都監寓焉睦宗院在景德寺西廊烏程丞廳在縣治東唐時尉曹倉廳有唐尉陸求修倉廳碑咸通以來為主簿廳後置丞始為丞廳主簿在縣治南舊在丞廳紹興中寓普寧寺後在浮玉亭並上以下學湖州郡學舊在城西丁酉春燬于兵海陵潘元明贖城北莘氏地及天寧寺圃以為廟學之基甲辰海陵唐志大始積財發廩造大成殿兩廡戟門既而永嘉陳昧設聖人四配十哲諸賢之像于廟西建講堂門廊其黝堊丹漆之飾將完而一新矣前知府張宗敏復立櫺星門飾聖賢像畢講堂工今知府顧公惟德乃大完之明揭雲孔子廟碑立教堂講堂也胡安定取三禮圖儀物黜其于古無考而益求其未見者命工繪於壁嵗久遂加圬墁紹興十二年教授關注于壁間倣佛見舊畫重加繪事有郡人劉一止記談志經史閣在立教堂後閣枕羅城氣象顯敞其下為堂曰養源左序曰直舍右序為進士題名所紹興三十二年知州事鄭作肅修禮象閣在齋館池上紹熙二年知州事王回建為樓五楹上繪禮像下之東西序為兩縣學小學舊在齋館後面大池置生員破供視太學齋生三之二有教諭以司訓導後廢紹熙二年移置池左運使沈詵撥田二百餘畝專贍小學生志復齋在齋館東以處習武進士也隆興以來兼崇武學生徒之肄武業者教授參掌之季補月書破供並同諸齋生紹興四年始立射圃在志復齋東乾道四年知州事唐瑑建有亭曰觀德時朝旨令賜第進士習射上親閲于殿廷賞賜有差故郡置圃取孔子矍相之義並上以下書院東湖書院在長興縣東北二十五里元時邑人蔣必勝創詔賜額名續文獻通考淳熙十五年武康巨室聞人觀國觀時遵其父武經君頥命作大成殿奉先聖及先師十哲像揭徽宗御書殿額郡人蕭德藻作記談志髙定子蜀人作同人書院于夾江修長興學創六先生祠蓋以教化為先務宋史梅溪書堂在梅鎮宋淳祐十一年天台郭居和建內設聖像旁立四齋集生徒肄業其中今有遺址安吉志東山書堂在州東三里桂陽范鏜建儲書萬卷招逺近士子居之上以下亭館杜牧之有云不是間人間不得願為間客此間行吳興因建得間亭留青日札逺光亭在武康縣後溪之上宣和三年朱容建邑人劉士英有記慶元六年知縣丁大聲改築武康有潛玉菴縣令毛滂建淳熙十二年縣令程九萬聚石作亭名松桂林餘英館在餘英溪上館南有雙鴛沼張子野詞云雙鴛池沼水溶溶南北小橈通即此也烏鎮南郊本蕭梁之南亭有故營以衛太子五代時為鎮官接中朝詔使之所宋髙宗自吳江取道駐蹕於此烏青志天隱樓在甘泉巷口宋之官酒樓也慶和樓在上智潭北宋茶坊也每嵗元宵則于池內張水燈戲最為繁盛第一春亭在官酒務衙內宋景定元年迪功郎酒正吳豫之建並上德清縣治有松竹堂在廳西舊名宜堂後取韓退之出宰山水縣讀書松竹林之句易名又有醉花堂香雪亭明秀亭在縣圃內亭北甃藥欄種桃花海棠榜曰紅雲島醉雪亭在明秀亭左取王荆公􅙐釄詩醉紅撩亂雪爭開之句為名縱雲臺在縣齋縣令沈造與沈長卿陳祖安觴咏于此取退之釋嶠孤雲縱遂名縱雲劉一止為記清意亭在縣治後宋縣令章鑑得古梅甚竒結亭于前扁曰清意貢茶院在長興縣西北四十五里貞元十七年刺史李詞以吉祥寺東廊三十間置有修貢堂堂上有唐貢茶刺史題名並上以下郵傳謝塘館在謝塘談志餘不館在州南景山館在州東一十八里唐貞元十年于頔置東遷館在州東四十里本名太湖館開元中張景遵置大厯九年顔真卿易名東遷在古東遷縣地故也震澤館在州東九十里開元年間張景遵置並上以上五所並皆唐時所置宋時已廢不存震澤今亦屬吳江德清縣餘不館在縣南二百步唐天授二年置談志安吉州并慈館在縣南上南潯館驛在南潯鎮洪武二年置十年革勞志以下倉庫永寧倉在白蘋洲上唐李師悅建名永盈後曰永寧嘉祐七年知州事鮑軻修淳熙八年胡南逢重建參議蕭德藻為記常平倉在永寧倉內西倉在清源門內北岸臨溪貯義倉米談志軍資庫在譙門內舊架閣樓東咸通十五年刺史張摶建嘉祐中知州事張田重修徐仲謀記烏程預備倉四所黃墅後村祐村後潘洪武二十三年置義役倉在縣治東北勞志烏鎮都稅務司在衆安橋南知酒醋務兼收兩鎮稅務設官提領一員後𨽻兩浙鹽運使司大德間移于南潯革罷烏青志按談志宋世潯溪有酒坊歸安預備倉四所花城東林千金思溪洪武二十三年置勞志安吉國朝預備倉二所一在順安鄉一在梅溪鄉義役倉在縣北三百步正統八年置長興預備倉四所白鳥鄉方山鄉惟新鄉吉祥鄉洪武二十三年置義役倉在縣治東南德清國朝預備倉四所樂舍後栁神林澉村義役倉在縣治內儀門西豐德庫在譙門內東北儀仗庫在忠愛樓西武康預備倉四所崇仁泰原慶安武都義役倉在縣治西並上以下營寨教場在郡治西北淳熙八年知州事胡南逢重修亭宇榜曰正已勞志長興教場在尉司西有序賔亭縣令林概建德清教場在尉司後安吉教場在尉司後武康教場在縣治東元置鎮守營寨有萬户府翼宋大錢巡檢寨在烏程縣北十八里元大錢湖口寨治在本處巡檢司四所烏鎮永新後潘常樂宋湖秀巡檢寨在歸安縣東南射村元巡檢司四所湖秀施溪千金璉市宋長興四安巡檢寨在縣西南三十三里元巡檢司二所四安臯塘牧馬寨在德清縣西九里宋牧馬于此淳熙間移于下菰城下塘巡檢寨在德清縣東南十八里紹興二十七年置又荷葉浦寨在縣東南二十七里嘉定七年郡守林嶽置宋安吉幽嶺巡檢寨在縣南六十里並上以下市橋烏程縣之東數十里有泊宅村時人不曉泊宅之義豫寓居之明年買田適在村下因閲金石遺文昔顔魯公守湖州張志和浮家泛宅往來苕霅間此乃志和泊舟之所也續仙傳云志和越人而唐史以為婺人豫喜卜築之初聞同里之髙風遂得友其人于千載因作詩識之泊宅編湖州德清縣南前溪村則南朝習樂之處今尚有數百家習音樂江南聲伎多自此出所謂歌舞出前溪也大唐傳陸市在德清縣南十五里舊為市一夕平沉居人遂徙而東去所謂新市也陸市今為溪港下有階基礎石甚多水淺天晴厯厯可見舟過竹篙著底磚石相擊有聲人或得銅鐵陶瓦之器談志栁村在水口鎮東多植栁杜牧之詩栁村穿窈窕桃澗度喧豗又曰春風最窈窕日暮栁村西唐時修貢􅋈舟處長興志魯般屋在東林山民戴氏居之相傳其先世遇異人欵之甚洽為建屋數椽而去今欹甚矣視椽際多罅雖暴雨無漏痕世謂魯般造云東林山志駱駝橋在霅溪上舊傳此橋梁或摧圯將墜夜逺處聞橋上若有千餘人工作呼聲及旦橋梁之將墜者煥然一新皆啇舶上桅檣木也居處近橋者一無所聞覺或曰此魯般仙也天中記玩花橋在峴山寺門峴山志通錦橋在東林市北宋魯國忠襄公孟珙築別業于寶溪之西常逰錦峰建此以便陸行故名東林山志前石橋後石橋在府治西北玄妙觀後唐太和六年郡人徐氏以路多墊溺遂自前石橋至後石橋以石為路碑刻在文宣王廟碑隂勞志倉橋在府治東舊名採蘋橋以其在白蘋洲北後人因橋南有倉故名倉橋斜橋在駱駝橋西北以其水出自子城濠而形斜故名崔載華消暑樓詩云捲簾對斜橋即此也皇祐橋在慈感渡口並上朱勝非云吳人謂虹橋為無星橋今吳興郡城有無星橋即虹橋也西吳里語以下坊巷叢桂坊舊名仁政坊在隆興橋直至郭尚書廟華表對峙太師觀文趙忠惠公府第在焉忠惠子江隂太守孟奎擢丙辰第咸淳乙丑少監孟圻運判孟機師孟垕一榜同登先是太師國公希懌監簿興惁都承與勤忠惠公與􅊸世濟科美改今名談志苕隂坊在儀鳳橋西後名狀元坊以賈安宅故名聼履坊在沈約宅前烏氏坊程氏坊俱在烏程縣南章后坊在天寧寺前章皇后宅故名白華坊以潘綜純孝居此故名以下祠觀佑聖宫在辨山陽宋紹興初道士沈無礙結菴恍惚見真武像命工圖寫刻石既而菴前石澗一龜一蛇相隨而出自是建祠勞志修真觀在烏鎮按陳觀碑記宋咸平元年嘗有道士張洞明者修真于此數有青鸞集其上元末遭兵燹洪武初里人稍稍輦災披萊而建之天順間住持邱玉岩者復繕云浙直分署記事本末沖真觀在長興縣東二里晉咸康元年建唐髙宗麟德三年正月一日封泰山日有重輪敕天下郡邑各置觀一所以重光為額遂立為重光宫宋治平二年改今額殿側有八角井世傳葛仙煉丹處張渤後漢人初居郡之白鶴山唐顔真卿碑載其事乾寧中邑人避宣城亂寓居辨山立草堂祀神時李師悅為守夢神丐授館乃建祠于辨山之隅統記云舊傳王之栁趙二姬實白鶴山之人建中靖國初知州事徐鐸始創今廟談志祠山張大帝張秉武陵人一日行山澤間遇仙女謂曰帝以君功在吳分故遣相配長子以木德王其地約踰年再會秉如期往果見前女歸之曰當世世相承血食吳楚後生子渤為祠山神神始自長興自流聖澤欲通津廣德便化為豨役使隂兵後為夫人李氏所見工遂輟故避食豨群碎録湖州人事廣德張王者不食豬肉言張王曽現身為豬故并剛鬛一牲避之不敢以祭亦不敢食陸德明曰鯀為黃熊東海人祭禹廟不用熊白及鱉亦此意也廣德州橫山有廟志云生西漢末遊苕霅之間夫人李氏亦有昭妃廟至今香火甚盛以二月八日生辰先一日必多風後一日必多雨俗人相傳以為神請其夫人之小姨飲酒故加以風雨欲視其足也可謂瀆神矣然至今此日風雨甚驗亦異事也又有埋藏之異是日土人殺牛祀之坎其庭中以所祭牛牲及器皿數百瘞于坎中明日發視之空坎一無所有留青日札陳武帝永定二年正月甲寅遣中書舍人韋鼎䇿吳興楚王神為帝陳書范丹廟在歸安縣七里店歸安志諸葛瑾廟在屠村上汪藻守湖州建言昔章聖皇帝幸亳次雎陽親屈帝尊臨見雙廟旌巡逺異代之忠以風厲天下顔真卿叱叛臣李希烈而死廟食吳興距行殿不能百里宜蒙褒典增忠臣義士之氣詔從之賜號忠烈詔下公大治祠屋書榜揭之郡有籍録朱勔窗户數十種丹漆之光可鑑寮吏請為州治樓觀之飾公曰吾葺魯公祠可用為輪奐州人大悅孫仲益汪公墓志協順廟在石冢其神陸圭昭慶軍人宋熙寧間以祖澤補右爵調真州兵馬都監宣和末引兵進攻方臘敗之死而為神紹興間海濤衝激江岸神檄隂兵却潮潮勢遂平淳祐間江潮衝激尤甚隨築隨圯神與三女揚旗空中浮石江面以顯其靈岸賴以成浙西帥臣徐栗以其事聞于朝賜廟額曰協順封神為廣陵侯三女為顯濟通濟永濟夫人一主護岸一主起水一主交澤傍有小廟祀十二潮神各主一時西湖遊覽志烏將軍廟在烏鎮將軍姓烏諱贊仕于典午之東總戎討賊至東溪而沒禆將吳起就墓于烏鎮後起集餘兵下城邑經檇李而還設豆觴祀于神神憑卒而言曰子有功皆吾也吾當復承祐兹土觀聼者翕然遂創廟宋睦冦將至鎮境民皆禱于神已而賊自遁人有自賊中來言賊見雲蒸霧塞旌旗蔽空疑有官兵故返云吳越錢鏐遣兵戍烏程東南之九十里以立一障謂之烏戍廟側有上智潭旱潦水不增減上按典午司馬也烏青志復以為烏重胤之姪一贊也或晉或唐安憑乎西吳季子廟在歸安縣西南前邱村祀吳季子札浦志朱明府廟在安吉州西南五里祀吳揚州別駕偏將軍朱紀有墓在焉上永靈廟在新市鎮神姓朱諱泗晉懷帝時為鎮國大將軍遭時多難力戰死國詔就邉立廟後族人感夢神建廟於此吳越錢氏封保寧將軍紹興五年賜廟額勞志惠應廟在德清縣東北梅林村祀漢巨鹿太守魏霸神兄弟雍睦為州里所慕和帝時舉孝亷遷巨鹿太守及卒里人祀之為土神宋建炎中金兵入境著靈異嘉泰三年賜廟額惠應上德清東嶽廟后土夫人像冠作九龍從後向前與髙宗瑞應圖太妃冠服不殊又足躡岐頭履如米南宫所畫文德皇后遺像蓋宋人塑手也貌亦端整惜乎剝壞耳見只編靈應廟在武康縣南二百步神姓徐諱天祐宋時縣人也一日謂人曰吾將往山東為國辦事言訖而逝邑人遂為立祠淳熙間縣中火知縣方導見神撲滅之勞志天目龍神廟在孝豐縣金石鄉廟有龍井邑人禱雨最驗每嵗春秋二祀談志云廟有古杉侵雲上已枯朽枝葉鬱然父老相傳僅百嵗今不存矣勞志吳興備志卷十四
