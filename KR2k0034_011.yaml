body:
  text: 吳興偹志卷十一明董斯張撰人物徴第五之四葉參字次公國初州人業儒者寡參卓然自立咸平中豋第為舉子倡景祐中自兵部郎中出守鄉郡金部尚書王惟正作詩送之三司度支韓琦太常丞吕公綽薛紳秘書丞余靖曽公亮皆有詩餞其行今刻石郡庠談志葉清臣字道卿參子也厯侍讀學士知河陽贈左諫議大夫清臣天資爽邁遇事敢言數上疏論天下事陳九議十要五利皆當世可行者有文集一百六十卷子均字公秉尚書司封員外郎知洪州勞志清臣天聖初上御崇政殿策士試雲瑞紀官賦宋郊第一清臣次之與張文定再入翰林凡六年張按范成大吳郡志云葉參少卿嘗守吳既謝事囙居焉作九檜堂以佚老然則東吳寓公自參始又按吳郡志蔣堂過葉道卿小園詩云秀野亭連小隠堂紅蕖綠篠媚滄浪弁山居士無歸意却借吳儂作醉鄉自註云弁山居士道卿自號觀此則清臣本苕産信矣陳樞字慎之長興人知泉州曽鞏薦之曰樞質性純篤治民為循吏積十有五年不上其課故為郎乆不遷方朝廷抑奔競尚亷素之時宜䝉特詔有司奏樞課優進其官以奨恬退遷尚書都官員外郎誥曰吾寵樞也所以戒奔競曽鞏陳君墓志詳見藝文樞為旌德令省刑薄稅為民興利以曽鞏論薦官至尚書南畿志按曽鞏志樞遷尚書員外郎耳此云尚書殊悞鄧氏函史亦仍之劉宜翁名誼元豐間自廣東移江西皆為提舉常平官上疏論新法勒停或云宜翁晩得道不出論新法疏大略有云自唐租庸調法壞五代至皇朝稅賦凡五増其數矣今又大更張不原其本斂愈重民愈困為害凡十又言變祖宗法者陛下也承意以立法者安石也討論潤色之者惠卿曽布章惇之徒也其語激切深至内批云誼張皇上書公肆誕慢上惑朝廷外摇衆聼可特勒停曲洧舊聞徽州志誼長興人中丙科從異人受出世法蘓軾嘗有與劉宜翁使君書大明一統志蘇文忠集胡志康字永寜父瑗嘗為湖州教授由如臯徙居烏程志康于嘉祐三年上舎釋褐授朝奉郎杭州觀察推官讞鞫獄情民心允服是年瑗上疏請致仕卒志康扶櫬歸𦵏于邑之何山南起復以憂卒子獬解鮮登熈寧余中榜進士通判衢州元初後遭楊總統之難散居嘉湖及蘇州之婁江逺孫澤建家廟以祀烏程新志孫侔字少述吳興人父及都官員外郎侔精識元解能得聖人深意多所論撰知制誥唐詢表其孝行賜之粟帛累徴不赴元豐中除通直郎兄觀太常博士亦有學行林希孫侔傳見宋文鑑沈播其先武康人再世家于錢塘父玉尚書屯田郎中知真州軍州事遂家焉播天聖二年以進士起家楚州司法參軍再調貴池縣主簿令不能而縣大治者君之力也嘗攝銅陵縣事有兄弟爭財者為辨其曲直卒使之感悟讓財相與同居其去也兩縣人追送涕泣逺焉而後去事生嚴喪死哀自族人至于㛰友無所不盡其心終身好書未嘗一日不讀而于酣樂嫚戯未嘗豫也循道守官以不諂其上而㡬至于殆者數矣故其仕常有去志而無㽞心年三十六疾卒于京師子男四人皆進士曰伯荘未仕曰季長越州司法參軍王安石妹壻曰叔通秘書省著作佐郎曰次通試将作監主簿季長子銖字平少從安石學進士髙第歴龍圖閣待制知宣州弟錫字子昭以王安禮任歴知海泰汝宣四州以通議大夫致仕卒贈宣奉大夫王荆公曽南豐兩集參宋史維揚志陳舜俞字令舉烏程人博學强記舉進士又舉制科第一熈寜中以屯田郎中知山隂縣詔俟代還試舘職舜俞辭青苖法行舜俞不奉法上疏自劾謫監南康軍塩酒稅五年而卒舜俞始嘗棄官歸居秀之白牛村自號白牛居士已而復出遂貶死蘇軾為文哭之稱其學術才能兼百人之噐慨然将以身任天下之事而人之所以周旋委曲輔成其天者不至一斥不復士大夫識與不識皆深悲之云舜俞以言新法謫居南康騎牛遊廬山詩畫皆傳于世舜俞初從安定胡先生學熈寧中六客其一也其墓在城南之蘇灣子孫猶宅于烏鎭文獻通考舜俞通判夀州見中都志張先字子野能詩詞以秘書歴知虢州渝州見梅舜俞集吳江有如歸亭康定元年知縣事秘書張先始為大之吳郡志張先元豐中判秀州先有俊才尤工詩嘉興志先子文剛字常勝王安石妹婿也安石嘗志其墓詳掌故藝文劉述字孝叔第進士累官提㸃江西刑獄六年不奏考功課改荆湖等路轉運使再遷刑部郎中神宗立召為侍御史知雜事又十一年不奏課帝知其乆次授吏部郎中王安石爭謀殺刑名述兼判刑部駁之及勅下述封還中書執奏不已安石白帝詔開封府推官王克臣劾述罪于是述又率御史劉錡錢顗共上疏曰安石執政未數日中外人情囂然胥動盖以専肆胸臆輕易憲度無忌憚之心故也安石自應舉歴官事尚堯舜之道以倡率學者及遭時得君首議財利務為容恱言行乖戾一至于此剛狠自任則又甚焉豈宜處之廟堂以亂國紀願早罷逐以慰天下元元之心曽公亮隂自結援以固寵趙抃括囊拱手但務依違大臣事君豈當如是疏上王安石奏先貶錡監處州塩酒務顗監衢州塩稅開封府獄具述三問不承安石欲置之獄司馬光與范純仁爭之乃議貶為通判帝不許以知江州遷温州述以五事訓人曰孝義務學謹身勤力蓄積民咸化之浙江通志莫君陳字和中從安定先生學熈寧中新置六法科首中其選甚為王安石噐重御家嚴整如官府然東坡有西湖跳珠軒詩贈莫同年即君陳也長子砥字彦平知識疏通嘗知永嘉生徒稍衆而飬士額少公為増額士感之為立生祠子伯虚字致逺為即繼守温州立思齊堂以記其事後知常州和氣所召春有瑞梅甘露夏麥秀兩岐秋禾合穎皆瑞應也後退居里社注意佛書撰修行净土書法門華嚴經意並行于世又解釋楞嚴圎覺經意藏于家諸孫濛漳談志孫覿梅露堂記伯虚嘗令崑山見蘇州志楊萬里淳熈薦士錄薦莫漳云長于史學達于吏事楊誠齋集隆興元年永嘉飢莫守伯虚鏤榜逺播飢荒之聲致客艘四集米價大賤温州府志莫磻字彦輔君陳第二子有子曰伯鎔字噐之少有髙世志年五十即歸林以迎師教子為事子三人曰濟曰汲曰沖皆有峻聲擢進士第時號三莫後濟沖又中博學宏詞科磻又有孫曰澄庚辰進士亦知名于時談志仰仁謙吳興人太平興國間以太子舎人知永嘉縣亷慎有容撫民如子時錢氏方歸疆土仁謙始為邑令政事一新後卒于官子孫囙家焉三世孫忻温州府志仰忻字天貺力學篤行年五十餘執母喪盡禮躬自負土廬于墓側有慈烏白竹之瑞元祐間郡守郟亶疏于朝乞加旌奨紹聖間郡守楊磻表其里曰孝亷大觀二年八行取士郡以忻應詔未㡬卒特贈将仕郎子師常師尹皆業儒有聲嘗有富室欲通㛰忻著同姓圗拒之姬周鄭江與仰同姓後世論氏不及姓非也有訓童規鑑永嘉百題詩集劉燾字無言誼次子東坡知元祐三年舉讀其文曰必巖谷間苦學者中第三廷對又中甲科尤善書嘗被詔脩閣帖十卷談志姚舜仁字令由歸安人元豐八年登第為太學正召對稱㫖除館職遷庫部員外郎進明堂定制圖并序上賜對褒奨降詔可其奏又撰明堂訓解一卷擬上之而疾後兄舜咨表進以成其志談志朱承逸霅人積善好施慶厯庚寅嵗以米八百石作粥散貧是嵗生孫名服熈寜中金榜第二人仕至中書舎人服子彧次孫肱亦登第著名節遂為吾鄊名族焉天之報善昭昭也如此癸辛雜志參說郛承逸代人償債事見掌故不重錄承逸子臨亦進士肱字亦中朱臨字正夫年未四十以大理寺丞致仕居吳興作仰髙亭于城上服肱其子也稗海朱服字行中歴監察御史裏行紹聖初詆變法召為中書舎人拜禮部侍郎湖州守馬城言其居喪疏几筵而處他室謫知莱州又坐與蘇軾㳺貶海州團練副使蘄州安置宋史服子彧字無惑著萍洲可談朱服烏程人哲宗時知廬州嵗飢便宜賑給全活十餘萬口明年大疫又課醫持藥分拯之賴以安者甚衆徽宗即位召為集賢殿脩撰再知廬州廬州府志姚孝孫字光祖安吉人官司農主簿安吉州志姚祐父也姚祐字伯受長興人徽宗初除䕫州路轉運判官且行㑹帝幸禁苑御弓矢祐奏聖武臨射賦帝大恱㽞為右正言厯陳紹述之說遷左司諌建議置輔郡以拱大畿厯延康殿學士禮部尚書贈特進諡文僖宋史余拂君厚霅川人也其居在漢銅官廟後溪山環合有相宅者言此地當出大魁君厚之父朝奉君云與其善之于一家不若推之于一郡即遷其居于後以其前地為烏程縣學不二三年君厚為南宫魁而莫儔賈安宅繼魁天下春渚紀聞蔡京書元祐黨人碑三百九人歸安沈千與焉見宋史帝紀何椒邱集千元豐二年進士郡志悮作于元衢余汝尚字退翁烏程人登第渉厯州縣無营進心還家苦貧未能㤀祿飬又從趙抃于青州以屯田郎中致仕卒孫俟敷文閣直學士宋史新編賈收號耘老仁宗朝梅摯公儀出守杭州上賜之詩有曰地有吳山美東南第一州梅以上詩語名堂士大夫㽞題甚衆東坡倅杭因命筆吏盡錄之而未著其姓名黙定詩之髙下遂以耘老詩為冠庚溪詩話賈安宅字居仁收之從孫年十八入太學升上舎二十二廷試魁天下召對除校書郎累遷至户部侍郎兼太上皇帝潜邸賛讀建炎中以舊學為給事中封駁無所回避厯事三朝累司文柄其所選掄皆得成材徽宗嘗手詔奨諭之子選詳明掌故通達法理為刑部侍郎談志今志載而不詳鄭居中去位侍御史張樸言朋黨分攻非朝廷福若不揃其尤乆則難圗于是宇文黄中賈安宅等六人皆罷凡蔡京所惡亦指為居中黨而逐宋史衢按安宅除中書舎人制云西䑓本政事之地内史掌誥命之文見職略紹興二年以給事中除工部侍郎見朝野雜記選為福建安撫使于淳熈十四年新靈澤廟奏改㑹應見八閩通志盧革字仲辛湖州人少舉童子知杭州馬亮見革詩異之秋貢士宻戒主司勿遺革革聞語人曰以私得薦吾恥之去勿就後二年遂首選年十六宋史盧秉字中甫革子也未冠有雋譽嘗謁蔣堂坐池亭堂曰亭沼粗適恨林木未就耳秉曰亭沼如爵位時来或有之林木非培植根株勿成大似士大夫立名節也堂賞味其言中進士甲科浮沉州縣二十年人無知者王安石得其壁間詩累擢提㸃兩浙刑獄領塩事持法苛嚴厯集賢殿脩撰知渭州西討有功進龍圗閣直學士秉守邉乆以殳老乞歸移知湖州未至復詔還渭元祐中知荆南劉安世論其行塩法虐民降秩奉祠宋史葉少藴崇觀間驟貴顯三十一嵗掌外制次年遂入翰林中廢至建炎乃執政然才數日而罷平生所厯州鎮皆有能聲胡文定安國嘗以其蔡頴南京之政薦于朝謂不當以宿累廢晩節兩帥金陵當烏珠臨江移三山平羣㓂其功不可沒也秦檜秉政欲令帥蜀辭不行忤檜意以崇慶節度使致仕文獻通考蔡京初以童貫為陜西宣撫取青唐公聞見京問之曰貫以八寳㤙除節度已非祖宗法今又以執政之任付之青唐朝廷所必欲得也使成功則何以處之京有媿色既得青唐公又見京問何以賞貫沉思未荅公曰節度使上惟有開府儀同三司不識朝廷遂與之否京曰恐未至是公曰幸甚外人以為必進此官矣某憂不能寐幸不至此則已設或有之今日言與他日言其受禍一也何遲速之間宋名臣言行錄崇寧初蔡太師持紹述之説為相既悉取元祐廷臣及元符末上書論新法之人指為謗訕而投竄之又籍其名氏刻之于石謂之黨籍碑且将世世錮其子孫其後再相亦自知其太甚而未有以為説葉左丞為祠部郎從容謂之曰夢得聞天下有道則庶人不議今舉籍上書之人名氏刻之于石以昭示来世恐非所以彰先帝之盛德也蔡大感悟其後黨禁稍弛而碑竟仆焉胡尚書直儒聞之嘆曰此人宜在君側却掃編石林為蔡京客故避暑録所書政宣間事尊京曰魯公凡及蔡氏毎委曲回護而于元祐斥司馬温公名何也建炎紹興初仕宦者供家状有不係蔡京王黼等親黨一項今日江湖從學者人人諱道是門生石林其矯一時之弊耶清波雜著烏程派夢得七世祖彪生刑部侍郎逵事吳越刑部夫人永安郡太君羊氏𦵏湖州葉氏始自縉雲遷湖州而居烏程者以烏程縣霅川鄊中書省為定著水東日記少藴子棟柱模見石林燕語柱為永州太守子節為宜興丞見周平園乾道丁亥泛舟㳺山錄劉士英字仲發武康人靖康初通判太原府金人圍城被執旋被害旌其廟曰忠烈妻陳氏居父母家亦被擄獲赴井死姑蘇志郡志載仲發不及妻故偹載陳氏蘇人沈畸字德侔德清人崇寧中擢監察御史六察無言事法畸詣匭上十事言花石擾民土木弊國冗費多㤙澤濫議論異同下情暌隔其論當十夹錫錢最為剴當進殿中侍御史建炎初贈龍圗閣直學士子濬為右正言宋史完顔宗弼攻臨安錢塘令朱蹕率民兵邀敵欵拒使杭民得為逃死計行二十里敵逆戰中傷猶叱左右負己再戰西湖志蹕字子美吳興人朱大亷蹕長子右廸功郎朱孝亷蹕次子右修職郎安吉志沈昭逺字傳耀歸安人政和八年以上舎擢第紹興十三年累官中書舎人擢戸部侍郎朝請大夫知袁州舊試貢士皆寄僧舎昭逺始創貢院民輸義倉米倉吏違法倍斂力為减其半時四邑羡餘錢米上邑不下數十萬昭逺曰此非天降非地出無非虐取于民盡却之民皆感悦十六年擢敷文閣待制知洪州一統志江西通志紹興十二年九月昭逺使金賀生辰宋通鑑盧知原字行之德清人以父任至梓州路轉運副使王黼當國費出無藝知原因疏言之黼怒罷去乆之起提㸃東京刑獄陞秘閣脩撰提舉河北髙宗即位知温州帝東幸知原由海道轉粟及金繒十萬至台州奨擢右文殿脩撰管内安撫使凡四年民繪像祠之厯徽猷閣待制知臨安府諫官唐輝論其乖謬以舊職奉祠弟法原宋史知原秉子也見談志盧法原字立之積官吏部尚書紹興元年知䕫州尋進端明殿學士川陕宣撫副使金人攻關輔叛将史斌䧟興州法原初堅壁不戰既而河東經制使王爕以乏食班師法原開闗納之與爕同破斌復興州方巨盗充斥秦隴叛兵欲窺蜀法原極意拊循嚴為偹禦傳檄諸路人心稍安視山川險阻分地置将闗師古屯通州劉錡屯巴西前後屢捷上所倚重㑹烏珠攻關為吳玠所敗法原素與玠不睦玠因奏功訟法原之過帝手詔詰問法原辯甚力上頗不直之憂恚卒始法原之擢宣撫也上從容謂知原曰朕方以川陕付法原盖兄弟皆以材見稱于世云宋史衢按臨海縣志紹興中知原来寓墓在署東一百二十里嘗夣人告云生山東死柑桐後果𦵏焉赤城舊志遂云山東人悞子連見暌車志曽孫子章字元平嘉泰二年進士見赤城舊志盧球革之孫嘉祐八年通判宣州寜國府志嘉疑作元盧彦仁秉之孫吳中舊事劉珏字希范遷吏部侍郎同脩國史言淮甸偹敵兵食為先乃今以降卒為見兵以糴米為見粮無一可恃維揚城池未脩軍旅多闕卒有不虞何以待之已而金人果乗虚大入帝急如臨安府以珏為龍圖直學士知宣州隆祐太后奉神主如江西詔珏為端明殿學士權同知三省樞宻院事從行至洪州疏言脩治廵幸道路之役乞降詔悉罷金人攻吉州分兵追太后舟至太和縣衛兵皆潰珏奉太后退保䖍州言者論不己連謫秘書少監貶衡州紹興初以朝散大夫分司西京追封龍圖閣學士宋史李剛罷中書舎人劉珏行詞謂剛勇于報國數至敗衂坐貶胡安國傳成無玷字士慤少有才氣善文崇寧四年夏趙懐德舉國効順無玷撰端門受降頌以獻之徽宗覧而褒之明年賜進士及第調江西令勞志紹興二十四年十一月丁夘施鉅自吏部侍郎除参知政事二十五年四月乙酉施鉅罷提舉太平興國宫宋史鉅字大任安吉人自檜獨相至死之日易執政二十八人皆世無一譽柔佞易制者如孫近韓肖胄施鉅鄭仲熊之徒率㧞之冗散遽躋政地然甫入即出或一閲月或半年即罷去宋史陶旐字季成吳興人父彖進士起家卒官承議郎通判鄂州君少孤力學元符三年進士乙科厯知東陽縣有善政邑人畫像祀之君不以希世為心臨事明敏毅然敢為所居可紀他人莫及也汪藻陶君墓表沈與求字必先德清人累遷殿中侍御史論范宗尹年少為相恐悮國事紹興四年為浙西路安撫使復以吏部尚書召除參知政事金人将入侵上諭輔臣曰朕當親總六軍與求賛之上書車攻詩以賜上曰朕以二聖在逺屈已通和今豫逆亂如此安可復忍與求曰和親乃金人屢試之策不足信也因奏諸将分屯江岸而敵人徃来淮甸當遣岳飛自上流取間道乗虚撃之彼必有反顧之憂五年兼權知樞宻院事六年張浚出視師不告同列與求嘆曰大事不與聞何以居位遂丐祠罷出知明州諡忠敏宋史俞俟字居易汝尚孫宣和中知真定獲鹿縣辟為歸安縣令縣在郡邦人多難之乃預定規模處之以公葛勝仲知州事待俟甚厚或至治與之談所至有治聲累遷敷文閣學士西吴里語俞汝尚孫俟曽孫南仲俱早年丐休告命有流傳父子當世榮之四世納禄抑又過焉之語談志沈時升字維中霅川人宣和末来令慈谿誠心撫字愛民如子俗咸化之無敢梗政既去父老請立祠于治内名沈公堂其子該為丞相寜波府志調字宜衍該字約父俱時升子待制沈調宣和間為越州士曺掾方臘亂太守劉韐募民能得賊首一級賞錢二萬調聞之遽見請以為如是則小人規利或殺平人乞令必生擒乃給賞仍倍其數不閲日郡人俘數十軰以獻命調覈其寔其間附賊者纔三四人乃請盡釋其餘韐從之自後凡有稱得賊者悉付調辨騐全活殆數千人紹興二十五年十二月甲午沈該自敷文閣待制知䕫州除參知政事二十六年五月壬寅沈該自參知政事除左僕射同平章事二十九年六月己酉沈該以觀文殿大學士提舉洞霄宫尋奪職閒住宋史孫道夫侍講奏敵有窺江淮意上曰朝廷待之甚厚彼以何名為兵端道夫曰彼身弑其父兄而奪其位興兵豈問有名宰相沈該不以為慮道夫毎進對輙言武事該疑其引用張浚忌之遂請外知綿州致仕宋史周操字元持登紹興乙夘第知徽州黟縣以忤權要去職後除國子錄當輪對上意欲興武學以問操操厯以夲朝建制之因對遂兼武學博士後厯言路陞八座及為詹事東宫加禮敬焉有奏議二百卷藏于家操厯尚書吏部員外郎歸安志操嘗以徽猷閣直學士知太平州見陸㳺入蜀記以左朝散郎充秘閣脩撰知衢州見衢州志隆興元年敵移書取海泗唐鄧且邀嵗幣左正言鄭丙持不可俄以王之鍳龍大淵徃議丙與侍御史周操復言四郡固不當議若歸陵寝乃予嵗幣聘使未應出境上命罷使周必大鄭丙神道碑施元之字德初長興人左宣教郎衢州刺史于郡立闕風亭及超覽堂洪邁毛幵為記衢州府志元之任贑州太守見劉後村杜郎中頴志施宿字武子長興人慶元初知餘姚縣其為政務大體興廢舉墜不爭細謹尤加意風教市田置書教誨學者姚北瀕海嵗役民脩堤民甚苦之宿更築石堤建荘田二千畆以備修堤之役與前令謝景初同稱浙江通志兩浙名賢録施宿晩為淮東倉曺時有故舊在言路因書以遺番萄歸院相㑹出以薦酒有問知所自憾其不已致也劾之無以薮罪宿嘗以其父元之所注坡詩刻之倉司有所識傅穉字漢孺湖州人窮乏相投善歐書遂俾書之鋟板以賙其歸因摭此事坐以賘私其女適章農卿良朋云癸辛雜志周淙字彦廣長興人父需字仲逹以進士起家廣東運判知太平州淙警敏力學以父任為郎紹興末知濠梁淮楚舊並有山水置砦自衛者淙為立約束結保伍金主亮傾國犯邉民頼全活者不可勝計孝宗受禪王師進取虹縣中原之民翕然来歸扶老擕㓜相屬于道淙計口給食行者犒以牛酒居者處以室廬人人感悅張浚視師駐于都梁謂淙曰有急公當與死淙亦感激至謂頭可㫁身不可去浚入朝悉陳其状上嘉嘆不己進直徽猷閣帥淮揚時兩淮經蹂踐民多流亾淙極力招輯安堵如故未㡬知臨安府請禁貴近奢靡浚河流以通舟楫進右文殿脩撰奉祠歸宋史臧衍長興志衢按談志進士表需元豐五年進士至紹興末八十餘年矣不知其夀若何淙晩年生者耶李彦頴字秀叔德清人金入浙西父扶家人逃避彦頴方十嵗追不及敵已廹其後能趨仄径亂流獲濟調富陽丞御史周操薦為御史䑓主簿金敗盟張浚督師進討孝宗方向浚執政堅主和陳良翰周操不以為然右正言尹穡隂附執政薦引同已者轉言和于上前上惑之罷督府良翰操相繼黜而穡進遷諌議大夫一日穡以和戰守叩彦頴荅曰人所見固不同公既以和議為是曷不明陳于上前以身任之事成功歸于公不成奉身而退若欲享其利而不及其害國事将誰倚穡大怒自是銜彦頴隂排之改國子博士權吏部郎中厯升詹事兼吏部侍郎權尚書兼侍讀時廷臣多以中批斥去彦頴言臣下有過宜顯逐之使中外知獲罪之由以為戒今譛毁潜行斥命中下将隂邪得伸善𩔖喪氣非盛世事也除吏部尚書既而自簽書樞宻擢參知政事墜馬在告力求去以資政殿學士知紹興府勤約有惠政與祠復參知政事諡忠文子沐慶元中為右正言排趙汝愚公論醜之宋史孝宗命選諌官虞允文以李彦頴林光朝王質對宋史劉一止字行簡歸安人七嵗能屬文有司欲舉八行曰行者士之常不就登進士第紹興初試館職其略曰事不克濟者患在不為不患其難聖人不畏多難以因難而圖事耳如其不為俟天命自回人事自正敵國自屈盗賊自息有是哉髙宗稱善除秘書省兩浙類試以科舉方變欲得通時務者同列皆患其無人一止出一卷曰是宜為者乃張九成也衆皆服遷監察御史上疏謂天下之治衆君子成之而不足一小人敗之而有餘君子雖衆其道孤小人雖寡勢易蔓不加察則小人伺隙而入以敗政矣秦檜請置脩政局一止言周宣王内脩政事脩其外攘之策而已今之所脩特簿書獄訟遷降营繕之務未見其所當急也又請倣劉晏法瀕江置司以制國用鄉村置義倉以偹水旱浚多採用其言遷起居郎奏事帝迎語曰朕親擢也由六察遷二史祖宗時有㡬一止謝先朝惟張徴李捝耳因極陳堂吏宦官之蠧執政植私黨無憂國心翌日罷奉祠厯擢中書舎人兼侍讀莫将賜出身除起居郎一止論将以助和議驟綴從班臣恥與同命乞并罷不報遷給事中居鎻闥百餘日繳奏不已用事者始忌奏其迎合李光復罷奉祠秦檜死召至國門以病不及拜力辭年八十三一止冲淡寡欲嘗誨其子曰吾平生通塞聼于自然惟機械不生故方寸自有樂地博學無不通為文不事纎刻制誥坦明有體其草顔魯公孫特命官制甚偉帝嘆賞為手書之詩自成家吕本中陳與義讀之曰語不自人間来也有類稿五十卷子巒嶅弟寜止宋史紹興九年有詔侍從兩省薦西北人材御史周葵同給事中劉一止薦吕廣問參政李光客也周必大簡惠公神道碑寜止字無虞登進士甲科厯両浙轉運判官苗劉之變寧止馳詣吕頥浩劉光世勉以忠義退而具軍湏以助勤王髙宗復辟累遷吏部侍郎進徽猷閣直學士寜止有文名慷慨喜論事指切時政多人所難言乞禁王安石日錄復賢良方正科用司馬光十科取士法倣唐宰執論事以諫官侍立皆其顯者寜止與一止岑皆羣從昆弟帝嘗稱寜止忠一止清岑敏云范成大與寜止初赴廷試京師人已傳惟㐮陽一范吳興一劉直言暨臚傳盡甲科不見二公姓名李丞相士羙以考官侍立出班奏知徽宗亟令索此二卷進讀嘉嘆再三遂俱寘第二甲首樓攻媿集劉度字汝一博覽强記内翰汪藻奉祠領日厯寓居西寺一見異之以制科表薦談志度脩潔博習葉夢得汪藻皆以賢良方正薦旋第進士入為學宫館職孝宗即位擢諫議大夫前後上九十餘疏其子瑞金宰深知裒成上下卷周必大為之序平園續稿深知郡志作深之劉崧字伯髙嶠字仲髙岑字季髙吳興人也東坡先生所賦吳興文人之詩劉孝叔諸孫也三公才學官位士夫例能稱之汪彦章嘗銘仲髙之墓仲髙任福建提刑日書武夷山三大字甚竒今石刻尚存合壁事類劉岑遷溧陽博學愛士有古君子風先世居烏程之杼山曽祖述為御史忤荆公出知江州司馬温公折簡與孝叔有道勝名立之語岑遂以道勝名其堂溧陽縣志季髙三子右通直郎㵸右脩職郎治司属官泌周平園泛舟逰山錄紹興以来文散階皆左右字以别有無出身惟甞犯賍者則去之劉岑季髙得罪秦氏坐賍廢後復去其左字季髙署銜不以為媿也齊東野語紹興二十五年秦檜死復張浚趙汾劉岑等官宋史芮曄字國噐官左從政郎仁和縣尉嘗和沈長卿牡丹詩云寜令漢社稷變作莾乾坤秦檜惡之㘴竄化州檜死始召用為廣東提刑以文章飭吏事雍容儒雅人推重之參廣東通志宋史新編堯山堂外紀葉顒進尚書左僕射首薦王十朋周操芮曄等可偹執政侍從䑓諌宋史秦檜乆專朝政而士大夫急于進者多附檜意掎摭人之語以為謗訕通判常州沈長卿嘗與參知政事李光啟曰縉紳守和親甘出娄敬之下䇿要荒難結信孰慮吐畨之刼盟檜時己惡之紹興二十五年六月與左從政郎芮曄同賦牡丹詩為隣舎人所告以為譏議送大理寺獄具檜奏其事簽書樞宻院權參知政事鄭仲熊嘿無一言罷朝檜頗咎之時有㫖長卿曄皆除名編管于是侍御史董德元右正言王珉論仲熊遂罷為提舉太平興國宫宰輔編年錄芮國噐毎對人説話退必入室黙思吕東莱集曄子正言卲武太守及言上髙宰見周必大芮氏家藏集序芮輝字國瑞乾道中提舉浙西常平除江西運判吳郡志南昌府志芮國瑞為桐川簿過倪偁曰與我遊者皆有歌詩然珠玉之賜不如藥石之贈公曰建平吏㸃民奸子何以處之曰以嚴馭吏以恕待民奉公以勤律身以儉交同寮以誠暇日讀吾所未見書以増其所未至公善之氏族大全吳興莫汲字子及解試省試廷對皆居前列一時名聲藉重後為學官以語言獲罪南遷石龍地並海子及素負邁徃之氣暇日具大舟招一時賔友之豪泛海以自快将至北洋海之尤大處也舟人畏不敢進子及大怒脅之以劍不得已從之及至其處四顧無際湏㬰風起浪湧舟掀簸如桔橰見三魚皆長十丈餘浮弄日光其一若大鮎状其二状類尤異衆皆戰栗不能出語子及命大白連酌賦詩数絶略無忌意興盡乃返其一絶云一帆㸃破碧落畍八面展開虚無天柁樓長嘯海波湧今夕何夕吾其仙齊東野語衢按宰輔編年錄前知衢州趙令衿居衢州因觀秦檜家廟記口誦君子之澤五世而斬之句通判汪召錫教授莫汲于坐間聞之因告令衿謗訕既而詔謫令衿于汀州且置獄檜死上謂參知政事魏良臣等曰趙令衿趙汾被罪事起汪召錫莫汲卿等可即治之執政奏莫汲張常先陸升等八人以告訐濫叨官爵上曰此大害風教悉送逺郡編管乃粤東志謂汲為國子監正檜惡其主張善類謫化州謬矣莫濛字子䝉歸安人提舉廣南市舶張子華以賘敗朝廷命濛徃鞫之濛正其罪又言秦熺鄭時中受子華賂計直數十緡還朝除大理寺正吏部火連坐者數百人乆不决命濛治之濛察最可疑者㽞于獄出餘人為耳目以踪跡之約三日復来遂得其實繫者乃得釋宋史莫濛紹興中知揚州城圯命濛増築規度城闉分授諸将各刻姓名甃堞間懸重賞激勸閲數月告成一統志莫濟温粹和易而立朝鯁亮毅然不可移為給舎封駁有常知温州以儒雅飭吏事為明州長吏輔以正道後知泉州所至皆稱循良談志陳居仁嘗言䑓閣宜多用明習典故之人帝問其人以李燾莫濟對宋史從官梁克家莫濟俱求補外陳俊卿奏二人皆賢其去可惜上濟字子齊嘗為㑹稽教授紹興志沈夏字得之德清人紹興中為太常主簿賜對便殿論古昔公卿身兼将相南巢之舉尹實視師東山之征周公專之漢之諸葛晋之杜預唐之李靖類皆儒者之傑出乃今士大夫口不談兵緩急孰可任用上悦除宗正丞淳熈中遷工部侍郎厯同知樞宻院事時大臣專政夏凝然中立毎公㑹一揖之外無他言有所論議不為少貶諡簡肅浙江通志沈樞字持要厯吏部侍郎封安吉縣開國男諡獻敏安吉州志沈詹事持要坐葉丞相論恢復貶筠州沈方售一妾年十七八擕與俱行處筠凡七年既歸呼妾父母以女歸之猶處子時人以比張忠定公詠㑹稽潘方仲為安吉尉獻詩云昔年單騎向筠州覔得歌姬共逺游去日正宜供夜直歸来渾未識春愁禪人尚有香嚢愧道士猶懐炭婦羞鐡石心腸延夀藥不風流處却風流龎元瑛談藪李浃字兼善彦頴中子也以父䕃提舉浙東常平㑹稽督零税急械繫滿府縣値公攝帥盡釋之士民歌呼叉手至額曰真李參政児也以兵部郎召遷太府少卿建言忤韓侂胄出福建運判子仁本知南陵縣仁及知仁和縣仁表廸功郎仁元通仕郎葉水心李公墓志詳藝文沈作賔字賔王以父任登仕厯知台州五十日盡除前政之弊邦人胥恱前守嫉其勝已也日媒孽之罷去慶元初帥浙東韓侂胄方用事族有居越者私釀公行作賔逮捕寘于獄竄其奴除兩浙轉運副使入奏攅宫一司嵗撥經捴制錢為緡率四萬有竒未見弊壊輙皆脩造妄費固不足計亦非所以安神靈彰聖孝自今有以营繕聞于朝下守臣稽覈畫㫖而後興役上首肯再三而脩奉者不樂也遷權工部侍郎兼户部厯江西安撫使兼知隆興府在郡撙錢二千餘萬緡僚属請獻之朝作賔謂平生未嘗獻羡一半歸帥司犒師半𨽻本府進顯謨閣學士致仕贈金紫光祿大夫宋史劉唐稽字林宗樞宻珏子能嗣家學治室曰飬浩齋翰林學士汪彦章薦之朝又為記厯知常州孫仲益鴻慶集曺清烏程人父嘗殺人繋獄清自誣手刃代刑其尸遡流至家𦵏西陽村邑人廟祀有祈輙應曽霅之烏程人寳祐間霅之父獲罪當刑代死吏上其事遂為立廟西吴里語丁勝烏程人善騎射嘉平十五年以卒伍從淮東安撫制置司許國鎮襄陽國之出偹李全也時李全陽為國下見必拜國喜曰吾折伏此人矣勝曰全猾人也終不能為相公下願深偹之寳慶元年正月全叛國走死統制彭興及親兵趙社朱虎皆降惟勝與張世雄不屈提親兵與賊巷戰斬賊将馬良勝之揚州歸趙范范授勝副統制紹定三年七月詔削全官爵命趙范趙葵率兵討之四年正月勝與范葵敗全兵于新塘全敗死授淮揚節度使㽞守揚州贈太尉烏青志丁勝起自羣盗以功為福州觀察使大将軍嘉熈間以老乞内任朝廷授以浙西捴管嘗駐兵平江守史宅之毎侮之勝曰丁勝是作賊後来作官尚書作官了却未作賊宅之自是不敢復為戯慢淳祐初馬光祖為畿憲㑹都内有巨㓂許大四聚衆州縣大擾而憲司議遣勝勦捕勝力辭行光祖誚其畏怯勝曰昔光武見大敵勇見小敵怯今賊勢叵測而先遣總管萬一不利後使何人光祖始服杭州府志吳興偹志卷十一
