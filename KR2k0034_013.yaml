body:
  text: 吳興偹志卷十三明董斯張撰笄褘徴第六孔氏婦吳興人寡而有子八人皆訓以義方晝耕夜讀漢哀帝時俱為郡守韋昭吳志下此已載郡志孔姥墩今出之晋吳興孝亷鈕滔母孫氏名瓊富春人能文章藝文類聚隋經籍志潞州沈尚書詢宣宗九載主春闈將欲放榜其母郡君夫人曰吾見近日崔李侍郎皆與宗盟及第似無一家之榜汝叨此事家門之慶也于諸葉中擬放誰也吳興沈氏相見問葉不問房詢曰莫先沈光也太夫人曰沈光早有聲價沈擢次之二子科名不必在汝自有他人言之吾以沈儋孤單鮮有知者汝其不愍孰能見哀詢不敢違慈母之命遂放儋第焉光後果升上第擢奏藝閣從事三湘太夫人之朗悟儋亦感激焉雲溪友議宋沈淑霅川沈尚書之女著諧史一卷載貞女烈婦忠僕諸軼事說郛湖州烏墩鎮沈氏婢其鄰里呼為施嬭婆者年六十餘髽兩髻明其尚處子也年二十為沈氏婢㑹大疫主公主母繼亡獨遺二女子十數嵗無旁親可倚為生施即傭㫪旁舍或織草屨與縫紉之事得錢以給二女且教護之至于長大擇良為配更為撫抱其子盡力奴事鎮人皆知敬愛之每大家出遊則假守舍餘物滿前一毫不取也至今尚在春渚紀聞湖州孫略教授家婢名呂媪者服勤孫氏有年矣性謹朴無他能但常日晨起厨中聚食器潔之聚所棄餘粒間有落溝渠者亦拾取淘濯再于釡中或加五味煮食之未嘗一日廢也年七十餘一日微病即告其家人曰為我髠髮著五戒衣吾將去矣家人從之因起以左手結印而化家人遂龕置開元寺觀者餘月了無穢氣而髮漸生因與剃之後一月一剃上張按范蔚宗傳李次公近世田叔禾傳阿寄施嬭婆者不可為萬世人臣法哉呂媪拾粒為餐居然有小物克勤之風至臨行正念蟬脫俗緣與杜黃裳何異噫此二媪者何可以婢目之魏國夫人管氏諱道升字仲姬吳興之棲賢山人也夫人天資開朗德言容功靡一不偹翰墨詞章不學而能處家事內外整然嵗時奉祖先祭祀非有疾必齊明盛服躬致其嚴夫族有失身于人者必贖出之遇人有不足必周給之無所吝至于待賔客應世務無不中禮合度心信佛法手書金剛經至數十卷松雪齊集眉公以仲姬為泖上人想未見松雪志耳寓公徴第七施延沛國蘄人明五經星官風角家貧嘗詣海鹽賃作半路亭以養母時馮敷為督郵至知其賢者下車謝請入亭與飲食脫衣與之餉錢不受後居烏程順帝初就徴厯大鴻臚陽嘉二年八月己巳拜太尉四年四月甲子以選舉事策罷魏黃初中詔曰故漢先賢太尉施延等二十四人並立忠貞之節咸修清白之行邪佞所讒禍及其身若有遺嗣宜顯舉之又令有司圗像以祀子三崇清河太守咸魏郡太守憲東萊太守皆有異才董卓聞其名將引用之皆潜匿不出憲子良官至尚書今烏程縣西二十四里有延墓參後漢書蕭廣濟孝子傳海鹽安吉二志太尉沛國施延清公潔白進士許國臨難不顧名著漢朝陶潜集聖賢羣輔録黃初詔及延三子已列郡志苐以延為郡人殊誤特正之王敬𢎞字裕之為宋武諱以字行元嘉三年為尚書僕射關署文案初不省讀嘗預聼訟上問疑獄敬𢎞不對上變色問左右何故不以訊牒副僕射敬𢎞曰臣乃得訊牒讀之正自不解上甚不悅六年遷尚書令固讓表求還東上不能奪改授侍中特進左光祿大夫及東歸車駕幸冶亭餞送十二年徴為太子少傅敬𢎞詣都上表固辭不拜東歸上時不豫自力見焉十六年以為左光祿大夫開府儀同三司侍中如故又詣都表辭竟不拜東歸二十三年復申前命復辭敬𢎞形狀短小而起坐端方桓𤣥謂之彈碁八勢所居舍亭山林㵎環周偹登臨之美故時人謂之王東山文帝嘗問為政得失對曰天下有道庶人不議上髙其言上嘗使二老婢女戴五條辮著青紋袴襦飾以朱粉女適尚書僕射何尚之弟述之敬𢎞嘗往何氏看女遇尚之不在因寄齊中卧俄頃尚之還敬𢎞使二婦守閣不聼尚之入云正熱不堪相見君可且去尚之于是移于他室敬𢎞性貞正先是徐羡之傅亮當朝不與來往及致仕隱吳興與子瓉之書深朂以靜退瓉之為五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓉之今便是朝隱瓉之子秀之為尚書又不與王儉欵接三世不事權貴時人稱之後為輔國將軍吳興太守王韶之少有志尚當世詔命表奏輒手自書寫義熙隆安時事大小悉撰録位琅琊郎中令韶之家貧好學嘗三日絶糧而執卷不輟家人謂之曰困窮如此何不耕答曰吾嘗自耕耳父偉之為烏程令韶之因居縣境好史籍博涉多聞初為衛將軍謝琰行參軍得父舊書因私撰晋安帝陽秋及成時人謂宜居史職後為吳興太守撰孝傳一卷文集行于世宋廟歌辭韶之所製也宋史隱在安吉相傳陶𢎞景嘗隱處勞志安吉有梁周𢎞讓故宅𢎞讓之弟𢎞政為安吉縣令𢎞讓結宇中山耽玩文史在縣南三十六里談志駱祕道臨安人梁安成王田曹參軍即駱牙之祖也今長興駱灣有祕道故宅參陳書長興志伏挺字士標平昌安邱人太清中客遊吳興侯景亂中卒著邇說十卷文集二十卷梁書唐吳珙吳頊吳嵩皮光業林升羅隱何肅韓必居于吳興長城之八座山時號八友此條載郡志山川類今出之羅隱字昭諌新安人隱本名橫凡十上不中第遂更名少聰敏作詩著文以譏刺為主錢鏐辟為從事朱溫以諫議召不行開平中羅紹威推為叔父表授給事中所著江東集十卷甲乙集十卷淮海寓言讒書五卷湘南雜槀吳越掌紀一卷見吳越偹史文獻通考上人生于㑹稽本湯氏子聰察嗜學不肯為凡夫因辭父兄出家號靈徹字源澄從越客嚴維學為詩維卒乃抵吳興居何山與詩僧皎然遊講益至皎然以書薦于詞人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韵主盟于世者包李以是上人之名由二公而揚如雲得風柯少葉張以文章接才子以禪理恱髙人風儀甚雅談笑多味權德輿靈徹詩集序初靈徹在吳興居何山與晝公為侣時豫方以兩髦執筆硯陪其吟咏皆曰孺子可教劉賔客徹上人文集紀賀知章一代異人天機卓絶不入名法轍迹而放意縱適超詣縣解晚年尤縱誕極飲狂肆元和己亥知章已百年矣往來㑹稽武夷吳興山水間以藥為市民賴以濟廣川畫跋詳藝文賀知章字季貞㑹稽永興人自號四明狂客又稱祕書外監遨逰里巷醉後屬詞動成卷軸文不加㸃咸有可觀又善草𨽻書好事者供其箋翰每紙不過數十字共傳寶之先是神龍中知章與越州賀朝萬齊融揚州張若虛邢巨潤州包融俱以吳越之士文詞佼秀名揚于上京朝萬止山隂尉齊融崑山令若虗兖州兵曹巨監察御史融遇張九齡引為懷州司户集賢直學士數子人間往往傳其文獨知章最貴參兩唐書顧雲大順中制同羊昭業等十人修史雲至江淮遇高逢休諫議時劉子長僕射清名雅譽光塞搢紳其弟崇望復在中書雲以逢休與子長舊交將造門希致先容逢休許之久矣雲臨岐請書逢休授之一函甚草創雲微有惑因潜啓閲之凡一幅並不言雲但曰羊昭業等擬捋一尺三寸汗腳蹈他燒殘龍尾道懿宗皇帝雖薄德不任被前件人羅織執大政者亦太悠悠雲嘆而已唐托言越雲寓吳興見吳偹史鳯䇿聨筆三卷唐虞部郎中淮南從事秋浦顧雲垂象撰多以擬古為題蓋行卷之文也雲咸通十五年進士陳振孫書録解題郎簡字叔亷臨安人知明州以工部侍郎致仕年八十九贈吏部侍郎簡和易喜賔客號武林居士導引服餌尤好醫術有集驗方行于世宋史郎簡侍郎慶厯間能吏與杜岐公極相厚善簡長岐公十餘年以兄事之既老謝事居里中築别館徑山下善服食得養生之術即徑山澗旁種菖蒲數畝嵗採以自餌山中人目之菖蒲田䝉齊筆談張按簡與吳興六老之㑹安吉志亦以為州人與宋史小乖或由臨安寓苕也其子淑馮京榜進士載郡志則簡之老于吳興信矣何薳浦城人自號韓青老農夫去非東坡薦為武學博士薳嘗寄居烏墩撰春渚紀聞十卷書録解題丹陽集四十二卷後集四十二卷顯謨閣待制江隂葛勝仲魯卿撰洪慶善序其文有所謂絶郭天信拒朱勔慚盛章而怒李彥者蓋其平生出處之略也再知湖州後遂家焉盛允升字德常其先建德人父僑直集賢院知越州宦遊吳興樂其山水因家焉允升資禀端亮力學問喜為文辭采贍蔚有吏能政和二年厯司開封户曹朝廷方考正徴角二聲允升上所著樂書數萬言論辨古樂府以析用中正之法甚悉改儀曹兼大成府製造官燕樂成徽宗命輔臣覆視允升所著精妙厯遷朝請大夫沈與求盛公行狀王升字逸老寓烏戍自號羔羊居士所居有聖采堂得栁軒樓異監鎮時與往還工草書殊有旭顛轉摺熊度宣和間以草書聖經上進除書録其書尤為內廷稱賞又兼能畫書史參攻愧錢惟善飲中八仙歌題跋張嵲字巨山襄陽人宣和三年上舍選中第厯利州路安撫司幹辦公事以母病去官紹興中召對嵲上疏論邉事召試除祕書省正字再遷著作郎出為福建路轉運判官上疏略曰古之人君其患有二不在于拒諫在納而不能用不在于不知天下利害在知而不以為意陛下渡江十年矣今皆以為當然而更為迂濶之事此近于納諫而不知用知利害而不知恤也除司勛員外郎金人敗盟上命兩省卿監郎曹各草檄獨取嵲所進者播之四方推中書舍人升實録院修撰未幾右正言万俟卨論嵲罷去後起知衢州與祠時方修好息兵朝廷講稽古禮文之事嵲作中興復古詩以進宋史武嵲寓居康見郡志張嵲為司勛郎官金人再取河南秦相皇恐上章引伊尹善無常主及周任不能者止之文以自解嵲之筆也秦德之遂擢修注掌制而嵲具槀倉卒誤以伊尹告太甲為告湯及周任之言為孔子自言時祕書省寓傳法寺有書其門曰周任為孔聖太甲作成湯秦疑諸館職為之多被逐然嵲亦以答檜三折肱之語謂其二于己未幾亦罷文獻通考王洋字元渤待制資深子亦以省第二名中宣和二年甲科紹興初以右贊善命直徽猷閣厯典三郡所至有異政官太學為博士時秦檜為丞相而直道正辭亦擯勿用晚守鄱陽洪忠宣適自北脫歸人無敢過其居公獨修答故坐事免去葉少藴嘗為公言劉貢父為漢史詩以為杜詩功曹非復漢蕭何為誤用事信乎公曰高紀蕭何為主吏孟康注曰功曹也王定國猶知之詩史豈誤哉少藴嘆服有東牟集三十卷行于世周丞相益公為之序嘉定山陽志見洋居德清之石壁山勞志韋嵩嶽州人隨宋髙宗南渡尉武康悅故鄣山水之勝因家長興張東沙故鄣韋氏譜序時氏彭城大族渡江而南居吳興者四衍之卒官朝請大夫成都運判子五人雋登進士科傑侃佐行以任入官張于凱贈時起之序胡舜􅕾嘗丐祠居吳興之射村子仔遂家苕溪焉漁隱叢話舜􅕾績溪人厯御史中丞廣西經略以忤秦檜貶洪元英嘗言舜陟之得人心雖古循吏無以過也仔弟仰亦為郎官見談志朱勝非自紹興四年九月罷相居湖州嘗就除知本州既而得提舉洞霄宫食祠祿八年寓天聖僧舍杜門却掃留心內典與世事相忘十四年十二月乙亥卒右迪功郎安誠曽受勝非辟為江西帥屬于佛寺飯僧自撰疏文訕及朝政為郡守所發詔停誠官惠州編管宋宰輔編年録秀水閒居録三卷霅川朱魯公丞相勝非寓宜春時作秀水者袁州水名也一編之內于南渡諸公行事貶駁無全人清波雜志書録解題曽協南豐人翰林學士肇孫也年十九以詞賦魁胄監一上不第考古著書有行莊集行于世終朝奉大夫知永州協始居湖之德清子南仲隆興元年進士知溫州有惠政葛文定公邲鎮越以最列除尚書户部郎中充金國正旦國信使將行值憲聖慈烈之喪授館燕山凡命宴皆請去樂及罷燕射金悉勉從尋為福建轉運副使首亷所部疾苦良願無擾奸無容欺厯擢刑部侍郎集賢殿修撰晚年意在簡默自號覺翁因以名菴好學不倦凡所述作溫潤典雅有覺菴集子掄監嘉興府都稅務孫仲良登仕郎樓攻愧集成閔字居仁邢州人靖康初應募捍金兵高宗南渡韓世忠追苖傅及襲烏珠討范汝為皆在戎行積功至保寧軍承宣使紹興二十四年拜慶逺軍節度使超拜太尉主管殿前司公事御史劾之罷太尉婺州居住乾道初聼自便歸湖州宋史李迎字彥將河陽人知湖州歸安縣以外艱不赴厯安撫司機宜寓湖州新市蕭寺中手抄聖賢治心飬性之學時賦詩自樂類成百篇嘗自贊曰三仕三已應緣而止一邱一壑倦逰而歸以子貴纍贈中奉大夫子結度支員外郎綰平江參軍綺知如臯縣孫大成青陽尉大雅主太平簿大均興化尉益公李迎墓志詳藝文濟溪老人遺槀一卷通判明州濟源李迎彥將撰永嘉周浮沚先生之壻與先大父為襟袂集中有送先君子越戊子秋試詩首句籍甚人言易已來蓋先君治易故也集序周益公作書録解題李結字元明河陽人迎子也慕元次山之風因以次山自號卜築霅上扁舟夤緣葦間鷗來相從百轉不止名為漁社後以尚書郎奉使全蜀凡六十一郡之官吏數十萬之將士莫不欽受約束乃念舊社不置繪漁社圗周必大序之武康寓客任公紳諫議古之從兄也靖康間失母長齊泣血以求之金人歸河南徒步走北方奉之以歸孝行上聞擢敕令所刪定官改秩主管官告院母終廬墓事之如生與世相忘久矣武康令方道訪其家列其高節于朝控懇偹至遂賜紫服聞者欽嘆風化之美攻愧集黃龜年字德邵號竹溪先生福州人葬父于鄞因家焉舉進士為殿中侍御史與諫官劉棐論秦檜檜由是罷至再相龜年寓湖州檜托其過押回福州檜死復居鄞寧波府志參氏族大全龜年永福人纍官尚書左司員外郎遷殿中侍御史㑹王倫來歸龜年劾檜主和誤國併劾檜黨檜與祠龜年又奏檜厚貌深情矯言僞行上不畏陛下中不畏大臣下不畏天下之議章凡三上遂禠檜職纍遷中書舍人兼給事中司諫詹大方希檜意論之落職宋史畢再遇兖州家將也開禧用兵諸將多敗事獨再遇纍有功金人認其旗幟即避之屢遷鎮江都統制揚州承宣使驍衛上將軍後致仕居于霅癸辛雜識再遇字德卿以武信軍節度使致仕贈太師諡忠毅再遇姿貌雄傑早以拳力聞屬時寢兵無所自見一旦邉事起諸將望風奔衄再遇遂為名將宋史吏部侍郎萬鍾字元亨家世錢塘自為司農卿時卜宅于安定門橫塘談志衢按杭志孝行傳范鍾字元亨臨安人父居市肆貨巾幘蓄婢生鍾婢約滿去不復聞鍾浸長讀書取科第授縣尉常欲訪母無從偶經霅川見渡口茅屋中嫗單身鬻餅餌甚苦鍾感之詢其往跡皆母事也且云少傭臨安巾肆中嘗生子今𫝊已入官恐貧賤不相認故獨勞耳鍾徴其子所生年月日皆與已合鍾大悲喜即拜認之嫗倉卒未敢當鍾曰阿母無棄兒也遂具衣迎歸後鍾綰郡符持使節登華要嫗皆及享其飬意即一人以萬為范字魯魚耳詹體仁字元善浦城人光宗即位纍遷太常少卿上以積疑成疾久不過重華宫體仁陛對首陳父子主恩之說孝宗崩體仁率同列抗疏詣重華宫親臨祥祭辭意懇切寧宗登極天下晏然體仁與諸賢密贊趙汝愚之力也孝宗將復土體仁言永阜陵地勢卑下非所以妥安神靈與宰相異講除太府卿尋直龍圖閣知福州言者竟以前論山陵事罷之退居霅川日以經史自娛人莫窺其際真德秀早從其遊嘗問居官蒞民之法體仁曰盡心平心而已盡心則無愧平心則無偏世服其確論宋史吳柔勝字勝之宣州人登進士第調都昌簿丞相趙汝愚知其賢差主嘉興府學教授將置之館閣㑹汝愚去御史湯碩劾為汝愚黨且主朱熹之學不可官師儒自是閒居十餘年嘉定初主管刑部架閣文字遷國子正業柔勝始以朱熹四書與諸生誦習伊洛之學晦而復明遷太學博士又遷司農寺丞出知隨州收土豪孟宗政扈再興𨽻帳下後皆為名將除京西提刑領州如故改湖北運判兼知鄂州改知太平州終祕閣修撰奉祠卒諡正肅二子淵潜各有傳宋史柔勝紹興初占籍新市繼娶右正言沈濬女生淵潜沈應升云程大昌字泰之休寧人自宦遊去鄉里樂吳興山水之勝而卜居焉纍遷權吏部尚書諡文簡宋史周益公集癸辛雜識云程文簡尚書園在城東宅後又云河口程氏園文簡别業藏書數萬卷作樓貯之北海集二卷北海王嵎季夷撰淳熙間名士寓居吳興陸務觀與之厚善三子甲田申皆登進士擅名文獻通考李龏字和父菏澤人家吳興三滙之交效元白為歌詩不樂仕進年登髦期自銘其墓云孰生豫孰死豫自不知為文之徒詩之徒佩楚軒客談李龏字和父號雪林有潄石吟行于世瀛奎律髓吳興林憲字景思少從其父宦遊天台因留蕭寓焉初賀參政允中竒其才妻以女孫而不取奩田貧甚為詩學韋蘇州淳熙五年尤延之為作雪巢記又為雪巢小集序柔櫓晚湖上寒燈深樹中汲井延晚花推忩數新竹延之謂唐人之精者不是過上雪巢小集三卷東魯林憲景思撰初寓吳興從徐度敦立遊後為賀參政允中子忱孫壻寓臨安其人髙尚詩清淡古句尤佳殆逼陶謝梁溪尤延之誠齊楊廷秀皆為之序且為雪巢賦及記余為南城其子遊謁至邑以家集見示愛而録之及守天台則板行久矣視所録本稍多然其暮年詩似不逮其初往往以貧為纍不能不衰索也書録解題李心傳字微之隆州人道傳兄也心傳閉户著書魏了翁等二十三人交薦寶慶二年以布衣詔為史館校勘厯工部侍郎奉祠居湖州心傳有史才通故實所著成書有髙宗繫年録學易編誦詩訓春秋考禮辨讀史考舊聞證誤朝野雜記道命録西陲泰定録辨南遷録又有詩文一百卷宋史理宗紀按宋史心傳居湖州張考道𫝊性傳俱寓吳興心傳宦跡僅判成都府四川制置司參議初未嘗蒞潮陽也何故違其二弟萬里乘桴冒蛟鱷之險耶今南林報國寺碑亦心傳撰性傳書宋史以湖為潮誤矣特正之李舜臣子心傳道傳性傳心傳官太史遊吳興悅山水之秀寓于郡城即今安定書院又相度辨峯建宅營墓名其灣曰太史灣殁以道傳子獻可為嗣遂為吳興人後徙長興之東山即余姻家李澄之世清之先也閲祁主政寧龍僉憲霓劉清惠麟諸傳志得其概因意其昆弟三人偕至吾湖而郡學獨祠道傳則以今兹繁衍者乃厥子姓耳如遡所自心傳尤當入寓賢而性傳亦未可遺也閔元衢張嘗據癸辛雜識及報國寺碑正宋史之誤近得康侯所示長興李氏譜自謂差有讀書眼耳李性傳字成之嘉定第進士厯起居舍人兼侍講疏言東周以後諸侯卿大夫皆既葬而除服秦漢之際尤為淺促孝文定為三十六日之制則視孝惠以前已有加矣東漢以後又損之為二十七日謂之以日易月則薄之至也于數百年惟晋武帝魏孝文為能復古之制而羣臣沮格未克盡行惟孝宗通喪三年近古所獨陛下繼之至性克盡前烈有光乞以此疏付之史館庶幾四海同風民德歸厚纍遷權吏部尚書臣竂論舜臣立廟封爵事落職與祠淳祐中厯同知樞密院事未幾落職與郡復與祠寶祐二年與內祠兼侍讀以觀文殿學士致仕卒贈少保宋史李元綱字國紀錢塘人號百鍊真隱乾道間以上庠英士寄居吳興之新市力學好古雖困窮􅋵履益堅怡然自得不為外物異端之所搖奪撰聖賢事業圖集說三先生西銘解厚德言行編諸書杭州府志袁說友字起巖建安人隆興元年登第文辭豐蔚嘗為四川安撫使輯成都文類一書楊廷秀有和袁起巖詩云道場山下弄山泉餐菊紉蘭萬物先魏華父挽袁詩云靈輀送無路淚灑霅溪風說友之寓苕審矣參八閩通志成都文類四川總志誠齊集鶴山集五書說友嘗知臨安平江見蘇杭二志嘗知池州見昭明集題跋號東塘居士見瀛奎律髓三登橋在德清袁說友與張巖王大有嘗寄居于此後皆登第故名德清志張按巖字肖翁廣陵人紹興末居湖州黨韓托胄厯參知政事知樞密院見宋史其人無足述也王大有平江人乾道八年進士說友事其兄直友謹宦寖逹至參知政事直友無一錢食客輒為萬錢具費皆出參政葉水心袁公墓志趙與􅊸字德淵燕王八世孫希懌第三子居湖州嘉定十三年進士嘉熙三年直敷文閣知平江兼淮浙發運使特置司領其事自與􅊸始四年郡中饑分場設粥以寓公方萬里為人所推敬委請董役全活者數萬人寶祐三年以觀文殿學士再守郡行鄉飲射禮于學宫復修飾殿堂齊廬廣絃誦以嚴教飬學宫弟子為立生祠明年兼提刑六年除江東安撫使知建康府景定元年復知平江丐祠封周國公八月卒贈少師諡忠惠學者稱為節齊先生宋史參姑蘇志右史徐元杰暴亡程公許亟奏于朝紳中選公正明决無所顧忌者専蒞其事分别首從必誅無赦疏入不報物論沸騰臨安尹趙與􅊸奏乞置獄天府帝從之公許繳奏與􅊸乃嵩之死黨乞送大理寺命臺臣董之詔殿中侍御史鄭宩宩回懦首鼠事竟不白然公論莫不偉公許宋史新編掌公許寓吳興見故陳貴誼字正甫福清人父宗召字景南因贅而居崑山淳熙二年登第厯工部尚書後寓武康貴誼亦卜居焉慶元五年進士又中博學宏詞科厯太學博士時議更楮幣法貴誼轉對言楮劵之令使奸惡得逞道路怨咨非所以祈天永命固結人心主議者摘其熙寧新法之語激怒時宰再遷將作監丞兼魏惠憲王府學教授遷祕書郎出知江隂軍提舉江西常平召赴行在未至授禮部郎官屬金人大擾淮蜀又指陳時弊彌逺滋不樂諷言官論罷主管崇禧觀起知徽州召授司封郎官兼翰林權宜理宗即位纍遷中書舍人升兼直學士院內侍溢受恩賞輒封還詔書遷至參知政事兼同知樞密院事出帥汴洛時已移疾猶上疏力爭五上章乞歸轉四官加邑封致仕卒贈少保資政殿大學士宋史新編參魏鶴山崑山志丁大全與董宋臣表裏濁亂朝政牟子才纍疏辭歸初子才在太平建李白祠自為記曰白之斥實由髙力士激怒妃子以報脫鞾之憾也力士方貴倨豈甘以奴𨽻自處者白非直以氣陵亢而已蓋以為掃除之職固當爾所以反其極重之勢也彼昏不知顧為逐其所忌力士聲勢益張宦官之盛遂自是始其後分提禁旅蹀血宫闈雖天子且不得奴𨽻之矣又寫力士脫鞾之狀為之贊而刻諸石屬有拓本遺宋臣宋臣大怒持二碑泣訴于帝乃與大臣合謀嗾御史交章誣劾子才在郡公燕及餽過客為入已降兩官猶未巳帝疑之密以槧問安吉守吳子明子明奏曰臣嘗至子才家四壁蕭然人咸知其清貧陛下毋信讒言帝語經筵官曰牟子才之事吳子明乃謂無之何也衆莫敢對戴慶炣曰臣憶子才嘗繳子明之兄子聰帝曰然事遂解蓋公論所在雖仇讐不可廢也子才事親甚孝弟子方客死公安挾其柩葬安吉女弟在眉山拔其家于兵火致之安吉在吉州文天祥以童子見即期以逺大所薦士若李芾趙昴發劉祓家鉉翁皆為忠義士平江守吳淵籍冨民田以千餘畝遺子才皆却之身後家無餘資賣金帶乃克􅌾宋史胡榮字宗叟歙人登淳祐四年第忤賈似道差知撫州似道嗾江西安撫曽淵子俟榮至隂圗中傷榮見幾勇退寓吳興龜溪之上似道南竄以將作大監召命下而世運新矣徒步歸歙洪焱祖胡大監𫝊陳存字體仁龍泉人太學上舍淳祐七年第三人文章政事皆有聞譽仕至兵部尚書端明殿大學士知慶元府沿海制置使括蒼彚紀戴表元序陳無逸詩稱其祖龍泉公居湖即存也壽昌徐文鳯從吳興陳本齊先生存受春秋故其經學卓有源委權知象山縣以慈惠稱本齊開閫沿海辟入簽㕔咨决庶務全活者尤衆嚴州府志度宗時詔卿監以下薦人材將作監楊文仲薦陳存王柏等十有八人皆名士也宋史衛富益崇德人幼有異質識見髙逺不為章句學嘗負笈往從金仁山學深探易理金卒復受業于許白雲白雲重其器識以友處之悉究性理默識心融許卒以義制服既而歸曰生何與草木禽獸同朽腐哉自以先世厯蒙宋澤聞宋亡于崖山日夜悲泣設壇具祭文天祥陸秀夫等詞並哀慘觀者無不墮泪又稱夷齊何人耶馮范何人耶遂决意不仕隱居教授創白社書院于石人涇春秋社日祀先聖鄉賢㑹布衣友賦詩講道縉紳仕元者不得就列風度飄然士林髙之至大間有司欲薦聞不就怪其迂毁其書院遂擕仲子隱于湖之金蓋山學者翕從所著四書考證性理集義易經集說讀書纂要耕讀怡情等録至治間長子迎飬還故里自號耕讀居士絶不言世務不理城市或有乞詩文者辭曰吾欲胸中涵養德性而已有何說為嘗語諸子曰士之品三道德為上冨貴功名何足慕哉一日遘微疾取所著書悉焚之曰吾志晦迹况𤣥奧處宋儒究盡安用㽜此糟粕耶平生推崇儒術闢異端表裏洞徹動定坦夷接人無貴賤親踈賢者服其德不賢者服其化卒年九十六門人沈夢麟黃彛鄭忠相率制服葬于舊隱金蓋山私諡曰正節先生正德間劉督學瑞贊曰逺宗正學獨抱遺忠崇德志史光蜀青神人嘉熙戊戌光年十二以避難遷湖州光之居湖也廣自植立遂以武科奮績官武翼郎浙東兵馬都鈐轄娶閔氏二子曰圭文故宋舉進士修職郎瑞安府司户參軍至大間將教授平江之嘉定未上而卒曰璋文早世圭文之幼也聞母有疾痛不忍聼更以燼爇左右臂以代痛母疾止乃已武翼嘗病纍月視藥未嘗解帶病亟哀號祈天願以已壽益父夢或告之曰感而孝念豫三齡武翼果又三年乃終娶程氏子三人台孫厯浙閩兩帥幕闕孫由舶司幕長將改除喜孫業進士孫六人名之曰淵源澄清潤澤蓋有所識也虞伯生史氏程夫人墓志龎朴字夷簡謙孺𤣥孫宋末補春秋員家松陵賈似道聘為孰師不赴錮不得試從方逢辰講學元初詔行臺御史程巨夫訪南士徴不起強至再出授翰林修撰兼禮部時敕修宋遼金三史總裁托克托同官多北人欲統金附宋朴曰昔曹魏有中原不附蜀漢元魏有中原不附齊梁此綱目所以重大統也今大元繼宋統近接漢唐逺接三代若承金統舍宋統恐非所以示廣也托克托不從同事門人貢師道復力辨之擬轉外秩朴引歸寓居南潯趙孟俯陳孚咸與倡和自號五湖狂叟龎氏家乘袁桷字伯長慶元人舉茂才異等自號清容居士寓吳興大德間為翰林國史院檢閲官時初建南郊桷進十議多采之至治元年遷侍講學士桷在詞林朝廷制册勳臣碑銘多出其手所著有易說春秋說清容居士集勞志袁桷讀書吳興有清容書院臨苕溪對辨山後山題云人同緑水長為主座有青山不計年堯山堂外紀楊維楨字亷夫諸暨人舉進士署天台尹維楨為文擬先秦兩漢詩尤名家有詔修遼金宋三史維楨作正統辨千言司徒歐陽𤣥見之嘆曰百年後公論定于此矣四海兵亂遂浪跡浙西山水間明興天下大定詔徴遺逸之士修纂禮樂書頒示郡國維楨被召至京師肺疾作而卒勞志崔復錢唐人父謙逺祖晋與趙文敏有世契之好故復妻文敏孫仲穆女洪武六年徐大章為銘其墓且云復有學行善繪事次子晟亦工篆𨽻晟字彥暉愛吳興山水營别業一區于辨山之麓號雲林小隱大章仍為作記蘇平章又為作雲林小隱詞苕紀藝術徴第八神仙附羽流姚最僧垣第二子也最幼在江左迄于入關未習醫術天和中齊王憲奏遣最習之憲又謂最曰博學髙才何如王褒庾信王庾名重兩國吾視之蔑如接待資給非爾家比也勿不存心且天子有敕彌須勉勵最于是始受家業十許年中略盡其妙後周書朱肱吳興人進士登科善論醫尤深于傷寒在南陽時太守盛次仲疾作召肱視之曰小柴胡湯證也請并進三服至晚乃覺滿又視之問所服藥安在取以視之乃小柴胡散也肱曰古人製㕮咀謂銼如麻豆大煮清汁飲之名曰湯所以入經絡攻病取快今乃為散滯在鬲上所以胃滿而病自如也因依法旋製自煮以進二服是夕遂安因論經絡之要盛君立贊成書蓋潜心二十年而活人書成道君朝詣闕投進得醫學博士肱之為此書固精贍矣嘗過洪州聞名醫宋道方在焉因擕以就見宋留肱欵語坐中指駁數十條皆有考據肱惘然自失即日解舟去由是觀之人之所學固異耶將朱氏之書亦有所未盡耶後之用此書者能審而慎擇之則善矣泊宅編王克明字彥昭樂平人徙湖州烏程紹興乾道間名醫也魏安行妻風痿十年不起克明施針而步履如初廬州守王安道風噤不語旬日他醫莫知所為克明令熾炭燒地灑藥置安道于上須臾而蘇金使黑鹿谷過姑蘇病垂死克明治之明日愈名聞北方張子蓋救海州戰士大疫克明時在軍中全活者幾萬人克明頗知書好俠尚義常數千里赴人之急初試禮部中選纍任醫官王炎宣撫四川辟克明不就炎怒劾克明避事坐貶秩後遷至額內翰林醫痊局賜金紫宋史新編凌漢章湖州人少學針灸三殺人乃棄其針于水中針皆上浮水面漢章曰天命我矣拜而受之遂精研其術名動天下嘗至常熟寓東海湯禮家早起聞其鄰徐叔元家哭甚哀往問之乃其子婦以産難死叔元以為不祥將舁出付火葬漢章急止之命其夫發棺揣胸前尚微溫出針下數穴良久子下婦得生又一跛翁扶杖過之自言少多瘡瘍有庸醫誤折針膝中今杖行二十年莫能愈漢章為從肩臂上針三四穴折針從患處突出棄杖再拜而去髙坡異纂鄉人顧謙𢎞治二年五月得疾夜見金冠緑袍者踞坐梁上呼謙名曰我天醫也為謙具說致病之故又授以數百言曰子能行此可為名醫善記之勿忘也自是頓瘳而得耳瞶至冬月往謁凌漢章求針治漢章為針兩耳移時而愈曰子嘗為天醫𫝊藥乎謙驚問所自知漢章曰大凡天醫治病𫝊藥耳中藥入而氣閉故聵也謙乃具言所見曰先生神人也然謙自病後追繹與人問答之語皆厯厯分明獨所授要言茫然不記一字庚巳編吳興西湖民景養善相詳封爵徴于頔刺湖州行縣至長城方山其下有水曰西湖舊唐書于頔傳吳菰城嫗善相吾粲數嵗時嫗見之曰是兒有卿相之骨粲後厯太子少傅吳志南宋丘睿吳興人善卜筮詳官師徴徐孝嗣沈立精堪輿之術自卜兆于里兆云後出宫妃今其孫為宸妃歸安志以下神仙及羽流沈羲武康人躬耕于野忽棄耕亡去家人求之不得子孫相傳以為羽化齊永明二年歸訪舊里呼諸孫謂之曰吾是汝四世祖在蜀以符藥治病有活人功上帝授吾為碧落侍郎今歸以告汝倐忽不見邑人駭異建道觀塑像以奉之宋崇寧大觀間有內庭女道官孫千霞夢一道士披綵霞衣言曰吾武康人也在碧落中與子有宿緣他日當遇于彼及靖康亂千霞避地南方依石防禦防禦者家于德清之韶村始知武康為吳興也一日石氏設醮羽衣畢集道士姜景良與焉千霞以其夢告景良曰吾邑沈羲也千霞急走羲祠瞻塑像曰真吾夢中所見也遂捐金遍施黃冠而去後千霞于冨陽太元山授徒數百人年八十有九忽髭髯叢生越三年而羽化今縣有仙人渚石胡梯世𫝊羲登仙之處武康志又詳見太平廣記陸修靜吳興東遷人宋文帝召入內殿時太后王氏雅信黃老降皇后之尊執門徒之禮珠囊修靜早為道士置館廬山時逺法師居東林其處流泉匝寺下入于溪每送客過此輒有虎號鳴因名虎溪後送客未嘗過獨陶淵明與修靜至語道契合不覺過溪因相與大笑世傳為三笑圗宋泰始三年羽化于京師賜諡簡寂以故居為觀馬湘字自然杭州鹽官人也世為縣小史而湘獨好經史攻文學治道術遍遊天下後歸江南嘗醉于湖州墜霅溪經日方出衣不沾濕坐于水上而言曰適為項羽相召飲酒大醉方返溪濵觀者如堵酒氣猶衝人狀若風狂路人多隨看之又時復以拳入鼻及出拳如故又指溪水令逆流食頃指栁樹令隨流水來去指橋令斷復續續仙𫝊馬自然每賖酒于白塔巷酒肆一日沉湎謂主人曰吾今得仙矣所逋酒價焉敢輕償遂出囊中藥化賣酒鐡器並為黃金即乘雲而去其橋遂名望仙勞志劉商彭城人家長安少好學强記精思攻文有胡笳十八拍盛行于世兒童婦女咸悉誦之進士擢第厯臺省為郎性耽道術逢道士即師資之煉丹服氣靡不勤切遊茅山久之復往宜興愛罨畫溪之景遂于胡父渚葺居隱于山中近樵者猶見云吾劉郎中也而莫知所止已為地仙矣續仙𫝊劉商泛苕霅間卜居武康上強山下仙𫝊拾遺劉誼字宜翁湖州人少登進士官至二千石集仙𫝊東林沈氏世為著姓沈思字持正號東老家頗藏書喜賔客東林當錢唐往來之衝士大夫與游客勝士聞其好事必過之沈亦應接不暇又能釀十八仙酒一日有客布裘青巾自稱回道人長揖于門曰知君白酒新熟逺來相訪願一醉實熙寧元年八月十九日也思見其風骨秀偉碧眼有光及論古今治亂老莊浮屠理無所不通意非塵埃中人也因出酒器數十事于席間曰聞道人善飲欲以鼎先為壽如何道人曰酒器中惟鍾鼎為大屈巵螺杯次之而梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如顧愷之食蔗漸入佳境也又約周而復始滿斟于前笑曰所謂杯中酒不空也回公興至即舉杯而盡乃命東老鼓瑟回浩歌和之又嘗圍碁以相娛止奕數子輒拂去笑曰祗恐碁中爛斧柯回公自日中至暮已飲數斗無酒色是夜月微明秋暑未退而蚊蚋尚多侍人秉扇驅拂偶滅一燭回公乃命取竹枝以酒噀之插于壁間須臾蚊蚋盡棲于壁上而所飲之地灑然思欲有所叩先托以求驅蚊之法回公曰且飲小術何足道哉聞公自能黃白之術未嘗妄用且篤于孝義又多隂功此吾所以來訪而將以發之也東老因叩長生輕舉之術回公曰以四大假合之身未可離形而頓去惟生死去住為大事死知所住則神生于彼矣東老攝衣起謝有以喻之回公曰此古今人所謂第一最上極則處也此去五年復遇今日公當化去然公之所鍾愛者子偕也治命時不得見之當此之際公亦先期而知謹勿動懷恐喪失公之真性東老頷而悟之飲將達旦則甕中所釀止留糟粕而無餘􅅹矣回公曰久不遊浙中今日為公而來當留詩以贈然吾不學世人用筆書乃就擘席上榴皮書字題于庵壁其色微黃而漸加黑詩曰西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書凡二十八字已而告别思啓關送之天漸明矣握手並行笑約異時之集即揖出門凌石橋而去追躡之已不見東老歸購寫照者繪仙人像不甚肖别命圖之正操筆忽一道者求齊延入坐坐定東老退具飯少頃竟無所見回至畫所苐見壁上仙像宛然如所遘回仙人無異蓋回字者吕字也後四年中秋東老果化去神采如生家人舉棺怪其輕視之惟衣履存焉今其地有回仙觀陸元老回仙録東林山志姜景良武康人道行髙潔能詩有醉蓬萊詞一章勞志金婆者好施茶人來啜茶金婆輒飲其餘瀝數十年不倦一異人變為癩者來啜茶金婆亦飲其餘悔而吐之異香滿室因得仙道尸解適湖人商于楚過洞庭湖見金婆與一道士同舟呼鄉人以雙履寄回西吳里語杜道堅字處逸號南谷子采石人年十四得異書師葛蒙庵為茅山道士居武康升元觀宋皇慶間授隆道冲真崇正真人作覽古樓聚書萬卷西吳里語處逸住升元報德觀興𤣥學建清規百廢具舉徒衆恱服屬元兵南渡所在震動玊石慮燬于崑岡黎庶懼淪于塗炭真人負矢石叩軍門見太傅淮安忠武王于故鄉披膽陳詞為民請命王與語大恱恨見之晚軍麾為之斂兵民社因之安堵遂使馳驛入覲帝閽詔特委江南搜訪遺逸真人退而上疏言求賢飬賢用賢之道上嘉納焉松雪齊集王壽衍字眉叟號溪月有學行居德清至治初徴入京師授𢎞文輔道粹德真人一時名士若虞楊范揭皆與友善大振𤣥風時有浙省都事劉時中者名士也既卒貧無以葬壽衍躬至其家弔哭撫其遺孤營其喪事乃為葬于德清縣與已壽穴相近便于拜掃人皆服其友義西湖游覽志參德清志沈野雲名道清德清人成祖聞其名召見令致雲物野雲舉一小瓶噓之雲氣充滿一室厚賜而退初野雲奉命還鄉族親嗤之曰狂道士何處乞丐回也野雲佯不顧但懸一牌于背云賣雷雨時太守方病旱聞之曰得非沈師耶吾昔知北州得其法以救旱不受謝而逸速召之果然乃揖之以禱雨告野雲曰公故人安敢辭然非城隍廟不可太守急延入城隍廟問須何物曰爛猪頭陳煮酒足矣令人奉之大嚼而卧衆道士白太守師正寐安得雨太守令問之曰酒肉未足雨豈遽降太守又具酒肉食畢又卧道士曰時午矣師果何為野雲曰天午耶請太守觀雨太守盛服至立庭中野雲曰公何不弊衣太守謝不敢乃取四碗至書一雲字於其中擲之又取三碗書雷雨二字三擲而坐使人視西北方有雲乎曰雲矣有頃布滿四空而中天有一穴以筆灑墨擲之倐合而雷雨大作須臾水深三尺太守曰可矣雨止太守出二十金謝不受但受米分施諸丐者退卧室中諸親前嗤之者來誦言神術野雲曰後五日雨當洗壇汝等田禾沾足否曰未也剪紙旗與之曰汝插一旗塍上以為别雨必倍之諸親爭受其旗以退五日果大雨而旗之所在㸃雨不集蓋以其前嗤笑故戲之野雲嘗行過金陵市中羣兒罵之曰癡道士野雲曰汝皆坐吾有栗分與汝曹羣兒信之皆不能起其父母謝之拂䄂而起沈術大抵類此湖海搜竒沈野雲字道寧烏程人寓鬱秀道院幼習方外學朝廷纍召禱有驗上深恱之賜三品服及湛然純一圗書雨浙名賢録吳興偹志卷十三
