body:
  text: 吳興備志卷十五明董斯張撰巖澤徵第十一園第陵墓附句餘東五百里曰浮玉之山北望具區具區太湖也東望諸毗水名有獸焉其狀如虎而牛尾其音如吠犬其名曰彘是食人苕水出于其隂北流注于具區其中多鮆魚山海經天目山左髙于地七千五百丈右髙于地七千丈從廣三十里上有淵中有魚可食無毒蟲太平御覽天目山第三十四洞天名太微𤣥蓋之天上有兩池如左右目因名天目其泉有異形之魚洞淵集天目山有兩湖謂左右目故名天目也山極髙峻上多美石泉水名茶地輿志天目山極髙峻崖嶺疏叠西臨澗山上有霜木皆是數百年樹謂之翔鳳林東面有瀑布下注數畝深沼名曰蛟龍池水經注辨山者勾踐于此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徙于南村種之飾治為馬箠獻于吳吳會分地記御覽所司辨山和採玉處山東足有一簣髙數尺晉太康中人開之風雨晦冥遂止厯代莫知所封郡國志烏程辨山本名土山有項籍廟自號辨王因名山足有一石匱髙數尺陳郡殷康嘗往開之風雨晦冥乃止說苑康吳興太守孺山在烏程縣東二十八里後漢徐孺子哭友人兾州刺史姚元起于此時九江吳子翼嘲之曰南州孺子弔生送死前慰林宗後傷元起山有孺子祠故名宋紹興中郡侯撤淫祠土人按圖經為言祠得不廢談志西余山在縣東一十八里漢封東海王子為顧余侯即此勞志吾鄉妙喜謂之杼山謂夏王杼嘗巡厯于此故名其西曰夏駕山又有夏王村癸辛雜識敢山在德清或云吳丞相闞澤所居當作闞談志戴山在烏程晉戴逵嘗居之勞志葛仙山在烏程縣南晉葛洪隱此有煉丹竈搗藥臼職方圖志云葛洪煉丹處天下十有三烏程居其三即此山也西吳里語吳興人指南門外二十餘里下菰菁山之間一帶逺山為西塞山也山水明秀真是絶境家有小舫時時載酒浮游其上當八九月秋氣澄爽尤可愛玩特恨無志和詩筆胸次耳經鋤堂雜志歐餘氏今烏程東二十里有歐餘山一曰烏山一曰歐亭山以王逸少升之曰升山路史繡毬山在錦峯西北多篠簜舊傳羅隱云官澤水長流東林滚繡毬菁山如走馬代代出公侯東林山志學士山在蘇灣面對峴山右挹碧湖子瞻常遊故名或曰即方屛山峴山志上下釣魚山俗名鮑山潘塘山志云從錢山北去為潘塘山上釣魚岡迤而髙下釣魚石坦而夷逺望如嚴陵釣臺近挹如石公之陂陀石上下河口山程文簡公讀書處上有武安王廟釣魚河口四山相對四山交㸦而湖盤瀦于內並上白鶴山出山石精好作為碑版江東記云員邱山石精好不謝吳興即此也談志邸閣山在長興吳大帝遣從弟孫敻修故障邸閣下有邸閣溪吳地志蓻香山在長興縣北一十五里相傳為西施種香之所又名湖陵山勞志龍牙洞在安吉州西南五十里宋時有僧智光于洞中得龍骨遂結菴居之名菴曰不朽洞曰龍牙一統志武康銅官山有石燕洞燕之隱見以春秋分與巢燕同見則其地多雨西吳里語湖州江子滙舊多蚊馬仙泊舟之後至今不生夏月多聚舟楊升菴集苕溪一源自天目一源自獨松嶺合浮玉山水至吳興入于太湖霅水亦箬水之異名也水深不可測俗謂之霅水輿地志苕溪夾岸多苕花相傳古有尹公者有異術此水或潮至日暮風生長數寸號為尹公潮圖經統記云興國寺在霅溪館西霅溪館今雙溪亭是也而烏程縣南浮玉亭舊名霅水堂縣西有霅水鄉二處所臨乃是苕水今餘杭又有苕溪館定安門內有四水亭皆相承之誤談志真珠泉在烏程縣西南二十五里妙喜之東北池方丈餘其泉清激觀者以足震地則泉中水泡連起如珠勞志橫塘面南山之勝對南溪之流自郡户口蕃盛士族漸多增土為園池賈牧詩曰洄洄流水抱橫塘蘭芷無風也自香及建炎中徙慈感教院于上春月多逰人來往今大半為亭館沼沚矣談志潮音渡在慈感寺內月河在府治東形如初月勞志凡常河在烏程縣西二十七里上潯溪在縣東七十二里其水自郡城運河東流與震澤鶯脰湖接大明一統志芙蓉池在郡城白蘋洲楊漢公所開池中有千葉蓮放生池在郡城距羅城有閶門遺跡池周數十畝蘇灣在峴山寺前其堤蘇子瞻為守時所築因名其灣曰蘇公灣堤曰蘇堤上夾山漾在山之隂兩岸皆山故名山名雞籠亦名夾山漾在其西左右有能仁福山二放生池峴山志百花洲宋熙寧中郡守孫覺創開于峴山之麓外植芰荷內栽花栁亭榭參差竹木森修水陸通道往來鱗集釣魚灣在烏程縣西三里古稱張志和釣魚處上梅涇一名東梅堰在烏程縣西南六十里以古梅亭為名勞志煉丹井在東林山天鑿無痕寬深十尋其泉冽雖大旱不涸世傳葛洪嘗煉丹于此東林山志合溪畫溪箬溪本同一溪其發源處為合溪有朱藤處為畫溪其下為箬溪長興志小白瀨在長興縣東南三里一名白靈湍勞志石鼓堰長一十四里濶五十步在縣北一十七里其源出天目山可溉田百頃唐聖厯元年縣令鉗耳知命所造上餘漁浦一名餘吾溪虞舜漁時人化之徠居路史上池在長興縣西二十五里陳武帝别墅也五官瀆在武康縣北二十里吳五官中郎沈珩居之因名上虎溪在湖州安吉縣方真人修道處杜光庭七十二福地記梅溪在安吉東北昔年嘗有紫梅花盛開又號紫梅溪勞志乳水潭廣一丈與下潭相去數百步味甘色白可瀹茗或三潭水湧則渾為一平則乳色自分安吉志拋錢池在州東東嶽廟前鄉人每祈禱以紙錢投之視其浮沉以卜吉凶上以下園第吳興山水清遠城据其㑹狀其景者曰水晶宫曰水雲鄉曰極樂國城之內觸處見山觸處可以引溪流故凡為園囿必景物幽雅雖近市如在雲岩江村所以為貴也唐開成中白蘋洲有三園錢氏時清源門內有芳菲園國朝寶元中定安門內有南園今廢為庾廪矣居宅矣招提矣園之亭館自白蘋外俱不可見鄉老寓公多為芳圃亭宇相望沼沚旁聮花木蓊茂逰者爭眩物固不能兩盛也談志程氏園文簡公别業也去城數里曰河口藏書數萬卷作樓貯之癸辛雜識小隱亭桂芳亭叢桂亭探梅亭俱在沈知丞園內亭臺森列相傳有三十餘所今逸其名皆張即之書匾一池可容舟楫人以武陵園擬之吟望堂水天一色堂在沈左藏園內流杯亭風月無盡藏亭在顧尚書園內並上嗣秀王伯圭湖州私第中有堂曰慶逺圃曰小隱樓曰溪山勝概扁榜皆三朝宸翰也樓攻愧崇憲靖王行狀以下陵墓九女塜黃巢之亂嘗發其巔有穴可縋而下見石屋一區壁間隱若有碑刻圖畫勞志吳越王妃許夫人墓在安吉州東南三十里銅山鄉上吳中書令鈕淑墓在烏程縣西十里談志丹陽太守太史慈墓在烏程縣西十七里晉黃門侍郎潘尼墓在烏程縣西八里宣城太守邱珍孫墓在歸安縣南十八里原鄉侯章道勇墓在烏程縣南一百里並上五代時錢超墓在長興縣西七里白蓮山吳越錢氏有國超以宣德軍節度使推主陂門宗人事墓上有松一本如指叢生俗呼為五枝松長興志宋祕書監徐廣墓在縣北二十八里上宋安闕郡王伯墓在通安橋東南烏青志僧遵式墓在夀聖塔院之西北隅朝散郎鄭續撰塔銘上宗正少卿姚舜仁墓在烏程澄靜鄉趙村談志中奉大夫李弼儒子朝奉大夫李迎葬烏程縣三碑鄉金山原周必大志其墓平園續槀詳藝文龍圖閣學士程大昌墓在安吉縣梅溪鄉邸閣山上趙彥倓厯福建轉運司使直顯謨閣少卿葬于武康縣上柏山武康志朝請大夫盛允升墓在金蓋山龜溪集考功員外郎括蒼鮑慎由欽止元祐初以任子試吏部銓第一復登進士乙科甫脫選即為郎其父粹始居于吳故葬于吳興文獻通考沈嚴寧海軍節度掌書記以寶元三年二月葬于德清縣之永和鄉范仲淹志其墓范文正公集嘉泰改元嗣秀王伯圭賜第為火災延燔乞還湖州故居守園廟二年九月薨十一日諸孤奉王之喪葬于烏程縣永新鄉成山之原樓攻愧崇憲靖王行狀宋魯察朝請大夫葬歸安縣至孝鄉仙嶺周必大志其墓宋魯訔直敷文閣葬武康縣慶安鄉後汪村之原亦必大志其墓袁直友字聲史建安人父延孺知武進縣葬武進君于烏程厲山初虞丞相薦君既不受舉進士亦不中第弟說友知衢州光宗立持其表來賀得海鹽催煎未久棄去為常州推官又棄去以嘉定六年二月二日卒年八十五月六日祔于武進君之墓葉水心袁公墓志趙孟頖墓在蘇灣之方屏山今為學士山峴山志姜處恭字安禮臨海人寓嘉興祖仲思朝散郎父諶從政郎葬武康上柏岩山處恭葬從政君墓西百步葉適銘其墓曰其詩則傳尚不忘哉葉水心集胡安定先生墓所舊有表思堂碧澗菴乃墓所奉祀先生之處田二十畝地十三段則墓所奉祀先生之資王麟重修安定墓記陳賢良墓在烏程三碑鄉蘇灣里蓋山與其妻夀安縣君婁氏同域清真先生銘其墓嘉興志元休寧縣尹唐子華墓在烏程縣西南二十五里沈村勞志元上元主簿牟應龍墓在三碑鄉上李龏字和父趙文耀為志葬之何道兩山間植梅樹百株趙德符題其墓曰宋詩人雪林李君之墓佩楚軒客談吳興備志卷十五
