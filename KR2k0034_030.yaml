body:
  text: 吳興備志卷三十明董斯張撰詭徴第二十五之一許子將墓在豫章郡之四里昔子將以中國大亂逺來渡江隨劉繇而卒於閶門裏於時漢興平二年也吳天紀中太守吳興沈季白日於廳事上坐忽然如夢見一人著黃單衣黃巾稱汝南許子將求改葬因忽不見即求其喪不知處所遂招魂葬之命文學施遐為招魂文豫章記吳興施績為尋陽督能言論有門生亦有理意常秉無鬼論忽有一黑衣白帢客來與共語遂及鬼神移日客詞屈乃曰君辭巧理不足僕即是鬼何以云無問鬼何以來答曰受使來取君期盡明日食時門生請乞酸苦鬼問有人似君者否門生云施績帳下都督與僕相似便與俱往與都督對坐鬼手中出一鐵鑿可尺餘安著都督頭便舉椎打之都督云頭覺微痛向來轉劇食頃便亡搜神記葛𤣥字孝先丹陽句容人號曰葛仙過武康見一人家病作請正祝妖邪邪附巫者與仙公飲公故不飲而邪妖出語不遜仙公厲聲叱曰奸鬼敢爾敕五伯拽妖邪頭附柱鞭背但聞鞭聲出血流地妖邪伏罪乃止列仙全𫝊江子滙𫝊有蜃棲其下滙東有葛仙翁祠仙翁恐蜃為患今民間每嵗元宵前後家家鳴鼓以壓之其聲若曰葛公在葛公在有見老人行市中形貌甚怪聞元宵鼓謂人曰吾聽鼓聲輒頭痛不能堪奈何忽不見人以為蜃精西吳里語晉元康初中夜見有人坐武康縣樓上身長數丈垂膝至地縣令㑹稽賀循知之曰此地本防風氏之國其防風氏之神乎遂立廟於縣東徴异記升明中荆州刺史沈攸之廄中羣馬夜輒躑躅驚嘶如似見物攸之令人伺之見一白駒以緑繩繫腹直自外來圉者具言攸之使人夜伏檻邊伺之俄而見白駒來忽然復去視廄門猶閉計其踪跡直入閣內時人見之咸謂之怪檢內人惟愛妾馮月華臂上一玉馬以緑繩繫穿之至夜輒脫至枕邊每為失去曉時則還試取看之蹄上有泥後攸之敗不知所在渚宫故事沈休文雨夜齊中獨坐風開竹扉有一女子擕絡絲具入門便坐風飄細雨如絲女隨風引絡絡繹不斷斷時亦就口續之若真絲焉燭未及跋得數兩起贈沈曰此謂氷絲贈君造以為氷紈忽不見沈後織成紈鮮潔明净不异於氷製扇當夏日甫擕在手不搖而自凉賈氏說林吳興俞亮以永明八年補護軍府吏於常眠處聞有羊聲疑為神怪竊于户窺之見其床下有一羊可髙二尺毛色若丹光耀滿室續异記齊豫章王蕭嶷亡後忽見形於沈文季曰吾病未應死皇太子加膏中十一種藥使吾不差湯中復加藥一種使吾痢不斷吾已訴先許還東郕當判此事便懷出青紙文書示文季云與卿少舊為呈主上也俄而失所在文季懼不敢𫝊少時文惠太子薨寃魂記梁簫猷為吳興太守吳興故有楚霸王神像在府治㕔中猷每祭神與交飲至一斛每酬祀盡歡極醉神影亦有酒色所禱必從後為益州刺史江陽人齊狗兒反衆十萬攻州城猷兵糧俱盡人有异心乃遙禱請救是日有田父逢一騎絡鐵從東方來問去城幾里曰百四十里時日已晡騎舉矟曰後人來可令之疾馬欲及日破賊俄有數百騎如風一騎過請飲田父問為誰曰吳興楚王來救臨汝侯齊狗兒遂平當此時吳興祈禱于神數日無驗後乃見侍衛土偶皆泥濕如汗猷後封臨汝侯故神云南史吳郡陸憑少有志行神彩秀徹篤信謙讓家湖州長城性悅山水一聞竒麗千里而往貞元乙丑嵗三月遊永嘉遘疾而歿憑素與吳興沈萇友善萇夢憑顔色憔悴曰吾遊至永嘉苦疾將困君為知吾者願托家事萇悲之又叙舊歡晏語久之因述文章話虛無之事乃謂萇曰贈君浮雲詩一萹以寄其懷詩曰虛虛復空空瞬息天地中假合成此像吾亦非吾躬悲吟數四臨去曰憑船已發來明日午時到此執手而去及覺所記甚分明乃書而録之如期而憑喪船至萇撫孤而慟賻助倍禮詞人楊丹為之志具旌神感銘曰篤生府君美秀而文沒而不起寄音浮雲通幽記唐蘇頲為烏程尉暇日曾與同僚泛舟㳂溪醉後諷詠因至道磯寺寺前是霅溪最深處俗相𫝊云此水深不可測有蛟螭代為人患頲乘醉步行還自駱駝橋遇橋破墮水直至潭底水中有人令扶尚書出冉冉至水上頲遂得濟廣异記己見郡志古跡此加詳大厯中有進士竇裕者家寓淮海下第將之成都至洋州無疾卒嘗與淮隂令吳興沈生善别有年矣聲塵兩絶莫知其適沈生自淮海調補金堂令至洋州舍於館亭中是夕風月清朗夜將半生獨居有所亡而不得其寢俄見一白衣丈夫自門步來且吟且嗟似有恨而不舒者久之吟曰家依楚水岸身寄洋州館望月獨相思塵襟淚痕滿生見之甚覺類竇裕特起與語未及遂無見矣乃嘆曰吾與竇君别久矣豈為鬼耶明日駕而去行未數里有殯其路前有識者曰進士竇裕殯宫生驚即馳至館問館吏曰有進士竇裕自京游蜀至此暴亡太守命殯於南二里許道左殯宫是也即致奠拜泣而去宣室志元和中進士陸喬家於丹陽居有亭沼號為勝境一夕有叩門者儀狀秀逸請其名氏曰吾沈約也聞君善詩故來候耳既而呼左右曰召青箱來俄有一兒至年可十餘嵗指謂喬曰此吾愛子也以青箱為名欲繼吾學也此亦好為詩近從吾與范僕射過臺城相與感舊援筆立成諷之曰六代舊山川興王幾百年繁華今寂寞朝市昔喧闐夜月琉璃水春風卵色天傷時與懷古垂淚國門前宣室志崔元亮滎陽人也奕世好道勤於香火常諷誦黃庭道德經寶厯中授湖州刺史修黃籙齊於紫極宫有鶴二百五十六隻集降壇上內一隻立於虛皇臺頂周身皎白朱頂而已紫氣彌亘壇所自辰及酉方散杭州刺史白居易為讃元亮自是通感彌加精誠一旦於靜室誦黃庭經度人經執手爐於靜室諷經奄然化去歸葬滎陽坐龕中但有手爐法水也杜光庭神仙感遇𫝊宋熙寧十年湖州知州章惇卜葬母於長興周行纍日無所得夢有二人告之曰頭枕靈山腳踏白蓮惇驚起待旦而行道問樵夫果得二山尋微路而入忽有廟宇題曰張李二王惇駭异使葬師視之穴在廟中遂禱以遷廟之意是夕大雷雨及旦廟已遷於山之東北遂以葬其母惇為宋之奸臣而鬼亦畏之何耶西吳里語鄱陽髙嵲就館於邑宰以無訟堂為學舍池中蓮生花雙頭丞賈選見之曰此嘉祥也先君大觀二年在吳興鄉校肄業直廬後産此花守兵白教授率諸生來觀之折取諦玩葉間隱隱有金書先君姓名三字諸生共致慶語勉令力學以來嵗大魁相期輕薄子翕然笑曰賈癩子作狀元是天下無士也時正病瘡瘍遍體故云至秋獲薦送廷對果第一賈名安宅夷堅志雌雄木生沈東老庵左回仙橋東其木一本二幹撑雲突兀髙十餘丈枝葉秀异不辨其為何木也雄者花而不實雌者實而不花永樂間已朽人伐而薪之其根尚存回仙橋輪囷玲瓏如卿雲萬態誠竒物也沈偕詩曰聞說真仙女靈根庇萬家不知其何所指而云然東林山志吳興備志卷三十
