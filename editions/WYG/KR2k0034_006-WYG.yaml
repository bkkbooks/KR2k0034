body:
  text: 吳興偹志卷六明董斯張撰官師徵第四之五郡丞治中别駕長史司馬通判同知推官晉庾翼字季恭吳興郡丞厯安西將軍荆州刺史諡曰肅翼為丞見顔魯公傳齊傅琰由武康令除吳興郡丞南齊書詳邑令唐李澥字堅永趙郡人天寳中進士佐晉陵吳興丹陽三郡厯尚書郎柱下史其佐郡也亷使輒移其守以避澥大率以古良二千石之理為之穆員外刑部郎中李府君墓志按志夫人盧氏至德二年九日乙亥捐于吳興郡長史之館盧承禮范陽人李恁隴西人並湖州司馬唐宰相世系表岑况鹽官人湖州别駕韓朝宗京兆人初厯左拾遺諫睿宗作乞塞胡戱厯山南東道採訪使開元末海内無事訛言兵當興衣冠潛為避世計朝宗廬終南山為長安尉霍仙竒所發貶吳興别駕朝宗善識㧞後進嘗薦崔宗之嚴武于朝當時咸歸重之新唐書此朝宗即李白時所謂但願一識韓荆州者廣輿記以為名會不知㑹乃愈之兄因其字合名而悞合為一人耳元衢李洪前御史中丞自河北負譴遇恩再移為湖州長史素知畫公精于佛理因請益焉先問宗源次及心印公笑而後答皎然詩式蕭憬蘭陵人朝散大夫湖州司馬穆員外蕭公墓志文唐宰相世系表名憬獨孤嶼洛陽人湖州别駕獨孤及毘陵集裴懷儉河東人厯湖州治中張説崔君神道碑馮昭泰字遇聖長樂人厯湖州長史束濕不回聚蚊交訕貶為饒州司馬遷括州刺史贈工部尚書張説馮公神道碑薛同河東汾陽人官湖州長史贈刑部尚書即湖州刺史戎之父也韓文公薛氏墓志張幸元和間湖州長史白樂天集薛卿教量移湖州别駕見皎然集乾寧三年水部郎中何迎表薦朱朴為相驟遷至右諫議大夫四年朴貶迎亦貶湖州司馬資治通鑑封特卿為湖州軍倅與同年李大諫詩酒唱酬以疾阻歡及愈有詩曰已負數條紅畫燭更辜雙帶繡香毬白蘋洲上風烟好扶病須􅂸到後籌詩話總龜户部尚書封敖渤海蓚人子彦卿望卿從子特卿皆進士及第咸通中厯位清顯舊唐書衢按唐宰相世系表特卿字亞公刁衎字元寳太祖時通判湖州上疏請定天下酒税額修郡縣城隍條約牧宰除兩浙丁錢禁汴水流屍凡五事浦志書史王堯臣字伯庸虞城人舉進士第一厯陜西安撫使有能名拜叅知政事諡文安改諡文忠先是天聖五年堯臣釋褐將作監丞通判湖州是年狄齊始投拱聖營為卒晩年同入樞密院齊為使堯臣副焉宋史叅東軒筆録周延雋字仲章通判湖州王安石集有送周都官判湖州詩又送周仲章使君云看君東下霅溪船即都官也梅堯臣亦有詩送之延雋見談志胥偃厯翰林學士以文章取髙第以清節為時名臣為人沈厚周密其居家雖燕必嚴不少懈歐陽修胥氏夫人墓誌偃即修婦翁也偃嘗通判湖州見談志偃字安道長沙人進士甲科累遷知制誥學士宋史胥偃未仕時家有良田數千頃既貴悉以與族人嘗與謝絳受詔試中書吏而大臣有以簡屬偃不發視而焚之且曰發而言之不亦傷刻薄乎厚徳録李軻四預鄉舉慶厯六年釋褐授湖州長史仕晩位卑石徂徠集抄見黄氏日按郡志軻歸安人進士胥元衡字平叔偃子也少以䕃為將作監主簿六遷為殿中丞鎻㕔應進士舉得出身又三遷為尚書都官員外郎通判湖州曾鞏胥君墓誌蘇舜欽字子美銅山人少慷慨有大志當天聖中學者為文多病對偶獨舜欽與河南穆脩好為古文范仲淹薦為集賢校理隨以事為王拱辰所中出為湖州長史坐放廢寓湖中讀書特發憤為歌詩豪放驚人每酒酣草書争為人所傳及謫死人多惜之浙江通志郡志載而不詳舜欽未嘗蒞任録此正之章衡字子平浦城人嘉祐二年進士第一通判湖州直集賢院改鹽鐵判官同修起居注物有掛空籍奏請蠲之三司使忌其能出知汝州厯集賢學士宋史薛長􅐐字元卿絳州亞平人太子右贊善大夫厯通判湖州歐陽修薛君志黄炎字晦之雩郡人博學能文十二嵗咏日以况志弱冠登嘉祐八年進士試鴈門令新法坐罪罷平生清介與孔毅甫孫介夫曾子固厚善嘗著安邦論未竟有㫖差充四川亷訪使復任朝散郎通判湖州贑州府志張太寧通判湖州見談志太寧嘗為大理丞見沈遘西溪集求元忠字正國崇寧二年進士朝奉大夫通判湖州軍事􅌘志左譽字與言大觀三年進士湖州通判陳侍郎公輔銘其墓臨海縣志陳能干字勉仲浦城人以行藝貢辟雍政和中登第通判湖州遷員外郎建寧志許將閩人通判湖州詳見曺幕周執羔字表卿弋陽人宣和六年進士第二授湖州司士曺事紹興五年通判湖州厯禮部侍郎孝宗患人才難知執羔曰今一介干進亦䝉賜召口舌相髙殆成風俗豈可使之得志哉上曰卿言是也拜尚書侍讀執羔有雅度立朝無明背治郡亷恕有循吏風宋史陸時雍淳安人㓜孤貧與兄力樵飬母稍長補郡學生念母兄食不給語掌膳曰吾日飯勿盡炊願輟一膳遺母自以一膳分為晨午其苦節孝養如此後登宣和進士第中博學宏詞科通判湖州厯秘書丞復請以恩官其兄子談志通判題名叅大明一統志張燾字子功德興人宣和中進士第三李綱為親征行營使辟燾入幕綱罷燾亦貶建炎初通判湖州明受之變賊矯詔俾燾撫諭江浙燾不受厯兵部侍郎排和議出帥蜀自蜀歸卧十有三年秦檜死除吏部尚書謚忠定上建炎元年以張燾通判常州改湖州賜緋衣銀魚二年詔頒廵社法於東南聴民自偹器械結隊伍燾上不便者十六事卒罷之周必大張忠定公神道碑鄭泰汴人紹興中以進士判湖州遂家徳清見徐天目鄭篁溪傳安僖秀王子偁髙宗族兄也宣和元年舍試合格調嘉興丞是年子伯琮生後被選入宫是為孝宗子偁召赴都堂省察改宗教郎通判湖州宋史按談志子偁添差湖州通判江都仲并字彌性紹興壬子進士晩丞光禄寺并嘗倅湖籍中有所盼為作生朝青詞好事傳誦之坐謫官其訓詞畧曰爾為凟侮之詞曾不知畏天其知畏吾法乎并有浮山集十六卷文獻通考賈廷佐字子埜真定人隨蹕南渡紹興二年進士遷大理司直時秦檜主和議廷佐誓以死爭忤秦檜意出通判湖州和議成廷佐奉祠而歸東陽縣志林霆通判湖州鄭樵為作芹齋詩云湖州别駕林三省掛却朝冠便自由詳藝文林霆字時隠莆田人擢進士博學深象數與鄭樵為金石交聚書數千卷皆自校讎謂子孫曰吾為汝曹獲良産矣紹興中為勅令所刪定官力詆秦檜和議掛冠去當世髙之宋史新編宋宗説新安人霅川倅李以申宋尚書傳徐夢雷嘉定十六年武舉仕至湖州倅東陽邑志李友直字叔益餘姚人史浩壻淳熙二年進士補通判婺州改湖州程大昌曰友直澄之不清撓之不濁淵乎似有道者莫叔光謂如美玉無瑕可指紹興府志友直淳熙十一年倅湖州湖州劇郡數易守公間行郡事輒稱治吏引例卷以攝丞當増俸叱去之一金不取也提刑陳公公亮提舉黄公遹將力薦于朝公力辭之趙公不迹來守强敏明察官吏􅃊惮且謂公必不合公不改其度守為之降色辭公亦以吏師事之始終賓敬不可得而親疎時人兩賢之樓鑰李友直墓志洪光祖丹陽人右朝奉郎通判湖州樓鑰洪子忱墓志宋翔字子飛通判湖州攝郡事見談志翔崇安人紹興十二年進士為張浚十客之一韋太后既歸獻紹興樂府十二章續文獻通考張晉望倅湖州見劉宰集按晉望其字不知何名張宗濤通判湖州見劉奉議墓志朝請郎前通判湖州曾槃槃别見建置徵槃遂安詹靖之壻陸游為詹作墓表朱希顔字景淵吳門人通判湖州有善政詳劉漫塘墓表見藝文徐綱字希顔乾道壬辰進士添倅湖州崇德志史濤四明人初名右谷通判湖州樓鑰葉夫人墓志梁季珌字餙父麗水人通判湖州湖去京百里而遥臺省監司之滯訟悉以委公公閲實其事不為吏欺裁處其平不為勢撓自本州以及旁郡事多賴公以直經制之人舊多乾沒當路之督責無己時公檢校彌密嵗額整辦又斥其餘以補前政之虧數以萬計諸司列上其政孝廟雅聞公名有㫖令都堂審察公素靖退力求外補執政擬他郡上親擢公信州劉漫塘集陳貴誠通判湖州武康志袁甫字廣微郢人嘉定七年進士第一厯校書郎轉對言邊事之病不在外而在内偷安之根不去規模終不立壅蔽之根不去血胍終不通忌嫉之根不去將帥終不可擇欺誕之根不去兵財終不可治出通判湖州考常平弊原以增積貯核隠産增附嬰兒局厯起居舎人兼崇政殿説書時相鄭清之以國用不足履畆使輸劵甫奏其害嘗讀資治通鑑至漢髙入闗辭秦民牛酒因奏今日無以與人反横科之其心喜乎怒乎本朝立國以仁陛下以為此舉仁乎否乎帝為惻然累吏部侍郎國子祭酒時邊警日至甫條十事權兵部尚書謚正肅有孝經説孟子解及文集行世宋史方山京字子髙慈谿人景定三年廷對第一度宗登極添差通判安吉州寧波府志歸罕仁吳人咸淳中為湖州通判歸太僕集謝晟孫字唐卿錢唐人徳祐初通判安吉黃溍謝公墓志全清夫會稽人嘉熙二年進士紹興府志方回字萬里歙人厯官所至皆得幕府譽獨與賈似道不偶登第後踰紀始改官通判安吉州都堂禀議時則元祐元年矣洪杏廷方總管傳張按周公謹雜事識中極詆方回無行祝希哲乃復曲䕶之余謂文士筆鋒都不足據只渠易服迎降偃然居總管之任便是名教掃地祝不必過䕶周亦不必苛責也回有詩選名瀛奎律髓楊用修嘗序之袁裒字徳平四明人著書學纂要為湖州推官宋史史崇方金壇人咸淳四年進士任湖州推官鎮江府志薊邱李衎字仲賓號息齋道人為吳興别駕喜寫墨竹用文與可法動筆鬱然趙松雪推重之題其竹云李侯寫竹有清芬滿紙墨光浮翠筠蕭郎已逺丹青死欲寫此君惟此人六研齋筆記叅戴剡源集王氏畫苑元趙雍字仲穆孟頫子同知湖州路總管府事書繪寳鑑至大中馬煦牧吳興重建府治命推官范忠董之湖州路重建府治記見勞志何頤貞為湖州推官見輟耕録頤貞名貞立長沙人見松雪亝集序湖州推官劉沂撰重修溪光亭記今在縣儀門右曹幕郡主簿叅軍簽判書記經厯監税晉沈警宋沈璞俱為郡主簿沈約自叙劉子頊守吳興以殷琰為録事叅軍行郡事宋書沈文秀初為郡主簿功曹吏檀道濟𫝊邱仲孚永明初太守徐孝嗣辟為主簿梁書梁新渝侯蕭映為吳興郡將召沈恪為郡主簿天監初栁惲為吳興守召吳均補郡主簿日引與賦詩均嘗不得意贈惲詩而去久之復來惲遇之如故沈崇傃天監二年桞惲辟為主簿並上李衆隴西人吳興郡司功叅軍唐宗室世系表李真湖州録事叅軍李錮湖州叅軍上裴季卿襄陽人湖州司士叅軍唐宰相世系表劉彦直湖州司功叅軍姚希齊陜州人思亷後湖州司功叅軍鄭朗滎陽人湖州兵曹叅軍並上朗字有榮厯中書門下平章事贈司空始朗舉進士有相者言君當貴然不可以科第進俄而有司擢朗第一既又覆實被放相者賀曰安之已而果然新唐書咸通十三年正月前中書舍人封彦卿貶湖州司户坐宰相于琮之親黨也舊唐書唐慶澄慶徳元年為吳興郡左衞録事叅軍一統志李壇湖州防禦推官温璐湖州防禦判官見英華志張標湖州録事叅軍上梅堯臣字舜俞宣城人嘗監湖州鹽税堯臣為詩深遠古淡間出竒巧歐陽修以為師友注孫子十三篇撰戴記二十八卷毛詩小傳二十卷宛陵集四十卷堯臣晩為詩益工有人得西南夷布弓衣其織文乃堯臣詩也浙江通志鄭戩承奉郎守太常寺奉禮郎簽書宣徳軍節度判官㕔公事談志戩字天休吳縣人厯陜西經畧安撫使吏部侍郎贈太尉謚文肅戩遇事果敢必行然憑氣近俠用刑峻深士民怨之宋史戩為楊文公億門人見歸田録曾公亮字明仲晉江人天聖進士知㑹稽縣坐父買田境中謫監湖州酒税厯平章事封魯國公拜司空謚宣靖公亮莊重沉黙然性嗇善殖貨帝以方張安世宋史許將字冲元閩人舉進士第一歐陽修讀其賦謂曰君辭氣似沂公未可量也簽書昭慶軍判官代還當試館職辭曰起家為官本代耕耳願以守選餘日讀所未見書宰相善其志通判湖州厯尚書左丞中書侍郎謚文定宋史邊裕字道夫家于吳以江寧府司録監湖州酒税嵗荒飢殍横道知州張珣委以賑䘏全活甚衆有寓士疾革裕初未識之即視饋藥死殮以棺衾後二十年其子知章過湖故老相指曰此吾邊司録子也厯潤州觀察推官除管勾南京留司御史臺公事姑蘓志李垂字舜工聊城人登進士第上兵制將書自湖州録事叅軍召為崇文校勘累遷著作郎上導河形勝書欲復九河故道時論重之丁謂執政垂未嘗徃謁或問其故垂曰謂恃權怙勢觀其所為必逰朱崕吾不欲在黨中謂聞而惡之罷知亳州東都事畧潁川志陳彭年字永年撫州人為大理寺詳斷官坐事出監湖州酒税厯叅知政事謚文僖彭年附王欽若興符瑞識者鄙之宋史丁寳臣字元珍晉陵人景祐中進士以太常丞監湖州酒税厯叅知政事太常禮院歐陽修丁君墓表寳臣東坡同年見東坡書歐陽公黄牛廟詩後王安石志其墓曰文於辭為達行於徳為充吕士元字佐堯江寧人湖州司理剛介有節長於為政贈太常博士歐陽修吕君墓志陶節夫潯陽人湖州録事叅軍某頃嵗謫守宣州而節夫叅軍事甚宜其職沈括長興集趙師臯趙善臨鄭鎮並湖州簽判見建置徴劉異湖州司法叅軍上異字成伯興化人天聖中進士厯屯田員外郎與蔡襄友善何絃浦陽人物志榕隂新檢吕延之真州揚子縣人湖州節度判官贈屯田郎中蔡㐮吕士昌墓志陳瓘字瑩中南劍州人中甲科調湖州掌書記厯左司諫論蔡京蔡卞奸惡崇寧中竄亷州靖康初贈諫議大夫髙宗賜謚忠肅宋史元豐二年初任昭慶軍掌書記湖州府學教授七年改濠州定逺宰陳忠肅年譜陳師錫字伯修建陽人熙寧中遊太學有雋聲及廷試奏名在甲乙科神宗偶讀其文屢加嘆賞顧侍臣曰此必陳師錫也啓封果然擢為第三調昭慶軍掌書記厯監察御史元祐初遷工部員外郎坐黨論置郴州師錫始與陳瓘同論京卞時號二陳紹聖中贈直龍圖閣宋史閑樂奏議一卷陳師錫撰熙寧九年第進士蘇軾知湖州師錫掌書記器之倚以為政軾得罪捕詣臺獄親朋多畏避師錫獨出餞之又安輯其家軾入西掖薦自代明著其事師錫在元豐己為察官坐論進士習律罷出建中靖國初再入未幾又罷書録解題參建寧府志雷覺民字將道建安人第進士調漳浦尉改湖州司録太守不以時給糧諸軍喧于庭乆不退覺民諭以經制錢代給後當積日俸為償之諸軍感謝而去建寧府志張哿初名駕字安時南劍州人熙寧九年進士厯監湖州新市鎮終知廣濟軍楊龜山集八閩通志文安國元豐八年湖州簽判鐘鼎欵識詳𤨏徵文勛字安道東坡文勛篆贊云安國用筆意在𨽻前䟦文勛畫扇云安國作方界畧不抒思黄魯直文勛贊云為吏不殘去其敗羣好賢喜士黽勉而勤勛嗜古而癖載米襄陽志林李宗師興化人莫儔榜第二人湖州掌書記八閩志唐稷字堯弼會昌人政和二年登乙科宣和五年授湖州叅軍兼管左右獄多平反贑州府志樓异字試可明州人進士髙第嘗監湖州烏鎮税厯徽猷閣直學士見樓攻媿王逸老八仙歌䟦安康郡夫人行狀叅宋史新編錢觀復字知原常熟人政和五年進士調湖州户曹朱勔以鄉人固欲妻以女辭不受知廣徳軍嵗上供民米輸送回逺加斂水脚錢乃請寄廪湖之四安至國門才五日費减大半姑蘇志李敦正莆田人建炎二年進士湖州簽判八閩志周大年濟南人廸功郎湖州司李叅軍周必大周樞神道碑曾惇字宏父布之孫紆之子也紹興中嘗為湖州司録厯知台州玉照新志叅文獻通考蘓掖丹陽人舜欽子也承議郎湖州司户叅軍見歐陽修蘓子美沈遼長壽太君二志薛龜從永嘉人湖州司法葉水心薛紹墓志葛書思江隂人嘗監湖州新市鎮有仙潭雜咏刻石墨妙亭厯朝奉郎贈太師謚清孝即丞相邲之曾祖也見勞志叅陳止齊集王文禮字立之龜齡先生子也由太學用詹事恩補承務郎監湖州烏青鎮有醫善為方得賜帶如從官吏畏之宴聖節居卿監上公按令黜其班又有訟其留人子女者奪以還民醫不勝忿挾他勢搖公因力求去葉水心集按宋史十朋子聞禮當以史為正醫即王克明也王十朋子聞詩聞禮皆篤學自立聞禮知常州江東轉運判官為治能守家法宋史王􅈄字渭夫少嗜讀書明周禮寳慶二年進士調昭慶軍節度掌書記諸公交薦除太學録仙游縣志朱埜字文之文公次子用􅄻補官厯監徳清縣新市鎮考亭淵源録湯宋彦字時美金壇人授廸功郎湖州司户叅軍湖劇郡户冗曹公以妙年居之有裕録重囚於獄得其寃狀自請更詢未幾更獲正囚闔郡稱其明劉漫塘湯君行述許開字仲啓湖州簽判談志黄童紹興八年進士監湖州新市鎮興化志王介字元石金華人紹興初進士授昭慶軍判官寧宗立韓侂胄出入禁中介力攻之坐是斥去累官中書舍人會不雨乞册免宰相史彌逺出知嘉興府謚忠簡一統志宋史王介東陽郡人授昭慶軍簽書節度判官㕔公事光宗久不覲重華宫介走書諷趙汝愚宜率百僚守寧和門竢六飛之動入為學官又上疏懇言之介初學於吕祖謙徙居金華故文學有原委姑蘓志劉暠文林郎昭慶軍節度判官黄溍劉録事墓志湯誼伯丹陽人湖州户曺姑蘓志叅宋史葛應龍天台人淳祐戊申受辟江西帥監徳清左庫嘗於餘不溪上建左顧亭葛應龍左顧亭記洪興祖字慶善丹陽人少讀禮至中庸頓悟性命之理績文日進登政和上舍第為湖州士曺紹興四年蘓湖地震興祖時為駕部郎官應詔上䟽具言朝廷綱紀之失為時宰所惡主管太平觀直敷文閣興祖好古博學自少至老未嘗一日去書著老莊本㫖周易通義繫辭要㫖古文孝經序贊離騷楚詞考異行於世宋史興祖又為湖學教授郡志趙師揆添差湖州簽判宋史鄭琚字伯潤壽昌人性明敏輕財好施淳祐間登進士乙科咸淳十年遷安吉州司李叅軍推情治獄人無寃濫嚴州府志徐子端字克之豐城人鹿卿子也䕃入仕初調監烏青鎮時更造楮幣漕司責以日解槿葉千斤吏牒旁午子端謂非庶工所有累請得免轉黄州推官厯官所在見稱及宋運革杜門讀書作後泉散人傳引蔡季通獨行不愧影獨寢不媿衾之語以自擬南昌府志劉黻字聲伯樂清人試太學以才署昭慶節度掌書記宋史新編文及翁蜀人官吳興為節度府掌書記朱吉甫墓碑陳榮承節郎咸淳中監南潯鎮事嘉應廟碑元王廓字元舉徐州人至正二年燕南第一人授湖州經厯徐州志楊黙冀寧人湖州録事判官貢師泰揚州志劉濟字仲源河間肅寧人湖州路總管府經厯黄溍劉都事志顧巖壽字子静以儒進厯湖州路總管府經厯器識𢎞逺博學通時厯職三十年所至有政聲鎮江志胡居善字伯仁天台人至正間授湖州路録事司判官天台志武臣駱牙字旗門梁太清末世祖嘗避地臨安牙母凌覩世祖儀表知非常人賓待甚厚及世祖為吳興太守引牙為將帥因從平杜龕張彪等每戰輙先鋒陷陣勇冠衆軍以功授直閣將軍陳書烏戍鎮守將軍烏贊張掖人邠國公重𦙍之猶子也初贊侍重𦙍為潞州牙將時王承宗叛王師討之潞帥盧從史密與賊通贊與重𦙍畫謀縛從史於帳下斬之朝廷賞其功授重𦙍為懷州刺史充河陽三城節度使而以贊為左司馬充湖州鎮海軍節度使李錡以烏墩為湖州要地檄贊將兵戍憲宗元和二年李錡反遣使來諭贊令起兵即斬其使曰吾豈從賊反叛者耶錡聞之怒自引兵犯烏墩贊與副將吳起勒兵禦之贊兵以衆寡不敵遂戰没已而收葬於鎮上智潭之北時元和二年十月也未幾錡就擒鎮民請於朝立廟墓前以祀浙直分署紀事本末録朱行先字藴之吳郡人也少親戎律長習武經始𨽻職於建寧都從髙公彦征討有功尋彦分符霅渚亦隨於治太守用為心膂或鄰境有冦總握兵柄仗劍前驅無不望風瓦解减竈之謀投醪之誼偹盡其妙以是聞於聖聰叠被寵加薦厯珥貂益為霅守所重自渤海公厭世髙湮亂行府君奮臂一呼率衆歸國時天下都元帥吳越國王親統全師撫寧郡縣以有功者宜加爵賞遂封協力勤王功臣尋封右僕射寳大元年四月終於静海鎮之官舍世墓在烏程縣不克歸葬在開元府海鹽縣厝於埜村謝諤朱府君墓志屠環智字寳光世居澉浦青山母顧夢抱璧有光而生故名環智少負勇畧從吳越武肅王起鄉兵拒黄巢與幕府籌畫積功領常州刺史越州都指揮使副髙彦守湖徐綰内叛遣環智與子渭赴難至靈隠山賊圍數重兩人轉戰身被百創環智奮力一呼手搏數賊以援絶同遇害王慟其殉國以衣冠歸葬青山贈武康節度使銀青光禄大夫檢校尚書右僕射開府儀同三司子晟吳興判官海鹽縣圖經侍其曙字景升咸平中以閤門祗候為蘓杭湖秀等州都廵檢使嵎畧曙為人沉敏有幹畧善論利害宋史王霆字定叟東陽人理宗即位充浙西副都監湖州駐劄時潘甫等起兵事甫定霆因綏撫之宋史宋末張濡馮驥皆獨松關戍將郁天興吳明皆四安鎮戍將宋史詳戰守徵按吳明馮驥咸殉䝉古之難視劉整范文虎二賊人禽哉抑可奴畜夢炎宜中軰謂甲胄不如珮玉吾勿信也亟當表出之費愚字子賢國初從舉義渡江為廣徳翼元帥時張士誠據浙西丙申我兵克安吉上命子賢與總管張俊徳戍其地二人因築城守之士誠連嵗出兵皆為所敗乙巳冬士誠遣其將張左丞帥兵八萬來攻時城中僅三千人愚等堅守設車弩以禦之因射殺其梟將二人敵驚潰城賴以全安吉州志劉成負膽智驍勇絶倫國初歸附耿炳文取長興敗張士誠守將為守禦計士誠遣其左丞潘元明元帥嚴再興入冦成與炳文擊敗之每戰輙勝㓂不敢犯洪武三年置海寧衞以成為指揮僉事後以殺賊中流矢卒人思其功祀之宿州志功臣録云竊觀吾聖祖取天下於羣雄惟以偽漢為勁敵鏖戰數年卒就殱無所逃命以偽吳不敢相援故也偽吳所以不敢相援者以炳文守長興則成實佐之也當姑蘓鴟張長興其必争之地孤城血戰厯十餘稔吳保無虞由斯言之成之功豈細也哉偽吳湖州左丞張天騏湖州將尹義石清長興將李福安趙打虎詳戰守徵吳興偹志卷六
