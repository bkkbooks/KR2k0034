body:
  text: 吳興偹志卷四明董斯張撰官師徴第四之三郡守唐呉越武徳載河南緱氏人天后從父弟湖州刺史唐武元衡𫝊崔元譽清河人崔順博陵人陸海吳郡人竇季安洛陽人楊鑑馮翊人並湖州刺史唐宰相世系表並以上五人蒞任年月不詳韋章韋敬先京兆人並出逍遥公房湖州刺史韋明敭京兆人出鄖公房守湖州歴華州刺史以上四人蒞任年月載談志徐嶠之開元十三年自吉州刺史授談志嶠之字惟嶽㑹稽人見徐浩𫝊即浩父也杜位襄陽人考功郎中湖州刺史唐宰相世系表張按舊唐書李林甫子壻杜位為補闕少陵有杜位宅守嵗詩云守嵗阿咸家又有寄位詩云近聞寛法離新州想見歸懐尚百憂盖位以林甫故得竄至乾寜中朝廷寛其罪移之于近郡也少陵寄位詩正渠刺湖州時耶周擇從自饒州刺史移湖州有令聞歴尚書禮部侍郎談志叅顧况刺史㕔壁記栁宗元龍安禪寺碑獨孤問俗上元元年自明州刺史授談志李史魚遷侍御史充幽州行軍司馬隔于兇盗詔不下達公與獨孤問俗宻結壯俠志圖博浪之舉間遣表章請固河潼之守帝用深嘉吾謀未行梁肅李史魚墓志宜興髙智周作相同邑蔣繒往見之智周妻以女生子挺歴湖延二州刺史宜興志明皇時監察御史蔣挺坐法勅令朝堂杖之張守珪奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可决杖士可殺而不可辱也唐書徐元之建昌人年十七第進士累遷監察御史諫議大夫開元七年出為湖州刺史有集十卷一統志鄭繇者鄭州滎陽人北齊吏部尚書述五代孫也繇嗣聖元年進士工五言詩開元初岐王範刺岐州繇為長史範失白鷹繇為失白鷹詩當時以為絶唱後為湖州刺史舊唐書徐煇開元二十三年自登州刺史授不曾之任轉洪州刺史談志唐沛郡武太冲為吳興太守增葺舊㕔棟宇既就有大白蛇長數丈横于㕔前筮者曰此項王神也不宜損宜奠祀之太冲以為正以勝邪吾以子養百姓蛇何能為有頃蛇遂死談志盧㓜平寳應三年自杭州刺史授談志令狐綯字子直華原人平章事楚之子也太和四年登進士第㑹昌五年自户部員外郎出為湖州刺史大中二年召拜考功郎中尋知制誥充翰林學士四年改兵部侍郎同中書門下平章事輔政十年累官吏部尚書右僕射涼國公先是宣宗謂白敏中曰憲宗葬道遇風雨六宫百官皆避見頎而髯者奉梓宫不去果誰耶敏中曰令狐楚上曰有子乎敏中曰緒少風痺不勝用綯今守湖州因曰其人宰相器也即召之舊唐書令狐綯白敏中二𫝊顔真卿轉湖州刺史政尚清靜長孤養老徹冗浚湟式亷明進賢碩特責大指而已郡人恱之立碑頌徳令狐峘魯公神道碑公字清臣小名羡門子别號應方魯公行狀大厯八年癸丑公年六十五正月至任七月追建放生池碑銘十二月有沈氏述祖徳記九年甲寅公年六十六作妙喜寺碑十一年丙辰公年六十八十二年丁巳公年六十九四月有栁惲西亭記元載誅楊綰薦公四月召于湖州四月有項王碑行述八月為刑部尚書魯公年譜蕭定字梅臣瑀曾孫歴湖州刺史朱泚反詭姓名為張誕不凂于賊後擢太子太師唐書邵說為吏部侍郎薦户部郎中蕭定自代不許裴清刺湖州始進金沙泉表上之清在郡時嘗撰吳興太守歴官記叅談志顧應祥長興志第五琦字禹珪長安人少以吏幹進頗能言强國富民術歴户部侍郎判度支進同中書門下平章事累封扶風郡公坐與魚朝恩善刺括州徙饒湖二州後為太子賔客唐書袁髙字公頥滄州人歴御史中丞建中二年出為湖州刺史尋拜給事中貞元元年徳宗復用盧杞刺饒州命髙草詔髙執不可改命舍人草之詔不下仍陳京等論奏髙又爭論于上遂追饒州制翌日遣使慰髙云朕思卿言深理切當憲宗朝宰相李吉甫常言髙忠鯁詔贈禮部尚書叅兩唐書范傅正字西老順陽人舉進士又以博學宏詞登甲科歴歙州刺史轉湖州以政事修理聞擢為歙宣觀察使受代至京師憲宗聞其里第過侈薄之因拜光祿卿傅正精悍有立好古自勵及為亷察頗事奢侈唐書李齊運拜禮部尚書無學術不知大體薦李琦為浙西觀察使受賂數十萬計舉李詞為湖州刺史既而邑人告其賍犯上以齊運故不問而遣之舊唐書于頔字允元河南人湖州刺史歴左僕射平章事燕國公諡曰思頔改蘇州追憾湖州舊尉封杖以計强决之文獻通考辛秘字藏之隴西人貞元中登開元禮科髙郢為太常卿嘉其禮學授太常博士元和元年刺湖州祕以平李錡功天子親以金印紫綬賞之僉曰秘才堪將帥急徴為河東軍司馬兼御史中丞歴官工部尚書潞州節度使久歴重任家無豐財為時所稱諡曰昭舊唐書叅牛僧孺辛秘碑祕平李錡詳戰守徴顔防為湖常二州刺史見舊唐書温公資治通鑑宋髙僧𫝊及文苑英華李紳辛祕二碑勞志及唐志俱以為顧防誤防以永貞元年四月自澧州刺史授除常州刺史明載談志中勞志雖誤以顔為顧幸猶存常州一事可以通鑑諸書考証之若唐志則盡去其除目即謬誤何從辨之乃知昔之人明載遷除日月良有逺識在古書真不可妄删字句也李錡恃恩驕恣猖狂弄兵幾效吳濞故事當時非防之竒謀矯制馳檄同仇則辛祕輩亦如蘇州刺史李素見縛賊營生致錡幕矣是役也保障江南防功第一祕次之當時祕有金紫之賞而顔防者殊寂寂未聞豈史偶失書耶抑在朝諸君子祖匡衡故智反以矯制為戎首耶防故一竒士刺湖時必有殊績作志者且并其姓亦誤書非牛李二丞相劉太保通慧禪師司馬公諸書顔公與曹蜍李志等耳崔元亮字晦叔磁州人貞元初進士歴湖曹二州太和中為諫議大夫鄭注誣宋申錫捕逮倉卒内外震駭元亮率諫官叩延英苦諫帝感悟頃之移疾歸東都召為虢州刺史卒贈禮部尚書元亮晩好黄老清靜術故所居官未久輒去叅兩唐書元亮刺湖州聚羡財而代逋租謹茶法以防黠吏脩堤塘以偹嵗旱罷民賴之如依父母白居易崔公墓志張文規河東人宰相𢎞靖子也歴吏部員外郎右丞韋温劾之云長慶中𢎞靖䧟在幽州文規徘徊京師不尋赴難不宜塵汚南宫出為安州刺史累遷御史中丞舊唐書文規嘗刺湖州著吳興雜録薛戎字元夫寳鼎人居陽羡江西觀察使李衡辟置幕府累衢湖常三州刺史遷浙東觀察使戎為吏不尚約束詭名譽其有善歸之所部故居官時無灼灼可驚者已罷則懐之俸入之餘散于宗族身沒之後人無譏焉叅兩唐書公年四十餘始脫褐衣為吏歴刺三州所至以亷貞寛大稱朝廷嘉之韓愈薛公墓志公移刺湖州其最患人者荻塘湖水瀦淤逼塞不能負舟公濬之百餘里元稹薛公神道碑楊漢公字用乂𢎞農人擢進士釋褐為李絳興元從事絳遇害遁而獲免歴湖亳蘇三州擢荆南節度使召為工部尚書或劾漢公治荆南貪降祕書監更天平宣武節度使舊唐書王仲脩收唐湖州刺史楊漢公書有鍾法米襄陽志林漢公汝士弟樂天之内弟兄也見長慶集鄭仁規滎陽人宰相肅孫也仁規有俊才文翰髙逸累遷拾遺補闕尚書郎湖州刺史舊唐書鄭肅𫝊仁規守湖與陸龜䝉友善見龜䝉紀事詩載掌故陸龜䝉少髙放通六經大義尤明春秋舉進士一不中往從湖州張博游博歴湖蘇二州辟以自佐新唐書韋珩太和五年自江州刺史授未視事卒談志杜牧字牧之舉賢良方正俄而澤潞平畧如牧䇿歴司勲員外郎兼史職改吏部乞為湖州刺史踰年遷中書舍人牧剛直有竒節不為齪齪小謹敢論列大事指陳利病尤切至少與李甘宋祁善其通古今善處成敗甘等不及也唐書王鉅厯駕部員外郎中中書舍人知制誥見英華錢珝制鉅湖州刺史載郡志姚朂字斯勤崇裔孫長慶初擢進士累遷諫議大夫更湖常二州刺史為宰相李徳裕厚善及徳裕為令狐綯等譛逐摘索支黨無敢通勞問既居海上家無貲病無湯劑朂數餽餉候門不薄時傳為厚終䕫王傅自作夀藏于萬安山南原崇瑩之傍署兆曰寂居穴坟曰復真堂中剟土為牀曰化䑓而刻石告後世唐書鹽鐵判官姚朂知河隂縣嘗雪寃獄鹽鐵使崔珙奏加酬奬令權知職方員外郎韋温執奏曰國朝已來郎官最為清選不可以賞能吏乃改朂檢校禮部郎中翌日帝謂楊嗣復曰韋温不放姚朂入省有故事否嗣復對曰韋温志在銓擇清流然姚朂士行無玷梁公元崇之孫自殿中判鹽鐵案陛下奬之宜也韋温傳杜孺休乾符元年自户部郎中授選司勲郎中中和三年再授談志孺休字休之累擢給事中大順中錢鏐遣弟球攻蘇州破之以海昌都將沈粲行刺史事而昭宗更命孺休為之以粲為制置指揮使鏐不恱宻遣粲害焉唐書宰相世系表云襄陽人乾寜三年十一月湖州刺史李師恱求旌節詔置忠國軍于湖州以師恱為節度使賜告身旌節者未入境戊子師恱卒楊行宻表師恱子前綿州刺史彦徽知州事資治通鑑中和四年武寜將李師恱與尚讓追黄巢至瑕邱敗之巢衆殆盡乾寜二年董昌搆湖州刺史李師恱率兵四千餘人侵我封境三年正月楊行宻將安仁義出戰船從湖州將渡江以應董昌王命許再思等禦之仁義竟不敢渡吳越偹史鮑君福清泰元年自鎮海軍節度副使授談志君福餘姚人性淳厚有膽氣能馬上舞雙劍從錢鏐征伐有功累遷保順軍節度使檢校太尉諡忠壯一統志光啟二年錢鏐自諸暨越平水鑿山開道五百里出曹娥埭浙東鎮將鮑君福帥衆降之資治通鑑鮑家田吳越相鮑慶臣采地也西湖游覧志慶臣君福子湖州刺史李繼徽以州附淮南牙將沈攸拒之繼徽遂奔王親廵吳興取繼徽家屬凡二百餘人而還湖州平王命海昌鎮將髙彦為湖州制置使以下吳越偹史髙彦字子竒海鹽人前後從征悉有功及繼徽棄郡奔淮南王親廵吳興其將沈攸等皆以已功有代守之望王遂題詩一章于嬰蘭堂在湖州東南溪次末云須將一片地付與有心人衆亦不測王將登舟始言曰吾以此郡付汝宜善撫之彦性淳厚居十一載政頗簡便將終有道塲山僧如訥訥口能容拳手垂過膝及入州城彦以師事之一日彦與之語訣别未幾而卒梁開平三年十月湖州刺史髙澧二于我遣其黨焚義和臨平等鎮王命弟鏢率師討之四年二月澧導淮南將李簡陳璋入其境都將盛師友沈行瑜閉城不納王遣子元璙禦之淮人挾澧而遁澧髙彦第三子梁開平四年三月癸巳王廵吳興命弟鏢為刺史癸卯至自吳興乾化元年鏢酗酒殺人恐王罪之十月辛亥殺都監潘長推官鍾安徳奔于吳吳越偹史叅資治通鑑錢元瓘吳越王子也乾化三年湖州刺史資治通鑑吳越司賔使沈韜文湖州人有㳺西湖詩云菰米蘋花似故鄉不是不歸歸未得好花明月一思量武肅憫其思鄉授以湖州刺史古今詩話詩遺一句吳越王錢鏐卒子元瓘立内牙指揮使劉仁杞及陸仁章久用事為衆所惡一日諸將共請誅之元瓘喻之曰二將事先王久吾方圖其功汝曹乃欲逞私憾而殺之可乎吾為汝主汝當禀吾命不然吾歸臨安以避賢路衆懼而退乃以仁章為衢州刺史仁杞為湖州刺史宋史右統軍使胡進思湖州人開運二年十一月吳越王𢎞佐出進思為湖州刺史既而復以他故留進思始末詳載資治通鑑進思髙澧舊將也談志進思字克開妻杜氏子璟工部尚書龔茂良靈昌廟記錢偡年十八出為湖州刺史有妖巫登大樹恣為鬼神語州人驚畏偡曰妖由人興命注弩而射巫果請命因鞭之州人大服吳越偹史浙江通志錢儼字誠允俶異母弟本名信淳化初改焉開寳三年代兄偡知湖州充宣徳軍安撫使太平興國二年從俶之請授新媯儒等州觀察使仍知湖州宋史呉興備志卷四
