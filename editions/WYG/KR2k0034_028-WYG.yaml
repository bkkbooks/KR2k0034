body:
  text: 吳興偹志卷二十八明董斯張撰璅徴第二十四之二柳開守維揚後圃遇隂雨即青燄夕起觸近即散賛寜曰此燐火也兵戰血或牛馬血著土則凝結為此氣桞掘之皆斷鎗折劒乃古戰地因贈詩曰空門今日見張華天中記江南徐知諤嘗得畵牛一軸晝則嚙草檻外夜則歸卧欄中知諤獻後主煜煜持貢闕下太宗張後苑以示羣臣俱無知者以問賛寜賛寜曰南倭海中方諸蚌有淚得之和色著物則晝隠而夜顯沃焦山時或風燒嵐石落海㟁得之滴水摩色染物則晝顯而夜晦諸學士皆以為無稽寜曰見張騫海外異物記後杜鎬檢三館書目果見於六朝舊本書中載之堯山堂外記宋太宗時賛寜充史館編修夀八十四王處納推其命孤薄三命禽畧六壬遁甲俱無夀貴處納謂寜曰師生時正得天貴星臨門寜曰母謂生我時錢文穆王徃臨安拜塋過門雨作避於茅簷甚乆浣浴襁籍徘徊方去湘山野錄宋郊字伯庠在翰林有指公姓名誣以它說者公因請更名嘗貽書葉道卿清臣目為同年葉戲答曰清臣宋郊榜第六人登第編閲小錄無宋庠者不知何許人公答詩云紙尾勤勤問姓名葉林依舊玷華纓莫驚書錄題臣向便是當時劉更生事文𩔖聚宋庠葉清臣鄭戩及庠弟祁同年登第皆有名稱康定中庠為叅知政事戩為樞宻副使清臣任三司使祁為天章閣待制趨向既同權勢亦盛時人謂之四友吕夷簡深忌之指為朋黨俄有無名子作詩謗庠有天下文章惟獨我榜中龍虎更無人之句餘韵甚多深訐庠之私語上聞乃盡罷四人為郡仍降詔天下戒朋比焉儒林公議滕元發謫知筠州時尚艤舟國東普照寺先子實公之客托撰陳情表自辨表入神宗大悅以公知湖州湖乃公所乞也是時林子中作禮部員外郎與公壻何洵直邦彦同曹聞滕公得湖州以詩賀邦彦曰清風樓下兩溪春三十餘年一夢新欲識玉皇香案吏水晶宫裏謫仙人謂公初登第時倅湖州距是三十年矣先子為滕作表手簡尚在今乃誤印在東坡集本文内此條出王性之王公四六話張按掌故載而不詳故詳録之王表與蘓書繁簡婉直不同不知滕當時果用何人筆也元衢吳僧文㨗戒律精至孫莘老知湖州日問吕吉甫如何時吉甫在潤州㨗曰只三年便在官家左右更有一人白晳而肥一人美髯而長後三年吉甫果参大政同列韓子華馮當世皆如㨗所言孫公談圃元豐間章岵守蘇與郡之長老游從飲酒賦詩為十老㑹時米黻以杭州從事罷經吳為作叙盧革首焉革字仲新大中大夫致仕上䕶軍濮陽縣開國子年八十二黻叙云濮陽公冲襟爽徹淑質端清積厚施逺父子顯榮吳都文粹米襄陽志林按革徳清人後寓吳閶見勞志革子秉俱詳人物文同字與可蜀人與蘇子瞻厚為人靖深超然不攖世故善畵墨竹作詩騷亦過人熈寜初時論既不一士大夫好惡紛然同在館閣未嘗有所向背時子瞻數上書論天下事退而與賔客言亦多以時事為譏誚同極以為不然每苦口力戒之子瞻不能聼也出為杭州通判同送行詩有云北客若來休問事西湖雖好莫吟詩及黄州之謫正坐杭州詩語人以為知言石林詩話昔年過洛見李公簡言真宗既東封訪天下隱者杞人楊朴能為詩召對自言不能上問臨行有人作詩送卿否朴曰惟臣妻有一首云更休落魄躭杯酒且莫猖狂愛咏詩今日捉將官裡去這囬斷送老頭皮上大笑放還山余在湖州坐作詩追赴詔獄妻子送予出門皆哭無以語之顧謂妻子曰子獨不能如楊處士妻作一詩送我乎妻子不覺失笑余乃出東坡集蘇軾以吟詩有譏訕言事官章疏狎上朝廷下御史䑓差官追取是時李定為中書丞對人太息以為人才難得求一可使逮軾者少有如意於是太常博士皇甫僎被遣以往僎擕一子二䑓卒倍道疾馳駙馬都尉王銑與子瞻游厚宻遣人報蘇轍轍時為南京幕官乃亟走介往湖州報軾而僎行如飛不可及至潤州適以子病求醫留半日故所遣人得先之僎至之日軾在告祖無頗權州事僎徑入州􅇬具鞾袍秉笏立庭下二䑓卒夾侍白衣青巾顧盻獰惡人心洶洶不可測軾恐不敢出乃謀之無頗無頗云事至於此無可奈何須出見之軾議所以服自以為得罪不可以朝服無頗云未知罪名當以朝服見也軾亦具靴袍秉笏立庭下無頗與職官皆小幘列軾後二卒懐䑓牒拄其衣若匕首然僎又久之不語人心益疑懼軾曰軾自來激惱朝廷多今日必是賜死死固不辭乞歸與家人訣别僎始肯言曰不至如此無頗乃前曰大博必有被受文字僎問誰何無頗曰無頗是權州僎乃以䑓牒授之及開視之只是尋常追攝行遣耳僎促軾行二獄卒就直之即時出城登舟郡人送者雨泣頃刻之間拉一太守如驅犬雞此事無頗目擊也孔平仲談苑蔣希魯居姑蘇延盧仲甫秉後圃希魯曰亭沼粗適恨林木未就仲甫曰亭沼譬爵位時來則有之林木譬名節非素修不成困學紀聞蘇堅字伯固丹陽人翰林學士紳之後也堅有詩名蘇子瞻守杭時以臨濮縣主簿監杭州商税主開湖之議見子瞻申三省狀子瞻與堅唱和及七夕重九詞見蘇集北歸答伯固書四首云論語説得暇當錄呈何時得與公久聚盡發所藴分付耶堅子庠號後湖子瞻亦極賞之稱為吾宗云蘇文忠全集㕘文獻通考李蓘秇圃集曹輔字子方海陵人以太僕丞權福建運使與子瞻賡咏亦多嘗為輔賦西江月一闋黄魯直贈以詩云曹侯黄鬚便弓馬從軍賦詩横槊間阿瞞文武兒如虎逺孫風氣猶班班張耒文潜與子方並典試闈有同文唱和曹君亦詩豪也坡謫惠州與子方書云専人至教賜累幅慰撫周盡又云専人辱書仰服眷厚子方真不以寒暑易交情者蘇黄二集叅瀛奎律髄按宋有兩曹輔其一字載徳南劍州人欽宗時簽樞宻院張弼字秉道子瞻辛未嵗離杭至潤贈以臨江仙一闋云我勸髯張歸去好從來自已忘情塵心消盡道心平江南與塞北何處不堪行秉道盖宦于杭者未詳何許人東坡全集楊繪字元素綿竹人少竒警讀書五行俱下皇祐初擢進士第二人神宗朝知諫院擢御史中丞時王安石用事賢士多謝去繪言老成人不可不惜當今舊臣多引疾求去范鎮年六十有三吕誨五十有八歐陽修六十有五而致仕富弼六十有八而引疾司馬光王陶皆五十求散地陛下可不思其故乎又言方今以經術取士獨不用春秋宜令學者以三𫝊觧經免役法行繪陳十害安石使曾布疏其説詔繪分析固執前議遂罷為侍讀學士知亳州再知杭州繪為吏敏強主愛利而性疏曠訖以見斥云嘗居無為山號無為子為文立就有集四十卷其序書九意云詩書春秋同出於史而仲尼或删或修莫不有筆法焉詩春秋先儒皆言之書獨無其法耶故作斷堯虞書夏書禪讓稽古商書費誓秦誓意九篇宋史叅晁氏讀書志按東軒筆錄載繪為王永年事降荆南副使而居荆南日又出家妓宴客致胡師文狎侮反遭拳毆人品如此史何以稱之劉季孫字景文開封人環慶死事將平之子也能作七字家藏書數千卷善用事送孔宗翰知揚州詩有云詩書魯國真男子歌吹揚州作貴人多稱其精當以右班殿直監饒州酒務王荆公為江東提刑廵歴至饒按酒務始至㕔事見屏間有題小詩曰呢喃燕子語梁間底事驚回夢裡閒説與傍人渾不解杖藜擕酒㸔芝山問専知官誰所作答以季孫詩即召與之語嘉歎升車而去不復問務事既至𫝊舍適學生持狀請差官攝學事公判監酒殿直一郡大驚遂知名為杭州鈐轄子瞻作守深知之嘗以詩寄子瞻云四海共知霜鬂滿重陽曾挿菊花無子瞻大喜在潁州和季孫詩所謂一篇向人寫肝肺四海知我霜鬂鬚盖記此也又云景文有英偉氣如陳元龍之流薦之以左庫藏使知隰州以歿有集十卷東坡集叅石林詩話書錄解題吾湖前后六客俱以坡翁重公擇仲謀子野孝叔令舉已見官師人物獨伯固等人或未詳其出處遐周録諸書未遑就緒余稍為詮次盖存其名宜徴其實可以一時之寄迹而忽之哉崇禎壬午冬至前十日元衢識元豐間彧先公為右史神考遣使治楚州新河面戒之曰東南不慣興大役卿且為朕憂惜兵民大哉王言簡而有體萍州可談先公帥廣崇寜元年正月游蒲澗同越俗也見游人簮鳯尾花作口號中一聨云孤臣正泣龍鬚草游子空簮鳯尾花盖以被遇先朝自傷流落後監司立論乃指此句以為罪其誣註云契勘正月十二日哲宗皇帝已大祥豈是孤臣正泣之時鞠獄竟無他意讒口真可畏如此也先公在元祐背馳與蘇轍尤不相好公知廬州轍門人吳儔為州學教授公延鄉人方素於學舍講三經義轍為内應公坐降知夀州後在廣州與東坡邂逅各出詩文相示既得罪范致虚行責詞云謟交軾轍宻與逢迎媚附安李隂求進遷或以轍事語范范曰吾固知之但不欲偏枯却屬對范學於先公或疑其背師盖國事也范操行非希指下石者張按服以友東坡被放故彧為其父辯嘵嘵焉非黨眉山者豈知二蘇名施後世到今不朽視惇卞軰何啻鴛雛視􅎙丸耶彧之為見亦异乎皇甫威明矣姚祐元符初為杭州敎授堂試諸生出易題乾為金坤亦為金也盖福建本書籍刋板舛錯坤為釡脱二㸃故姚悞讀作金諸生疑之因上請姚復為臆説而諸生或以誠告姚取官本視果釡也大慙曰祐買著福建本升堂自罸一直其不䕶短如此並上張子野能為詩及樂府至老不衰居錢塘年八十餘家猶蓄聲妓子瞻嘗贈以詩有鶯鶯燕燕之語全用張氏故事戱之石林詩話張子野郎中以樂章名擅一時宋子京尚書竒其才先往見之遣將命者曰尚書欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意閙尚書耶遂出置酒盡歡盖二人所舉皆其警策也古今詩話亦云子野嘗作天仙子詞曰雲破月來花弄影士大夫多稱之張初謁見歐陽公迎謂曰好雲破月來花弄影恨相見之晩也遯齋閒覧潘及甫字憲臣厲志文行聞胡安定倡學於湖往從之安定見其文喜曰非諸生比也遂補學職妻以女弟慶厯中登進士維揚志兵部侍郎莫卞居塲屋日因赴浙漕夢人就旅邸報姓莫人作狀元卞出迎之乃云名儔非卞也時卞已投卷是舉登科明年得子因名儔後二十四年儔作大魁卞對賀客言之墨莊漫録京城既䧟敵遣使籍帑藏至軍器庫㸃閲兵仗時莫夀朋以内相為館伴因曰自今兩朝和好當載戢干戈載櫜弓矢敵使應聲曰我曹脚轉後請云左屬櫜鞬右執鞭弭與君周旋閑燕常談字夀朋莫儔舊制麻三道以上䨇宣學士分撰元豐未鄧潤甫為學士一夕鎻麻二十二通靖康元年麻六道權直院莫儔獨宿困學紀聞金人令吳升莫儔𫝊道意㫖往返數四京師人謂之㨗疾鬼六月九日莫儔責授寜化軍節度副使全州安置李綱建炎時政記莫儔謫曲江其家蒼頭奴為朱勝非治疽而愈奴為儔請得復官宋史桂南昇貴溪人政和間舉進士靖康之變金人欲立異姓莫儔等𫝊招尼瑪哈意在張邦昌張俊胡寅等趨入太學南昇於廣㑹叱莫儔曰汝嘗作大魁乃如此舉措不愧後世清議耶儔不敢出一語廣信府志大觀中章莊敏公質夫之子綖為時相誣以盗鑄詔開封尹李孝夀來置獄連逮千餘人屯甲士圍其家鉦鼓聲徹晝夜郡人震駭獄不成又遣御史沈畸蕭服姚䒩來重鞫之甚至州人多閉户或隙中窺觀不敢正視識者知其非太平氣象其後遂有建炎南渡之變方章氏事前城中小兒所在羣聚而唱云沈逍遥沈逍遥莫知其由已而三御史至姑蘓志宣和中王鼎為刑部尚書年甫三十時盧樞宻益盧尚書法原俱為吏部侍郎而並多髯王嘲之曰可憐吏部兩胡盧容貌威儀摠不如盧尚書應聲曰若要少年并美貌須還下部小尚書聞者以為快却掃編余家自曾伯祖侍郎諱宫以甲科起家至慶厯中曾大父通議公楊寘榜相繼及第爾後世世有人大父清孝公余中牓先人文康公何昌言牓某黄公度牓至小子邲朱待問牓連五世矣當時尊長皆有詩以紀慶曾大父贈先祖詩云𫝊家何用富金籯教子何如只一經慶厯科名今已繼更教來葉嗣前馨先大父贈伯父及先人詩云廣塲筆陣數千人喜汝穿楊箭鏃親慶緒綿長時幸㑹文科興復事還新昔年繼牓熈寜嵗今偶同科紹聖春從此莫教書種斷孫曾應復值昌辰文康公賜某詩云兒曹春牓預言揚竊吹知難復士鄉黄絹未能摛好語青氊偶幸繼前芳穿楊喜共東床客女夫章倧同牓攀桂同標北寺房聖世選才如華岳積塵曾不愧毫芒予嘗贈邲詩云吾家五世十三人競擷丹枝撼月輪慶厯賢科開後裔隆興事業繼前塵泥金帖報家庭喜燒尾筵張帝里春從此𫝊芳應未艾桂香應已襲天倫通議之子若孫若曾孫在桂籍者已經十有三人故言之于前長子郛亦不廢學業故期之于後他宗從登科者甚多各有詩紀慶不暇録葛立方䪨語陽秋郯姪留意星厯學紹興癸酉取解漕䑓斗為帝車賦省試復以日星為紀三台色齊為詩賦題其所為貫穿甘石之學甚詳小孫女夜夢郯登樓至十六級而止筮之為省闈第十六人之祥已而果然予作詩贈之曰張鈴走幟到金溪喜子文闈預品題名字巍峩先蘂榜詞章斐亹動文奎階梯已合嬰兒夢星斗光分太乙藜後日臚𫝊當第一天倫科甲尚為低時郯弟邵王佐榜甲科第七人上章茂深嘗得其婦翁石林所書賀新郎詞曰睡起啼鶯語章疑其悞頗詰之石林曰老夫嘗考之矣流鶯不解語啼鶯解語見禽經野客叢書石林二字出楚辭天問見米襄陽志林葉少藴少年貴盛平生好收書逾萬卷置霅川山居建書樓以處之極為華煥丁邜年其宅與書俱蕩一燎李㤗發家舊有萬餘卷亦以是嵗火豈厄運所遇耶揮塵録石林每夜必延諸子女兒婦列坐説春秋聽者不悦曰翁翁又請説春秋耶野客叢書劉資政班靖康間為太常少卿因檢禮器庫見有故祭服甚多將建請以為戰士衲衣有老吏諫曰祭器敝則埋之祭服敝則焚之禮也奈何以為戰士衣乎劉黙然無以應却掃編廸功郎漳浦髙登彦先考試湖州䇿問忤秦相謫死書録觧題游操字存誠宋紹興中與潘良能沈介洪景伯俱為秘書省正字同日赴館少監秦熺于㑹食之次出對曰潘游洪沈泛瀛洲有欲用絳繹繪維綰綸綍為對盖熈寕中韓維陳繹韓絳楊繪相先後除學士也氏族大全仲彌性并淮上知名士也登第之後諸侯交辟久之得通判湖州楊娼韵者以色藝顯名一時彌性惑之誓以偕老韵以誕日嘗作醮供彌性為代作醮詞其黷穹甚矣尋即俱去適王承可鈇為郡守與之啟云方將歌别駕之功聞已泛扁舟之興彌性坐廢二十餘年迨秦檜殂始獲昭雪既而入丞光祿出守蘄春以疾終于淮東儀幕玉照新志詞載藝文渡江後兩入玉堂者十六人沈忠憲與求倪侍郎思與焉事文𩔖聚張按龜溪集沈公謚忠敏此云忠憲何据髙宗時幸醫王繼先怙寵干法聞邊警亟輦重寳歸吳興為避敵計杜莘老疏其十罪竄之宋史紹興中沈守約湯進之二丞相父皆名舉于是改提舉書局為提領此則朝廷為臣下避家諱也齊東野語蜀老言紹興初漕粟嘉陵以餉邊每一斛至軍中計其費為七十五斛席大光胡承公為帥始議轉搬摺運於是費减十六七向非二公蜀已大困矣故至今蜀人謂承公為湖州鏡老學菴筆記胡世將字承公常州人四州安撫制置使摺運事亦見宋史前承公帥蜀者席生亦有能名宋史云旦字晉仲筆記云大光何也張按秦嘉書云頃得此鏡既明且好湖州鏡之稱葢况承公清能鍳物耶往嵗鄰人屋發古牆得鏡一遺余鏡㣲薄欵似唐製銅質瑩然光奕奕有清寒氣殆數鍊所獲背有銘云淳熈二年湖州石十五郎造字體稍𩔖蘇長公書湖州以鏡名宋世已然今薛氏獨著聲市間多贗售者余欲畧放秦式買宣銅百鍊造之後百年品當踞漢工上商之好事者若曰賈如是鈍乎何云之後世紹興二十五年秦檜死詔莫汲張常先等八人並以告訐濫叨官爵送逺郡編管續綱目魏掞之過衢客郡守章傑之家㑹故相趙忠簡公鼎之表歸自海外傑雅以私怨趙旦希秦檜意逮治其家勢烈如火掞之獨慨然以書譙傑長揖而去傑亦無以害也張南軒集傑是子厚之裔臧衍長興志列于宋進士中不可因閩志亦列謂非我湖人也秦㑹之丞相卒魏道弼作叅政委任頗專且大拜矣翰苑欲先作白麻又不能辦假手於士人陳豐豐以其姓魏遂以晉絳和戎對鄭公論諫久之道弼出典藩而沈守約万俟元忠並拜左右揆翰苑者倉猝取豐所作制以與沈公而忘易晉絳鄭公之語實錄例載拜相麻予在史院欲刪此一聨會去國不果筆記秦㑹之主和議大帥皆罷兵權賜田宅予為岳侯作謝表有云功狀蔑聞敢遂良田之請謗書狎至猶存息壤之盟㑹之讀之不樂沈明逺寓簡夀皇賜宰執宴御前雜劇粧秀才三人首問第一秀才仙鄉何處曰上黨人問次曰澤州人問三曰湖州人又問上黨秀才汝鄉出甚生藥曰某鄉出人参次問澤州者曰出甘草又問湖州者曰出黄蘖如何湖州出黄蘖最是黄蘖苦人當是時皇伯秀王在湖州故有此語夀皇即日召入賜第奉朝請貴耳集芮曄一字仲䝉東萊第三妻乃其女也吕成公集唐樞曰烏程自來惟芮曄倪淵有志聖賢惜無誰與歸魏掞之建陽人詔舉遺逸部刺史芮公曄帥其寮與帥守六人者共以掞之行誼為言于是詔特徴之朱文公魏元履墓志楊萬里淳熈薦士録薦李沐云大臣之子而綽有寒畯之􅋵甲科之雋而益勵文辭之事按李沐秀叔子也其後韓侂胄引為右正言歴詆善𩔖誠齋牘云云知人之難如此洪頴字洪甫先世吳興人遷四明舉淳熈五年進士第一攻媿集孝廟欲除張説簽書樞宻院事在廷諸儒力爭孝廟一日盛怒與周益公言朕將用花臂􅈩者為樞宻使益公答云臣敢為天下倡秘書省正字沈瀛當輪對一奏劄薦張説反不稱㫖即自免周益公後至宰輔沈正字止此識見淺深亦足以卜前程逺近貴耳二集張説之爲承㫖也朝士多趨之王質景文沈瀛子夀始俱在學校有聲既而俱立朝物譽亦歸之相與言吾儕當以詣説為戒衆皆聞其說而壯之已而質潜往説所甫入客位而瀛已先在焉相視愕然明日喧𫝊清議鄙之乆皆不安而去焉齊東野語周必大子充莫濟子齊坐繳張説樞宻之命皆投閒張説乃露章薦之兩人皆得郡周得建寜莫得温莫意欲往周遷延不進喻子才有書言激定生患故東漢有士大夫之禍盖必以温為是建為非汪聖錫報云東漢之患生於激西漢之患生於養方今患在養不患在激也癸辛雜録張説開封人以父任為右職娶夀聖皇后女弟累遷知閤門事孝宗遷至簽書樞宻院事淳熈元年連降明州觀察使責居撫州三年許自便七年卒于湖州宋史王季海丞相為太常少卿時葛丞相楚輔為浙東叅議官以啟賀季海用雞檄對鵝經季海賞其的對雞檄乃用王勃為諸王作鬭雞檄楊誠齋詩話投人詩之有語忌者不可不知周茂振賀劉季髙由謫籍放自便啟云十年去國驚我馬之虺隤一日還家喜是翁之矍鑠季髙曰是翁對我馬上知湖州陳之茂進職知平江孝宗知之茂嘗毁史浩曰卿豈以徳報怨耶對曰臣不知有怨若以為怨而以徳報之是有心也莫濟作詹事王十朋行狀詆毁尤甚浩薦濟作内制孝宗曰濟非議卿者乎浩曰臣不敢以私害公遂除中書舍人兼直學士院待之如初樓鑰史浩行狀程文簡著演繁露初成髙文虎炳嘗假觀稱其博贍其子似孫續古時年尚少因竊窺之越日程索囬元書續古因出一帖曰繁露話其間多文簡所未載而辨証尤詳文簡雖甚賞之而心實不能堪或議其該洽有餘而輕薄亦太過也齊東野語四月戊子早過湖州望城中樓觀縹緲環以溪山宜晉唐以來以為名郡也申時過徳清縣溪橋頗壯麗有左顧亭謂放龜也二更宿鳯口周平圍隆興癸未自後省歸廬陵日記霅川月河莫氏稱望族以春秋馳聲嘗至一酒樓飲壁間有題字云春王三月公與夫人㑹于此樓葢輕薄子攜妓飲于此所題耳莫即援筆題其下云夏大旱秋饑冬雨雪公薨君子曰不度徳不量力其死於饑寒也宜哉見者大笑行都紀事近時稱白石者樂清錢文字文季畨陽姜䕫堯章三山黄景説岩老各因其居號之耳堯章居苕溪上潘徳久字之曰白石道人詩云屋角紅梅樹花前白石生愛日齋聚抄侂胄誅御史章爕論張岩與蘇師旦朋姦誤國奪兩官寜宗謂兵釁方開岩嘗言其不可許自便復元官奉祠以銀青光祿大夫致仕宋史岩大梁人紹興末居湖州霅川張㢸者曩與韓侂胄同知閤門事頗以知書自負方議内禪時趙汝愚獨與侂胄計議㢸弗得與聞内懐不平至是謂侂胄曰趙相欲専大功君豈惟不得節度將恐不免嶺海之行矣侂胄愕然因問計㢸曰惟有用臺諌耳侂胄問若何而可㢸曰御筆批出是也侂胄悟即以内批除所知劉徳秀為監察御史楊大法為殿中侍御史罷吳獵監察御史而用劉三傑代之於是言路皆侂胄之黨汝愚之跡始危上李心𫝊道命録云省闈知貢舉葉翥倪思劉徳秀奏論文弊復言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之𩔖並行除毁是科取士稍涉義理者悉見黜落六經語孟中庸大學之書為世大禁初疑文節正人何亦爾爾及閲宋史韓侂胄𫝊云吏部尚書葉翥要侍郎倪思列疏論偽學思不從侂胄乃擢翥執政而免思官又齊東野語云王柟使金歸以金人欲求侂胄凾首為辭詔侍從兩省臺諫集議林樞宻大中樓吏部鑰倪兵部思皆以為和議重事待此而决奸兇已斃之首又何足惜與其亡國寜若辱國而倪公主之尤力且謂在朝有受其恩欲為之地者盖朝堂集議之時獨章文莊良能于衆中以事關國體抗詞力爭所謂欲為之地者指文莊也乃史於鑰謂和議待此而决奸兇已斃之首又何足恤外復有章爕等奏乞梟首然後函送敵國惟思謂有傷國體焉因按魏華父撰文節志有云章良能將除御史中丞公進臺諌論三篇上以付中書章見之滋不悦公力請外補上諭留再三公曰侂胄以臺諌為私人今章良能未除中書前一日亦以小輿見彌逺矣是思與艮能雖同郡道不相謀而弁陽為良能外孫但據日録家乘書之安知其是非顛倒也雙林寓牘慶元二年移内侍林億年於湖州宋史宦者𫝊朝散大夫劉三傑奏今日之憂有二有邊境之憂有偽學之憂邊境之憂有大臣以任其責臣未敢輕論若夫偽學之憂姑未論其逺請以三十餘年以來而論之其始有張栻者談性理之學言一出口嘘枯吹生人爭趨之可以獲利栻雖欲為義而學之者已為利矣又有朱熹者専以為利借大學中庸以文其奸而行其計下一拜則以為顔閔得一語即以為孔孟獲利益廣而肆無忌憚矣然猶未有在上有勢者為之主盟已而周必大為石相欲與左丞相王淮相傾而奪之柄知此曹敢為無顧忌大言而能變亂黒白也遂誘而寘之朝列卒藉其力傾去王淮而此曺愈得志矣其後留正之來雖明知此曹之非顧勢已成無可奈何反藉其黨與心腹至汝愚則素懐不軌之心非此曹莫與共事而此曹亦知汝愚之心也垂涎利祿甘為鷹犬以覬幸非望故或駕姍笑于君父或以三女一魚之符以惑衆庶甚至因雷風不時之變則以天動威以彰周公之徳有如劉光祖因陛下未登極人情洶洶之時則詐𫝊有㫖但得趙家肉一塊足矣之語有如徐誼其他扇妖造怪不可勝數盖前日之偽黨至此變為逆黨矣頼陛下聖明去之之早此宗廟社稷無疆之福然此曹潜形匿影日夜伺隙雨𤾉稍愆則喜見顔色聞敵國侵擾之報則移於吾之君父此如鬼蜮百方害人防之不至必受其禍臣謂今日之䇿惟當銷之而已其習偽深而附逆固者自知罪不容誅終不肯為國家用其他能革心易慮則勿遂廢黜使之去偽從正以銷今日之憂取進止閏六月六日奉聖㫖依慶元三年上劉三傑者嘗為監察御史未三月以憂去免䘮入見因上此疏侂胄大喜即日除石正言明年九月除侍御史又明年七月遂除兵部侍郎道命録三傑字漢臣長興人見勞志安定胡先生後竟無聞端平間郡胡楷世行得其女孫於城西時氏遂白郡博士楊㓜度淑憲我先人實相其事率鄉曲具奩飾得郡庠諸生陳生應甫遂以歸之為安定存一線云三桞軒雜識方臘亂歸安陸行兒聚黨應之宋史陳遘𫝊富陽孫守榮七嵗病瞽遇异人教以風角烏占之術號富春子寳慶間游吳興聞譙樓鼓角聲驚曰旦夕且有變土人當有典郡者見王元春即賀之曰作鄉郡者必君也元春初不之信越兩月潘丙作亂濟王命元春告變朝廷以其有功果令典郡宋史新編端平三年六月行都大火士民上書咸訴濟王寃者侍御史蔣峴史黨獨倡邪説謂水火天數何預故王事遂劾方大琮王逸劉克莊鼓扇异論同日去國並斥進士潘昉姓同逆賊語渉不順皆論以漢法宋季三朝政要蔣良貴簽判安吉州時水災後修城郡守趙希觀屬良貴作記用浩浩字希觀欲改良貴不可曰以宰相父名而宗室避之此非藝祖皇帝所望於金枝玉葉也聞者壯之困學紀聞李庭芝得鄉舉不行以策干荆帥孟珙請自效珙善相人顧諸子曰李生名位當過我授權建始縣淳祐初舉進士辟珙幕中珙卒庭芝扶柩塟之興國棄官行三年䘮宋史湖州民潘甫與弟丙壬聚亡命數十為亂夜入州刼濟王尋敗甫死於兵丙磔於市壬逸去餘黨就擒守臣謝周卿通判張宗濤以下悉付大理獄詔以徐公瑄鞫其事公矢其寮曰國體民命為重身為輕不可為利害􅇶幽有鬼神吾儕謹之先是寺之推鞫或付胥徒公偕二丞日躬訊之時壬未就逮蔓及亡辜時宰疑壬本生父匿之命公織其罪公弗聽未幾得壬於楚州時宰面授風㫖又數以手簡羅致不附己者且諭公可立致貴顯公語諸子曰王忠嗣唐武將也且不肯以人命易官吾忍以訟易服乎吏有希㫖摘壬詞謂它偽擬某人為某官公手裂之吏為危語公曰吾代諸賢受禍弗恤也獄具騰書於朝曰唐天寳之亂陳希烈等將抵死李峴獨曰衣冠奔亡各顧其生可盡責耶彼罪狀顯著峴欲脱之况變生倉卒迹渉疑似者乎湖之守貳不能死猶曰可罪謂與聞謂故從不已過乎又論許澤等六人罪不當死詔徐煥沈源不貸餘悉原之公復執論數四不報壬黨有偶同姓者傅之死議者公竟出之從政郎周成子坐與潘交時宰疑檄出其手騐治亡狀公以數百言爭之一日保章氏奏熒惑犯左執法廷尉當之公曰吾寜以身易人之死也方湖黨之就鞫也時宰既以付公又擢何處仁為治獄少卿魏執中為丞林演以簿攝丞既而何以未至辭不與公据正不阿二丞翕然從公或曰故王不過朽骨殘胔安能富貴人雖歸獄於王無害也而諸公違時宰捐軀命以昭其寃不亦左乎公曰吾豈不知此亡何四人同日罷魏了翁大理少卿徐公墓志吳興向氏宋欽聖后族也家富而儉不中節至於屋漏亦不整治列盤盎以承之有三子嘗訪名于客長曰涣次曰汗曰仌父不之疑他日有呼其名曰涣汗冰方悟為戲也癸辛雜識仌古冰字文本心典淮郡蕭條甚謝賈相啓云人家如破寺十室九空太守若頭陀兩粥一飯山房隨筆本心寓公也景定元年夏四月出内侍董宋臣於安吉州通鑑賈師憲柄國日尤喜苕溪之魚趙與可因造大盤養魚至千頭復作機使相灌輸不少停魚游泳撥刺自得如在江湖中數舟上下運不絶焉癸辛雜識隆國育聖黄夫人徳清人初入魏峻叔髙家既出復歸李仁本媵其女以入榮邸名定喜時嗣王與芮苦無子一幸而得男是為度宗然自處極謙抑雖驟貴盛每遇邸第親戚至不敢坐常以妳子自稱人亦以此名之或者有魏妳子之謗其實不然也秦齊國夫人胡氏亦同邑人相去纔數里賈渉濟川以制置日舟過龜溪見婦人浣衣者偶盼之因至其家問夫何在曰未歸語稍洽調之曰肯相從乎欣然惟命及夫還扣之亦無難色遂擕以歸既而生似道未幾去嫁為民妻似道年長始奉以歸性極嚴毅似道畏之當景定咸淳間屢入禁中隆國至與同寝處恩寵甚渥年至八十有三上方賜秘器及氷腦各五百両時銀絹四千疋命中使䕶葬漕帥供費凡両輟朝賜謚柔正又賜功徳寺及田六千畆可謂盛矣一邑産二女貴人前此所未有也齊東野語宋史亦載而不詳張按李仁本即彦頴之孫浹之子也衢按通鑑隆國偕全太后北行似不逮胡氏先卒矣徳祐元年二月戊辰知太平州孟之縉以城降於元三月庚寅簽書文及翁諷䑓臣劾已章未上亟出關道癸巳岳州摠制孟之紹以城降於元五月辛邜藉吕文煥孟之縉等家十二月癸丑遣少卿陸秀夫等使元軍詔吕文煥趙孟桂通好二年正月辛未以常楙叅知政事己邜常楙遁宋史張按趙氏郡志載亂世能不渝其節可尚也之縉忠襄次子以専城降敵何以見無菴先生於地下乃不能化其婦百鍊之剛古人誦刑于浪說耳之紹不載東林志必之縉伯仲也本心長孺二公號一時賢執政亦效陳宜中留夣炎䑕竄何耶衢按之縉謀以城降倅鄞人豐存芳諫不聽詈之之縉引䝉古兵屠其家同死者十八人卒方義竊其八嵗孤禮長於民間非獨有愧於其婦兼有愧於其卒矣乙亥嵗國事將危忽傳孟之縉妻趙孟桂見為巴延丞相次妻者朝廷遂以太后命遣人齎金帛與之俾賛和議繼得孟桂囬奏云和議將成遂復賜手詔並以金帛慰之繼而寂然無動及事定孟桂南歸霅川盖未嘗為巴延次妻亦未嘗得詔書及賜物也盖奸人乘危造為此説以騙脱朝廷金帛耳問探不明有同兒戲國安得不亡哉孟桂乃趙忠惠與􅊸之妹今為尼改名子桂一作妙惠住湖州廣福一作惠寺云癸辛雜録吳興備志卷二十八
