body:
  text: 吳興備志卷十八明董斯張撰選舉徵第十四薦辟進士宏詞鄉舉封䕃附宋制丹陽吳郡㑹稽吳興四郡嵗舉二人餘郡各舉一人通典漢沈鸞沈直州舉茂才以下詳人物徴沈亮州辟從事沈正弱冠州辟從事晉鈕錫察孝亷邱滔舉孝亷晉沈陵東海王越辟從事沈演之舉秀才為嘉興令有能名沈冲舉秀才為廵撫記室沈憲初應州辟為主簿邱遲在齊以秀才累遷殿中郎邱仲孚永明初為國子生舉髙第沈不害年十四補國子生舉明經姚璹姚班舉明經唐沈懷文沈豪之並舉孝亷並上沈𤣥望徳清人舉孝亷為兖州司馬見釋真乗傳錢珝以宰相王溥薦辟知制誥詳人物徴宋仰忻舉八行沈友直舉賢良方正孝亷趙奕舉茂才趙文敏神道碑以下進士鄔載天寳十二年登第唐詩紀事載吳興人見掌故唐以詩取士錢起之鼔瑟李之霓裳是也起名在第六豹舄賦困學紀聞衢按姑蘇志起天寳十年進士沈亞之元和十年進士詳人物徵楊衡大厯間擢第文苑英華詳藝文沈詢沈樞傅師子俱進士孫沈顔天復初進士詳人物徵錢可復可及俱徽子登進士舊唐書沈光呉興人羅隠有送沈光及第詩文苑英華邵錫呉興人僧無可有送邵錫及第歸湖州詩上蔣子友乾符中進士見談志寺院下詳白法志沈嚴字叔寛德清人祥符八年省試第四人廷試中甲科除南康軍判官厯海寕軍掌書記范文正沈嚴墓志詳掌故藝文葉清臣天聖二年第二人及第氏族大全張按事文𩔖集清臣名在第六詳瑣徵范說呉興人咸平三年進士同學究出身厯司封員外郎陳振孫張氏十咏圖䟦周頌呉興人天聖八年進士厯大理丞上余拂南宫魁詳人物盧革年十六省試解元林肇寳元中進士勵静湖州人嘉祐中進士西呉里語沈當字退夫德清人賜同三禮出身累遷國子監丞仁宗朝熈寕三年庚戌榜壺德字季升元豐間為雲巖令性孝友工書畫與楚州徐積善同師胡安定公事見西山廣記烏鎮人烏青志吳鎮卿宣和中進士詳人物王邁子圭俱登進士張按宋有三王邁一字實之莆人見宋史一字英伯京口人見柱史一字徳逺安吉人范石湖之婿也趙善養年十九登進士子汝成汝恂俱登第趙彦博子賛夫孫時逢俱進士沈播播四子俱詳人物時雋登進士詳寓公葛郯省闈十六人葛邰甲科第七人俱詳𤨏徵沈介彦聲之孫年十八登進士勞志朱吉甫貢舉擢本經第一安吉志潘蕡歸安人乙科授廸功郎調髙郵軍司兵曹事沈與求朱夫人墓志潘莘蕡兄亦登進士授廸功郎調西安縣尉上曾炎隆興元年進士别見寓公慶元二年丙辰榜顧元龍任黄巖縣丞烏青志端平二年乙未榜顧巖元龍子仕至禮部尚書淳祐十年庚戌特科沈仕至工部侍郎泰定四年丁夘科顔旒字景義仕至江西行省貟外郎並上史圭文吳興人故宋舉進士授修職郎瑞安府司户叅軍虞集史氏程夫人墓志詳寓公趙麟字彦徵雍子也以國子生登第書繪寳鑑以下制策宏詞仁宗朝以制策登科者十五人軾忝冒時有富彦國張道安陳令舉軾與家弟轍輩九人存焉當時名公咸以陳賢良稱之東坡詩集叅司馬温公集湖士中博學宏詞科者紹興壬戌沈介辛未莫冲甲戌莫濟淳熈戊戌倪思玉海陳晦字自明中童子科繼中博學宏詞科仕至刑部侍郎兼中書舎人有文集三十卷長興志倪祖常中博學宏詞科官至侍郎東林山志以下鄉舉唐鄉貢進士李翊見掌故金石𩔖潘芑莘兄由鄉薦肄太學龜溪集宋劉曈鄉進士武康志談重字元鼎呉興人屢領鄉薦齊東野語張元㑹號愛松居士宋鄉貢進士烏青志壺嘉㑹字子禮烏程人中嘉定十四年鄉試為同安主簿見西山廣記烏青志屠瓉臨安省元詳人物趙彦亨文敏公從孫也通周易至正乙巳試藝浙江鄉闈與薦宋學士集沈夢麟字元昭元癸巳以易經中乙科以下封廕張維烏程人能詩以子先貴贈尚書刑部侍郎孫莘老張氏十咏圖䟦劉餘慶以從子述貴贈殿中丞周守中以子頌貴呉琰以子知幾貴俱贈大理丞癸辛襍識陳迪長興人以子樞貴贈尚書屯田員外郎配周氏封德清縣君曽南豐集葛立方以子邲貴贈太師封越國公配雍氏贈陳國夫人陳止齋集元程子淶公許子以孫郇貴贈奉直大夫黄文獻集程䋲翁以子郇貴贈奉訓大夫台州路黄岩州知州飛騎尉追封烏程縣男配陶氏封烏程縣君倪守真以子淵貴贈承務郎松江府判官配濮氏贈恭人並上張按明興以來烏程陳實以子秉中貴贈翰林編修見黎淳陳秉中墓志又烏程呉昻以子瓊貴封承徳郎武選司主事見華亭張弼墓志郡志闕焉無紀况前朝哉兹特搜其一二酌古者其廣之盧知原法原俱以父任入官沈詵以大父與求廕補京秩周淙李浹倪思諸子沈作賔俱見宋本傳李澄彦頴子以廕至兵部侍郎德清志葉水心集葛邲以廕補上元丞後登第本傳俞徵以伯祖俟恩入仕齊東野語趙與訔以父希永廕調參軍松雪齋集時傑時侃時佐時行以父衍之廕入仕合璧事𩔖李仁本通直郎知南陵縣李仁方承事郎知仁和縣李仁表迪功郎海鹽縣主簿李仁元通事郎俱太府少卿李浹廕葉水心集趙孟頔以與訔廕補承務郎松雪齋集趙雍以孟頫廕授海州知州文敏公神道碑吳興備志卷十八
