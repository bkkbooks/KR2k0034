body:
  text: 吳興偹志卷二十五明董斯張撰書畫徵第二十一郡人所藏名蹟附賀邵字興伯吳興人官至中書令與皇象同時其體瘠而不流逸而寡禮書小史張按陳夀書興伯山隂人書史云云豈邵曽寓吳興耶邵史作劭邱道䕶善草書與羊欣同受筆法于王獻之殊劣于欣李嗣真曰道䕶謬登髙品迹乃浮漫書小史邱道䕶善𨽻書便書素時司馬珣之為吳興令羊欣弟倫為臨安令欣至吳興㸔弟珣之乃以道䕶素書洛神賦示欣欣嗟咨其工以為勝已道䕶烏程人官至相國主簿張懷瓘書品王道迄烏程人渉學善書形貌又美太守王韶之謂人曰有子弟如王道迄無所少始興王濬以為世子師補中書令史弟道隆亦知書宋書右軍孫智永禪師自臨千字文八百本散與人間江南諸寺各留一本永往住吳興永福寺積年學書秃筆頭十瓮每瓮皆數石人來覔書并請題頭者如市所居户限為之穿穴乃用鐵葉裹之人謂鐵門限後取筆頭瘞之號為退筆塜自製銘誌尚書故實永福一作永興吳興一作㑹稽㑹稽僧智果工書嘗謂永師曰和尚得右軍肉智果得骨永草書入妙行入能永兄智楷亦能書並上顔魯公有湖州帖宣和書譜唐禮部尚書沈傅師書道林詩在潭州道林寺四絶堂以杉板薄略布粉不盡紋故歲乆不脱沈牌某官潭借留書齋半歳榻得其石本為橅石僧希白務于勁快多改落筆端直無復縹渺縈洄飛動之勢寶章待訪録傅師道林詩字大如掌書牌嘗以一小閣貯之米元章為微官時㳺宦過其下艤舟湘江就寺主僧借觀一夕張帆擕之遁去僧亟訟于官官為遣健步追取還世以為口實米襄陽志林按此則所云借留者米自文耳釋髙閑烏程人寓湖州開元寺具戒律善草書宣宗時召對賜以紫袍加大德號頗為韓愈所知作序送之大抵愈所論書其書法出張顛流離顛沛必于草書發之故其變動猶鬼神不可端倪學者當求顛之心而不當逐其跡也已而要其歸正而語若詆毁盖知愈者必謂愈深知閑而不知愈者以為愈之黜閑也宣和書譜唐髙閑書令狐楚詩真蹟在户部尚書康季常家某見石本在湖州墨池編劉涇嘗作書話以懐素比玉髙閑比金藝林伐山卞忠烈墓前華表宋龍圖閣直學士葉清臣書净土禪寺石刻蓮花經葉清臣書杭州府志宋許采字師正吳興人字畫規模鍾王殆窺其妙書史會要姚贊吳興人工八分書書史會要楊凝式晉開運元年甲辰四月十五日有㸔花八韻時年七十二題于洛陽一僧舍書上後云維晉九載今刻石在湖州前殿中侍御史劉燾家㳺宦紀聞沈思東老菴囬仙橋俱蘇軾書劉一止囬仙橋祠堂碑記劉燾以草書名世晚年用筆圓熟黄庭堅題續法帖云劉燾箋題便不𩔖今人書使之春秋髙江東又出一羊欣薄紹之矣書史建中靖國中曽丞相布當國命劉燾為館職取淳化所遺與近出者别為續法帖十卷字多作燾體陳繹曽云太清樓續閣帖劉燾無言模刻工夫精緻亞于淳化肥而多骨求偹于王著乃失之粗硬遂少風韻古今法書苑朱服紹聖中召試中書舍人上曰服文詞可采書札亦工書史劉岑字季髙能草書縱逸而不拘盖有自得之趣上劉侍郎季髙居建康中書舍人張孝祥字安國時為帥還往甚宻一日安國忽具衣冠造季髙季髙驚異未出先令人問盛服而來何故安國曰欲北面書法季髙不辭讓著道服而出安國則令人扶季髙納再拜者再季髙亦不辭讓安國請曰云云季髙荅曰云云大意令安國學李邕書詩話吳興慈感寺有新堂未名蔡京偶過之為書榜曰超覽有坐客賀曰行即走召而人臣四見矣明年京遂入相泊宅編霅溪沈作舟善書紹興丁巳五月十有四日茅山顔魯公碑大風吹折作舟扶起并鐫名于背後苕記宋人書習鍾法者姜䕫堯章研北雜志堯章作綘帖評旁正曲引有功于今古缺亦疑之趙子固目堯章為書家申韓又謂姜書精妙過于黄米並上趙魏公云篆法自秦李相至宋吳興道士張有而止後世的的有所據依研北雜志徐滋字元象宋杞字子和俱吳興人張有髙弟子習篆得其法書史松雪翁書法妙天下而人鮮有知之者公平日博觀歴代真跡石刻深求古人筆意其揮翰時如庖丁鼔刀郢匠運斤不動神色而自合矩度豈俗筆可得而擬耶翁嘗有詩云學書工拙何足計名世不難傳後難當有深知書者出未容俗子議其間又云古來名刻世可數餘者未精心不降欲使清風傳萬古須知明月印千江霏雪錄延祐元年十一月十九日彰徳朱長儒求書晋嵇侍中之廟六大字余每敬其忠節不辭而書之運筆若有神助是夜京口石民瞻館于書室中夢一丈夫晋人衣冠蓬首𤣥衣流血被面謂民瞻曰我嵇侍中也今日趙子昻為余書廟額故來謝之民瞻既覺猶汗流亦異事也松雪齋集元兵伐宋至巴陵女子韓希孟者魏公五世孫也嫁賈尚書之子瓊岳州破被擄明日以衣帛書一詩自投于江而死長興州判官沈思安嘗託劉元履丐子昂為書其詩元履諾而未言一夕夢一婦人云趣為我求書庶因大人君子之筆發攄幽憤松雪聞而異之乃為書一通輟耕錄元世祖命為殿上春聯子昂題曰九天閶闔開宫殿萬國衣冠拜冕旒又命書應門春聯曰日月光天德山河壯帝居又出宋藝祖神像命之題贊以觀其志子昂踧踖良久題曰玉帯緋袍色色新一囬展卷一傷神江南江北新疆土曽屬當年舊主人濯纓亭筆記鮮于困學壙志趙文敏公書小楷精絶篆筆出石鼔文少師廬陵楊公得之吳人武昌陳士謙家藏文敏自書哀困學五字古詩一首行書亦佳水東日記胡汲仲謂子昂書上下五百年縱横一萬里舉無此書硏北襍志袁伯長謂子昂書法髙踵魏晋為律書則專守唐法故雖造次酬荅必守典則上趙吳興寫龍門三自省偈自謂無慮數十百本曰願一切見聞悉皆成佛太平清話趙子昂家藏智永千字文為湯君載借摹易去一百六十五字硏北襍志子昂書秋興賦行書墨跡一卷筆法全出獻之其卷向為吾鄉進士王緝之所藏後有張東海䟦今藏于項希憲家太平清話趙松雪小楷尚書序甚精工前有小像上書延祐五年提舉楊叔謙畵時余為翰林學士承旨年六十有五焦氏說楛天寧萬夀禪寺郡城中天寧寺額子昂書相傳云子昂初于僧㕑下大食桌上試書六字遒媚斐亹後更他書皆不及遂以桌面板鏤刻為寺額盖趙之得意筆也苕記余家有松雪小楷大洞玉經字如蠅頭共四千八百九十五字圓匀遒媚眞可與黄庭並觀余嘗呼為墨皇每移至衡山齋中即竟日展玩在南京因槖中空乏有人以重貲購去至今在夢寐也四友齋叢說趙集賢與人寫碑若非茅紹之刻則不書亦以此人稍能知其筆意耳上衢見文敏篆書心經末附四明茅紹之刻解學士評趙文敏神明英傑儀鳯冲霄祥雲捧日又謂文敏學書十年不下樓古今法書苑方遜志評子昂書如程不識将兵號令嚴明不使毫髪出法度外故動無遺失上子昂亭林圖其眞蹟粘村民屋壁上王野賔買得之售項氏書畵史文敏始事張即之得南宫傳而天資英邁積學功深盡掩前人超入魏晉當時翕然師之解縉書畵傳授管夫人字仲姬趙魏公室有才畧聰明過人能為詞章亦善書仁宗嘗取夫人書合魏公及子雍書裝為卷軸識以御寳命藏之秘書監曰使後世知我朝有一家夫婦父子皆善書也書史觀音大士像大徳丙午春三月清明日吳興弟子管氏志心齋沐焚拜寫墨刻衢從内弟沈尚父見此乃楷書也末有隂文管氏之章陽文玉堂青𤨏夫人二篆女史以為𫝊為管作誤矣趙孟頖字景魯文敏兄書法師二王書史文敏弟孟籲字子俊官至知州亦工書上趙雍王叔明俱工書續文獻通考姚子敬書自楊凝式上泝王大令使人想見其翕然埃壒之表時為小楷極清吳師道嘗為之䟦元薛漢字宗海徳清人官至國子助教楷字宗歐陽率更書史㑹要陳繹曽學優識博真草𨽻篆俱通習之各得其法元吳仲章吳興人留心翰墨有聲於時並上吳興山水圖記文徵明書在江隂古今碑帖考孫太初手蹟有詩草帖諸世揚者諸公諱偁其子彪湖公諱夏能法書古文詞于其孫清之所藏見之上以下畫余家有紙本曹不興如意輪圖米襄陽志林古來丹青其最髙逺者以曹不興𤣥女授黄帝兵符圖為第一米芾畫史裴孝源公私錄畫有弗興畫二卷謂九州名山圖秦皇東游圖韻語陽秋張僧繇為吳興太守畫白塔寺彌勒佛像世稱其妙吳興統記南史僧繇梁時為吳興太守值昭明太子偶患風恙醫不能效僧繇乃畫二獅子宻懸于青宮禁門之上其夕太子即有起色張僧繇五代梁時吳興人姚最續畫品楞伽會圖一卷寳積變相圖一卷俱張儒童畫儒童僧繇之子太平清目不載出貞觀畫史沈曇慶醉像陸探㣲畫曇慶吳興人並上朱審吳興人工畫山水深沉瓌壯險黒磊落湍瀨激人平逺極目建中間頗知名張彦逺歴代名畫記張志和號烟波子常漁釣洞庭初顔魯公典吳興知其髙節以漁舟歌五首以贈之張乃為卷軸隨句賦象人物舟船鳥獸烟波風月依字成形曲盡其妙畫斷𤣥真子為烏程李明府畫武城圖皎然有讚杼山集吳僧皎然亦工畫國史補劉商官為郎中愛畫松石樹木格性髙邁時有畢庶子亦善畫松樹水石時人云劉郎中松樹𣲖標畢庶子松根絶妙朱景賔唐朝名畫錄荆浩河内人自號洪谷子御府藏白蘋洲五亭圖張彦逺厯代名畫記周文矩句容人御府藏寫李季蘭像一髙閑圖一上季蘭真思陵題元仲山家物雲烟過眼錄葉助字天祐收蜀范瓊畫梁武帝寫誌公圖一幅武帝白冠衣褐米元章畫史燕文貴吳興人𨽻軍中善畫山水及人物初師河東郝惠太宗朝駕舟來京師多畫山水人物貨于天門之道待詔髙益見而驚之遂售數畨輒聞於上且曰臣奉詔寫相國寺壁其間樹石非文貴不能成也上亦賞其精筆遂召入圖畫院端拱中敕畫臣面進紈扇上覽文貴者甚説嘗畫七夕夜市圖狀其浩壤之所至為精偹富商髙氏家有文貴畫舶船渡海圖一本大不盈尺舟如葉人如麥而檣帆篙櫓指呼奮躍盡得情狀至於風波浩蕩島嶼相望蛟蜃襍出咫尺千里何其妙也大梁劉氏聖朝名畫評文貴為翰林藝學將仕郎守雲州雲應主簿研北襍志清江九華圖一卷畫秋浦西㟁㟁中横大江林木椒臺極其精細全𩔖燕文貴後有石林二印石林藝文隱居世寳空青書雲烟過眼録子瞻出城見坡竹秀擢可愛囬訪耘老見睌香堂蘇帖前有眉山蘇軾印後有猶賢乎已印老米苕溪春晩圖在王醫士家都穆寓意編雲山煙樹總糢糊此是南宫鶻突圖自是頂門無慧眼臨窻墨跡淡如無米老此圖初藏於苕川李振叔後入嚴尚書府中今宫保閔公得之盖嚴與李同郡而宫保為尚書外孫流𫝊有自而收蓄得所此老亦無所恨矣𢎞治癸亥長洲吳寛書米襄陽志林李伯時有水晶宫明月館圖王氏畫苑僧梵隆字茂宗號無住吳興人善白描人物山水師李伯時髙宗極喜其畫每見輒品題之然氣韻筆法皆不逮龍眠圖繪寶鑑梵隆為葉少藴門僧久居弁山故其作畫極多徳夀宫評畫以隆為龍眠嫡嗣研北襍志江參字貫道江南人長于山水形貌清癯嗜香茶以為生初以葉少藴左丞薦於宇文湖州季䝉今其家有泉石五幅一本筆墨學董源而豪放過之季䝉欲多取其畫而貫道忽被召去止得此圖深以為歉後季髙侍郎再寄江居圖一卷作無盡景始少慰焉鄧公夀畫紀貫道居霅川深得河天之景平逺曠蕩盡在方寸長于山水師董源巨然趙叔問居三衢治園作館取楚詞之言名之曰崇蘭嘗與陳簡齋程致道從容其中命貫道為之圖令畫史各畫其上乃賦詩焉圖繪寶鑑李次山有霅溪漁社圖周益公必大為之跋省齋稿俞澂字子清吳興人作竹石得文蘇二公筆意清潤可愛光宗朝任大理少卿寳謨閣待制澂號且軒癸辛襍識管洞于長興城山寺羅漢壁作猿鶴皆走而復歸圖畫寶鑑陳籛善寫芝草陳傅良嘗跋之止齋集道士林靈素善作墨竹湖州𤣥妙觀有石刻一枝尚存圖繪寶鑑吳興趙公嘗取汝南先賢𫝊所記漢司徒袁公卧雪事寫為圖以遺吳門袁易通甫且曰予作此圖以通甫好修之士景慕其髙鄉耳則君之人品固不問可知黄溍袁易墓志趙松雪有墨竹在崇徳士人家吾鄉華亭衛富益先生題一絶句其上云漢家日暮龍沙逺南國春深水殿寒留得一枝烟雨闕又隨人去報平安儼山詩話松雪畫淵明像一卷題云既書歸去来辭餘興未盡乃作竹石淵明亦當愛此耶太平清話鵲華秋色卷子昂為周公謹作山頭皆着青緑全學王右丞上子昂馬學龔翠巖霏雪録承㫖畫滚馬管夫人隔垣窺公作滚馬形自此絶筆見董思白畫㫖趙子昂如來雪山叅道絹畫為吾鄉羅淵泉物羅且死囑其細君以是乞銘于家君家君前夜夢一佛白雲中下臨余家晨起得此適符之佛坐古松下以手按膝宛然如生故是神物焦氏説楛趙文敏黄鶴山樵皆有清弁圖余逰弁山維舟其下知二公之畫各能為此𫝊神寫照然山川靈氣無盡余于二公筆墨蹊徑外别搆一境未為蛇足也畫㫖松雪為清宻作畫題詩云鷗波風日好吮筆寫幽閒松頂堆蒼鬣峰頭擁翠環𤣥言尋伴侣靜處倚潺湲誰得箇中趣白雲開逺山延祐戊午九月張爰平寶繪録爰平名泰階我湖守也所得古畫盡筆于此書如魏公洎管夫人仲穆叔明舜舉政復不少而且皆有題詠不及偹採聊見一斑云元衢趙子昂秋江待渡圖青錄長幅旁細書云為叔固公摹李叔固也上有張伯雨詩常熟陳原錫家物後丹客得之以售郡人沙生今二十五年歸洞庭人家並上管夫人性喜蘭梅下筆精妙不讓水仙有時對庭中修竹亦自興致不能自休丹青記管夫人畫與文敏爭重其畫蘭幽絶題云趙管才髙栁絮風水晶宫裏畫幽叢秋來紉在夫君佩笑殺逥文漫自工松江新志董𤣥宰題云管夫人墨竹世多有之余見山廬繡佛圖亦工山水今復見此佛像及小楷皆有法度雖文敏續書數十行不能逺過也上管夫人畫竹卷前書竹賦字清勁竹瀟洒後書至大闕年四月二日余奉松雪于鷗波亭觀雨頗有清興松雪謂余曰不可無記遂作此卷舊是商文毅公家物今歸金粟齋中焦氏說楛唐子華樹石上有趙松雪題字數行云子華畫樹石筆意俱到曲盡物理更能學古人假以歲月亦可名世也珂雪齋外集管夫人竹子華每為作䟦檇李李日華有子華秋山行旅圖倣郭河陽並上錢選字舜舉花木翎毛師趙昌青綠山水師趙千里圖繪寶鑑趙彦正仲穆姪工人馬圖繪寶鑑趙雍號山齋官至集賢待制同知湖州路摠管府事畫山水師董源尤善人馬書篆多精妙子鳳字允文畫蘭竹與乃父亂真集賢每題作已畫以酬索者故其名不顯麟字彦徴以國子生登第今為浙江行省檢校善畫人馬周宻字公謹號草窻宋寶祐中為義烏令家藏名畫法書頗多善畫墨竹蘭石趙孟籲工畫人物花鳥頗佳並上王叔明䝉吳興人趙文敏之甥也隱于仁和之黃鶴山號黃鶴山樵善詞翰畫學王維與倪元鎮齊名西湖遊覽志叔明為句章王景行作蛟門春曉圖宋景濓為賦長歌見宋集霅有華溪勝國時人多寫華溪漁隱葢是趙承㫖倡之王叔明趙家甥故亦作數幅今皆為𤣥宰所藏每欲買山霅上作桃源人以應畫識為余圖趙王孫桃花緑山一冊太平清話叔明居吳興最近太湖屢游東西洞庭兩山嘗見其溪橋玩月圖又名具區林屋圖皆摹王右丞石穴嵌空樹枝刻畫為未變唐法也𤣥宰畫㫖余見檇李黃履常中丞家王叔明樂志論分寸許段與盛懋田家樂相似上孟玉澗字天澤胡廷暉字欽亮皆吳興人畫青緑山水花鳥雖極宻然未免工氣圖繪寳鑑張文樞字石隱德清人幼嘗為僧能畫山水學巨然亦善墨竹徐愷字士元南潯鎮人畫山水師李成愷幼從外氏姓稱莫士元莫廷𤾉歸安人能詩工畫山水勞志趙雍家有閻立本作十八學士虞世南房元齡最佳余家舊藏林邑進雞鵝圖盖唐貞觀時徑進太宗以其思歸并二女皆送還國乃閻立本真跡也雲烟過眼録林靜字子山善畫馬上明初張羽亦善畫師小米太平清話沈巽字士偁精于繪事嘗為曹孔章作水晶宫圖贈貝瓊瓊作水晶宫詩子孟均亦善畫吳興畫苑巽又有枇杷雙鼠圖吳匏菴題閻驤善畫有溪山圖一卷長興楊復題筆氣洒落學郭熈而山水平逺有輞川遺意並上劉坦翁司空晚好靜攝嘗獨坐暗室子姓來朝不知所在必髙聲示之又剖竹編成似陶令籃輿懸之于梁僅可弓卧而其上下收放之機皆自握今聞雉城長老言如此金陵瑣事亦載之然此豈可形之于絹素抑豈翁所托神樓乃謂徴仲之圖及名公歌咏皆不得其㫖誤矣圖後入鮑氏轉歸丁長孺家近來推關何思畫烏戍唐靈水瀧以百尺全絹丐之景偹四時相禪無迹米仲詔顔曰川巖無盡圖靈水出遊每貯奚囊己巳客都城外延夀菴值有人猝至濳瘞地坑俟退而取封識宛然殆神物䕶持哉今行者多贋筆並上清閟徴第二十二載顔魯公地記者不書詳遺書徴孔愉放龜左顧遂作一鼎其文曰孔敬康鼎沈之于水即今德清縣龜澤中虞荔鼎録沈約有香爐曰辟塵謝靈運有帳亦曰辟塵採蘭志沈玩琴曰霜霄鐵馬古琴録陳武帝即位鑄一鼎其文曰元勛沉于浙江虞荔鼎録陳宣帝于太極殿中鑄一鼎其文曰忠烈常稱丁初正書上大寧寺有章后鏡一面談志天聖禪院有鐘唐咸熈中鑄刻景清禪院上葉石林老日以古銅鳩頭裝天台藤又塗金兕觥挾二物遊山水間太平清話宋德清龜溪李大卿之子娶韓平原之女奩具中有白玉出香獅子髙尺五寸精妙無比真竒玩也後聞歸之福邸西吳里語漢銅馬式藏周公謹家其初破為數段鑄工以藥銲柵之復完如新研北襍志趙子昂學士至京師得古玉辟邪二制作精妙世罕其比一牡者為李叔固藏去遂失其偶趙夫婦不悅者累日一尚在其子雍處余並得見之上余家有火浣布尺餘外祖知泉州日得之里人後歸予家又蠟沉重二十四兩雲烟過眼録瑪瑙盞二隻其一純白中有金鱓魚一條其一純紅中有白鰍魚一條上鮮于伯機贈趙松雪琴曰震餘云是許旌陽手植桐木所斵說楛趙子昂有琴名松雪但時出橫床未嘗撫弄上子昂得靈壁石筆格狀如鑽雲螭虎太平清話吴興偹志卷二十五
