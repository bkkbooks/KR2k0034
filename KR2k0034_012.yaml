body:
  text: 吳興偹志卷十二明董斯張撰人物徴第五之五倪稱字文舉號綺川居士南渡時居東林登紹興進士任承議郎太常年五十二卒贈少師所著有綺川集十五卷子恕願思並登進士第恕字行甫淮東撫幹願字添甫知建平恕子祖淳字子孟亦登進士東林山志倪思字正甫試禮部侍郎兼直學士院韓托胄先以書致殷勤曰國事如此一世人望豈專以潔已為賢哉思報曰但恐方拙不能徇時好耳遂入見論言路不通自吕祖儉謫徙而朝士不敢輸忠自吕祖泰編竄而布衣不敢極説又言蘇師旦賘巨萬當戮皇甫斌李爽秦世輔潰將皆罪大罰輕又士大夫寡亷恥有列拜門要稱門生不足甚至于恩父者托胄大怒思既退謂托胄曰公明有餘而聰不足堂中剖決如流此明有餘為蘇師旦蒙蔽此聰不足也周筠與師旦並為姦利師旦己敗筠尚在人言平章騎虎不下之勢此李林甫楊國忠晚節也托胄悚然曰聞所未聞司諫毛憲劾思豫祠托胄殛除權兵部尚書兼侍讀求對言大權方歸所當防微一有干預端倪必且仍蹈覆轍托胄雖誅而人言猶有未靖者蓋以樞臣猶兼宫賔不時宣召宰執宜同班同對樞臣亦當逺權以息外議樞臣謂史彌逺也金人求托胄函首命廷集議思謂有傷國體既與金講解中書議表賀有以和成為二府功欲遷秩者思執不可乃止尋以忤彌逺求去以寶謨閣直學士知福州彌逺拜右丞相陳晦草制用昆命元龜語思嘆曰董賢為大司馬册文有允執厥中一言蕭咸以為堯禪舜之文長老見之莫不心懼今制詞所引此舜禹揖遜也有如蕭咸者讀之得不大駭乎乃上省牘請貼改麻制下分析彌逺遂除晦殿中侍御史即劾思藩臣僣論麻制鐫職而罷思性剛介不茍合嘗言與其為有瑕執政寧為無瑕從官故慶元嘉定之間屢召屢出名重天下宋史思子祖仁字子榮通判南劍州祖禮字子簡知金溪縣祖智字子大監丹徒縣事祖信字子誠充福建幹辨公事祖義字子由思次子知無錫縣編吳興分類詩集三十卷東林山志倪祖常字子武思第六子有學行淳熙中中慱學宏詞科嘉定壬午四月自毗陵易守徽州先州民困于和糴郡計二萬斛強無為有人所勿堪祖常惻然加念屢牘申省事得寢凡興利除害去災致順甃通道之衢廣賑乏之廩創嘉賔之館新明刑之宇宣布令條而民興行誼出入阡陌而農務耕桑教化所關悉意奉行有古循良之風治最上聞士民茹德纍官朝散大夫華文殿修撰兼禮部侍郎東林山志沈偕字君與號太清子東老之子登進士厯左宣德郎終知池州宣德縣東老沈氏之老自謂也湖人因以名之其子偕作詩有可觀者東坡題東老菴詩集沈友直字伯益偕之子以太學上舍中賢良方正孝亷等科政和中賜第授潁昌府教授教道有方執經席下成就才能者甚衆考課為諸路最子長卿沈修字誠中東老曽孫賢而才雖貧有守挺挺得祖風上沈長卿字文伯霅川人乾道改元信州判官編西漢總類二十六卷趙希辨郡齋讀書志别記沈清臣字正卿烏程人紹興丁丑進士因上書極論諌官不當用歸正人語侵時宰貶封州放還隱居城南號晦巖創書屋以來四方學者召入遷至皇子嘉王府翊善丐祠即所居治圃築亭揭閣目曰潛溪多所諷詠後以祕閣修撰終于家西吳里語沈清臣紹興末知封州政尚簡易一介不取風節凜然人望而畏之謂不愧其名云廣東志淳熙十六年二月庚寅詔中書舍人羅點具可為臺諌者點以葉適沈清臣等八人上之宋史沈度字公雅德清人紹興間令餘干政有三善田無廢土市無間居獄犴無宿繫民謳歌之以考功郎中除直祕閣知平江府乾道二年七月召赴行在上曰甲申之嵗委卿守吳門未幾治行昭著果如朕所料可謂得人又詢吳中嵗事如何具以豐穰對上曰二年以來水潦軫憂惟恐懼修省以百姓為念耳度奏臣初到郡水歉艱食荷陛下捐四萬石馬料以賑濟全活甚衆上曰正賴良守措置漢宣帝所謂與我共理者其惟良二千石乎即以為中書門下省檢正諸房公事四年又以直龍圖閣知建寧府是時朱子在崇安為屬吏創立社倉均糴偹貸度乃以錢六萬緡助其役倉成民賴之朱子為記其事又知臨安府仕終兵部尚書范成大吳郡志王鏊姑蘇志及維揚志衢按驂鸞録謂過德清往過公雅考室而揚志謂為播曽孫不知遷在何時録又謂公雅素傳過庭所教常有知止易足之説不知指何人宋史傳銖錫而不傳公雅何也劉坦之字平子吳興人淳熙初知歙縣勤于催科撫字之任作知縣廳壁記慶元二年六月以朝請大夫知台州三年十二月除河北路提舉常平茶鹽徽州志赤城舊志天台詩續集嘉定二年正月丁巳章良能自御史中丞除中大夫同知樞密院事六年四月丙子章良能除參知政事章文莊少好雅潔性滑稽居一室必汛掃巧飾陳設琴書或譏其無逺志一日大書素屏曰陳蕃不事一室而欲掃除天下吾知其無能為矣識者知不凡後居兩制登政地齊東野語章文莊公以右史直禁林時宇文挺臣紹節為司諌指公為謝深甫丞相之黨出知溫陵既而公入為言官遍厯三院為中執法時挺臣以京湖宣撫使知江陵府入覲除端明殿學士挺臣懷前日之疑不敢拜文莊識其意乃抗疏言公論出一時之見豈敢以報私憾乞趣紹節就職未幾公亦登政地上章文莊參政與其兄宗卿雖世家五馬而清貧自若少依鄉校與沈丞相該之家學相連章日過其門沈氏少年與客坐于廳事時方嚴冬二章衣掩脛沈哂之曰此人會著及時衣客警之曰二章才學鄉曲所推不可忽也章亦微聞之既而兄弟聨登第駸駸通顯沈氏之屋適有出售者宗卿首賈之以居焉癸辛雜識良能字達之吳興人即癸辛雜識中所謂章參政文莊公也城南有嘉林園良能宋史不為立傳兄良肱字翼之亦舉進士厯宗卿考宋史呂午傳有浙東提舉章良朋者當亦文莊羣從耶良能子叔恭倅襄州見齊東野語良朋為施宿壻適康侯以寫本癸辛雜識見示多會稽商氏刻本所未載者得此一條快甚詳瑣徵良能吳興人史傳靡可考無辨陽老人書幾與草同腐矣著述之不可已如是張按宋史史彌逺初革韓托胄之政召還正人良能與樓鑰婁機同執政當亦一時佳士史家不為立傳何也章良朋字益之慶元三年為旌德尉嘉定中為慶元刺史兼權沿海制置使司公事時留吕午在幕海波未平問策安在午亷知調軍出海糧盡即還軍獲寇物官盡拘收乃與制置司幹官施一飛議糧盡再給不許擅還賊舟所有悉以給軍海道遂清紹定元年三月以朝奉大夫直寶謨閣知平江府七月致仕見宋史寧國寧波姑蘇三志談鑰與文莊兄弟同于淳熙時登第而文莊又為周密外大父其為湖人無疑矣括紀亦列之選舉豈其先本括人自其父駒來湖耶駒紹興十八年進士見考亭登科録為寧海尉上虞令見臨海紹興兩志良肱嘉定間福建轉運司判官見八閩通志江西提刑見海亭四六知臨安府見杭志元衢趙時逄遁可為贑州守贑妓朱雲楚警慧知書趙嘗會客果實有炮栗趙指之曰栗破縫黃見坐客屬對皆莫能楚輒曰妾有對取席間藕片以進曰藕斷露絲飛趙大竒之贑州志注漢東人當是寄貫時逢宗室孝光間知仁和縣杭州府志蔣南金字汝貴德清人淳熙八年登第嘉定中知容州興學校立貢院在任三年日以教養為事未嘗有逸豫遊樂之好梧州志俞徴字子清汝尚玄孫以清介自持所至有治聲為刑部侍郎丐休除寶謨閣待制放意泉石創圃于南門之外去城二里許與小浮玉山相對號曰無塵時以扁舟往來飲酒賦詩自樂焉談志吾鄉前輩俞且軒侍郎善墨戲竹石為人寶重然人知其能畫而不知其為人因書其概于此侍郎名徴因伯祖閣學字居易恩入仕中刑法科短小精悍清淡簡約樂易無崕岸而居官守正不阿其為福建檢法陳丞相帥三山治盜過嚴一日驅數十囚欲投諸海徴白其長曰朝廷有憲部而郡國無憲臺可乎力爭之因命閲實遂為區别戮者黥者各若干陳始怒而後喜其有守悉從之且薦以京秩為刑部郎日有鄉豪素以俠稱為時所畏殺人諉其奴獄上駁之請自鞫豪因得其直光宗壯之即日除大理少卿然竟為豪擠去又常德有舟稍程亮殺巡檢宋正國一家十二口纍嵗始獲乃在寧廟登極赦前吏受其賂欲出之徴奏援太祖廟戮范義超故事以為殺人于異代既更開國大霈猶有所不赦况亮乎于是遂正典刑後權刑部侍郎以待制致仕家居十年乃終年七十八且軒其自號也俞氏自退翁起家七十而納祿至徴凡五人且皆享髙年有園池琴書歌舞之樂鄉曲榮之後余得竹石二紙于故家葉如黍米亦竒潤自成一家上題印居易戲作蓋閣學俟所為也因知子清戲墨有所自來此亦人所未知者因表而出之齊東野語沈詵字宜之以大父與求廕補京秩鎖廳賜出身紹熙初光宗嗣位厯官左右司直轉運兩浙本路舊無試闈詵于抱城北隅列屋三百楹嵗減官錢甚夥奏蠲德清稅務錢二萬四千緡初至漕額才十八萬緡去之日至六十餘萬進太府卿榜所居曰歸來開禧中謁告家居已十年矣召起歸班時韓托胄議大舉詵論中興與創業不同今以所當保之基兾不可必之功宜審所處莫若偹修以觀變臺臣謂其動搖國論豫祠去更化初召除刑部侍郎遷户部尚書德清志沈詵淳熙間知臨江軍嘗買民丘以廣貢院又翻刻二劉春秋傳權衡意林于郡學宫臨江府志葛公謙問文康公孫也魁然重厚古君子宦情世故皆應以無心文采外著深契禪悅終倅毗陵葛名郯清波雜志詳白法志郯吳興人葛郛淳熙間知興化軍事八閩通志郛淳熙七年以朝奉郎通判潤州鎮江府志葛邲字楚輔吳興人髙祖密至邲五世登科第大父勝仲至邲三世掌詞命邲少警敏以廕為上元丞登第除國子博士輪對論州縣受納及鬻爵之弊又論征𣙜嵗增之害上召令條陳邲以六事對皆切中時弊除侍御史論救荒三事纍遷給事中除刑部尚書邲為東宫僚屬八年孝宗書安遇二字以賜又出梅花詩命邲屬和眷遇甚渥光宗受禪除參知政事又除知樞密院事紹熙四年拜左丞相專守祖宗法度薦進人物博采公論惟恐其不聞之嘗曰十二時中莫欺自己其實踐如此贈少師諡文定宋史寶慶二年三月戊寅建昭勳崇德閣趙普曹彬薛居正石熙載潘美李沆王旦李繼隆王曽吕夷簡曹瑋韓琦曽公亮富弼司馬光韓忠彥吕頥浩趙鼎韓世忠張浚陳康伯史浩葛邲後益以趙汝愚凡二十四人皆圖形其上通鑑沈介字德和德清人厯中書舍人以次對知平江召歸上疏甚剴切偹言敵必為患明年敵犯兩淮乃以兵部尚書為荆湖制置及再知郡上諭以平江輔郡極難其人知卿政事特加遴選當為朕撫恤百姓均財節用使恩威並施為佳如常平錢米以偹凶荒訓兵令精不必增補至于兵器亦令堅緻其眷遇如此沈介紹興二十七年十二月以左朝散郎知台州為政有聲雨暘禱輒應赤城舊志黃中字通老副沈介使金還纍遷權禮部侍郎中之初還也言金治汴宫必徙居見迫宜早為計上矍然宰相顧謂中曰沈介歸殊不聞此何耶居數日中白宰相請以妄言待罪湯思退怒語侵中已乃除介吏部侍郎徙中以補其處宋史沈介乾道四年以顯謨閣學士守信郡前此趙師嚴在任時州兵嘗欲援往例有所求不獲遂聚謀亂後雖散府庫以撫之復反側不安介代至誅首領二人餘皆安堵嵗飢賑貸有方民得不死是嵗六月移知溧州去之日老稚扶擕行數十里涕泣不能舍廣信府志王正功為荆湖轉運主管時尚書沈公介為帥尤簡貴威重裁決無敢輒經外臺者理或未安君改之不疑沈公更加警異不以為忤也沈公更薦之又為延譽樓攻愧王止功墓志公知紹興十二年貢舉考博學宏詞科得洪遵沈介洪適以所試制詞進讀上曰是洪皓子耶父在逺能自立此忠義報也遂以遵為祕書省正字介適並為敕令所刪定官自中興以來詞科登選即入館自是科始程克俊家傳吳興沈文炳堯夫有聲國學養親不仕嘗作論語解周必大序之平園續稿李元吉湖州人淳祐間知福清頗以師儒自任為人仁明峭直不可干以私始視事每日二百餘狀未期月惟三狀時劍建盜起他處隅官練兵盡激其變獨福清晏然監司亦不之責嘗曰吾為政惟容吏輩一二人故一時雁鶩棄逐殆盡易簀之際惟以憫雨恤刑為念對妻子無私語八閩通志章謙亨字牧叔吳興人紹定間知鉛山為政寬平人號為佛家置像而祀焉其興養學士禦盜安民禮賢表俗蠲賦救荒之績邑人勒之章巖識不忘云鉛書謙亨于嘉定十七年知泰興縣見維揚志嘉熙三年朝請大夫直祕閣浙東提刑兼知衢州見衢志章燮嘉泰四年浙東提刑開禧二年知紹興府劉宰任浙東判官時有謝章倉燮舉改官啓劉漫塘集朝廷與金人約和金人約函致韓托胄首詔令臺諌侍從兩省雜議黃疇若與章燮等奏乞梟首然後函送敵國人譏其有失國體宋史朱應元字見則厯監察御史崇政殿説書首劾時宰去之後為丁大全所忌被論左遷復除監察御史升右文殿侍講會星變賈似道當國衆畏縮莫敢言應元極陳時政以起居舍人斥歸安吉志周頡字元吉厯左右司郎中直龍圗閣福建轉運使有適菴集百卷與楊萬里程大昌洪邁諸賢倡酬詩二卷安吉志紹興四年鄭丙以正奉大夫致仕時史丞相浩沈詹事樞右司郎中周頡與丙皆同年進士退休于二浙詩筒倡酬人競傳之周必大鄭丙神道碑周祐字子受自長城徙居武康以春秋登進士第沉靜寡交不事表暴恬熙若布素無仕進心丞相留正葛邲以文行薦于朝除諸王宫教授以疾力辭纍敦促赴闕卒不就兩浙名賢録朱焕文字實甫弱冠有聲胄監時馬碧梧為相擇壻于六館得焕文曰可妻也以其女歸之初署迪功郎後以湖州教授致仕屬文敏麗尤善詩有北山藁若干卷安吉志朱天鍚歸安人父喪哭泣廬墓三年有司聞于朝旌之歸安志錢几字君慿號圃翁遊心儒術學有源委為一鄉士夫冠冕徴辟不起凡邑士之登科者第其榜籍為圗以奬勵後學尤長于詩有云上若溪頭老圃家一瓢沉醉是生涯之句著詩集三卷臧衍長興志陳晦字自明中童子科繼中博學宏詞科仕至刑部侍郎兼中書舍人有文集三十卷陳璧字君玉一字起度官至大理寺丞知泰州撰本縣廟學瑞芝記見存刻石著詩文一百卷並上朱震字震之號坦齋幼頴異從父官青陽晦菴先生一見竒之比長受教于袁潔齋之門義理精洽一日友人與論持敬震曰只須言存誠論顔子未達一間曰體以心其間自見嵗晚笑傲林泉燈夕里人招之勿往謝以詩曰賴有半窗知已月已多一點讀書燈聞者傳誦安吉志震有益泉集三十卷趙善養字浩然居武康十九嵗登進士再中法科官至朝奉大夫子汝成汝忱俱登第勞志趙浩然宋宗室德昭之後博學能詩為人倜儻一時豪傑多與之遊舉授春坊授經郎嘗與大都文衡出判吉州有善政長興志趙彥博字富文居武康之上陌太宗八世孫登進士第守郡持節俱以能稱遷工部侍郎子贊夫孫時逢俱登第勞志閔康侯云南渡以來太宗後尚有人也思陵舍本宗而登秀邸何耶或云天命有在趙伉夫字尊道霅川人開禧乙丑知上髙縣內腴而外瘠政尚慈恕不忍橫斂民懷愛之目為趙佛子踰年政成事理入為樞密院承旨官至浙東提刑江西通志上髙志陳振孫字伯玉安吉人藏書數千卷各為解題讐勘精核鄱陽馬端臨多採其語成書提舉浙西舉行萬户停廢醋庫邦人德之管攝興化篆折獄平允時皆服其得法之意焉姑蘇志參癸辛雜識文獻通考朱泰湖州人家貧鬻薪養母嘗適數十里外易甘旨一日雞初鳴入山及明憩于山足遇虎搏攖負之而去泰已瞑眩行百餘步忽稍醒厲聲曰虎為暴食我所恨母無托爾虎忽棄泰于地走不顧如人疾驅狀泰匍匐而歸母扶持以泣泰無恙里人目為朱虎殘宋史新編王圭字君玉范成大外孫也父邁字德逺安吉人依妻家以居登進士終通判太平州圭于父卒忍貧力學孝于其母嘉定十年登第主松陽簿以才幹就升為令行經界井井有條至今版繪其式制行于天下為經界者凖則後知常州入為司封郎終朝散大夫自號靜觀有文集十卷其居官亷家無餘資死無以斂子敏學強學俱以圭廕厯任亦以亷謹聞姑蘇志程覃字會元文簡公季子提舉兩浙常平茶鹽權沿海制置司事嘉定六年蒞任以東錢湖它山堰灌溉甚溥每患湮圮始置田租以所收嵗給浚導者撥錢及田造器服以勸學蠲海錯果蓏之征以惠民凡公府廨舍城郭戎器倉場橋道以至鄉飲器具纎悉畢偹人服其整十年知臨安府紹定四年知紹興府終司農卿集英殿修撰兄凖知慶元府阜通判廬州徽杭寧紹四志白獺髓周俌字正甫安吉人寶祐四年知新昌縣事剛正明敏不畏強禦時丁大全引用汙吏預令州縣上供俌舉手誓天曰俌頭可斷決不為新昌開此例上命督責益急俌持之愈確當時咸以頑令目之其後他州縣被害積五六年不已而新昌以俌故獨免云秩滿攝監察御史忌者諷臺臣劾去公論惜之紹興府志芮立言嘉泰初知邵武軍事為治清亷明決八閩志芮及言字子及嘉泰三年知上髙縣政事精勤容貌嚴厲一縣憚之號為小監司嘗書所坐屏後少飲酒加餐飯勤出廨公事辦蒞官四年終始如一上壺徴字慎之雲巖令德之六世孫也嘉定間為舒州通判致仕歸濟王竑愛幸之王為史彌逺所害徴同死焉見西山廣記曽捨粟五百石以濟鎮人烏青志吳淵字道夫嘉定中第進士差浙東制置使司幹辦公事丁父憂詔以前職起復力辭勿許再辭且貽書政府曰冒哀求榮平生大節掃地矣他日何以事君時史嵩之方起復或曰得無礙時宰乎淵勿顧詔從之厯江西安撫使會嵗大祲講行荒政全活者百萬人復知鎮江平江兼浙西兩淮發運使嵗亦大祲因淵全活者又百餘萬人進沿江制置使三郡屯田使朝廷付淵以光豐蘄黃之事凡創司空山燕家山金剛臺等大寨三小寨二十有一團丁壯立隊伍無事則耕有警則禦詔以淵興利除害封金陵郡公纍官參知政事卒贈少師諡莊敏淵有才略迄濟事功所至興學養士然政尚嚴酷好興羅織之獄籍入豪橫故時有蜈蚣之謡其弟潛亦數諫止之所著易解及退菴文集奏議徽州府志吳潛字毅夫淵弟也舉進士第一厯左丞相許國公元兵渡江攻鄂州别將由大理下交趾破廣西湖南諸郡潛奏今鄂渚被兵湖南擾動推原禍根良由近年姦臣僉士設為虛議迷國誤軍其禍一二年而逾酷附和逢迎媕阿諂媚積至于大不靖臣年將七十捐軀致命所不敢辭所深痛者臣交任之日上流之兵已踰黃漢廣右之兵己蹈賔栁謂臣壞天下之事亦可哀己又論國家安危治亂之原蓋自近年公道晦蝕私意橫流仁賢空虛名節喪敗忠嘉絶響諛佞成風天怒而陛下不知人怨而陛下不察稔成兵戈之禍積為宗社之憂乞令大全致仕沈炎等與祠不報屬將立度宗為太子潛密奏云臣無彌逺之材忠王無陛下之福帝怒竟以炎論劾落職尋責授化州團練使循州安置潛預知死日語人曰吾將逝矣夜必大雷風已而果然至四鼓開霽撰遺表作詩頌端坐而逝景定三年五月也德祐初贈少師宋史吳淵吳潛皆生長德清非流寓也潛死時焚青詞以告天為詩曰夫子曵杖逍遙曽子易簀兢戰聖賢樂天知命吳子中庸一線又曰生在湖州新市鎮死在循州貢院中一場雜劇也好笑來時無物去時空德清新志吳璞字禹珉號覺軒許國公長子登淳祐四年進士第授校書郎除嘉興府通判添沿江鎮撫使信賞必罰將士用命大敗元人兵于泗州及知鎮江治城導隍嚴于守偹邉患永息寶祐六年除吏部尚書掌左選與丁大全不協嘆曰吾不能為梁成大吕惠卿遂抗章丐間文天祥稱其有揚休山立之韻日光玊潔之襟德清新志屠瓉字元卿好讀書潔行舉明經當理度時國事日舛于是托空門終身不仕别號有髮僧云浙直分署紀事本末沈平字東臯烏程人雅好文鄭清之吳潛皆與之遊薦于朝欲官之皆以疾辭不赴人稱為沈處士云當時里中碑刻多出其手所著東臯遺稿若干卷烏青記四卷行于世烏青志趙與訔字仲父秀安僖王四世孫以父廕調饒州司户參軍厯户部侍郎東平劉震孫曰與訔于時為循吏于朝為名臣于國為信厚公族世以為知言子孟頔孟頒孟碩孟頌孟頖孟皓孟俯孟籲皆顯貴歸安志常楙字長孺武康人厯兩浙轉運使修築海鹽海宴塘既而以集英殿修撰知平江府值旱故事郡守合得緡錢十五萬楙悉以為民食軍餉助捐苖九萬稅十三萬版張十六萬又蠲新苗二萬八千大寬公稅之力飛蝗幾入境疾風飄入太湖節浮費修守庫既代有送還事例自給吏卒外餘金萬楮悉不受吏驚曰人言常侍郎不愛錢果然改浙東安撫使姑蘇志常楙浙東安撫使值水災捐萬楮以賑之又以諸暨被水尤甚給二萬楮付縣折運民食不至乏絶民各祀于家會稽山隂死者暴露與貧無以為殮者造棺以給之召為刑部侍郎平反偽獄全活甚衆浙江通志宋時丁氏世家吳興之安吉名曄者慶元丙辰進士官中大夫太府少卿總領淮東軍馬錢糧生嘉定癸未進士朝奉郎淮東制置大使司幹辦公事伯虎伯虎生儒林郎浙西提舉常平茶鹽司幹辦公事應復應復為昭慶軍節度掌書記王囦金壻王之婦則贈朝散郎義烏黃伯信女也伯信子朝請大夫夢炎孫承節郎堮堮以疾廢夢炎以應復第四子後之製名曰鑄沿恩補將仕郎宋亡丁氏家落鑄迎應復及其兄將仕郎仁以歸侍飬終身嵗時為位以祭惟謹後鑄子文獻公溍貴贈堮嘉議大夫禮部尚書輕車都尉追封江夏郡侯封鑄從仕郎溫州路樂清縣尹纍贈中奉大夫江浙等處行中書省參知政事追封江夏郡公黃溍先考墓志銘後記參栁貫危素宋濓二狀一碑衢按二丁登第不見湖志而見杭志豈文獻妄書先世土著而諸集參互不足據哉宋時無寄貫之禁如朱繹之端常父子本雲間人而用湖州貫莫汲葛邰萬介本湖人而用開封處州貫可類推矣夫姚元之為唐相系自武康溍為元學士系自安吉雖世有逺近而功業文章不相上下且俱諡文獻為余與遐周得之真一竒也若溍本氏丁逮貴而不請復僅拳拳于墓中之石尤徴其厚云牟巘字獻甫子才子也巘善為文一門父子自為師友討論經學以義理相切磨于諸經皆有成説惟五經音考盛行于世巘大理少卿按戴表元牟氏壽席詩序先生還會稽使者節則巘當晚宋嘗守越矣壺韜字怡樂號萬菊居士烏程人同安主簿嘉會之五世孫也幼以孝弟稱及長不樂仕進居鄉里工詩詞有樵雲集集中稱宋謙之或曰無名氏曰宋者不忘本也曰無名氏者恥成名也其詞曰壺山居士未老心先懶壺山寓姓未老心先懶寓不仕意也又曰身在玊壺邉曰梅瘦玊壺中皆此意也龍泉章三益之師他門人之顯者以百計有怡樂墓志檇李項襄毅乃渠孫守正之徒事見襄毅詞林中烏青志顔旒字景義烏程人舉泰定四年進士官至江西行省員外郎有能聲抽簮後日與文人墨士唱和林泉以終壽考晚年號竹雲怡老有歸間集上牟應龍字伯成巘子也應龍幼警敏過人日記數千言文章有渾厚之氣應龍當以世賞補京官盡讓諸從弟擢咸淳進士第時賈似道當國自擬伊周謂馬廷鸞曰君故與清忠遊其孫幸見之當處以高第應龍拒之不見及對策具言上下內外之情不通國勢危急之狀考官不敢置上第調光州定城尉應龍曰昔吾祖對策以直言忤史彌遠得洪雅尉今固當爾無愧也沿海制置司辟為屬以疾辭不仕而宋亡矣故相留夢炎事世祖為吏部尚書以書招之曰茍至翰林可得也應龍不答元史清忠公以國學博士言時政忤時宰鄭清之去國抵吳興寓第而先生生清忠公喜字先生曰翁歸先生子必遠必大必達必勝必昌虞集牟公墓志吳惟信字仲孚號菊潭湖州人寓居嘉定白鶴村以詩鳴宋季吳老儒糜先生􅠐弇諸父也記問該洽九經注疏悉能成誦然垂老不預貢籍見惟信詩亟稱之一日遇之塗叩以近作惟信誦一絶云白髮傷春又一年間將心事卜金錢梨花瘦盡東風懶商略平生到杜鵑糜不覺下拜曰子真謫仙人也老夫每欲效顰則漢高祖唐太宗追逐不少置矣齊東野語寶祐間李知孝為言官與曽極有隙摘極咏春詩為謗訕押歸聼讀江湖以詩為諱者數年其後史衛王之子宅之壻趙汝祺喜談詩引至黃中吳仲孚諸人于是詩道復興矣上俞善道退翁之後從吳興徙華亭樂高尚不令子孫進取四世孫顯始教子允應制成進士墓在佘山李至剛銘少師姚廣孝題詩曰聚土成邱馬鬛封墓前木拱氣蔥蘢九原不作應無憾嵗有佳兒為掃松松江新志趙孟俯入見世祖神采煥發世祖顧之喜使坐時方立尚書省命孟俯草詔頒天下帝覽之喜曰得朕心之所欲言矣他日行東御墻外道險孟俯馬跌墮河僧格聞之言于帝移築御墻稍西二丈許孟俯自念久在上側必為人忌力請補外出同知濟南路總管府事會修世祖實録召還京師以翰林侍讀學士撰定祀南郊祝文又有旨書金字藏經初孟俯以程巨夫薦起家為郎及巨夫為翰林承旨致仕去孟俯代之先拜其門而後入院人以為衣冠盛事至元二年追封魏國公諡文敏所著有尚書注琴原樂原得律呂不傳之妙詩文清邃竒逸篆籒分𨽻真行草書冠絶古今天竺有僧數萬里來求其書歸國中寶之其畫山水木石花竹人馬尤精緻元史僧格者西僧善巴國師弟子黠而橫言興利口津津涎流元主深喜之與楊總統請毁宋故郊廟以為寺與總管府判官宋潔矩請徙宋宗室居江南者實京師天下騷然當是時天下大權盡歸于僧格相安圖不能禁御時理算天下錢榖已徴者數百萬未徴者尚數千萬民不聊生逃山林發兵捕之以稱亂會星變集賢學士孟俯因諤爾根薩里入奏請蠲除庶天變可彌從之詔草已畢僧格怒曰此必非帝意孟俯曰凡錢榖可得徴者業盡徴之矣其未徴者必貧窮無賴及是時除之他日言者倘以失陷歸尚書獨不為丞相纍耶僧格乃默然聼之民以少蘇會元主宴居孟俯侍上問葉李留夢炎優劣孟俯對曰夢炎臣父執其人厚重篤自信好謀能斷有大臣器葉李所讀之書臣皆讀之其所知所能臣皆知之能之帝曰汝以夢炎賢于李耶夢炎宋狀元丞相當賈似道誤國罔上依阿取容李布衣乃伏闕上其罪此賢于夢炎遠矣孟俯退謂奉御薩里曰適上論賈似道誤國責夢炎不言今僧格罪甚于似道而我等不言他日何以辭其責然我遠臣言必不聼上所親信無踰公公必勉之仁者之事也薩里奮曰信知言必死不死不足以報國會元主畋郭北薩里乘間具言之元主怒謂詆毁大臣命衛士披其頰口鼻血湧出委地上少蘇復呼問辨愈力曰臣與僧格故無仇所以力數其罪不顧身者為國家耳茍畏上怒而不言則禍亂何極既而大臣有助其言者上悟遂誅僧格後薩里論及斯事嘆曰使我有萬世名者子昻之力也函史參歐陽玄神道碑元世祖蕆事南郊他學士撰祝册有云章亥復生不足以步有元之幅員又云謹以太祖聖武皇帝正東南之位公曰天子父事天子誇疆里于其父不可且公不為禮乎禮太祖東向居中子孫在左者南向故稱昭在右者北向故稱穆若南郊之位上帝南面太祖自宜西向故事第稱配天作主公不用何也其人謝服從所刋定皇太后命學士擬改降福宫名同列擬光被公擬光天或曰光天出陳後主詩不祥公曰帝光天之下出虞書何謂不祥各書所擬進後竟用光天歐陽玄神道碑趙孟頖字景魯吳興人以簽書高郵軍判官廳公事未仕宋歸于元宦情素薄浮沉里閭不求仕進日以翰墨為娛書九經一過細字謹楷人傳以為玩喜與名僧遊書蓮華華嚴楞嚴圓覺金剛諸經皆數過明忩淨几焚香瀹茗四時花草婆娑愛賞欣然自得松雪齋集趙雍字仲穆孟俯之子善書畫名重當世廕授海州知州在官期年後除集賢待制湖州路總管淮安志雍有二子鳯麟鳯字允文麟字彥徽趙仲穆善書畫嘗任淮南知州有一玊帶時亷訪某卒欲得之不從竟以是衊之而罷其職至正中被召入朝旨下淮安取往來案牘焚之仕至翰林待制晚年典郡農田餘話趙奕字仲光號西齋晚居吳興與崑山顧仲瑛交仲瑛稱其為人有王孫風度而無綺紈故習文敏三子長亮次仲穆仲光其季也上唐棣字子華歸安人從名儒善解悟章句兼習繪畫舉筆有法趙文敏一見竒之出入門下嘗以詩通郡守馬煦煦與語合未幾煦擢秋官挾之至都進薦仁宗詔繪嘉禧殿御屏稱旨待詔集賢院遷嘉興路照磨至正五年除休寧縣尹時承平久為政者習于貪鄙廢事且賦稅不均詭名應户雜其間棣一核而正之及重新縣學等事見范滙虞集于文傳王譜四記世號唐休寧進奉議大夫吳江州知州致仕後起福建行省僉事而已矣年六十九著休寧藁虞為序味外味藁董為序皆傳于世勞志休寧志張來儀墓碣王方叔字壯猷與子昻善其先自盱眙徙吳興故推其所自題其詩編云第一山人文集松雪齋集王子中武康人居喪廬墓詔表其門閭元史子中字居正元人少好學有詩名無仕進意柯敬仲虞卲菴皆相善多唱酬有挂蓑吟三卷行于世張復亨字剛父烏程人力學博聞仕至泰州同知時與趙子昻牟應龍蕭子中陳無逸陳仲信姚式錢選皆能詩號吳興八俊虞邵菴嘗稱唐人之後惟吳興八俊可繼其音勞志姚式字子敬歸安人學于敖繼翁浙西平章高彥敬薦式與鄧文原陳康祖倪淵皆為儒官勞志趙子昻嘗謂人曰姚子敬天資高爽相見令人怒不見令人思又贈詩云吾愛子姚子風流如晉人白眼視四海清言無一塵其為子昻敬畏如此研北雜志陳康祖字無逸嗜詩剡源戴表元評其詩為氷蠶火布煤脫垢燼翛然而潔云剡源集豫友鄧善之張仲實陳無逸皆英爽之士其言語文字足以雄一時松雪齋集陳繹曽字伯敷康祖子為人雖口吃而精敏異常諸經注疏皆能成誦文詞汪洋浩博其氣藹如也與修遼史官至國子助教論者謂與陳旅相伯仲云元史參研北雜志歐陽圭齋戴剡源兩集周密宋季為國局嘗祠蠟充奉禮部郎兼太祝終義烏令癸辛雜識參書繪寶鑑密詳掌故宇文公諒字子貞其先成都人父挺祖徙吳興厯同知餘姚州事夏不雨公諒出禱輒應嵗以有年民頌之以為别駕雨攝會稽縣申明寃滯所活者衆省檄察實松江海塗田公諒以潮汐不常後必貽患請一概免科省臣從之遷髙郵府推官未幾除國子助教日與諸生辨析六經六館之士資其陶甄者往往出為名臣調應奉翰林文字同知制誥兼國史院編修官以病得告後召為國子監丞除江浙儒學提舉改僉嶺南亷訪司事元史凌懋翁字師德安吉人厯嘉興路總管勞志郯韶字九成吳興人能詩清麗溫重沈子厚亦郡人通史善為詩遊于樂府鐡崖集程郇字晉甫公許孫少有至行能文官婺源知州民懷其德致仕歸老植五栁于庭扁曰栁軒有栁退藁十卷勞志許德彰篤志于學自號潛齋纍辟不起苕霅野史黃溍字晉卿本姓丁世居吳興祖應復浙西提舉曽祖伯虎髙祖曄俱進士其父鑄育于義烏之黃母童氏夢大星墜于懷有娠二十四月始生溍元祐二年進士厯知制誥兼國史院編修官纍翰林院學士兼經筵官追封江夏郡公諡文獻溍天資介特在州縣惟以清白為治月俸不給每鬻産以佐其費及升朝行挺立無所附足不登巨公勢人之門君子稱其有清風高節如氷壺玊尺纎塵勿汙然剛少容觸物或弦急雷霆若未易涯涘一旋踵間煦若陽春溍之學博極天下之書而約之于至精剖析經史疑難及古今因革制度名物之屬旁引曲證多先儒所未發文辭布置謹嚴援據精切俯仰雍容不大聲色譬之澄湖不波一碧萬頃魚鱉蛟龍潛伏而淵然之光自不可犯所著有日損齋稿二十三卷義烏志七卷筆記一卷元史黃溍為文章如澄湖不波一碧萬頃凡朝廷大詔令多出其手京師人呼為璽口學士李材解酲語晉卿早年為湖州長興吏因簿書被箠乃棄吏發憤讀書登乙卯進士第為世名儒農田餘話牟應奎字文甫吳興人子才之孫為黃巖州判官有著政黃巖志魯琪琳烏程人為人古朴忠實詩文雄壯不樂仕進沈原昭求詩法因詩示之云三百五篇風雅頌世人能讀少人觀吟哦須得自情性雕琢返愁夭肺肝春草池塘中造化梅花香影外波瀾熟參熟究工夫到始信仙凡共一丹西吳里語吳興絶唱集史台孫吳興人厯江閩兩帥幕詳藝文沈國祥歸安人天性仁孝篤志好修少遊學浦江師事吳淵頴為髙弟揭徯斯知其名會詔修三史薦為纂修官不就隱居武康之仙臺山築一堂名曰逍遙堂優遊樂道以終其身沈氏譜蔣必勝字質甫號容齋長興人教授高郵池州厯慶元主簿至元丁亥創東湖書院捐田𨽻之至治辛酉必勝弟居仁白有司轉聞于中書得書院額益以田二百四畝祀事無闕至元乙邜蔣克明復輟田百畝歸之由是稱義門蔣氏云楊亷夫東湖書院記史博字約之南潯人博極羣書尤邃于易時元世祖求南人欲用之逺近交辟皆不就雲汀筆談金文質號聼雪翁性豪蕩力學好吟善恢諧隱居不仕長興志劉鑄字季冶長興人性素剛鯁淹貫經史幼孤鞠于伯氏比長報以父禮李潛稱為純德士平生交遊多名流讀書天竺山從學者百餘人母死廬于墓側孝心篤至有仕族欲妻以女鑄曰吾窶子而得仕族女必不肯提甕出汲以修婦道井臼之責鑄委之耶竟謝却之既歿鄉人追悼為之流涕著有燕石編傳家萬姓統譜陳潤祖東遷人宋參知政事存之孫以道德文章開發後進若太平尉趙彥恭松江教授倪子逺徽州推官吳本立衢州推官張安國皆其門人也潤祖中延祐甲寅浙江鄉舉第一仕至崑山同知孫曰鑾曰禮承家學有詩名著于時烏程新志朱爃字山甫其先吉安人祖宋進士父力修嘗館甥烏程王氏因為烏程人嶸篤學苦志元祐甲寅浙江鄉舉乙邜張起巖榜進士任長洲縣丞上徐飬素號素庵居士德清人縝密寡言笑切劘經史至老無倦仕元為翰林直學士與虞集同朝友善家居種德樂施名其堂曰積善未嘗挾富貴以驕人宋濓嘗有跋積善堂記後麻溪徐氏譜劉仲仁字彥德晚號曲肱道人讀書務實踐為詩文不事藻飾旁通堪輿之術善畫山水人物得之者寶之在稠人中嗤嗤不肯出一語中年折其肱遂以為號人皆惜其不果為世用仲仁不加戚則曰生余者天成余者天曲余肱者天緣世而寧余生者天余何憾夫天其能脫略世慮如此臧衍長興志談文禮德清人居邑南甫五齡父蚤世即知哀痛號泣纍日夜不休母潘氏矢節撫之賴以成立每伏臘享祀必思慕哭泣成禮又念母劬勞搆奉萱堂朝夕供甘旨以營色飬母亡居喪幾毁邑人閻仲彬繪圖名公題咏盈帙鄉里稱純孝博學能詩人勸之仕文禮不屑隱居終身德清新志章同字克明又字元文號橫塘邱吉吳興絶唱集韓友直字伯清號靜退老人又號介石吳興絶唱集邱輔仁字友文歸安人少不樂華靡五經百氏悉究其歸元季張氏偽平章潘元明使人召之輔仁遁至洪武初始歸張安國字世昌烏程人少有才名仕元為衢州路推官子溥字伯源國初授北平檢校永樂中纍遷文華殿大學士勞志張按嘉興志載世昌石縣尹善政碑云浙間宰令之賢必以嘉興石君為首余昔居霅上固稔聞之又閔氏譜載至順間崇順菴蘭若記亦世昌筆則世昌乃其名也張文蔚字楙實吳興人工文章嘗為楊參謀誄參謀名椿死于張士誠之難見吳匏庵志錢鼒字德鉉吳興人從楊亷夫讀書雲間一堂如破舟啜菽飲水力學不怠以古文辭名洪武癸丑冬舉明經任國子學録松江新志嚴應雷烏程人當元末擁素封之資孝行內篤仁恩外浹脫守臣之家難周故官之廩餼拯溺解厄惟日不足子震直官至工部尚書流芳録吳興偹志卷十二
