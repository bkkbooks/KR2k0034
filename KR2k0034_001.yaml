body:
  text: 吳興偹志卷一明董斯張撰帝胄徴第一陳達始家長城生丞相掾康康生盱眙太守英英生尚書郎公弼公弼生步兵校尉鼎鼎生散騎侍郎髙髙生懷安令咏咏生安成太守猛猛生太常卿道巨道巨生文讃武帝皇考也陳書陳武帝微時常遊義興館于許氏夜夢天開數丈有數人朱衣捧日而至令帝開口納焉上陳文帝梁太清初夢兩日鬭一大一小大者先滅墮地色正黃其大如斗帝三分取一懷之上武帝未貴時直閣吏史溥夢有人朱衣執玉簡自天而降簡上金字書曰陳氏五世三十四年遂凌空而上及後主降隋史溥尚在獨異志髙祖追封世子克為孝懷太子王子立為豫章王諡曰獻權為長沙王諡曰思陳書衡陽王昌薨諡曰獻無子文帝以第七皇子伯信嗣伯信字孚之為西衡州刺史及隋師渡江與臨汝侯方慶並為東衡州刺史王勇所害侯景平衡陽王昌拜長城國世子吳興太守時年十六神情秀朗明習政事髙祖遣陳郡謝哲濟陽蔡景厯輔昌為郡又遣吳郡杜之偉授昌以經書昌讀書一覽便誦明于經義剖析如流陳書南康愍王曇朗武帝母弟忠壯王休光之子也曇朗少孤有膽力善綏御武帝誅王僧辨留曇朗鎮京口紹泰元年除中書侍郎監南徐州二年齊兵攻逼建業因請和求武帝子姪為質乃遣曇朗恐曇朗憚行帝自率步騎京口迎之使質于齊齊背約遣蕭軌等渡江武帝大破之俘蕭軌東方老誅之齊人亦害曇朗于晉陽時陳與齊絶勿之知武帝踐祚猶以曇朗襲南康郡王奉忠壯王祠禮秩一同太子天嘉二年齊人結好始知其亡詔贈開府儀同三司南徐州刺史諡曰愍子方泰襲封方慶臨汝縣侯鄱陽王伯山字靜之性寬厚美風儀又于諸王最長後主深敬之每朝廷有冠婚饗宴恆使為主居喪以孝聞子君範仕隋為溫鄉令嶽陽王叔慎字子敬宣帝第十六子也十嵗能屬文時後主尤愛文章叔慎與衡陽王伯信新蔡王叔齊等日夕陪侍賦詩恆被嗟賞禎明元年出為湘州刺史加都督及隋師濟江楊素遣將龎暉略地至湘州州內將士尅日請降叔慎置酒會文武酒酣嘆曰君臣之義盡于此乎長史謝恭伏而流涕湘州助防遂興侯正理在坐起曰主辱臣死諸君獨非陳國臣乎縱其無成猶見臣節青門之外有死而已今日後應者斬衆咸許諾乃刑牲結盟遣人詐奉降書于龎暉叔慎伏甲待之暉入伏兵發縛暉等以殉皆斬之叔慎詔士衆數日中兵至五千人隋遣薛胄為刺史益請兵胄擒叔慎秦王斬之漢口按叔慎正理亦陳氏之北地王也李延夀云磐石維城嶽陽近之郡志載其略復遺遂興豫故詳著之惜哉宜黃為烈不終然賢于諸王侯逺矣陳慧紀字元方武帝從孫也涉獵書史負材任氣從武帝平侯景帝踐祚封宜黃縣侯禎明三年隋師渡江慧紀率將士三萬人沿江而下欲趨臺城遣南康太守吕肅將兵據巫峽隋楊素擊之四十餘戰隋軍死者五千餘人既而隋軍屢捷獲陳之士三縱之肅收餘衆東走慧紀時至漢口為隋秦王俊拒不得進聞肅敗偽引兵東下推湘州刺史晉熙王叔文為盟主水軍都督周羅㬋守江夏及建業平隋晉王廣遣一使以慧紀子正業來喻又使樊毅喻羅㬋上流城戍悉解甲于是慧紀慟哭而降入隋授儀同三司子正平頗有文學上新蔡王叔齊字子肅七嵗能誦六經既悟玄寂又曉詩賦入隋為國子司業常推屈原之旨著籟記三卷蓋緣氣類之動以觸身世之感上述廟社下傷宗親雖詳寓乎興替亦自見其窮愁沈志道新蔡王墓志吳興王胤字承業後主長子也後主即位為皇太子胤性聰明好學執經肄業終日不倦博通大義兼善屬文為張麗華所搆廢為吳興王入隋終長安陳亡諸王隨後主入長安並配隴右及河西諸州各給田業以處之大業二年煬帝以後主第六女婤為貴人絶愛幸召陳氏子弟盡還京師隨才敘用由是並為守宰遍于天下南史陳叔達字子聰陳宣帝第十六子也在陳封義陽王十餘嵗常侍宴賦詩十韻便就僕射徐陵甚竒之歷侍中丹陽尹都官尚書入隋為絳都通守義師至絳叔達歸欵封漢東郡公武德四年拜侍中叔達明辨善容止每有敷奏縉紳屬目江南名士薄遊長安者多薦拔之五年進封江國公常賜食御前得蒲萄執而不食髙祖問其故對曰臣母患口乾求之不能致欲歸以遺母髙祖喟然流涕曰卿有母可遺乎因賜物百假貞觀初拜禮部尚書建成元吉疾太宗隂行譛毁而髙祖惑其言叔達固諫乃止至是太宗勞之曰武德時危難潛搆知公有讜言今之此拜有以相答諡曰忠有集十五卷舊唐書陳君賔陳鄱陽王伯山子也仕隋為襄國太守武德初以郡歸欵封東陽公纍轉鄧州刺史州邑喪亂之後百姓流離君賔至才期月皆來復業天下諸州並遭霖潦君賔一境獨免太宗下詔勞之蒲虞等州戶口盡入其境入為太府少卿轉少府少監陳京字慶復宜郡王叔明五世孫父兼右補闕翰林學士京善文詞常衮妻以兄子擢第纍遷太常博士德宗在奉天聞假秀實為賊害七日不朝宰相謂方多難不宜壅萬幾京曰宰相言非也夫褒大節恤賢臣天下所以安況卓卓特異者乎帝曰善還京師擢補闕帝以盧杞為饒州刺史京劾杞固寵要位帝不聽京爭之帝大怒左右辟易京極道不可以死爭杞遂廢帝迎訪太后久不得意且怠京密白第遣使物色以求帝大悟終代不敢置帝器京有宰相才欲大用會病勿果自考功員外再遷給事中皆兼集賢殿學士新唐書宫闈徴第二公主附公主非吳興産而食邑于郡者例得書陳武宣章皇后本姓鈕父景明為章氏所飬因改章少聰慧美容儀手爪長五寸色並紅白每有期功之服則一爪先折武帝先娶同郡錢仲方女早卒後乃聘后后能誦詩及楚辭永定元年立為皇后拜后母蘇安吉縣君追封后父景明廣德縣侯諡曰溫族兄鈕洽官至中散大夫陳書文帝沈皇后武帝踐阼為臨川王妃文帝即位為皇后廢帝即位尊為皇太后時宣帝與到仲舉劉師知並受遺命輔政師知仲舉恆居禁中參決衆事而帝為揚州刺史居尚書省師知忌帝權重矯勑令還東府理州務宣帝稱疾召師知留與語使毛喜先入言于后后曰伯宗年幼政事並委二郎此非吾意喜出報帝帝因囚師知自入見后仍自草敕請畫以師知付廷尉賜死自是政歸宣帝后計無所出乃密賂宦者蔣裕令誘建安人張安國使據郡反兾因此圖帝事發被誅時后左右頗知其事后恐逮黨與並殺之宣帝即位以后為文皇后陳亡入隋大業初歸江南後主沈皇后身居儉約衣服無錦繡之飾左右近侍才百許人惟尋繹圖史及釋典為事常遇嵗旱自暴而誦釋經應時雨降無子飬孫姬子胤為已子與後主俱入長安並上太宗賢妃徐氏名惠右散騎常侍堅之姑也父孝德試擬楚辭太宗納為才人俄拜媫妤再遷充容及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫病甚謂所親曰吾荷顧實深志在早歿魂其有靈得侍園寢吾之志也因為七言詩及連珠以見志永徽元年卒時年二十四舊唐書代宗睿真皇后沈氏吳興人開元末以良家子入東宫太子以賜廣平王實生德宗天寶亂賊囚后東都掖庭王入洛復留宫中時方北討未及歸長安而河南為史思明所沒遂失后所在新唐書自武宣后以下郡志載而不詳故偹録天福八年十一月戊子吳越王元佐納妃仰氏仁銓之女也資治通鑑以下公主宋武帝第二女吳興長公主諱榮男適王偃常裸偃縛之庭樹時天夜雪噤凍久之偃兄恢排閣詬主乃免宋書文帝女長城公主適謝緯孝武帝女安吉公主適蔡約並上太祖賞佐命之功禇淵王儉等進爵增户各有差處士何點謂人曰吾作齊書已竟贊云淵既世族儉亦國華不賴舅氏遑恤國家儉母武康公主故云然資治通鑑武帝女武康公主適徐演南齊書長城公主適何敬容上武帝女臨安安吉長城三公主並有文才安吉最得令稱安吉主適王實長城主適桞偃梁書武帝女會稽公主適沈君理陳書蔡凝美容止博學有詞章以名家子選尚信義公主拜駙馬都尉文帝女侯鎮子淨藏尚世祖第二女富陽公主除員外散騎侍郎富陽公主適桞盻按淨藏尚富陽公主矣盻之適豈再降耶盻桞后弟到都彭城人尚文帝妹信義長公主官至中書侍郎出為宣城太守陳文帝長女豐安公主配留異第三子貞臣並上髙宗女樂昌公主適徐德言孟啓本事詩詳璅徴徐綜吳興人始安太守尚永嘉公主吳興統記參徐文公碑後主第六女婤見前唐西河公主降吳興沈氏後再降郭曖子汾州刺史某沈亞之郭公墓志按公主表適沈翬德清公主昭宗女唐書封爵徴第三爵隆五等昉虞夏郡人得封者書食邑于郡者書吳伐越墮會稽獲骨節専車吳子使來好聘且問之仲尼曰骨何為大仲尼曰禹戮防風氏其骨節専車客曰防風氏何守也仲尼曰汪芒氏之君也守封隅之山者也國語山汪芒長翟國名封隅在吳永安縣吳興郡禹貢揚州之域防風氏國也唐十道志楚滅越封越王無疆之子蹄于烏程歐餘山之陽為歐陽亭侯子孫因以為氏談志本路史漢文帝封東海王搖之子為顧余侯即烏程之西余山也輿地志烏程本烏程氏國秦為縣路史漢徐鴻立節校尉海西侯長城人談志錢咸林玄孫旗門將軍髙密侯長興志錢讓富春公談志沈戎封海昏縣侯辭不就宋書自敘萬豪驃騎將軍東海侯安吉志抗徐字伯徐丹陽人鄉邦稱其膽智後為中郎將宗資别部司馬擊太山賊破之封烏程東鄉侯五百户遷長沙太守後漢書度尚傳參謝承書張按文獻通考亦逸此録孫堅靈帝中平間録前後功封烏程侯吳志孫皓封烏程侯遣就國西湖民景飬相皓當大貴皓隂喜而不敢泄吳志之此西湖長城西湖也吳朱治毗陵侯徙故鄣侯子才嗣才子琬沈珩永安鄉侯沈約自敘朱然永安侯改當陽侯子績嗣吳志鈕詳富春縣侯談志鈕淑尚書令臨水侯子瑒嗣談志徐詳都鄉侯吳志孫謙永安侯吳志沈曼定陽侯沈約自敘沈矯吳立武校尉偏將軍封列侯吳志劉超臨沂人以文帝佐命功封原鄉亭侯諡忠子訥嗣晉書錢廣長城人永世縣侯宜興志參晉書丁潭永安伯晉書周玘以討陳敏定江南功封烏程縣侯子協嗣周札以討錢璯功封東遷縣周贊大將軍從事中郎封武康縣侯孔瑜建興初以討華軼功封餘不亭侯並上鈕胤東遷侯談志王􅘙字世將琅琊人元帝時為左衛將軍封武康縣侯晉書錢彌長城人豫章縣侯談志施先安吉人歷青州牧封安吉侯子彬封中蠲侯談志宋邱淵之給事中龍鄉侯談志參隋經籍志沈淵之封繁峙縣五等侯沈田子晉初封營道縣五等侯宋改封漢夀縣伯邱道護新安太守條陽侯吳興統記沈慶之南昌縣公進晉安郡公改始興郡公宋書沈法系平固縣侯沈攸之平樂縣五等侯進東興縣侯再進貞陽縣公王道隆吳平縣侯子法嗣王宜興長夀縣男沈演之吉陽縣侯沈叔慎新寧縣男子融之嗣孫暢之曾孫曅沈文耀永陽縣侯沈曇亮廣興郡公沈懷明吳興縣子沈文秀新城縣侯並上沈文季宋初封山陽縣五等伯進建安縣侯改封略陽縣侯齊改封西豐縣侯參宋齊二書姚郢五城侯後周書齊茹法亮吳興武康人永明二年以權幸封望蔡縣男南史梅蟲兒吳興人東昏時以恩幸封竟陵縣男上梁徐整直閣將軍慈源縣侯張九齡碑姚宣業吳興郡公唐宰相世系表沈約建昌縣侯子旋嗣旋子實梁書庾信字子山新野人侯景之亂奔江陵梁元帝承制除御史中丞及即位轉右衛將軍封武康侯後周書陳武帝初封長城縣侯進封義興郡公陳書陳文帝初封長城縣侯梁散騎常侍平圮將軍兖州刺史長城縣公陳道談梁侍中驃騎將軍南徐州刺史武康縣侯陳休先道談武帝兄後封始興王休先武帝弟後封南康王休先一作休光陳胡頴字方秀漢陽侯子六同嗣東遷人六同文獻通考作商錢道戢字子韜永安侯長城人子邈嗣周文育封東遷縣侯章昭達字伯通封欣樂縣侯改邵武縣侯進邵陵郡公子大寶嗣位豐州刺史沈法深封建城縣侯子欽孫觀嗣沈君理初封永安亭侯賜爵望蔡縣侯諡貞憲章景明封廣德縣侯本姓鈕明盛將軍原鄉侯沈炯諡恭東興侯沈恪諡元子法興嗣並上章道勇封原鄉縣侯談志張按章昭達父名道蓋勇疑當作蓋後周姚僧垣北絳郡公子察察弟最嗣後周書唐吳興郡王淑順宗孫唐書錢九隴字永業郇國公改封巢國公上徐堅慈原縣子進縣伯再進東海郡公張九齡碑陳叔達漢東郡公進江國公唐書徐嶠慈源縣公談志姚思亷豐城縣男舊唐書陳君實東陽郡公上姚惲待寶郎襲豐城縣公思亷子系唐宰相世表陳岌武帝裔長城公上義寧初光祿大夫李神符封安吉郡公舊唐書杜淹封安吉郡公張按唐設州而郡廢安吉又古縣名也此系郡公于安吉之下殊不可曉沈琳睿真后曾祖封徐國公姚班纍封宣城郡公姚璹吳興伯諡成姚崇初封梁縣侯進封梁國公朱克融幽州節度使檢校司空吳興郡王廣明三年邠寧節度使朱玫進封吳興侯並上沈叔明武康人潭州都督封吳興郡公西吳里語昭宗大順元年八月制加錢鏐吳興郡開國男吳興偹史吳越錢偡吳興郡王見談志寺院下别見郡守宋慶元二年三月己亥進封弟柄為吳興郡王黃疇若字伯庸豐城人將作監丞許奕字成之簡州人校書郎並兼吳興郡王府教授見宋史王炎亦吳興郡王教授見新安文獻志穆陵既正九五皇兄濟王竑出判宛陵辭不就史彌逺以其有逼近之嫌徙寓于霅城西寶慶元年潘甫起兵尋事平史彌逺遣其客余天錫來遂縊于州治之便室貶王為巴陵縣公夫人吳氏賜度牒為女冠移居紹興癸辛雜識德祐二年詔濟王特封鎮王賜諡昭肅宋史趙伯圭字禹錫嗣秀王後判大宗正事超拜太師寧宗詔贊拜不名追封崇王諡憲靖師揆字元輔歷升節度使檢校太保開府儀同三司襲封贈太傅澧王諡恭惠師禹至開府儀同三司襲封贈太傅和王諡端肅師嵒師彌與澤與檡相繼嗣封彌至保寧軍節度使纍遷太傅與澤贈少師追封臨海郡王與檡為浙江閩廣察訪使宋史孟彥弼贈太師吳興郡王洛州人昭慈聖獻皇后母弟也孫覿秦國夫人墓志沈該歸安縣侯進吳興開國公玉堂雜記施巨文安郡開國侯安吉州志沈振字發之錢塘人長興縣男萬善同歸序參雲巢集沈括字存中錢塘人長興縣男沈括除翰林學士笏記沈遘字文通振從子長興縣開國伯西溪序沈起字興宗闕二字人長興縣男沈括集周淙長興縣男宋史新編葛立方越國公陳正齋集葛邲廣陵郡開國公上孟珙初封漢東郡公進封吉國公宋史珙父宗政寓吳興丁勝封濟陽侯烏青志吳淵封金陵郡侯進爵為公吳潛封許國公李彥頴吳興郡公談志德清學盧革濮陽縣開國子吳郡文粹劉岑吳興郡開國侯金陵梵剎志詳書畫徴曾炎家德清曲阜縣開國男進封子詳寓公錢象祖吳興郡開國公真西山集象祖即與史彌逺殺韓平原者邢煥字仲文開封人詔以其女為康王妃王即位封德清縣開國子宋史凌時中吳興郡侯勞志孟淳贈吳興郡公勞志黃鑄追封江夏郡公黃溍追封江夏郡公詳人物王伯顔至正巾贈太原郡侯子禎襲元史趙師垂趙希永纍贈吳興郡公孟俯祖元史趙與訔贈吳興郡公加封魏國公趙孟俯贈魏國公諡文敏並上陸垕字仁仲江隂人贈吳興郡侯諡莊簡南畿志程繩翁郇父封烏程縣男黃溍集竒塔特章厯事四朝封德清王學海耿炳文長興侯開國功臣録徐理西平人封武康侯河南通志施史君縉雲人吳興郡公吳興備志卷一
