body:
  text: 吳興備志卷三十一明董斯張撰詭徴第二十五之二芮曄初任仁和尉長河堰有龍王廟每祭則有小蛇出或上香爐或飲於杯往來者謹事之堰嵗數壞人以為龍所為芮疲於修築之役一日焚香設奠蛇果出爐上芮端笏數之曰有功於民者乃得祀龍廟食於此未嘗有功而嵗數壞堰勞民之力為罪多矣無功有罪於國法當殺即舉笏斬之應手碎是夕宿於近地疾風甚雨大木盡拔土人大恐而芮處之自若後卒為名臣云齊東野語太湖漁者陸氏子舉網得蟹如斗大以􅚺剪其網皆斷陸怒欲烹之其侣老於漁者曰不可吾聞龜蟹之殊類甚者必江湖之使也烹之不祥乃釋之蟹至水橫行里許方沒陸肱蟹譜嗣秀王伯圭為安僖卜宅兆銜哀走數百里惟烏程之菁山最佳卜之而吉然念力不能致徘徊其處一叟忽前曰官豈姓趙而欲求葬地乎王矍然曰汝何以知之叟曰嘗夢神告我矣指所卜之地以售今寢園是樓鑰崇靖憲王行狀淳熙間烏鎮西利濟院有道人祝道誠者頗有行誼死之日見夢於鎮人黃岩縣縣丞顧元龍曰我當為公之子但公無家眷於此吾故托生黃岩民項氏家元龍夢覺甚竒之翌日訪之民有項氏婦果於是夜産一男産婦將就褥時亦夢一神人謂曰所生者非汝子當為顧縣丞嗣於是元龍遂收項氏子為己子以其生於岩邑故名之曰岩及元龍任滿歸其徒又夢神謂曰爾師明日未時歸可至通河橋相候其徒如期而往遇元龍元龍因道其事岩生之日即道誠之死期也岩後仕至禮部尚書烏青志淳熙中有錢三翁者衣衲茹素脅不沾席者五十年俗呼布衲翁時德清建阜安橋屬主其事一夕謂其徒曰翌朝有餽醬謹視之明日果有青坡村民獻醬二甕探之得銀二笏以充橋費人異其前知常摩挲橋曰此可過五百年寶慶丁亥秋震風凌雨民廬寺觀多壞此橋屹然中流片石不搖齊東野語長興縣有老嫗採桑次被虎銜入深谷中不傷之其虎就將蹲自旦至午嫗告曰某之年邁莫有宿業否今困於此又不食乞大聖念之呼虎為大聖虎遂伸一腳於嫗前看之有一竹籖在爪下嫗曰莫要去耶虎掉尾點頭似相感之狀嫗乃為拔之虎迅躍數四却銜之舊所並無損至夜置一鹿於門首去葆光録太湖之間村民耕耘之暇多事網釣以甘口腹獨沈文寶家全家好善用錢買所獲之禽魚放焉衆笑其癡沈獨為喜後值疫疾人有夢見疫鬼執旗一束自相語曰除沈家放生外餘排門並可插旗其居民三百餘家皆染疾死者過半獨沈全家獲免後享髙夀而卒好生録劉誠意伯溫元時常館於歸安花城沈氏每夜有妖化一女子來就之劉知其妖紿曰汝欲為夫婦必擇日具酒乃可耳因與訂期劉謂其徒曰今日有客來可具酒肴待之然其人蹤迹甚竒勿窺瞷至夜妖果至劉與共酌強之痛飲妖醉先就枕酣睡口中吐出一物精光耀室內劉取而吞之妖驚覺泣曰我養此丹己八百年矣欲得子精氣成上仙耳今為子所食子必為王者師我逝矣然我與子有恩明日可至某所吊我劉次日依其言往焉有一雉死於草莽間劉為瘞之劉自是神智倍常後果佐太祖髙皇帝定天下焉西吳里語慈感寺前橋曰湖音水清徹有蚌浮水面吐珠人皆見之每風雨即有蛟龍來攫永樂中夏忠靖治水至湖宿寺中夜有神黑衣白裏率一美女來見公不為動徐訴曰久窟於此嵗被鄰豪欲奪吾女若得大人一字為鎮彼即懾服不敢動公書一詩與之中有蚌傾心之句神拜領而去未幾公至吳淞江有金甲神來訴曰聘一鄰女已久無賴賺大人手筆抵塞不肯嫁請改判公張目視之金甲神甚怖冉冉而退公因悟曰是矣慈感蚌珠之仇也牒於海神次日大風雨震電有一蛟死於錢溪之北文皇方有偵卒報知及還朝問狀對曰此皆陛下威德百神效靈聽命臣何敢與上甚悅楊文貞請録付史館上不許萬厯己亥余遊太和至荆州文貞六代孫現為兵使者對余言如此湧幢小品忠靖全聨貝葉曉翻龍側耳珠光夜吐蚌傾心宿寺詠也吳興唐訓科廣嘗得周公謹所著癸辛雜識見載方回事惡周之薄作一絶句解之其夜夢一丈夫曰吾宋方回也杭人周密與豫有場屋之隙作書痛謗豫何以雪寃二百年後賴有子知我幸終為白之唐唯唯而寤詰旦有人送瀛奎律髓至實虛谷所編也唐曰此殆方君報我耳祝子志怪録閔莊懿入郡齋讀書東楹忽疾風迅雷大雨如注衣領皆濕移書就西楹未及展誦忽震雷擊碎東楹棟瓦無一遺者公獲無恙天順癸未公赴會試文場恍惚若有神助公以早投卷不與難二事皆異之名世類苑成化間差錦衣衛官王瘤子下江南取寶湖有陳姓者家有一鐵笛一室中吹之則一室中蠅蚋俱遁為王取去西吳里語王雨舟名濟湖之烏鎮市人也其父王翁家巨富而性吝無子其家臨市河傍有市橋久廢矣一日有老僧至門以修橋為請怒叱數四其請益堅翁曰汝以市中募緣吾當為主僧不肯必欲翁一力成之不得已而諾焉費之百金成焉仍建亭橋側俾僧居之僧戒律清苦時時與翁往來笑語甚相得也居且十年時翁側室有妊將就館矣一夕翁夢此僧踉蹌進門徑入閨中翁夢中大怒追逐遂醒而內室啼聲聞矣舉家大喜天明得外報云僧於半夜坐化於亭中翁大驚因命其子曰濟蓋取義於橋也雨舟後官橫州别駕詞翰俱佳亦無子性坦夷有大度窮極聲色富樂終身與余先君交善此其所自言也碧里雜存湖州凌漢章成化間針術神靈擅名吳浙嘗謂豫先子從吾翁曰昔曾於市中見一丐者形軀長大而凶惡面頰天生一手掌痕有十餘丐者從之既去問於主人主人曰此丐姓聶父聶某原為司務之官因早朝從行吏失擕笏板怒甚掌其面遂仆地死後家居其妻有娠忽一白日見前吏入門徑入其室已而妻生一子掌痕宛然在面父已心知之矣始能言即有報仇之語比長日以殺父為事父謹防之幾被其弒者屢矣夫妻相議逃避竟不知所往其子遂縱酒色為非將家業費盡而為丐云凌時感其事作詩記之曰平生不信有隂魂丐面而今見掌痕寄與世間君子道莫教結怨種寃根上𢎞治癸丑湖州俞氏敷演梨園飲客酒罷有二青衣持燈至曰吾乃嚴尚書府中召汝今夕演戲隨以白金半錠授之諸優如召從至一大厦雕梁畫棟席間章縫畢集惟飲食殊不可啖主公命云今夕宜演趙盾故事直未許鳴金諸優演罷久之未曉復睡一覺乃一古廟試以白金視之冥錠也或曰國初嚴尚書舊遊地也西樵野記溪亭嚴公謁選銓曹名次已在知縣推官之列但不知何地一夕夢其家僮與其兄之僮同舟䈒泥相爭蓋湖人䈒以壅桑地者公急乘一採菱圓木桶浮至其所各量取泥一半而覺比榜出乃袁州府分宜縣也見聞紀訓正德八年四月二十六日湖州西門外漁人罾內得一魚長三尺許頭似鮎魚黑身大口無鱗似黑鯉魚四足二足近腮二足尾如青蛙之足不知何物自是連日大風雨洪水泛溢十二月初六至二十日湖州大雪約共丈許溪河凍氷厚尺餘人船不能行者半月餘苕記歸安姚石林先生邦材嘉靖壬午鄉薦時先外祖尚未生也夢人謂之曰君與嚴杰同舉進士注意訪求一日探壻屆驥村入孰中閲童子籍見先外祖名驚異因撫其首曰我安能待乎後果同登又嘗書夢齋􅐼曰火燒狗尾幸在庚戌梅聽録嘉靖戊子秋南潯鎮有錢珂者其妻産一男六七日而死以火焚之有骨一片不化因共觀之上有宰相二字長半寸有餘字如圖書刻出陽文四圍復有邊欄端楷整齊人人傳示苕記虞長孺辛巳嵗就潘公子聘讀書毗山長孺持齋禮梁皇懴衆戀其誠皆來共禮至夜懴本不收但闔户而散比明長公子啓戶先入見五色香雲四合驚呼諸弟共視長孺後入猶見一角未散柱棟露積如凝珠衆共嘗之其味各别長孺所嘗獨淡快雪堂集金龍大王姓謝名緒建祠洪上隆慶間大司空潘季馴督漕河河塞不流司空為文責神河塞如故會司空有書史以事過洪天將暮遇五伯擒以見神神坐廟內詰問書史曰若官人胡得無禮河流塞亦天數也豈吾為此厲民為語司空吾已得請於帝河將以某日通矣若掌書不敬當罰書史訴不得受撲去以告司空已而河果以某日通於是司空祗事不敢不虔馬元成集湖州董尚書潯陽公得姑蘇某家山石髙五丈連巨舟載歸至震澤舟沉墮水中公募善泅者摸石盛在一大石盤止盤可合五人抱公甚駭異命數百人次第皆起之而以石置盤孔毫末湊洽蓋即當時以盛石者而某家亦不知其所始耳談餘干李公頥為湖州守前守有卒於官者久而為厲前後太守率避中堂不敢居然無如之何李至處之不疑居數日怪輒出李有所見亟命灑掃一室四圍封護極密止留一户出入乃盛具筵室中招之是日李盛服具賔主禮望空酬對揖讓就坐對飲久之李忽出戶即隨手反扃以泥塗隙處而以太守印章封之數重嚴戒家人不得開自此終李之世怪不復出麈餘金澤寺側有葉販者嘗遊寺中見一羅漢背有一孔手探之得金字金剛經一卷持之吳門識者曰此松雪真迹也即以二十金買之販者乃悉破羅漢背取之遂成富室忽患痢脫肛蹲踞田畔有猛犬忽來銜其肛拖出腸而死佛亦有靈哉雲間雜記吳興備志卷三十一
