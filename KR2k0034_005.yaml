body:
  text: 吳興偹志卷五明董斯張撰官師徴第四之四潘慎脩字成徳莆田人歴知湖梓二州淳化中祕書監李至薦之命以本官知直祕閣慎脩善奕棋太宗屢召對奕因作棋說以獻大扺謂棋之道在乎恬黙而取舍為急仁則能全義則能守禮則能變智則能兼信則能克君子知斯五者庶幾可以言棋矣因舉十要以明其義太宗覧之稱善歴兩浙廵撫副使宋史齊廓字公弼㑹稽人舉進士歴知明湖舒三州積官光禄卿廓寛柔恭謹人犯之不校弟唐為吉州司理參軍嘗與賢良方正對䇿入等越州蔣堂奏廓及唐父母垂老窮居鄉里二子委而之官唐復久不歸省于是罷唐令歸侍養廓方使湖南雖置不問然士論薄之宋史丁度字公度祥符人累遷中書舍人時葉清臣請商州置監鑄大錢以一當十度奏曰漢之五銖唐之開元及國朝錢法輕重大小最為折衷歴代改更法雖精宻不能期年即復改鑄議者欲䋲以峻法革其盗鑄昔漢變錢幣盗鑄死者數十萬唐鑄乾元及重輪乾元錢錢輕幣重嚴刑不能禁止今禁旅戍邊月給百錢得大錢裁十不可畸用舊錢不出新錢愈輕則芻糧增價臣嘗知湖州有扺茶禁者受千錢立契代鞭昔在京西有盗殺人取其敝衣直不過數百錢盗鑄之利不啻數倍何以禁止度叅知政事諡文簡宋史楊紘刑部郎中至和元年十一月視事轉兵部郎中談志紘字望之浦城人億從子為億後用廕補官歴江東轉運按察使屬嵗饑開倉賑濟之吏持不可紘曰義倉為民也稍稽人將殍矣紘用法嚴急與王綽王鼎號江東三虎官至太常少卿平生集書數萬卷手抄寔事名窺豹篇宋史八閩志王鬷字總之趙州人曹利用得罪鬷以所厚出知湖州歴叅知政事知樞宻天聖中鬷嘗使湖北見曹瑋謂曰君異日當柄政願留意邊防鬷曰何以敎之瑋曰嘗使人覘元昊狀貌異常他日必為邊患鬷未以為然比再入樞宻元昊反帝數問邊事鬷不能對及西征失利議刺鄉兵又久未决鬷出知河南府始嘆瑋之明識贈户部尚書諡忠穆宋史章岷字伯鎮司馬温公有送章伯鎮知湖州詩江鄰幾有晩赴館宿覩吳興太守章伯鎮題壁記詩岷以集賢校理知湖州談志岷浦城人舉進士與范仲淹同賦鬭茶歌岷詩先就仲淹覧之曰此詩真可壓倒元白官至光祿卿八閩通志刁衎字元賔冀州人大理寺丞獻文四十篇召試授殿中丞通判湖州歴比部員外郎充崇文院檢討宋史衎後知湖州見郡志胡宿字武平晉陵人知湖州歴樞宻副使太子太師諡文恭宿清謹忠寔内剛外和羣居不譁笑言必思而後對故臨事重慎不輙發發亦不可囬止居母䘮三年不至私室少與一僧善僧有祕術化金石為黄金且死將授宿使葬之宿曰後事當盡力他非所冀也宿知湖州前守滕宗諒大興學校費錢數十萬通判寮吏皆疑以為欺不肯書歴宿誚之曰君輩佐滕侯久矣苟有過曷不早正乃隂拱以俟其去而非之豈昔人分謗之意乎坐者大慚謝其後湖學為東南最宿之力為多西吳里語嘉祐中鮑軻知湖州購秀州田十頃為學糧嵗可食百員顧臨湖學田記軻永嘉人歴太常少卿葉水心鮑清卿墓志徐起字豫之鄄城人舉進士終知湖州有善政宋史馬尋鄆州須城人歴兩浙轉運使歴知湖州州饑人或羣入富家掠囷粟獄吏鞫為强盗尋曰此脫死耳情與强盗異奏得減死論著為例終司農卿浙江通志馬尋字子正祥符初進士授吳江簿兄彛戒之曰到任半載可誦律書為治民之本後彛至縣詰之荅曰治在孔道疲于賔餞未暇及也彛不恱尋曰少緩期諷之至冬果精律學繼登朝籍久叅法寺有平允之譽累著治聲彛之力也姑蘇志謝泌字宗源歙州人少好學有志操第進士累遷殿中丞獻所著文十篇古今𩔖要三十卷召試中書直史舘進銀䑓司出知湖州歴太常少卿判吏部銓卒年六十三泌性端直為政有恵愛頗好方外之學疾革服道士服端坐而逝宋史張昷之字景山滌人進士及第歴河北轉運使保州卒殺通判石待舉為亂昷之自魏馳至城下召諸將部分攻城平之後以事被謫歴知湖州以光祿卿致仕昷之善吏事所至有聲宋史鮑當以職方員外郎知湖州有清風集一卷談志鮑當善為詩景徳二年進士第及為河南府法曹薛尚書映知府事當失其意初甚怒之當獻孤雁詩天寒稻粱少萬里孤難進不惜死君庖為帶邊城信薛大嗟賞不復以掾屬待之温公詩話張田字公載澶淵人歐陽脩薦其才歴提㸃湖南刑獄唐介與司馬光狀其傾險改知湖州歴直龍圖閣知廣州田伉直自喜好嫚罵氣陵其下然臨政以清作欽賢堂繪古清刺史像日夕師拜之蘇軾嘗讀其詩以侔古亷吏云宋史盛申甫司封員外郎集賢校理嘉祐三年十月視事五年十月罷治平二年五月再任談志申甫餘杭人叅政盛度子嘗為福建轉運使頗以修潔稱宋史新編陳亞字亞之揚州人慶厯三年以金部郎中知湖州仕至太常少卿近世滑稽之雄也嘗著藥名詩百餘首行于世若風月前湖近軒忩半夏凉棋怕臘寒呵子下衣嫌春暖宿紗裁及贈祈雨僧云無雨若還過半夏和師晒作葫蘆羓之𩔖極為膾炙亞嘗言藥名用于詩無所不可或曰延胡索可用乎亞朗吟曰布袍袖裏漫懷刺到處遷延胡索人此可贈游謁窮措大聞者莫不大笑青箱雜記迂叟詩話叅談志亞喜蓄書家蔵數千卷見青波雜著亞詩如浪平天接影山盡樹囬身皆深得作者之格又有惜竹詩云出檻亦不剪從敎長瘦叢年年當盛夏葉葉是清風句清格老皆此𩔖墨客揮犀龎籍字醇之武城人仁宗朝歴同中書門下平章事以使相出知湖州累封潁國公諡莊敏籍曉律令長吏事治民頗有恵愛宋史按籍之守湖僅載沈括夢溪筆談及攷仁宗紀第云皇祐五年龎籍罷知鄆州籍本𫝊復云歴知并州青州秀州闕州初未言涖湖也然存中嘉祐二年登第莊敏事其所目擊者又家錢唐去吳興僅百里寜有父母之邦而紀載舛錯乃爾豈托克托輩脩史時删之耶唐淑問字士憲江陵人介子也第進士擢監察御史裏行歴數中丞滕甫之短神宗以為邀名出刺復州歴知湖州哲宗立司馬光薦其行已有恥召為左司諫宋史滕宗諒字子京河南人舉進士累遷左司諫坐言宫禁事降知信州徙湖州問民疾苦省視風俗請胡瑗為敎授歴天章閣待制知蘇州宗諒尚氣倜儻自任及卒家無積財所涖州喜建學而湖州最盛所著有諫疏二十餘篇宋史宗諒在湖州進柑子詩仁宗賜奬諭勅書談志陳侗字成伯太常博士集賢校理知湖州東林山志侗莆田人富弼知汝州辟侗從事官至寳文閣待制八閩志孫覺字莘老髙郵人熈寜二年詔知諫院王安石早與覺善驟引用之將援以為助青苗法行覺條奏其妄安石覧之怒出知廣徳軍哲宗即位遷右諫議大夫論宰相蔡確韓縝進不以徳擢御史中丞紹聖中以元祐黨奪官徽宗即位復之宋史莘老至嵗適大水湖人饑將相率亡去莘老大振廪勸分躬自撫循勞來出于至誠富有餘者爭出粟以佐官所活不可勝計墨妙亭記薛文忠集李常字公擇建昌人熈寜中為右正言疏言均輸青苗歛散取息傅㑹經義何異王莽猥拆周官片言以流毒天下安石見之遣所親宻諭意常不為止落校理通判滑州元豐中詔遷禮部侍郎哲宗立進户部尚書所著有文集奏議詩𫝊元祐㑹計録常與孫覺齊名俱受知呂公著其論議趨舎大略多同宋史常與覺皆知湖州歴中丞常黄庭堅母舅覺庭堅婦翁尤可異也公擇在吳興政尚寛簡日與賔客笑咏吏民安樂之郡以大治秦少游李公行狀陸元光字䝉老長興人熈寜中進士歴吳興知州軍事朝奉大夫集賢院學士提舉南京鴻慶宫東林山志叅西吳里語余中字行老宜興人熈寜五年偕兄貫試禮部中領選而貫黜請自黜以薦兄有司雖不許而士論嘉之次年魁廷對紹聖三年使金還奏河朔城隍墮圯乞從宻院行下葺治以戒不虞宣靖間金人長驅直入城守多不固議者始思其言以霅川守致仕宜興志章惇字子厚浦城人父俞徙蘇州惇初生時父母欲不育浸以水盆後復育之熈寜初王安石恱其才為三司使吕恵卿去位鄧綰論惇同惡出守湖州嘗以詩寄東坡坡用其韵和之曰方丈仙人出淼茫髙情猶愛水雲鄉云云絳闕雲䑓總有名應須極貴又長生云云前一詩言其出𣺌茫而終貴顯後一詩言其好爐火而餌茯苓皆善謔也子厚得詩不樂數日宋史叅菊坡叢話全詩入藝文王異司封郎中充秘閣校理治平四年七月視事談志王介性輕率出守湖州荆公以詩送之云吳興太守美如何桞惲詩才未足多遥想郡人迎下擔白蘋洲渚正滄波其意以水值風起波也介喻其意遂和十篇盛意而頌于荆公其一曰吳興太守美如何太守從來惡祝鮀生若不為上柱國死時猶合代閻羅荆公笑曰閻羅見闕請速赴任東軒筆録介字石甫常山人性强記負直氣累官至祕閣校理與安石甚欵未嘗降意相下初安石屢召不起後受學士之命介以詩寄之有云草廬三顧動春蟄蕙帳一空生曉寒盖有所諷云石林詩話蘇軾元豐二年己未年四十四嵗四月二十日到湖州五月五日同王子立子敏及兒子邁徧遊湖城小城看荷花作詩是月過賈耘老水閣作詩又次前韵耘老少伎號雙荷葉作詞又至黄龍洞祈雨七月七日作文與可畵篔簹偃竹記是月何大正舒亶李定言公作為詩文謗訕朝政國子博士李宜之狀亦上七月三日進呈奉㫖送御史䑓勘二十八日皇甫遵到湖州追攝過南京張文定公上劄范蜀公上書救之郡人懐徳作消灾道塲東坡年譜皇甫遵追攝蘇軾軾在告祖無頗權州事孔平仲謹苑詳𤨏徴唐詢字彦猷錢塘人以父肅任為將作監主簿天聖中詔許天下士獻文章應詔者百數有司第其善者詢數人而已詔賜進士及第知長興縣工部員外郎直史舘知湖州歴知制誥以叅知政事曾公亮親嫌出知蘇州從杭青二府進翰林侍讀學士進給事中贈禮部侍郎詢晩改節知湖州納官妓為妾好蓄硯著硯録子坰宋史唐坰字林夫元祐八年以左朝散郎知湖州談志叅樓㵸䟦唐林夫父子帖唐坰以父任得官熈寜初上書云秦二世制于趙髙乃失之弱非失之强神宗恱其言又云青苗法不同宜斬大臣異議如韓琦者數十安石尤喜之薦使對賜進士出身為崇文校書上薄其人除知錢塘縣安石欲留之乃令鄧綰薦為御史遂除太子中允數月將用為諫官安石疑其輕脫將背已立名不除職以本官同知諫院非故事也坰果怒奏二十餘疏論時事皆留中乃因百官起居日叩陛請對至御座前搢笏展疏目安石曰王安石近御座聽劄子大聲宣讀凡六十餘條大畧以安石専作威福曾布等表裏擅權天下但知憚安石不復知有陛下王珪曲事安石無異厮僕且讀且目珪珪慚懼俯首元絳薛旬陳繹安石頥指氣使無異家奴張琥李定為安石爪牙張商彛乃安石鷹犬至詆為李林甫盧杞上屢止之坰慷慨自若讀已下殿再拜而退侍臣衛士相顧失色閣門糾其凟亂朝儀貶潮州别駕鄧綰申救之且自劾繆舉安石曰此素狂不足責改監廣州軍資庫王安禮字和甫臨川人安石弟直集賢院出知湖州歴尚書左丞安禮偉風儀論議明辨頗以經綸自任而濶畧細謹常救蘇軾之獄劾舒亶䇿徐禧必誤國沮李憲節度宋史刁約字景純天聖中進士蘇子瞻有答湖守刁景純書載藝文約康定中與歐公同在舘閣修禮書後直史舘浩然有山水志掛冠而歸築室潤州號藏春塢日游息其中東坡題云年抛造物甄陶外春在先生杖屨中氏族大全景純與東坡同年舉進士熈寜中為於潜令軾倅杭時行縣為賦野翁亭詩云有我來觀政問俗謡皆云吠犬足生氂之句其行政恵利可見杭州府志閭邱孝直字公顯元豐中知湖州嘗知黄州後致仕居吳中東坡有水龍吟詞贈之談志叅東坡全集孝直一作孝忠見坡詩集註晁補之字無咎鉅野人舉進士第一神宗閱其文曰是深于經術者元祐初遷校書郎知湖州歸葬因自號歸來子補之文章竒卓出于天成尤精楚詞集屈宋以來賦咏為變離騷安南用兵著罪言一篇議者以為通逹世務宋史林希字子中長樂人元祐元年以集賢修撰知湖州歴同知樞宻院事諡文節宋史叅談志林氏野史八卷林希撰希不得志于元祐起從章惇甘心下問遷西掖草諸賢謫詞者也而此書記熈寜元豐以來事頗平直不類其所為或言此書作於元祐之前其後時事既變希亦隨之書藏不毁久而時事復變其孫懋于紹興中始序而行之耳文獻通考馬瑊字忠玉荏平人元祐中兩浙提刑歴湖北憲副紹聖三年知湖州劾禮部侍郎朱服罷之累知荆州黄庭堅自蜀出峽與瑊相從歡甚多酬唱庭堅與趙挺之有怨挺之執政庭堅覊置宜州瑊坐庭堅善置海州瑊一作珹忠一作中宋史叅談志黄山谷年譜欒城集西掖誥詞墨莊漫録張按忠玉以山谷故逺謫行中之竄亦坐從子瞻游瑊之彈服殆兩賢相厄哉王安上宣徳郎紹聖元年視事談志安上字純父安石第七弟見曾鞏王益墓志王安石㳺褒禪寺記安上嘗守和州見黄庭堅與郭英發書又歴江東提刑見東軒筆録按東都事畧王安石弟安禮以直集賢院出知湖州未知訛安上于安禮抑兩人皆知郡事而並𫝊歟候攷之吕嘉問字望之夀州人崇寜元年以中大夫知湖州歴户部侍郎龍圖閣學士宋史叅談志嘉問公弼從孫附安石惇卞致髙位吕氏號為家賊吕嘉問提舉市易務三司使曾布劾其違法荆公惑黨人之說反以罪三司布既罷朝請而嘉問治事如故劉邠聞而嘆曰豈應曾子避席望之儼然章綡字子上浦城人樞宻楶之子也第進士為户部員外郎中書侍郎劉逵之妻綡姨也逵漸復元祐之政綡多賛之蔡京欲擠逵且惡綡不附已使其黨攻之出綡湖州及京復相遂興制獄綡一門流竄張商英入相始辨其寃仕終龍圖閣直學士所著有蜀漢書浩堂類藁行于世宋史叅鴻慶集建寜志章援浦城人惇子知湖州終校書郎宋史叅談志援字致平嘉祐四年進士見東坡荅書張詢字仲謀浦城人元祐中以佐朝請郎視事嵗饑命司録邊裕賑之全活甚衆詳曹希下蘇軾嘗過吳興偕劉景文輩㑹碧瀾堂軾為賦六客詩遂以六客名堂焉談志蘇文忠集姑蘇志徐鐸字振文莆田人熈寜九年進士第一紹聖末以給事中直學士院蹇序辰建議編類元祐諸臣章牘事狀詔鐸同主之凡一事施行文書摭拾附著纎悉不遺遷禮部侍郎徽宗立御史中丞豐稷論鐸編類事狀率視章惇好惡為輕重存沒諸臣横罹竄斥序辰既放歸田里鐸之罪不在其下詔落職知湖州崇寜中拜禮部尚書宋史豐稷字相之鄞人元符元年以龍圖閣待制知湖州歴工部尚書嘗論蔡京曾布奸狀舉司馬光吕公著配享哲宗京得政除名徙建州髙宗朝追復學士諡清敏初文彦博嘗品稷似趙抃及賜諡皆以清得名稷三任言責每草疏必宻室退多焚藁未嘗以時政語人云宋史叅談志葛勝仲字魯卿丹陽人歴國子祭酒再知湖州時羣盗縱横聲摇諸郡勝仲修城郭治戰艦閲士卒賊知有偹引去嵗大饑發廪賑之民賴以濟宋史勝仲歴太常卿承詔續太常因革禮三百卷諡文康一統志梁端朝請大夫直祕閣建炎元年到任二年正月捕獲叛兵特恩轉中大夫三年以協助勤王陞直龍圖閣談志曾紆字公卷南豐人有志節建炎間常力勸湖州郡將梁端起兵勤王官至直寶文閣知衢州一統志曾紆工詩詞號空青先生布第四子也汪彦章志其墓云公才髙識明悟及書史為家賢子弟以文章翰墨風流藴籍為時名勝以精明强力見事風生為國能吏氏族大全盧秉知渭州守邊久以父老乞歸移知湖州未至復詔還渭宋史詳人物徴宇文時中紹興六年十一月以左中奉大夫直寳文閣視事談志時中蜀廣都人兄左丞粹中樞宻虚中時中賜進士第後以直龍圖閣知漢川費著蜀氏族譜鄭滋字徳象福州人知湖州郡志趙明誠靖康二年秘閣修撰知江寜府仍兼江南東路經制使改湖州應天府志明誠字徳甫宻州諸城人故相挺之之子也所蔵三代彛器及漢唐前後石刻為目録十卷辨證二十卷紹興中其妻易安居士李清照表上之洪适𨽻釋易安有祭湖州文云白日正中嘆龎翁之機㨗堅城自墮憐杞婦之悲深四六談麈嘗怪徳甫歴官二千石好古博雅史不立𫝊又不附其父清憲公僅于李格非𫝊後因妻以見名建炎己酉被㫖知湖州郡志莫攷復從易安金石録後序祭湖州文及應天府志知之豈以未嘗蒞任乎何湖州之文名灼人耳目也雖然有妻能文免仝秋草嗜竒者得焉更侈為勝談也元衢周常字仲脩浦城人熈寜六年進士第以所著檀弓義見王安石安石稱之補太常博士歴中書舍人禮部侍郎蔡京用事不能容以寳文閣待制出知湖州尋奪職八閩通志建寜府志李光字泰發上虞人知湖州歴吏部尚書叅知政事秦檜以親黨鄭億年為資政學士光于榻前面折之因曰觀檜之意欲盗弄國權懐奸誤國不可不察檜大怒明日光引去髙宗曰卿昨面叱秦檜朕退而嘆息方寄卿腹心何乃引去光曰臣與宰相爭不可留章九上除資政殿學士後安置瓊州孝宗朝諡莊肅光有易𫝊十卷宋史陳與義字去非洛人知湖州髙宗如平江拜翰林學士尋叅知政事時趙鼎言中原有可圖之勢宜便進兵上曰今梓宫與太后淵聖皆未還若不議和則無可還之理與義曰若和議成豈不賢于用兵萬一無成則用兵必不免既而從帝如建康扈蹕還臨安以資政殿學士再知湖州提舉洞霄宫與義平居謙以接物然内剛不可犯其薦士于朝退未嘗以語人士以是多之宋史陳與義紹興二年轉大中大夫知湖州陛辭上勞問甚渥且云姑遂雅志行復用卿矣于是公疾益侵遂請閒是年十一月薨于烏墩之精舍詔贈特進令有司給葬事葬湖州歸安縣上强里之岩山張嵲陳君墓志銘常同字子正臨卭人紹興初乞郡得彬州召還首論朋黨相攻豢成禍患今國歩艱難而分朋締交背公死黨者固自若也上曰朋黨亦難破對曰朋黨之結盖緣邪正不分但觀其言行之寔察其朋附之私則邪正分而朋黨破矣四年除中書舍人史館脩撰先是同嘗上疏論神哲二史悉出一時奸人之論望精擇史館修定上嘉納至是命同修撰七年擢御史中丞顯謨閣直學士知湖州宋史同在湖州郡有賢明之謡復召請祠貧無立錐寄居海鹽天寧僧舍十年自號虛閒居士卒贈少師諡忠毅海鹽志朱勝非字藏一蔡州人建炎中同中書門下平章事時員外郎江端友請營宗廟議者謂國家期于恢復不常厥居勝非方主和議遂白上營宗廟于臨安時御史魏矼劾罷之紹興五年起知湖州引疾秦檜得政勝非遂廢居卒諡忠靖宋史王欽字承可分寜人以父䕃歴官敷文閣直學士知湖州南昌府志勾濤字景山成都人除荆湖北路安撫使知潭州秦檜嘗令人道意欲與共政濤以書謝之檜諷言者劾濤不報濤疏論時事之害政者有五帝嘆忠直賜繒綵茶藥秩滿與祠久之帝謂檜曰勾濤久閒性喜泉石可進職與一山水近郡檜對永嘉有天台雁蕩之勝帝曰永嘉太逺其以湖州命之俄卒年五十九宋史汪思温字汝直鄞人吳興擇守有言公三衢治狀者除直徽猷閣知湖州吳興地汙下故有溝以走潦水而並溝之居嵗久填淤或置屋其上遇甚雨則水及半扉公按尋道跡撤屋除地復還故道水患遂除歴太府少卿直顯謨閣贈少師孫覿汪公誌樓鑰安康夫人狀及朝議大夫王正已志周葵字立義宜興人紹興中為侍御史欲奏論户部尚書梁汝嘉汝嘉致辭于秦檜出葵知湖州檜蓄怒未已又易平江值兩浙運使李椿年行經界法欲增田租三十萬葵辨其不可忤椿年椿年還都希檜意奏葵罷之居閒十五年後歴官叅知政事著聖𫝊詩三十篇文集三十卷奏議五卷晩號惟心居士諡簡恵宋史浙江通志一云字惇義趙不迹鉛山人太宗闕世孫隆興元年進士知湖州鉛山志蕭振字徳起温州人入太學登進士歴監察御史振本趙鼎所薦後因秦檜引入䑓除徽猷閣待制知湖州將行白檜曰宰相如一元氣不可有私私則萬物為之不生檜不恱振至州檜欲取羡餘振遺檜書謂財用在天下如血氣之在一身移左以寔右則病矣檜屬以私事又不克盡從以親老乞祠許之後知成都府安撫制置使帝嘉振治行謂宰相曰四川善政前有胡世將今有蕭振振有文集二十卷宋史胡交脩字已懋晉陵人登崇寜進士授泰州推官試詞學兼茂科給事中翟汝文同知貢舉得其文曰非吾所能及也置之首選歴右文殿修撰知湖州終兵部尚書翰林學士宋史晉陵志宗愈至交脩世將皆在禁林中興以後學士三入者自交脩始交脩裒次為書號曰世絲綸集宋史王師心字與道金華人政和八年進士知湖州救水旱饑荒仕至宣奉大夫贈少師諡莊敏談志汪藻字彦章饒陽人舉進士第一紹興中藻言自元符以來並無日厯此國之重事願留聖心上納之既而宰執請擇所付上曰無以易藻矣出知湖州詔領日厯如故辟官屬二員且賜史館修撰餐錢後以郡人顔經投匭訴其數糶軍實遂貶秩言行録叅宋史藻通顯三十年無室廬以居博極羣書老不釋卷尤喜讀春秋左氏𫝊宋史藻前後典六州先恵愛重名教有古循吏之迹守湖朝廷和糴米六萬斛公視湖六縣民力所堪鐫三之一而上書自劾詔勿問居嵗餘除户部被㫖降本錢復糴數萬斛嵗適大稔物估自當如數而辦例進一官公曰吾常以減糴待罪得䝉恩貸今豈可復受賞耶三辭卒不拜孫仲益汪公志秦梓字楚材登進士歴知台秀袁太平常湖六州除翰林學士出知宣州民請留再移湖州告老贈光祿大夫苕記秦檜弟梓兼崇政殿說書每除言路必侍經筵後以端明知湖州進大資致仕宋史職官表秦棣紹興十三年二月以右朝奉郎充集賢修撰視事談志許搏莆田人宣和中在太學時秦檜弟棣犯學規王希亮充直學申堂司檜折簡為棣援搏曰事到堂上豈容私檜怏怏而去八閩志張按吳興南渡股肱郡也鎮茲土者前乎弟乎檜者後乎弟乎檜者目中猶有趙哉危矣張宇字泰定晉陵人紹興十四年移知湖州治道清淨不事聲華整齊大體濶畧細故不治苞苴奉權貴不飾厨𫝊稱使客奉治循理期于不擾至今以愛利為人所思孫仲益張公志汪勃黟人紹興二年登第歴官權參知政事尋以端明殿學士領外祠後起知湖州為政安靜不事鞭扑未嘗妄費一錢民至鋟木為語掲于家曰賢哲太守福夀千秋天子聞之進秩三等汪勃建炎十九年簽書樞宻院檜黨也見宋史朱敦儒𫝊云諌議大夫汪勃希檜意劾之南畿志云勃與檜異數志家曲筆耳勃字彦及知湖州亷儉至骨不費公使一物内屛燭反燃以代燎政以慈愛為主勸兩訟勿爭詞致殷重其人感恱合掌結歡而散霅上相語莫激惱這佛葉水心汪公志曾逮字仲躬其先贑州人徙河南禮部侍郎文清公敏之子也能世其家淳熈中歴知湖州終敷文閣待制文獻通考叅宋史河南志談志紹興末有韓慥者賣卜臨安多竒中曾侍郎仲躬嘗詣其肆問之慥曰命甚佳有家世有文學有政事亦有官職只欠一事終身無科第耳仲躬累舉進士不第竟以廕至從官癸辛雜識水待問永嘉人隆興元年省元狀元光宗時知湖州尋以引嫌改知婺州見攻媿集王正已字伯仁鄞人歴荆湖轉運判官移知湖州未半年罷版曹以全年逋欠奏正已鐫兩秩不辯也尋除廣南運判歴祕閣修撰正已剖符數郡所至無聚斂省鞭扑薦舉必公按刺至寡而端毅簡黙望風畏之藏書至二萬卷手抄為多號酌古居士攻媿集王炎字晦叔婺源人乾道五年進士歴吳興郡王府教授改知湖州湖甲浙右素號難理炎不畏强禦邸第貴介有撓法者炎注于牘曰汝為天子親亂天子法炎為天子臣正天子法浙右人多誦之竟以謗罷炎初著易解未竟病革夜分祝天願須㬰無死以成書卒如其言胡升王大監𫝊程克俊字元籲浮梁人宣和間進士調湖州刑曹改太學録被薦召對論事訐直擢給事中歴端明殿學士兼權叅知政事上曰如卿數人可致太平以疾辭得祠起知建康改湖州召拜叅知政事紀綱振舉諡章靖所著有易通解詩文諸書饒州府志盧襄靖康元年以徽猷閣待制知江寜府改湖州應天府志襄字賛元三衢人錦繡萬花谷載襄西征記一卷盧賛元宣和末為吏部侍中詩篇極多嘗得其數十篇皆清㧞可喜尚記其贈鼔琴者曰試將鍾子山水意一洗退之氷炭腸庚溪詩話張震字彦亨歙人知湖州踰年公私富羡乃捐府帑八萬緡代倚郭烏程歸安兩縣民輸免丁錢一年又餘九萬緡為餘邑代輸罷四安鎮商稅置酒坊以補課額政聲籍甚官至朝議大夫歙志王十朋字龜齡樂清人自䕫州移至湖州召對劉珙請留之上曰朕豈不知王十朋顧湖州被水非十朋莫能鎮撫至郡户部青苖虚逋三十四萬命吏持劵往辦不聽即請祠去起知泉州十朋前在湖割俸錢剏貢院又為泉建之尤宏壯凡歴四郡布深恩恤民隱士之賢者詣門以禮致之所至人繪而祠之饒久旱入境雨至湖積霖入境即霽凡禱必應其至誠不獨感人而亦動天地鬼神宋史陳之茂字草卿無錫人為太學生與張九成同廷對之茂所對忤權相黜之九成第一叩頭殿堦曰陳之茂能言人所不敢言宜奬不宜黜髙宗覽對悚然曰忠言也賜同進士出身經學為諸儒倡以左承議知湖州仕至吏部尚書一統志叅勞志趙伯驌字希逺太祖七世孫以父任補承節郎監湖州商稅歴浙西提刑蘇湖缺守皆公兼攝晝夜服勤庭無留訟潔已裕民財用贍足吳興學生犯法公命敎授笞以學規其愛惜士類如此或得盗賊囊槖治不少恕特轉和州防禦使伯驌博洽藴藉長于歌詩自號無隱居士周必大趙公神道碑趙師䕫字汝一嗣秀王伯珪子直徽猷閣知湖州時歸附從軍而廪于湖者衆不能給師䕫請增廪仍别給僦屋錢以安其心帝稱善詔諸將行之郡宅東舊有燕堂師䕫改名晝錦贈新安郡王諡恭榮宋史孟浩字養直宜春人乾道五年進士歴國子監丞出知湖州以忤權貴罷後復起官至直祕閣所至捐廪不妄取予强明精敏洞見事情為文章有法度所著有鼯坡集袁州志鄭作肅字恭老蘇人宣和三年進士知湖州隆興二年嵗歉民貧有生子不舉棄于道路者作肅命屬官尋訪收取又擇乳母為之保養月給贍米一石委請學官専莅其事條其事目刻石州縣遂為其邦著令姑蘇志董草知湖州歴右朝奉大夫司農少卿勞志顔度字魯子居崑山以文章政事名一時乾道五年知長興縣遇事慈恕以善惡福應之說喻人人不忍欺其聽訟于淳朴中出智計以得其實聞者稱為神明一日某王自寜國入朝舟次縣界皆以婦女挽韅王怪問之皆云知縣顔佛子愛惜民力縱男子耕種卒難招集恐累顔公故婦女悉當其役洎入對孝宗問卿治得人乎即以度對未幾召為監察御史累遷知湖州以中大夫秘閣修撰提舉冲祐觀封長洲縣男度與朱熹友善孝宗謂度每出一言不動如山因以如山自號焉蘇志林栗字黄中福清人乾道六年以直寳文閣知湖州歴兵部侍郎諡簡栗為人强介有才而性狷急欲快其私忿遂至攻詆名儒廢絶師敎雖疇昔論事雄辨可觀不足以盖晩節之謬也宋史新編叅談志王十朋梅溪序云林黄中少卿出守吳興芮國器司業有詩送之王信字誠之麗水人歴太常少卿太史奏仲秋日月五星㑹于軫信言休咎之數史䇿不同然五星聚者有之未聞七政並集也分野在楚願思所以順天而應之因條上七事信遇事剛果論奏不避權要上亦虚心延訪益抗志不囬由此人多疾之信亦力求去起知湖州擢浙東安撫使所著有是齋集宋史楊恕字可久丹徒人權知湖州劉漫塘集薛季宣字士龍永嘉人事袁溉溉嘗從周敦頥學盡以其學授之季宣既得溉學于古封建井田鄉遂司馬法之制靡不研究講畫皆可行為大理寺主簿嘗言于孝宗曰齊威之伯不在阿即墨之誅賞而在毁譽者之刑臣觀近政柰何毁譽之人自若乎又言近或以好名棄士大夫夫好名特為臣子學問之累人主為社稷計惟恐士不好名誠人人好名畏義何鄉不立帝稱善恨得季宣晩除大理寺自是凡奏請論薦皆報可以虞允文諱闕大不樂之居七日出知湖州季宣于詩書春秋中庸大學論語皆有訓義藏于家其雜著者曰浪語集宋史趙粹中宻州諸城人歴吏部侍郎嘗論王安石奸邪當罷從祀後知池州有善政乾道六年移知湖州挽留者繫道不絶樓攻媿趙公神道碑鮑潚字清卿乾道六年進士知湖州永嘉縣志單䕫錢塘人乾道八年以右奉議郎視事官至侍從王回字亞夫瑞安人初入太學名聲彰徹登紹興甲戌第歴直徽猷閣浙西提刑改知湖州除江東提刑以疾請老再得祠祿積官至朝議大夫湖士夫淵林也公以耆徳鎮之上下恱服又訪郡之大利修湖漊増城堞建利濟院有盗夜殺牛牛逸訴烏程尉尉不省復訴歸安尉尉視之漠然牛怒觸人無敢近者尉聞于州公遣卒𫝊呼示以判事牛即俯聽盗竟得云聞者異之或歌之曰謂牛不能言何以訴其寃謂牛而善觸何以俯而伏信及豚魚疇不曰迂牛聽公令不顯公政公嘗曰吾有三不欺一曰君二曰人三曰已初視峴山晩卜築峴河自號峴河居士在湖州朝廷方欲用之而求去益切既憲江東歸至峴河摩挲鄉曲問訊親舊喜不自勝居無何移疾乞掛其冠云楊萬里王囬墓志吳守趙希蒼字漢英初至損稅斂増學廪親不𦵏女不嫁廢疾無醫死無斂皆助之如不及葉水心集希蒼伯驌孫見周必大神道碑張杓字定叟綿竹人浚子也兼攝蘇湖二州有執政姻黨閉糴杓首治之歴知臨安府吏部侍郎杓天分髙爽吏才敏給遇事無滯隨宜變通所至以治辦稱南渡來稱京尹者以杓為首宋史西吳里語張忠恕字行父浚孫開禧末為籍田令屬太廟鴟吻為雷雨所壊神主遷御忠恕因輪對請廣言路通下情寜宗嘉納嘉定五年進太府丞出知湖州魏了翁嘗勉忠恕以植立名節無墜家聲及是嘆曰忠獻有後矣又因輪對引伯父栻告孝宗之語曰當求曉事之臣不求辦事之臣欲求仗節死義之臣必求犯顔敢諫之臣魏了翁嘗許張忠恕惓惓體國似浚撥繁剸劇似其父于歛華就實則有志義理之學嘗有聞乎栻之敎矣宋史浙江通志公在湖州治勢家門卒之暴民者逮復湖學以振士風蠲下户積逋凡泉帛纊粟之征為效甚夥魏鶴山集楊長孺字伯子秀水人萬里子以䕃補知湖州清訟獄折强横人稱神明與秀邸相持譛之問要錢否曰不要寜宗曰不要錢是好官真徳秀入對寜宗問當今亷吏對曰楊長孺當今亷吏也尋改贑州端平中以理宗之立非正累召不起以集賢殿修撰守中大夫致仕號東山潜夫有東山集贑州志叅考亭淵源録趙善湘字清臣宋宗室知湖州歴江淮安撫制置使天水郡公有易或問續或問指要學易補過洪範統論中庸大學論語孟子解老子解春秋三𫝊通議詩詞雜著百餘卷宋史徐定字徳操晉江人徙永嘉守湖州永嘉縣志吳曇慶元丙辰進士歴知湖州泰順縣志求承祖字子紹朝散大夫兵部郎中賜紫金魚袋知湖州在任十有一月除沿海制置使叅議嵊志汪泳字伯游休寜人歴將作監部言王者仁政必自均力役始累知泰湖處三州封江寜縣男新安文獻志衢按泳晩居烏程見徐長谷汪友山志虞儔朝奉大夫直秘閣紹興五年十二月視事談志儔寜國人隆興初登第孤介不苟淳熈中任湖學敎授萬姓統譜周夢祥麗水人淳熈甲辰進士知湖州括蒼彚紀趙立夫字徳成樂清人登開禧第知湖州兩浙名賢録天台宋濟仲楫為湖守更立諸坊扁左題曰守臣宋濟立未幾濟王變作或以為先䜟齊東野語紹定二年李全攻泰州知州宋濟迎降之通鑑續編按濟無他可攷見觀此其人不足道矣寳慶元年正月湖州潘壬起兵立濟王知州謝周卿率官屬入賀通鑑續編壬含山狂士也見齊東野語潘壬之變寓公王元春告變于朝事平改湖州為安吉州王元春以告變功遂知鄉郡齊東野語王邁為浙西安撫司幹官考廷試詳定官王元春欲私所親寘髙第邁顯摘其謬元春怒嗾諫官李知孝劾免調南外睦宗院教授宋史項公澤字徳潤紹定進士知吉州安吉州潮州俱有政聲瑞安縣志趙必槐歴太府簿司農丞知安吉州入為金部郎復以直秘閣知徽州能修其官始終不掛吏議永嘉縣志陳淳祖字道初瑞安人嘉熈戊戌進士浙西水以倉節兼知安吉州賑恤有方列城安堵兩浙名賢録糜弇字仲昭平江人差知安吉州兩易知吉州所至吏不能欺豪右屏迹蘇州志林存字以道閩縣人寳祐初知湖州五年十月自吏部侍郎簽書樞宻院事六年十一月罷知建寜府談志叅宋史宰輔表孟淳字君復珙之孫也父兵部尚書之縉舉神童寳祐二年知寜國有祭梅都官文諡文敏淳㓜强記亦號竒童年十二襲父廕歴浙西安撫使轉湖州路總管諡康靖洪焱祖稱淳賢而文長于吏事東林山志劉震孫嘉熈元年八月以承議郎視事勞志震孫字長卿號朔齋中州人歴中書賈似道創公田震孫與京尹魏克愚湖邊唱和詞語仍犯時忌隨命劾去之齊東埜語謝夢生字性之永嘉人少力學與陳埴葉味道為同志友聖經賢𫝊靡不研究由是所得沛然有餘下筆亹亹不休名重當時趙善得亟稱之以女妻焉登嘉定癸未第歴樞宻院編修官兼都官郎出知安吉州召為宗正丞兼户部郎改秘書丞知汀州以疾致仕卒弟挺之同登第終通判安吉州永嘉縣志楊纉字嗣翁知安吉州嘗刻張先安陸集于郡齋陳振孫張氏十咏圖䟦嗣翁精于琴理見戚輔之佩楚軒客談趙良淳字景程汝愚曽孫少學于雙峯饒魯以廕三遷至淮西運轄咸淳末廷臣議建宗室于内郡以為屏翰遂除知安吉州先是知州李庾遁百度隳廢良淳至與察吏論所以守禦之偹悉舉行之嵗饑民相集為盗所在蠭起或請以兵擊之良淳曰民豈樂為盗哉嵗艱剽掠以茍活耳命僚屬以義喻之衆皆投兵散歸其不歸者衆縛以獻有掠人貨財者詣其主謝過而還之又勸富人出粟以賑語人曰使太守身可以濟民亦不惜也其言懇懇足以動人人皆倒囷應之朝議以徐道隆為浙西提刑以輔良淳加良淳直秘閣文天祥去平江潰兵四出剽掠良淳捕斬數人梟首于市兵稍戢范文虎遣使持書招降良淳焚書斬其使元兵廹獨松闗有㫖趣道隆入衞道隆既去率衆城守夜宿陴上先是朝廷遣將吳國定援宜興不敢往乃如安吉願留為輔良淳見其慷慨大言意其可用請于朝留戍安吉已而國定開南門納元兵兵入城呼曰衆散元帥不殺于是衆號泣散去良淳歸府兵士止之曰事至此侍郎當為自全計良淳叱去之乃閉閣自經有兵士解拯之復蘇衆羅拜泣曰侍郎何自苦逃之猶可求生良淳叱曰吾豈逃生者耶衆猶環守不去良淳大呼曰爾輩欲為亂耶衆涕泣出復投繯而死宋史按浦志載良淳大畧其立身之大節居官之善政臨難從容就死之義俱不明白又誤以趙昴發節義成雙之事入于𫝊内特取宋史本𫝊節其文而録之以正舊志之譌且以風厲後人焉顧應祥長興志辨証元馬煦字得昌磁州滏陽人至大元年守湖州煦在湖富商有傭舟師至他郡者溺死或嗾舟師妻訟商殺其夫冀得賄商不與又不賄吏吏誣商成獄又有二人同市飲者後三日其一人死既葬或訴死者子訟同飲者不賄吏吏亦誣之成獄公曰無死法訊之得實遂釋之其精敏平允類如此富家私田跨縣邑資無筭援結大官貴人如平交氣勢出守令上逺甚析其户役為數十其等在最下賦役常不及已而中下户反代之供輸莫敢問公因買絲之役㑹而均之遂無所逃鄰郡多法焉胡安定先生墓見奪于何山浮屠公遷之髙原而祀之置守塜二家撤淫祠二百區興學校築塘濼嚴保伍懲豪縱蠲煩擾皆有成法三年召拜刑部尚書虞集馬公碑趙全闕寜人元初由軍功膺寵及下江南授懐逺大將軍湖州路總管至元二十年改平江姑蘇志王虎臣言平江路總管趙全不法世祖命虎臣往按葉李執奏不宜遣虎臣帝不聽趙承㫖奏曰趙全固當問然虎臣前守此郡多强買人田縱賔客為姦利全數與爭虎臣怨之虎臣往必將陷全事縱得實人亦不能無疑帝悟乃遣他使何氏語林衢按研北雜志虎臣守湖毁貢院為軍砦至舁先聖像棄水中人無不唾罵其人可知矣淳祐中蔡節知湖州即城西官地建書院祠安定見牟應龍郝侯祠記唐伯剛至正二十四年夏來牧湖郡建府學在子城之東見敎授方安記髙謙字舜臣磁州人兼習儒吏釋褐將仕佐郎歴湖州路總管致仕加吏部尚書纂述格律百八十册彰徳府志張崇徳人湖州府尹崇徳志詳邑令楊訓文潼川人元淮海書院山長遇亂不能去居江都吳元年徴為起居注上稱訓文謹厚諭令始終一致兩遷中書省左司郎中改太常卿知湖州府移至汀州入禮部與陶凱同為尚書已而改户部出為河南行省叅政洪武五年卒訓文學行政事有名吾學編呉興備志卷五
