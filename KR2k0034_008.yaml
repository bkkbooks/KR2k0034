body:
  text: 吳興偹志卷八明董斯張撰人物徵第五之一費泛字仲慮烏程人察孝亷除郎中屯騎司馬遷蕭令視民如子先教後罰在位九年奸冦不發三年不斷獄禎祥感應時沛有蝗獨不入界國以狀聞拜梁相泛二子鳯堂邑令政九江太守泛卒政子立碑紀之洪適𨽻釋費泛碑按泛已載郡志但語太略耳志所据當亦此碑碑中僅有先教後罰一語志易之為賞罰嚴明無論詞不雅馴失立碑者本指矣兹稍節漢碑録之詳見萟文費鳯字伯簫踐郡右職三貢獻計辟州式部忠以衛上漢安二年吳郡太守郭君以君有自公之􅋵年三十一舉孝亷拜郎中除陳國新平長靜而為治匪煩匪擾功成事就色斯髙舉退已進弟不營榮祿栖遲厯稔鄣土不庭黔民作慝試守故鄣長强者綏以德弱者撫以仁牧守旌功轉堂邑令垂拱不言而民化之祖業良田畝直一金推豫弟息鳯以熹平六年卒故鄣施業字世堅偕堂邑義民戚忠治其喪鳯妻之弟卜𦙍及甘陵石勛子才皆誄之鳯孫字元宰參𨽻釋費鳯二碑詳萟文張按鳯弟九江太守政碑所云退已進弟者即政也鳯父子郡志亦載其略乃悉取漢碑芟之殊令觀者惘惘嗟乎漢𨽻之傳今兹者僅一二三碑真拱璧哉漢平帝時有邱俊者持節安輯江淮屬王莾篡位遂留江左居烏程漢大司馬騰交州太守聰陽羡令昭宋尚書右丞淵之新安太守道護建安太守道成梁黃門侍郎遲雜見於王儉姓系元和姓纂諸書張按漢有兩邱騰其一冲帝時九江太守姚氏漢青州刺史恢尚書左僕射皓吳太常卿信晉九江太守渠墓皆在郡境有碑姚之居吳興也久矣姓氏書謂王莽封田豐奉舜祀豐子恆避莽亂過江居吳郡改姓為媯五世孫敷復改姓姚始居武康敷生信信子寧海太守陶陶子太傅奮奮六世孫僧垣子察察隋蜀王友自晉至梁多顯人藏散騎常侍宣業吳興郡公武韞璿壽欽文祥六人皆給事中鈕氏漢有關內侯馥而冲充皆以牧守襲爵其為姓舊矣又名綽者東漢荆兖青三州刺史衡九真太守詳富春侯淑吳尚書令臨水侯瑒晉察孝亷襲臨水之封𦙍東遷侯淑及宋御史中丞滔墓同境必其後也吳景帝有鈕后陳武宣章后本亦鈕姓上錢讓字德髙吳郡烏程人纍遷廣陵太守都督九江諸軍事徐兖二州刺史封富春侯食邑五千戶卒年六十二贈富春公諡曰哀天子臨弔哀慟給兵吏一千人加威儀還葬本鄉賜錢十萬黃金百鎰錦被十張與讓母趙氏勞志沈戎字威卿戎長子鄷字聖通第二子滸字仲髙安平相少子景河間相演之慶之曇慶懷文其後也仲髙子鸞字建光少有髙名舉茂才公府辟州别駕從事史時廣陵太守陸稠鸞之舅也以女妻之子直字伯平州舉茂才亦有清名子瑜儀俱少有至行瑜十嵗儀九嵗而父亡居喪毁瘠過於成人外祖盛孝章漢末名士也深加憂傷每撫慰之兄弟並以孝著儀字仲則篤學有雅才以儒素自業時海內大亂兵革並起經術廢弛士少全行而儀淳深隱默守道不移風􅋵貞整不妄交納惟與族子仲山叔山及吳郡陸公紀友善州郡禮請二府交辟公車徵並不屈以壽終子憲字元禮左中郎將新都都尉定陽侯才志顯於吳朝子矯字仲桓以氣節立名仕為立武校尉偏將軍孫皓時有將帥之稱吳平為鬱林長沙二太守不就沈約宋書自叙沈戎子孫見史傳者一百五十八人三十八人有正傳一百二十人附傳宋梁陳間皇后三人尚主者五人唐沈君諒相武后睿真太后亦曰吳興人至今人物視三姓為盛云談志沈豐字聖達一云聖通永平中為郡主簿後遷零陵太守為政慎刑重殺罪法辭訟初不厯獄嫌疑不决一斷於口鞭杖不舉市無刑戮寮友有過初不暴揚有竒謀异略輒為談述曰太守所不及也到官一年甘露降芝草生官至尚書令東觀記參沈約自叙郡志載而不詳故偹録之吳郡沈豐為郡主簿太守第五倫母老不能之官倫每至臘節常感戀垂泣遣豐迎母廣陵母見大江畏水不敢渡豐祭神令子孫對母飲酒醉卧便渡謝承後漢書沈景戎之少子永建中為侍御史時河間王政狠傲不奉法帝以景素强毅擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王耶景曰王不正服常人何别今相謁王豈謁無禮者耶王慚而更服景然後拜出詣王傅責之曰前發京師陛見受詔以王不恭使相檢督諸君空受爵祿曽無導訓之義因捕諸奸人奏案其罪出寃獄百餘人政遂改節悔過自修子彥荆州刺史孫嘉晉吏部尚書後漢書河間王𫝊及朱子綱目參唐宰相世系表沈景為河間相拜二千石妻子不厯官舍五日一炊常食乾糒謝承後漢書沈友字子正吳郡人年十一華歆行風俗見而异之因呼曰沈郎可登車語乎友逡巡却曰君子講好㑹宴以禮今仁義凌遲聖道漸壞先生銜命將何以裨補先王之教整齊風俗而輕脫威儀猶負薪救火無乃更崇其熾乎歆慚曰自桓靈以來雖多英彥未有幼童若此者弱冠博學多所貫綜善屬文辭兼好武事注孫子兵法又辨於口每所至衆人皆默然莫與為對咸言其筆之妙舌之妙三者皆過絶於人孫權以禮聘既至論王伯之略當時之務權斂容敬焉陳荆州宜并之計納之正色立朝清議峻厲為庸臣所譛誣以謀反權亦以終不為已用故害之時年二十九張勃吳録沈珩字仲山吳郡人少總經萟尤善春秋內外傳孫權以珩有知謀能專對乃使至魏魏文帝問曰吳嫌魏東向乎珩曰不嫌曰何以曰信恃舊盟言歸于好是以不嫌若魏渝盟自有豫偹又問聞太子當來宜然乎珩曰臣在東朝朝不坐宴不與若此之議無所聞也文帝善之乃引珩自近談語終日珩隨事響應無所屈服珩還言曰臣密參侍中劉曄數為賊設奸計終不久慤臣聞兵家舊論不恃敵之不我犯恃我之不可犯今為朝廷慮之且當省息他役特務農桑以廣軍資修繕舟車增作戰具令皆兼盈撫養兵民使各得其所延攬英俊奬勵將士則天下可圖矣以奉使有稱封永安鄉侯官至少府吳書珩使魏時為西曹掾見吳志武康舊名永安屬吳郡武康之沈前史但云吳郡人沈仲山見休文自叙武康有五官瀆吳五官中郎將沈珩所居乃吳書亦以為吳郡人可證也沈自唐以前吳興而外無聞人沈友為武康産明矣朱治字君理以年向老思戀土風自表屯故鄣以為鎮撫山越諸父老故人莫不詣門治皆引進與共飲食鄉黨以為榮子才素為校尉領兵既嗣父爵遷偏將軍才弟紀權以策女妻之亦以校尉領兵紀弟緯萬嵗才子琬襲爵為將至鎮西將軍吳志吾粲字孔休烏程人仕吳與吳郡陸遜卜靜等比肩齊聲孫權召為主簿吳志沈陵字景髙矯子也晉元帝為鎮東將軍命參軍事子延字思長潁川太守始居縣東鄉之博陸里餘烏村延子賀字子寧桓冲南中郎參軍賀子景字世明惇篤有行業學通左氏春秋家産纍千金為東南豪士無進仕意子穆夫字彥和坐孫恩妖黨見戮沈約宋書陳敏據江東子弟凶暴所在為患周玘顧榮之徒常懼禍敗遣使密報征東大將軍劉準遣兵臨江已為內應準遣揚州刺史劉機寧遠將軍衡彥等出厯陽敏使弟昶及將軍錢廣次烏江以拒之錢廣家在長城玘鄉人也玘潛使圖昶廣遣其屬何康錢象投幕遂白事於昶昶傾頭視書廣揮刀斬之稱州下已殺敏敢有動者夷三族吹角為內應先勒兵在朱雀橋陳兵水南玘榮又說甘卓卓遂背敏敏率萬餘人將與卓戰未獲濟榮以白羽扇揮之敏衆潰晉書廣字敬平封永世縣侯宜興志晉施彬安吉人初令山隂纍官信安義興二郡太守厯尚書左丞征西大將軍太興元年以功封中蠲侯食邑本縣一千三百户諡曰明參談志安吉志彬一作斌沈孟頲宋左光祿大夫戎八代孫勞志沈田子字敬光父穆父為宗人沈預所告遇害田子及弟林子志復父仇卒斬預首祭父祖塜後破盧循爵都鄉侯入關以擅戮王鎮惡見殺林子以其子亮為之後沈約宋書田子請鎮惡計事使宗人敬仁於坐殺之沈林子字敬士從宋武帝伐姚泓破泓弟紹軍虜以千數悉獲紹器械資實時諸將破賊皆多其首級而林子獻捷書至每以實聞武帝問其故林子曰夫王者之師本有征無戰豈可復增張虛獲以示誇誕昔魏尚以盈級受罰此亦後乘之良轍也武帝曰乃所望於卿也厯封漢夀縣伯贈征虜將軍諡曰懷伯少子璞字道真纍遷淮南太守元凶弒立璞以奉迎之晚見殺沈邵字道輝林子子涉獵文史襲爵駙馬都尉奉朝請㑹彊弩將軍缺上詔録尚書彭城王義康曰沈邵人身不惡吾與林子周旋異常可以補選於是拜彊弩將軍出為鍾離太守在郡有惠政子侃嗣封官至南沛郡太守沈亮字道明林子子也清撡好學善屬文未弱冠州辟從事會稽太守孟顗在郡不法亮糾劾免官厯義成太守蒞官清約為太祖所嘉每遠方貢獻絶國勳器輒班賚焉又賜書二千卷沈淵子字敬深少有志節隨髙祖克京城封繁峙縣五等侯參知鎮軍車騎中軍事子正字元直淹詳有風度美丰姿善容止好老莊之學弱冠辟州從事演之稱之曰此宗中千里駒也隨王誕鎮會稽參安東軍事元凶弒立分江東為會州以誕為刺史誕將受命正說司馬顧琛曰國家此禍開闢未聞今以江東義鋭之衆為天下倡始若馳一介四方詎不響應此以雪朝廷寃恥大明臣子之節豈可北靣凶逆使殿下受其僞寵琛曰江東忘戰日久士不習兵雖云逆順不同然强弱有異當須四方有義舉者應之不為晚也正曰天下若有無父之國則可矣苟其不爾寧可自安仇恥而責義於餘方今正以弒逆寃醜義不同戴舉兵之日豈必求全耶馮衍有言大漢之貴臣將不如青齊之賤士乎况殿下義兼臣子事實家國者哉琛乃與正俱入說誕誕猶豫未决會潯陽義兵起世祖使至誕乃加正寧朔將軍孝建元年除齊北海二郡太守沈雲子淵子弟元嘉中為晉安太守雲子子煥字士蔚少為駙馬都尉奉朝請厯散騎侍郎南昌令有能名元徽中遷寧遠將軍交州刺史雲子又有弟䖍子沈慶之厯司空封始興郡公每履行田園無人從行遇之者不知其為三公也朝廷賜慶之三望車慶之曰吾每遊田園有人時與馬成三無人時與馬成二今乘此車安所之乎桞元景與顔師伯嘗詣慶之鳴笳列卒滿道會慶之在田見之曰吾與諸公並起貧賤一時遭際榮貴至此惟當共思損挹之事老子年已八十見成敗已多諸君炫此竒服欲何為乎插杖而藝不為之顧宋書慶之字𢎞先竟陵王誕反以慶之為兖州刺史率衆討之至歐陽誕遣慶之宗人沈道愍齎書說慶之餉以玉環刀慶之遣道愍數以罪惡慶之至城下誕登樓謂之曰沈君白首之年何為來此慶之曰朝廷以君狂愚不足勞少壯故使僕來耳慶之兄子僧榮時為兖州刺史鎮瑕邱遣子懷明率數百騎詣受慶之節度沈慶之弟邵之元嘉中廬陵王行參軍兄子僧榮敞之之子也孝建初為安成相荆江叛發兵拒臧質質遣其安成相臧眇之討僧榮擊破之大明中為兖州刺史子懷明建威將軍封吳興縣子厯南兖州刺史義陽王昶反沈慶之從帝渡江總統衆軍少子文耀年十餘嵗善騎射帝愛之封永陽縣侯食邑千戶沈法系字體先慶之從弟亦有將才世祖伐逆加寧朔將軍領三千人前發與柳元景旦至新亭元景居中營宗慤居西營法系居東營東營據岡賊攻元景法系臨射之所殺甚衆法系塹外樹悉伐之令倒賊劭來攻緣樹以進彭排多開隙選善射手的發無不中事平以為始興太守討蕭簡於廣州斬之廣州平封庫藏付鄧琬而還官至驍騎將軍潯陽太守慶之長子文叔位侍中廢帝賜慶之死文叔引藥自殺文叔子昭明位祕書郎聞父死曰何忍獨生亦自縊死元徽元年還復先封時改始興為廣興昭明子曇亮襲廣興郡公沈演之字臺真厯吏部尚書雖未為宰相任寄不異素有心氣疾病厯年上使卧疾治事性好舉才申濟屈滯而謙約自持上賜女伎不受車駕拜京陵演之以疾不從上還宫召見自勉到坐出至尚書下省暴卒追贈散騎常侍金紫光祿大夫諡曰貞侯子睦至黃門郎通直散騎常侍大明初坐要引上左右俞欣之訪評殿省內事又與弟西陽王文學勃忿䦧不睦坐徙始興郡沈赤黔厯廷尉卿徑之演之祖也演之兄融之子暢之襲寧新縣男大明中為海陵王咨議參軍子曅嗣齊受禪除沈勃好為文章善彈琴能圍碁而輕薄逐利泰始中為太子右衛率加給事中時欲北討使勃還鄉里募人多受貨賄上怒下詔徙付梁州元徽初以例得還結阮佃夫王道隆等復為司徒左長史為廢帝所誅順帝即位追贈本官勃弟統大明中為著作佐郎沈伯玉字德潤䖍子子也溫恭有行業能文章厯衛尉丞世祖舊臣故佐普皆升顯伯玉自守私門朔望未嘗問訊顏師伯戴法興等並有藩邸之舊一不造問由是官次不進上以伯玉容狀似畫圖中仲尼像常呼為孔某舊制車駕出行衛尉丞直門常戎服張永謂伯玉曰此職乖卿志王景文亦與伯玉有舊常陪輦出指伯玉白上孔某竒形容上於是特聽伯玉直門服𤣥衣纍遷永世令有能名伯玉性至孝奉親有聞未嘗妄取於人有物輒散之故知弟仲玉泰始末為寧朔長史蜀郡太守沈攸之字仲達厯荆州刺史宋季起義雍州刺史張敬兒襲之先是攸之自江陵下以邊榮為留府司馬守城城敗見敬兒敬兒問曰邊公何為同人作賊不早來榮曰沈荆州舉義兵匡社稷身雖可滅要是宋室忠臣天下尚有直言之士不可謂之為賊身本不靳生何須見問敬兒命斬之榮歡笑而去容無異色沈攸之父叔仁為衡陽王義季征西長史兼行參軍鎮彭城沈攸之弟登之新安太守去職在家為吳興太守沈文秀所收斬弟雍之鄱陽太守雍之與攸之異生諸弟中最和謹尤見親愛雍之弟榮之尚書庫部郎宋書攸之長子元琰司徒左長史第二子懿太子洗馬第三子文和中書郎沈攸之從子懷寶為晉安王將師在赭圻遣親人楊公讚賫密書招誘攸之攸之斬公讚封懷寶書呈太宗尋尅赭圻沈文秀字仲遠慶之弟子也父邵之南中郎行參軍文秀宋前廢帝時纍遷青州刺史將之鎮部曲出次白下文秀謂慶之以帝狂悖禍在難測欲因此衆力圖之慶之不從既行慶之果見殺又遣直閣張方興領兵誅文秀未至而明帝已定亂時晉安王子勛據潯陽文秀與徐州刺史薛安都並同子勛反潯陽平定明帝遣其弟文炳召之便歸命詣罪即安本任封新城縣侯先是冀州刺史崔道固亦據厯城同反文秀遣信引魏魏遣慕容白曜援之及至而文秀已受朝命文秀善於撫御後魏圍三載無叛者五年為魏所剋終於北並上白曜既下厯城并力攻討自夏至春始克文秀取所持節衣冠儼然坐於齊內亂兵入曰文秀何在文秀曰各二國大臣無相拜禮白曜忿之因至撾撻後還其衣為之設饌與長史房天樂司馬沈嵩等鎖送京師面縛數罪宥待以下客給以粗衣疏食獻文重其節義稍亦嘉禮之拜外都下大夫太和三年遷外都大官孝文嘉其忠於其國賜絹綵二百匹後為征南都將臨發賜以戎服除懷州刺史假吳郡公後魏書沈文秀子保冲大和中奉朝請大將軍宋王外兵參軍後為南徐州冠軍長史二十一年坐援漣口退散有司處之死髙祖詔曰保冲文秀之子可特原命配洛陽作部終身既而獲免後魏書沈髙文秀族子聰明有筆札文秀以為司馬甚器重之隨文秀至懷州沈陵字道通亦文秀族子太和十八年髙祖南伐陵擕族孫智度歸降引見於行宫陵資質妍偉詞氣辨暢髙祖竒之禮遇亞于王肅並上沈懷文字思明父宣新安太守懷文嘗為楚昭王二妃詩見稱於世除尚書殿中郎隱士雷次宗被徵居鍾山後南還廬嶽何尚之設祖道文士畢集為聯句詩懷文所作尤美辭髙一座遷揚州别駕從事史江夏王義恭遷西陽王子尚為揚州居職如故時熒惑守南斗上乃廢西州舊館使子尚移居東城以厭之懷文曰天道示變宜應之以德今雖空西州恐無益也不從而州竟廢矣大明二年遷尚書吏部郎宋書沈懷遠懷文弟為始興王濬參軍深見親待坐納王鸚鵡為妾世祖徙之廣州使廣州刺史宗慤於南殺之會南郡王義宣反懷遠頗間文茟慤起義使造檄書并銜命至始興與始興相沈法系論起義事平慤具為陳請由此見原至武康令撰南越志及文集並傳於世邱淵之字思元烏程人博學有才識文帝即位以舊恩厯侍中都官尚書吳郡太守龍鄉侯所著文章一百卷勞志黃回率衆出新亭諸將任侯伯彭文之王宜興等謀應袁粲攻髙帝於朝堂事既不果髙帝撫之如舊回與宜興素不協斬之宜興吳興人也形狀短小而果徑有膽力少年時為劫不須伴郡縣討逐圍繞數十重終莫能擒嘗舞刀楯回使十餘人以水交灑不能著明帝泰始中為長夀縣男至是被殺宋書黃回傳張按宜興謀應袁粲此不肯作禇淵生者也世僅知仲達宋世忠臣未有齒宜興者可慨然吳興邱珍孫言論嘗侵蔡興宗珍孫子景先人才甚美興宗與之周旋及景先為鄱陽郡會晉安王子勛為逆轉在竟陵為吳喜所殺母老女幼流離夏口興宗至郢州親自臨哭致其喪柩家纍皆得東遷宋書珍孫厯寧朔將軍見禇伯玉傳丹徒縣令沈巑之以清亷抵罪邱寂之曰亷吏真不可為也政當處季孟之間巑之吳興武康人性疏直在縣自以清亷不事左右浸潤日至遂鎖繫尚方嘆曰一見天子足矣上召問曰復欲何陳對曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至巑之雖危言上亦不責後知其無罪重除丹徒令入縣界吏人候之謂曰吾今重來當以人肝代之不然清名不立南史吳興偹志卷八
