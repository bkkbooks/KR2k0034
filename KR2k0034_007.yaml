body:
  text: 吳興偹志卷七明董斯張撰官師徵第四之六州邑漢嚴欣字少通治嚴氏春秋馮君章句為烏程長舉孝亷遷東牟侯相下邳祝長典牧十城所在若神趙明誠金石録費鳯烏程人試守故鄣長洪適𨽻釋人物吳駱統字公緒會稽人時飢荒鄉里及逺方客多有困乏統為之飲食衰少其姊仁愛有行寡居無子見統甚哀之數問其故統曰士大夫糟糠不足我何心獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與統又以告母母亦賢之遂使分施由是顯名孫權以將軍領會稽太守統年二十試為烏程相民户過萬咸嘆其惠理權嘉之召為功曺行騎都尉妻以從兄女吳志孫河字伯海堅從子也出後姑俞氏後復姓為孫質性忠直訥言敏行有氣幹能服勤少從堅征討嘗為前驅後領左右兵典知內事待以腹心之任又從策平定吳會從權討李術破之拜威冦中郎將領廬江太守吳志河為烏程長見吾粲傳晉殷康為武康令教曰郭邑居民有死喪者可令送兩坩粥太平御覽陶範字道則侃第十子也侃諸子中最知名厯尚書祕書監陶侃别傳範烏程令見世說已入掌故賀循字彥先山隂人節􅋵髙厲好學博聞舉秀才除陽羡武康令顧榮陸機陸雲表薦之曰伏見吳興武康令賀循德量邃茂才鑒清逺厯踐三城刑政肅穆守職下縣州黨帖然召為太子舍人元帝時領太子太傅時朝廷初建動有疑議宗廟制度皆循所定為一時儒宗贈司空諡曰穆虞預晉書張亢字季陽安平人載協弟也才藻不逮二昆亦有屬綴又解音樂伎術時人謂協載亢陸機雲曰二陸三張中興初過江領著作郎補烏程令入為散騎常侍復領佐著作郎許裴字季顯義興陽羡人烏程令晉百官名參許氏譜張按裴己載掌故苐不詳其邑里耳故出之河內司馬揚為烏程令將赴職戴洋曰君宜深慎下吏揚後果坐吏免官洋又謂曰卿雖免官十一月當作郡加將軍至期為太山太守振武將軍晉書袁猷字申甫陽夏人少與兄瓌齊名尋相率渡江瓌為丹陽令猷為武康令有政聲厯侍中衛尉卿羊不疑太山南城人烏程令厯桂陽太守夏侯愔譙郡人為烏程令孫恩自海襲㑹稽有衆數萬於是吳郡陸瓌吳興邱尫等凡八郡一時俱起殺長吏以應之吳興太守謝邈嘉興顧𦙍與愔等皆遇害並上册府元龜𦙍作裔避宋諱耳宋臧諶之東莞人元嘉中為尚書都官郎烏程令以下沈約宋書劉亮彭城人大明中為武康令時境內多盜鑄錢亮掩討擒殺以干計厯封順陽侯厯梁益二州刺史劉秀之字道寶東莞人司徒穆之從兄子也為無錫陽羡烏程令並著能名封康樂郡公厯尚書右僕射諡忠成虞玩之字茂瑤餘姚人少間刀筆泛涉書史仕宋為烏程令路太后親朱仁彌犯罪依法録治太后怒訴孝武坐免官厯驍騎黃門郎宋文帝以彭城王義康嫌隙既成乃誅劉湛及烏程令盛曇泰等曇泰為義康所逐顧凱之字偉仁吳人元嘉中為東遷令後為吳郡太守風節過峻終湘州刺史諡曰簡子張祐髙平人厯武康錢唐令並著能名時有北地傅僧祐潁川陳珉並以吏才見知宋世言長吏者必以三人為首何敬叔東海郯人也齊長城令有能名在縣清亷不受禮遺夏至節忽榜門受餉數日中得米二千餘斛他物稱是悉以代他人輸租南史裴松之字世期河東人博覽墳籍立身簡素義熙初為故鄣令轉中書侍郎上使注陳壽三國志松之鳩集𫝊訛廣增異聞既成奏之上覽之曰裴世期可不朽矣荀卞之大明七年為烏程令詳祥孽徴江秉之字元叔厯烏程建康令遷臨海太守並以簡約見稱在郡嘗作一書案去官留以付庫王偉之為烏程令亷介特甚書籍之外家無長物偉之少有志尚當世詔命表奏輒自書寫泰元隆安時事小大悉撰録之子韶之因此私自撰晉安帝陽秋宋書沈懷逺武康令見隋經籍志武康令謝沈宋書蔡興宗傳朱齡石字伯兒沛人也武帝以為鎮軍參軍遷武康令厯雍州刺史張岱東遷令時殷冲為吳興太守謂人曰張東遷親貧須養所以棲遲下邑然名器方顯終當致大位岱詳見郡守沈攸之孝建七年為龍驤將軍武康令沈文秀字仲逺武康人初為郡主簿功曹起家東海王參軍遷武康令詳人物徵傅琰字季圭靈州人仕宋為武康令遷山隂令著能名二縣皆謂之傅聖賜爵新亭侯元徽中遷尚書左丞琰與父僧祐並有竒績時云諸傅有理縣譜子孫不以示人時山隂令邱仲起長城令何敬叔故鄣令邱寂之皆有能名而不及琰也南史齊庾肅之孔欣之俱武康令肅之迎沈道䖍為立宅道䖍隱居鄉里相率受學欣之厚為資給焉南史南齊顧昌言烏程令坐父法秀宋泰始中戰亡遺骸不反而昌言宴樂如常有司請加以清議說傳縣昌言吳郡人豫章文獻王蕭嶷字宣儼太祖第二子起家為太學博士長城令南齊書傅映字徽遠靈州人為武康令髙祖師取建康吳興太守袁昂自謂門世忠貞固守臣節乃訪於映映勸背昏向明尋以公事免天監初除建安王長史烏程令所受俸祿悉以歸兄纍遷光祿卿蘇侃字休烈涉獵詩書宋時出身正員將軍補長城令南齊書何遠字義方郯人梁武踐阼以奉迎功封廣興男後為武康令愈厲亷節除淫祀正身率職人甚稱之太守王彬巡屬縣諸縣皆盛供帳以待焉至武康遠獨具糗水而已彬去遠送至境進斗酒隻鵝而别彬戲曰卿禮有過陸納將不為古人所笑乎武帝聞其能擢為宣城太守自縣為近畿大郡近代未之有也其輕財好義周人之急言不妄發蓋天性也每戲語人曰卿能得我一妄語則謝卿以一縑衆共伺之不能記也梁書禇雲字士洋陽翟人為曲阿烏程延陵令並稱清慎厯御史中丞湘東王咨議參軍隂鏗字子堅姑臧人善五言詩為時所重釋褐梁湘東王法曹行參軍纍遷晉陵太守員外散騎常侍有集三卷鏗有罷故鄣令詩一卷見隋志伏挺字士標平昌人好屬文樂安任昉深相嘆異齊末則舉秀才對策為當時第一髙祖義師至挺迎謁于西林髙祖見之甚悅謂曰顔子引為征東行參軍時年十八天監初除中軍參軍事纍為晉陵武康令罷縣還仍于東郊築室不復仕後出仕尋除南臺治書因事納賄當被推劾挺懼罪遂變服為道人久之藏匿後遇赦因此還俗太清中客遊吳興侯景亂中卒范岫字𢡟賔濟陽考城人外祖顔延之早相品題以為中外之寶仕齊為長城令厯梁吏部尚書江蒍濟陽人淹子也襲封臨沮縣伯自丹陽尹丞為長城令有罪削爵普通四年髙祖追念淹功復封為吳昌伯殷不佞字季卿長平人少立名節居父喪以至孝稱好讀書尤長吏事承聖初為武康令上沈文阿字國衛武康人仕梁為五經博士簡文在東宫引為學士及侯景冦逆簡文别遣文阿招募士卒入京師城陷與張嵊共保吳興嵊敗文阿竄於山野景素聞其名求之甚急文阿窮迫不知所出登樹自縊遇有所親救之便自投而下折其左股及景平髙祖以文阿州里表為原鄉令以下陳書梁元帝於荆州即位授姚察原鄉令察武康人詳人物徴周𢎞正字思行汝南安城人梁都官尚書入陳厯國子祭酒尚書右僕射諡曰簡子所著周易講疏十六卷論語疏十一卷莊子疏八卷老子疏五卷孝經疏二卷集二十卷行於世隋經籍志𢎞正為安吉令見陳書庾持字元德鄢陵人父沙彌長城令持篤志好學尤長書記以才藝聞解褐為安吉令天嘉初遷尚書左丞以預長城之功封崇德縣子厯大中大夫徐秀郯人年十五擢髙第厯德清長城丹陽三縣令顔真卿徐府君碑王實唐宰相涯父也湖州安吉縣令贈尚書刑部員外郎文苑英華王涯家廟碑韋鐸京兆人烏程令唐宰相世系表孫尚復武邑人德清令李濬後魏平棘令系之裔鄭邃滎陽人並武康令並上李寵渤海王裔烏程令唐宗室世系表解禹字德禹天寶中舉進士為湖州安吉縣令用薦為吉州刺史解春雨集李清字士澄天寶十二年進士宰烏程嘗有咏石季倫詩唐詩紀事又見顔真卿西亭記韋承慶渤海人字延休鄭州陽武人也少恭謹事繼母以孝聞弱冠舉進士纍遷太子司議郎儀鳯中太子賢監國頗近聲色承慶上書諫之承慶又以人之用心多擾濁浮躁罕詣冲和之境乃著靈城賦以廣其志調露初東宫廢出為烏程令風化大行厯天官侍郎兼修國史承慶自天授以來三掌天官銓授平允海內稱之尋同平章事舊唐書武康響應山下有碧玉潭神龍所居神龍八年令劉汭禱雨而應勞志權逢吉為長興令時縣西有西湖可溉田三千餘頃舊引方山泉注之為豪家所堰莫敢誰何逢吉決堰仍引泉溉田鄉人賴焉浙江通志崔孚博陵人厯湖州長城令長城之理加於前二邑令政成秩滿解印罷去白香山集李某元和十年烏程令見談志德清覺海寺條下李誤作米王晏𢎞農人武康令見權德輿王妣夫人楊氏墓志獨孤及字至之洛陽人武康令厯常州刺史唐書胡傳美害武康令有游碧落觀詩稿簡贅筆見藝文李府君諱晤厯金壇烏程晉陵三縣令府君為人篤於內行飾以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛白居易趙郡李公家廟碑晤宰相紳之父也見唐書皇考湖州德清令諱察躬行孝悌之德振揚家聲栁子厚叔父殿中侍御史墓志喻鳬毗陵人有詩名開成進士全唐詩話云卒於烏程令西吳里語鳬字坦之嘗謁杜紫薇不遇曰我詩無羅綺鉛粉氣宜不售也宜興志宋裴大亮大理寺丞知長興縣見胡宿為謝安置守冡表曾士倬禺山人知烏程縣東林山志劉嘉成政和戊戌進士知德清縣厯判楚州武義縣志章望之字表民浦城人除知烏程縣趣令受命固辭以光祿寺丞致仕宋史望之伯父得象廕得官以宰相嫌遂不仕文獻經籍考王正已湖州德清縣令王安石吏部侍郎句公墓志此又一王正已也齊融號衡山居士與王正巳相友善一時名士也氏族大全陳洙字師道建陽人令烏程與王安石遊安石有詩送之瀛奎律髓陳洙字師道登進士第厯殿中侍御史嘉祐中上疏助司馬光乞早建嗣且曰陛下以臣為懷異日之圖莫若殺臣之身用臣之言疏方上即仰藥以卒奏下大計遂定仁宗聞洙死賜錢百萬元祐初用光言官其一子八閩通志詹祥字周文崇安人祥符元年進士烏程令石元之新昌人天聖五年進士烏程令蘇耆字國老參知政事易簡之子舜欽之父也有才名嘗宰烏程厯工部郎中直集賢院贈刑部侍郎宋史參東坡劉夫人墓志米襄陽志林四川志耆見郡志方仲弓烏程令天聖七年有小臣方仲弓請立劉氏七廟魯宗道諫而止通鑑明道壬申河南竇克知德清縣始作聖廟值巽之隅文雅之士班班出焉沈與求重修孔廟碑狄遵孔字子安湘潭人以父任在安吉時馬尋守湖州少公恐不任事安吉大姓俞氏所為多不法前後令多不敢擊俞氏私釀酒椎牛會客公捕得劾治尋大驚曰乃能如我少時黃山谷狄公志柯述字仲常南安人知湖州歸安縣修水田蓄泄之利八閩志謝伯宜字仲聖龍溪人知湖州長興縣開水利蝗不入境諸臺以聞遷奉議郎賜緋厯任凡六司議讞者四平反者多上錢顗字安道無錫人知贑烏程二縣皆以治行聞治平末為殿中侍御史許遵議謀殺刑名未定而入判大理顗以為一人偏詞不可以汩天下之法遵所見迂不可以當刑名之任不從二年而貶將出臺責同列孫昌齡曰君媚事王安石得為御史亦當少思報國奈何將欲附會以求美官顗自當遠竄君自謂得策耶拂衣上馬去後自衢徙秀州家貧母老至丐貸親友以給朝晡而怡然無謫官之色宋史李餘慶字昌宗以叔父任起家應天法曹參軍遇事輒爭之留守者不能奪也卒薦公改太常寺太祝知湖州歸安縣厯知常州王安石李公志沈兼字子達明州人遷衛尉寺丞知湖州歸安縣王安石沈君墓忘陸廣字彥博侯官人天聖二年進士令烏程王安石陸君墓志尹熙古天聖中以中大夫行國子博士護軍知安吉縣安吉志孫載字積中崑山人治平三年舉進士初為河中府户曹遷德清令開說是非出於至誠訟有纍年不决者聞載一言即感悟棄去熙寧八年杭秀湖三郡饑載諭富室倍糴至明年平其價出糶一邑之民賴以全活浙江通志陳吉老字子州仙遊人厯知揚州與韓世忠戮力恢復秦檜主和議吉老纍疏爭辨請出逐之贈奉直大夫八閩志吉老知長興見郡志陳輔字安國明州象山人嘉祐二年進士第厯著作佐郎知安吉縣嵗饑籍富家出粟食流民所活以千計將代民詣郡及使者言古之循吏所去見思我曹於陳君不待去而思思其將去而不樂也使者知其才命攝華亭徙攝壽昌時王介守湖請使者曰安吉不可以無陳君也乃得歸道聞其繫囚衆以旦至邑遽閲牘有競渡毆人死至繫百人者且情得矣即械應法者於州餘悉遣去幕庭為虛人人歡舞天目山水溉一邑其附山六鄉為防專利而下二十一鄉請決堤主簿劉璹視之千餘人擁璹鬬堤下璹走還君徐以他事至旁佛舍召六鄉老人諭散之與約决堤三日慰二十一鄉民老人唯爭趨令而溪悍猛既决則三日不能復下鄉用穰朝廷初以七十五等定家業均役錢使者厲君立浙西法而翰林沈公括方察訪二浙遽言於朝遂推其法浙東朝無咎陳君墓志張著河間人嘉祐中以祕書丞知安吉縣安吉志許遵字仲塗泗州人第進士又中明法擢大理寺詳斷官知長興縣興水利邑人立石紀之遵出知壽州潤州又請提舉崇福宫尋致仕纍官中散大夫宋史陳察海州人為宣德郎知烏程縣事某與烏程同年進士烏程允篤君子也與余雅善沈括長興集冷源元符中任武康令萬姓統譜毛滂字澤民元符中令武康嘗築東堂於衙齊有生遠樓畫舫亝潜玉菴清泉修竹率多遠韵滂時作長短句聲文遒媚緝之為東堂詞驀山溪一序尤膾炙人口東坡稱其文章典器可偹著述勞志參東堂詞文獻通考蘇子由送滂詩云酒腸天與渾無敵詩律家傳便出人欒城集滕中字元直甫子以廕補官厯知安吉有美政終承議郎亷勤自將治民守邊所至有聲尤長於詩萬姓統譜王勳郢人政和八年進士紹興七年知湖州長興縣有治聲髙宗皇帝以廣南舶政大弊命擇士人修潔者為之樞密沈公與求以勳薦既對擢提舉市舶果以清裁著名贈金紫光祿大夫樓攻愧集勳子正己見郡守吳桓字孟文龍溪人熙寧間陳三要三術甚切時務元豐八年進士以奉議郎知湖州長興縣楊龜山集八閩通志林概字端父福清人舉進士以祕書省校書郎知長興縣厯知連州康定初上封事謂古者民為兵而今兵食民古馬寓於民而今不習馬此兵與馬之大患也又行陳無法而出於臨時將無素偹而取於倉卒軍不豫權而監於宦侍若是者雖得古之材使循今之法亦必屢戰而屢敗官至集賢校理宋史浙工通志林概知長興嵗大饑出俸粟誘富人輸數千石以飼飢者八閩志丁大聲知武康縣程大昌之壻也周必大程公墓志孫畋字無逸紹興元年知錢唐縣以讒謗免所居官公議訟公非罪差建寧府糧料院未赴改湖州安吉縣厯簽書鎮江判官孫覿撰墓志銘徐良能字彥才紹興五年進士知安吉竭力賑艱食之民除水灾之賦民為之繪像祀於學宫及刻石以紀其政去之日爭致贐一無所受待次家貧至出産以給食處之泰然厯龍圖閣侍制蘭溪邑志范鎔字茂寬知武康父老訴前令定物力溢故者十餘萬科輸不前欲更之吏白板已上郡須三嵗可改曰是困吾民一日不可可三年乎立除其十之二繼列其弊白於郡追易前板民以為利上乾道六年知湖州長興縣茹驤坐贓免編管台州仍籍沒家財參知政事錢良臣奏臣昨任淮東總領日失舉茹驤改官今以贓敗法當同坐詔覽良臣所奏乃欲以身行法國有常憲朕不敢私勉從所請可鐫三官於是陳峴張宗元趙磻老徐本中並坐舉驤各降三官文獻通考見登科録茹驤之字曰伯駿嵊縣人紹興戊辰進士史岩之知長興縣嵩之弟也見葉水心史進翁墓志鎦有開迪功郎安吉州烏程令歐陽𤣥鎦更亝墓碑陳希莆田人通直郎知武康縣樓攻愧陳居仁行狀林大中紹興三十年進士調左迪功郎湖州烏程縣主簿貧甚俸薄郡欲日有贈餽卒謝之所立已如此淳熙七年知湖州長興縣縣在浙右號稱難治公益究心官事民情孚洽若有相之者嵗饑官無贏蓄公方憂慮而無策夜半湧水自荻浦灌河聲震數里米舟輻輳闔境以為神和買比經界前增四之三公必欲寬之推見衆弊獲免者五千餘户增輸以實者帖給訟牒必竟曲直不許私和或謂恐益多事公曰此乃省事之法也以是詬訟日稀期限寬而信可展而不可違去如始至所下文移無一紙遺於民間樓攻愧林正惠公神道碑永康縣志大中字和叔厯中書舍人給事中以忤韓托胄罷歸或勸通托胄書對曰福不可求吾為省郎時一言承意豈至今日耶客曰縱不求福盍亦免禍對曰福不可求而得禍可懼而免耶托胄誅即召見試吏部尚書簽書樞密院事諡正惠宋史詹儀之遂安人時張栻守郡吕祖謙分教儀之日以學問為事嘗宰烏程終吏部侍郎談志參嚴州志儀之字體仁從晦菴先生游見朱文公大全書問中時又有門人詹體仁字元善者亦從文公遊吾郡寓公也方道字夷吾嚴州人淳熙八年以通直郎知湖州武康縣武康密邇行都易致越訴君律身既嚴剖决公平不科罰一錢寬猛得宜訟亦衰少縣出絲纊賴以濟稅課郡利其羡使别儲以候命縣無所從出商人患苦倍征旁出山蹊公私交病君請於郡復舊規蠲宿逋申法禁减則例以招之曾不踰時來者輻輳井邑為之改觀米運至豐儲倉退却至數百斛典吏鬻妻子不足以償君為於他州賤糴取贏以補其數又以餘資代下五等畸稅義役良法也行之或反以致害君更立規式勸諭誠篤民咸信之追科不事鞭撲間出郊野食用百須皆隨無纎粟之擾於是爭先就役他縣至取以為法後有欲更張者老幼叩閽幾二千人竟仍其舊嘗久雨有怪民出昌言水且大至人皆悚懼謀避亟捕至庭焚其書械繫以俟既不驗杖而逐之有訴夫久出不還知其必死而迹不明者君為設方略得姓徐者一問即承境內盜賊帖息雨暘致禱多驗洊值豐年上下熙然提刑劉公頴行部謂太守曰自蘇至此惟武康無一詞致前蓋君專務行所學視四境如一家不表暴以取赫赫名而民受實惠其去也遮道挽留越境追送者不以數計終淮南安撫司參議官所著有覺齊聞見録樓攻愧方君墓志宋蔡開字子明崇德人淳熙辛丑第進士宰德清值軍興征調縣為不擾及去民攀留之厯知卲武著畏亝集十五卷萬姓統譜蕭德藻烏程令楊萬里淳熙薦士録云德藻文學甚古氣節甚髙其志常有為其進未嘗茍合老而不遇士論屈之今為湖北參議官德藻詳見掌故鄭昭先字景紹閩縣人淳熙進士初主浦城簿嘆曰僥幸一第問學未悉遂游朱文公之門遷知歸安邑民愛之纍官知樞密院事兼參知政事進右丞相辭不拜立朝纍有奏疏言皆切直諡文靖有闕湖遺稿五十卷真德秀為序八閩志莫若冲字子謙淳熙乙未進士尉湖之安吉郡委聽斷爭者心服改秩知安吉邑人交慶以平允稱崇德志徐浚字明道紹興甲戌進士始尉德清有聲改秩知烏程多惠政上俞應符字寶文錢唐人歸安令嘉定十四年自給事中除簽書樞密院事蔣重珍字良貴無錫人嘉定末進士第一簽判奉國軍理宗召入對首以自天子以至庶人所當知者本心外物二者之界限為言次論苞苴盛行民為其害遷校書郎辭不就明年待命霅川移文閣門請對當路憚之尋知安吉州歷官刑部侍郎致仕諡忠文宋史趙與歡字悅道宋宗室嘉定進士以直寶章閣知安吉州有富民訴幼子察之非其本心姑逮其子付獄徐亷之乃二兄强其父析業與歡曉以法開以天理皆欣然感悟又嫠媪僅一子亦以不孝告留之郡㕔日給㕔饌俾親饋晨昏以禮未周日母子如初二家皆畫像事之厯户部侍郎權兵部尚書嘗謂士大夫有貪聲則雖竒方奧學徒以蠧國害民耳追封奉化郡王宋史衢按郡志前事逸之後事以為二子誤且逸畫像句趙潗字伯逺淳熙間為長興令邑蝗潗募力收捕至三千餘石又大旱河竭米價騰湧潗出官錢增直糴粟粟商輻輳人皆得濟士民咸德之浙江通志諸葛千里烏程令詳主簿吕午條陸景文字叔辨為安吉令松江府志趙彥衛字景安紹熙間宰烏程有能名厯通判徽州有雲麓漫抄二十卷續鈔二卷書録解題余端禮字處恭龍游人第進士知烏程縣纍遷吏部尚書同知樞密院事少保郇國公贈太傅諡忠肅宋史蔣峴字伯見奉化人性剛不阿慶元二年進士令武康有治聲浙江通志寶慶丁酉火災議者以為濟王之寃殿院蔣峴謂火災止是失偹更無餘說且云君臣已定父子不可言兄弟不當問此周公謹所志者又宋史王邁傳云蔣峴附彌逺邁劾之按此則峴為能吏不可謂純臣矣顔逸顔子四十一代孫武康令聖門志章鑑字君保嘉熙中令餘杭志確而衆信􅋵潔而吏莊慮深而弊淺俗和刑清逺慕近悅謝夢生東萊讀書堂記郡志入古蹟類今出之張按晚宋有兩章鑑一字公秉分寧人咸淳間拜右丞相所稱滿朝歡者其人也君保為昌化人見癸辛雜識李芾字叔章衡州人知德清縣屬浙西饑芾置保伍賑民活數萬計遷主管酒庫所德清有妖人扇民為亂民蜂起附之至數萬人遣芾討之盜聞其來衆立散移浙西提刑時浙西多盜羣穴太湖中芾跡得其出沒按捕之盜駭散宋史韓補玉山人奉議郎知安吉州武康縣程洺水集衢按勞志有韓亞卿豈即其人安吉州歸安令黃申戴表元瀏陽教授李君志李餘姚人申之外孫按勞志有黃犖梁琮字宗本相臺人至元中宰長興慨然以敬教勸學為急敦詩書禮逢掖每儒官教授必親至講室與諸生疑難答問質判精微胥吏文無害者咸在列聽率至夜分乃罷髙純厚長興修廟學記魏信為歸安令博聞强記終日端坐人莫敢干以私者時定浙西坊里之役信以田為率貧富均一民懷其惠勞志趙孟實黃岩人宋宗室知長興縣黃岩邑志沈拱辰字國祥吳縣人至元丁丑尹安吉鋤强植弱奸豪屏迹事至立決吏受成而已浦志李拱辰字廷弼滏陽人皇慶二年春升承值郎湖州路歸安縣尹邑附於郡事多掣肘公守法不附有爭家財而骨肉相戕者諭以天理感悟而去有以死獄誣平民者折以片言遂伏其辜京師貴近有指邑民之妻為其逃婢者中使督捕甚急公不為遣卒歸其夫每嵗二稅先期至者輒勞以羊酒人皆知勸莫敢自後前是土田多荒責里胥代輸其租公屏吏卒步入阡陌間視地之肥瘠定為嵗入之數募有力者使墾種之有㫖經理田土奉行者率務增加以為功公不茍隨聽民自占主者以所增田僅百五十頃議倍加其賦公曰吾官可棄民不可病也卒從公言仍其舊臺省交章舉公亷能延祐四年夏除承德郎中書户部司計黃溍李公志衢按郡志俱以字為名宜改正張炯字元明武康縣尹築渠堰禦水患民賴其功終湖州府尹崇德志張炳字元暉炯弟安吉縣尹循良著績有去思碑上杜遂德清令金華縣志按勞志有吕遂豈姓誤與僧努别名巴哩承務郎烏程縣達嚕噶齊程雪樓秦國先墓碑趙桂縉雲人延祐間烏程縣尹黃學士集括蒼彚志朱德潤字擇民崑山人工詩文延祐末遊燕趙孟俯薦之召見命為編修明年授鎮東儒學提舉以歸喀喇庫庫袁桷皆與友善後攝守長興至則市無一人乃郊召父老告之以其故仍即印號給其照身以識别乎冦且曰汝所怖者官軍耳保此則官軍不汝犯於是黎民麇集未竟日得户萬四千八百九十九尋以病