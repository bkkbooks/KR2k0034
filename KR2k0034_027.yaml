body:
  text: 吳興偹志卷二十七明董斯張撰璅徴第二十四之一三吳之說世未有定論十道四畨志以吳郡及丹陽吳興為三吳又以義興吳興及吳郡為三吳元和郡國圖經同前說水經注云漢陽羡周嘉上書以縣逺赴會至難求得分置遂以浙江西為吳東為會稽後又分為三曰三吳吳興吳郡會稽共一焉按晉書成帝咸和三年蘇峻反吳興太守虞潭與庾氷王舒起義兵于三吳時氷為吳郡太守舒為會稽太守又孫恩攻陷會稽劉牢之遣將桓寶率師救三吳又陶回為吳興太守年饑穀貴三吳尤甚回開倉賑之一境獲全詔會稽吳郡依回賑恤據此則吳郡與吳興會稽三郡為三吳甚明又虞潭傳蘇峻反潭為吳興太守詔加潭督三吳晉陵宣城義興五郡軍事又寧康二年太后詔曰三吳奧壤水旱併臻宜時拯恤三吳義興晉陵及會稽遭水之縣全除一年租據此則義興固在三吳之外而太后之詔會稽亦復在三吳之外豈一時稱謂未有定議抑史文自有詳簡差互耶或云虞潭所督三吳晉陵宣城義興計六郡而稱五部潭自為吳興太守矣增督五郡蓋丹陽其一也又以太后詔考之則會稽决不在三吳之數桓寶救三吳者以孫恩既陷會稽遂逼吳中故云今當以十道四畨志及郡國志别說為正范成大吳興志宋大明三年詔以丹陽吳郡吳興等六郡為王畿資治通鑑分吳丹陽為吳興郡者吳寶鼎元年也置吳興縣于建安郡者吳永安三年也郡縣名雖同而地之相去逺矣六朝史梁陳無地理志晋宋齊有之皆仍吳之舊隋則或改或省焉晋宋陸邁賀道力江淹梁王琰皆吳興令淹稱梁人令在宋時又宋檀道濟沈懷明唐沈佺期封吳興縣侯與子與男其明冠以建安郡者封懷明詔洎淹本傳也淹嘗自叙云吳興地在東南嶠外閩越之舊境而游黃蘗山詩亦云閩雲連越邊何顔魯公杼山碑遮淹賦詩事乎宋轉運使高冕奏云古吳興郡倚郭管烏程吳興兩縣未必不由於此舊圖經復因唐書沈伯儀傳云湖州吳興人統記載南封記云齊吳興縣邱靈鞠撰而傅會之但既謂武后時有吳興縣又疑齊有吳興縣未可知既謂靈鞠烏程人又疑恐是吳興縣令中無所主展轉支離抑知靈鞠官至長沙王車騎將軍一作長史前令烏程而吳興縣創于吳省于隋逮武德四年復置更名唐興也在統記于吳興下漏烏程二字在唐詩列傳與地里志自相抵牾安得為倚郭兩縣之證哉因是而知唐宰相世系表之有于安貞吳興令亦誤也世逺籍遙湖州本隋置而齊王僧䖍録古來能書人名謂大令同時之康昕吳興湖州人郡名未改而預書縣名已亡而叠見兩者不相類耶志首沿革談監簿存而不論張子靜辨而未明故竊考之以俟外史氏採云閔元衢沈自漢以後居武康者為大族齊郡丹陽下邳皆沈望其人微不足稱自以其望卑少折而入于武康故武康之沈亦不自知其所出沈括沈興宗墓志長興有錢胥二氏載太平寰宇記李宗諤圖經及王曾九域圖志今邑惟有錢氏而胥氏無聞焉長興志施姓明姓麴姓聞姓木姓水邱姓皆以吳興著望合璧事類氏族鞠氏余氏錢氏尤氏沛氏俱望出吳興西吳里語陶隱居書如吳興小兒情狀雖未成長而骨體甚峭快梁武帝書評宋世諺曰蘇湖熟天下足鄭虎臣吳部文粹湖州土俗歲十二月人家多設鼓而亂捶之晝夜不停至來年正月半乃止問其本無能知者但相傳云此名打耗打耗云者言驚去鬼祟也世說禰衡作漁陽摻撾正是正月十五案時而言此說近之演繁露吳興人說久雨遇雷地脉必開山為之發洪一山至有數十處水迸而出或深至五六丈者研北雜志湖州各鄉村人歲時晚間以竹葦雜地草木束為一大炬若庭燎然舉火燃之名曰㸃田蠶謂宜耕種育蠶二事又因之以祭田公田母西吳里語吾郡稱水晶宫摘楊漢公詩中語坡詩注云湖州四面皆水謂之水晶宫乃常建題法院詩勝景門開對逺山竹深松老半含煙皎月殿中三弄磬水晶宫裡一聲禪逸史紀太陰夫人度盧杞曰此水晶宫也金鳳外傳閩王嘗築水晶宫于西湖旁列臺榭周回十餘里朝氏客語吕原明元祐間侍講大雪不罷講講孟子有感哲廟一笑喜為詩云水晶宫殿玉花零㸃綴宫槐卧素屏特輟下簾延墨客不因風雪廢談經又吳正獻夫人李氏雪夜詩云絮如栁陌三春雨花落梨園一笛風百尺玉樓簾半捲夜深人在水晶宫此三字乃不令吾郡專美耶竹坡詩話汪內相將赴臨川曾吉甫以詩迎之有云白玉堂中曽草詔水晶宫裡近題詩韓子蒼改云白玉堂深曽草詔水晶宫冷近題詩吉甫聞之以子蒼為一字師按偶雋浮溪自湖移撫故曾詩云爾但水晶宫著一冷字無乃蛇足不如易之以曉字病餘贅筆吳興沈統鑄小錢謂之沈郎錢晉書食貨志沈昭略齊侍中文叔之子性狂俊使酒任氣朝士常憚而容之嘗醉負杖至蕪湖苑遇琅琊王約張目視之曰汝王約耶何肥而癡約曰汝沈昭略耶何瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡約文景之子談藪王道隆烏程人稍知書太始二年兼中書通事舍人道隆為明帝所委過于佃夫而和謹自保不妄毁傷人元徽二年桂陽王休範舉兵奄至道隆見殺宋書時右軍將軍王道隆任參內政權重一時躡履到前不敢就席良久方去竟不呼坐蔡興宗傳宋明帝宴會朝臣以南臺御史賀臧為柱下史糾不醉者沈文季不肯飲酒被驅下殿南齊書元徽中童謠曰襄陽白銅鞮郎殺荆州兒後沈攸之反雍州刺史張敬兒襲江陵殺沈攸之子元琰等齊書蕭惠明為吳興太守郡界有卞山山下有項羽神廟相承云羽居郡廳事前後七人不敢上廳惠明謂綱紀曰孔季恭曽為此郡未聞有災遂盛設筵榻接賔數日未幾惠明忽見一人長丈餘張弓挾矢向之既而不見因發背而殞宋書齊太祖之為齊王也置酒為樂清河崔思祖侍宴謂寺中沈文季曰羮膾為南北所推文季答曰羮膾乃是吳食非卿所知思祖曰庖鱉膾鯉似非句吳之詩文季曰千里蓴羮豈關魯衛之士帝稱美曰蓴羮頗須歸沈談藪初徐孝嗣復故封使故吏吳興邱睿筮之當傳幾世睿曰恐不終尊身孝嗣容色甚惡徐曰緣有此慮故令卿决之南史齊建武四年吳興姚方興于大航頭得孔氏傳古文舜典亦類太康中書乃表上之事未施行方興以罪致戮至隋開皇初購求遺典始得之尚書注疏按隋書作吳姚方興蓋隋尅陳後廢吳興入吳故云齊永明初中書舍人四人各住一省謂之四户以吳興茹法亮臨海吕文顯等為之既總重權勢傾朝廷守宰數換遷去來四方傾重餉遺數百萬通鑑梅蟲兒吳興人與茹法珍齊東昏時並為制局監見愛幸後為梁武所戮南齊書梁高祖嘗作五字叠韻曰後牖有朽栁命朝士並作劉孝綽曰梁王長康强沈約曰偏眠船舷邊庾肩吾曰載匕每礙埭徐摛曰臣昨祭禹廟殘六斛熟鹿肉何遜用曹瞞故事曰膜蘇姑枯盧吳均沉思良久竟無所言髙祖愀然不悅俄有詔曰吳均不均何遜不遜宜付廷尉談藪沈休文羸劣多病數米而食羮不過一筯青陽記沈休文多病六月猶綿絹溫爐食薑椒飯不爾則委頓自慶集齊吳均為文多慷慨軍旅之思梁武帝圍臺城朝廷問外禦之計均忙懼不知所對但云愚意速降為上談藪梁世有謠云王氣在三餘梁武帝聞之乃于餘千餘姚餘杭皆為厭勝又漢末童謠云天子當興三餘之間長城有餘千山餘罌溪餘魚浦陳武帝興焉談志長城北五里有雉山梁武帝時聞童謠云鳥山出天子乃于江左以鳥名者鑿之而雉山獨遺焉及武帝興為長城下若里實應其謠上陳子高會稽人世祖時為吳興太守子高年十六為總角容貌美麗狀如婦人世祖見而問之能事我乎子高許諾本名蠻子世祖改命今名執偹身刀世祖寵之小名録考陳書氏韓北齊盧思道聘陳陳主用觀音語弄思道曰是何商人賫持重寶思道即以觀音語報曰忽遇惡風漂墮羅剎鬼國陳主大慚啓顔録徐德言尚後主妹樂昌公主時陳政方亂德言知不相保謂其妻曰以卿之才容國亡必入權豪之家倘情緣未斷尚冀相見乃破一照各執其半約曰他日必于正月望日賣于都市我當在即以是日訪之及陳亡公主果入越公楊素府寵嬖殊厚德言流離困苦僅能至京遂于正月望日訪于都市有蒼頭賣半照者大高其價人皆笑之德言直引至其居設食具言其故出半照合之仍題詩曰照與人俱去照歸人不歸無復嫦娥影空留明月輝公主得詩涕泣不食素知愴然改容即召德言相見仍與偕飲素令公主賦詩公主遂口占一絶云今日何遷次新官對舊官笑啼俱不敢方見作人難素厚遺之送還江南竟以終老孟啓本事詩寧海浮門土多陳姓蓋六朝時霸先之後隋滅陳盡室避亂于此歷唐五代以資雄其家磚甓皆湖州物人取以為砥赤城志李百藥字重規德林子也七歲解屬文大業九年授建安郡丞行達烏程屬江都難作沈法興以為大司馬府掾後法興為李子通所破又命為中書侍郎舊唐書李安期百藥子也幼聰辨七歲解屬文初百藥大業末出為桂州司馬行至太湖遇逆賊將加白刃安期跪泣請代父命賊哀而釋之上楊國忠會諸親時知吏部詮事欲大噱呼選人名引入中庭不問資序短小者補道州參軍胡者與湖州文學簾中大笑劉禹錫嘉話唐詩僧皎然居湖州妙喜今寶積寺是其故廬自言謝靈運後詩祖其家法自許甚髙顔魯公為守時與張志和陸鴻漸皆為客意其人品亦必不凡吾嘗至妙喜訪其遺跡無復有但山顛墳存耳其詩十卷尚行于世無甚令人喜者以為優于唐詩僧可也石林詩話錢起與郎士元齊名時人語曰前有沈宋後有錢郎然郎豈敢望哉起詩遇雨詩云雲銜七曜起雨拂九門來宴宋監宅云晚鐘過竹靜醉客出花遲罷官後云秋堂入閒夜雲月思離居對雨云生事萍無定愁心雲不開亦可謂奇句矣士元詩豈有如此句者乎韻語陽秋烏程女道士李冶字季蘭高仲武評其詩上倣班姬則不足下比韓英則有餘不以遲暮亦一俊媪唐詩紀事參中興間氣集季蘭已詳掌故但混入人物殊不倫復不書其名特正之常魯公使西畨烹茶帳中贊普問曰此為何物魯公曰滌煩療渴所謂茶也贊普曰我此亦有遂命出之以指曰此夀州者此舒州者此顧渚者此蘄門者此昌明者此㴩湖者國史補唐崔元亮故宅在長興縣西崔灣元亮磁州昭義人長慶中為湖州刺史因家于此唐相崔祐甫之後也後其裔有居崔灣者家藏韓愈所作祐甫墓銘雖蟬腐而翰墨精彩如故又藏崔逖崔值等誥敕數軸及顔真卿張說李雍李揆李林甫諸公筆跡宋時復其家今盡失之談志孟郊為溧水尉開射鴨堂坡詩注韓有詩贈賈島云孟郊死葬北邙山日月風雲頓覺閒天地文章聲斷絶故生賈島在人間唐宋遺史孟郊下第詩曰棄置復棄置情如刀劍傷又再下第詩曰再度長安陌空將淚見花後及第有詩曰昔日齷齪不足嗟今朝曠蕩恩無涯青春得意馬蹄疾一日看遍長安花一日之間花皆看盡何其速也進取得失蓋亦常事而器宇不宏至于如此何其鄙也唐宋遺史孟郊賈島皆以詩窮至死而平生尤自喜為窮苦之句孟有移居詩云借車載家具家具少于車乃是都無一物耳又謝人惠炭云暖得曲身成直身人謂非其身偹嘗之不能道此句也賈云鬢髮雖有絲不堪織寒衣就令織得能得幾何又其朝飢詩云坐聞西床琴凍折兩三絃人謂其不止忍飢也其寒亦何可忍也六一詩話栁子玉文郊寒島瘦元輕白俗此語具眼客見詰曰子盛稱東坡祭白樂天孟東野書又愛元微之詩而取此語何也僕曰論道當嚴取人當恕此八字東坡論道之語也許彥國詩話石旻有奇術寶厯中隨尚書錢徽至湖州學院子弟皆在時暑月獵者進一兔錢命作湯方共食旻笑曰可留兔皮聊志一事遂釘皮于地壘塹塗之上朱書一符獨言曰恨較遲恨較遲錢氏兄弟詰之旻曰欲與諸君共記卯年也至太和九年錢可復鳳翔遇害歲在乙卯也集異記唐太和末杜牧自侍御史佐沈傳師宣城幕雅聞湖州為浙西名郡風物妍好且多麗色往游之時刺史崔公亦牧之素所厚者頗喻其意凡籍之名妓悉為致之牧殊不愜所望使君復候其意牧曰願得張水戲使州人畢觀之俟其雲合牧當閒行寓目冀或有閲焉使君大喜如言至日兩岸觀者如堵逮暮竟無所得將罷忽有老姥引髽髻女才十餘歲牧熟視之曰真國色也因使語其姥將致舟中姥女皆歡牧曰且不即納當為後期吾十年必為此郡若不來乃從所適因以重幣結之大中三年牧移授湖州刺史比至郡亟使召之女母懼其見奪也因擕幼以詣牧詰其母曰昔既許吾矣何為適人母拜曰向約十年不來而後嫁嫁已三年矣牧俯首曰辭也直强之不祥乃禮而遣之因為悵别詩云自恨尋芳到已遲往年曾見未開時如今風擺花狼籍緑葉成隂子滿枝田畫詩云弟病兄孤失所依當時書語最堪悲豈圖乞得南州牧却恨尋春去較遲正以譏牧之放肆之過也麗情集詩林廣記杜牧欲來湖州尋舊約三上時相書以弟顗病求醫為辭乞知湖州既至而私願復不諧後世果可欺耶泊宅集賈餗與沈傳師善餗拜相傳師前死嘗夢云君可休矣餗寤祭之寢復夢曰事已然叵奈何餗與李訓謀覆族然實不與訓謀也若傳師者死不忘友今之翻面弄舌者可以愧矣湧幢小品徐晦嗜酒沈傳師善餐楊嗣復云徐家肺沈家脾真安穩耶語録世傳周秦行記非牛奇章所作是李衛公門人韋瓘所撰開成中曾為憲司所覆文宗覽之笑曰此必假名僧孺是貞元中進士豈敢呼德宗為沈婆兒也事遂寢賈氏談録沈詢在昭義嘗宴府中賓友乃便歌著詞令曰莫打南來鴈從他向北飛打時雙打取休使兩分離及歸而夫妻皆為嬖妾夫歸秦所殺北夢瑣言沈亞之嘗客游為小輩所試曰某改令書俗各兩句伐木丁丁鳥鳴嚶嚶東行西行遇飯遇羮亞之答曰如切如磋如琢如磨欺客打婦不當嘍囉托言沈雲翔亞之弟也咸通中自雲翔輩十人皆通中貴號芳林十哲芳林門名由此入內故也上唐之晚年詩人無復李杜豪放之格然亦務以精意相高如周朴者搆思尤艱每有所得必極其雕琢故時人稱朴詩月鍛季鍊未及成篇已播人口其名重當時如此而今不復傳矣豫少時猶見其序其句有云風暖鳥聲碎日高花影重又云曉來山鳥閙雨過杏花稀誠佳句也六一詩話吳興備志卷二十七
