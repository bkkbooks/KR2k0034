body:
  text: 吳興備志卷二十九明董斯張撰璅徴第二十四之三趙子昻有古琴二一曰大雅一曰松雪因以大雅名堂號松雪焉壻王筠菴國器字德璉即蒙父也堯山堂外記松雪肌極細潤常服止用軟綾絹遇絺葛肌即傷擦元主以其儀觀非常且宋宗室懼為衆望所歸竊忌之一日步至館閣適據案讀乃默從後相其肩背笑云此不過秀才官耳自是信任不疑上趙子固公從弟子昻自苕中來訪公閉門不納夫人勸之始令從後門入坐定苐問辨山笠澤近來佳否子昻曰佳公曰弟奈山澤佳何子昻慙退公便令蒼頭濯其坐具樂部私語余從德清趙氏見文敏公家用簿書法隨手運筆精妙凡養蠶樹桑稼穡工料奴婢日給與今不殊第往往用􅔇作食及烏豆之類動至百斤百石此皆今時南方不用豈古今習俗有不同者耶姚士麟見只編趙松雪公宋之宗室而仕元人皆議之有題其畫者趙家公子玉堂仙畫出苕溪似輞川多少青山紅樹裏豈無十畝種瓜田其譏之也深矣恐亦傷於太刻天命有在宋祀巳墟族屬疏逺又無責任仰事俯育為祿而仕民之道也但當辭尊居卑時懷黍離之感而已趙子昻過揚州迎月樓趙家其主求作春聨遂題之曰春風閬苑三千客明月揚州第一樓其家以紫金壺奉酬寓圃雜記松雪微時嘗館於嘉定沈文輝沈方營義孰松雪乘興遽為書榜自謂愜意及落成纍書不逮竟用初筆嘉定縣志元有松人謁趙文敏公公在內未出問是何人答曰吾是雲間人公隨應曰君非日裡鬼間中今古錢塘祝吉甫居西湖上搆小樓眺盡湖山之勝賓客嘗滿鄰有富豪築髙墻數仞蔽之吉甫因欎欎不樂趙松雪訪吉甫登樓為書二字扁曰且看無何鄰以通畨簿録家徙垣屋摧毁小樓內湖山如故西湖志餘趙文敏孟俯胡石塘長孺至元中有以名聞於上被召入見問文敏會甚麼奏曰做得文章曉得琴棋書畫次問石塘奏曰臣曉得那正心修身齊家治國平天下本事時胡所戴笠相偏欹上曰頭上一箇笠兒尚不端正何以治國平天下竟不録用農田餘話趙文敏小像一軸止半身其面圓而俊偉神觀煥爛世祖所謂神仙中人也公有七言律詩題其上後有男雍重裝四字友人劉無已家見之眉公筆記趙松雪與夫人管氏畫像余嘗見於茅山趙繼先家繼先其遺胤也松雪鬚髮少斑然面上童顔幞頭紫袍玉帶象笏署云魏國公趙某夫人貌豐偉所服乃禙子然俱坐錦墩繼先謂聞之祖父此元主宣入賜坐命畫工貌者也兩山墨談豫過演福寺僧房見趙子昻親書探梅訪僧一絶句云輕輕踏破白雲堆半為尋僧半探梅僧不逢兮梅未放野猿笑我却空回松雪集失載七修類藁趙魏公刻私印曰水晶宫道人錢塘周草忩先生密以瑪瑙寺行者屬比之魏公遂不用此印後見先生同郡崔進之藥肆懸一牌曰養生主藥室乃以敢死軍醫人對之進之亦不復設此牌魏公語人曰吾今日方為水晶宫吐氣矣輟耕録趙魏公夫人管道升善書畫吾竹房嘗題其所畫竹石竹房有一私印是好嬉子三字即以此印倒用於跋尾人皆以為竹房之誤魏公見之曰此非誤也這瞎子道婦人會作畫倒好嬉子何氏語林顧信字善夫居太倉善筆札從趙文敏公遊每得文敏書即鑱諸石置一亭扁曰墨妙文敏為其好學樂為之書張昶吳中人物志周辨翁釀白醪字曰秋玉佩韋軒客談飛來峯諸處元僧楊璉真伽鑿成觀音羅漢像以千百計中天竺佛殿後壁山水乃王叔明所畫嵗久剝落有遜齋子為補之開化方豪題其上云飛來峯天竒也自楊總統鐫之天竒鑿矣叔明畫人竒也自遜齋子補之人竒損矣此二者山中千古不平之疑案也豫法官也不翻是案何以服人為時傳誦西園雜記蘇友龍字伯夔金華人元季自承事郎轉文林郎行樞密院照磨偽吳張士誠據姑蘇既降公持詔書往湖州責其戍將潘允明行郊迎禮禮成允明欲西向坐公公曰以爵則吾幕僚雖相向坐亦以為過然吾所持者詔書君敢與詔使抗禮耶挾胡床中席而坐允明懼服臨發贐米百斛錦二十端公笑辭曰君謂使者而可以貨取耶宋學士集張士誠取三興土築王府基嘉興宜興長興紫桃軒又綴前江浙副提舉劉基嘗遊西湖有異雲起西北光映湖水時魯道原宇文公諒諸同遊者皆以為慶雲將分韻賦詩基獨縱飲不顧大言曰此天子氣也應在金陵十年後有王者起其下吾當輔之時杭城猶全盛諸老大駭以為狂悉去之啓運録沈萬三名富字仲榮其弟萬四名貴字仲華本湖州南潯人父沈祐始徙蘇之長洲東蔡村貴之子漢傑又徙于化周莊今南京會同館乃其故宅初居東蔡村時人以汙菜之地歸之祐躬率子弟服勞糞治有方瀦泄有法由是致富不資後流雲南尋命選大戶家為京六曹得漢傑之子曰玠者擢員外郎受官辭祿上器重之至今傳二家子孫在流所者尚富或云善點化術留青日札劉三吾撰沈漢傑墓志沈之先為吳興人後徙長洲之東蔡村萬三諱富字仲榮與其弟萬四仲華率先兩浙輸其稅為石者萬又嘗獻白金為兩千百以佐用度太祖却之不得乃俾造廊房者六百五十披甲馬者千以萬四曾孫玠為倉曹戶部員外郎玠之父曰漢傑卒葬南興隆蕩之北先外舅東樓公則云仲榮子茂旺國初獻白金千錠黃金百斤凡京城廳守街道橋梁甲馬錢榖之類多取資於沈乃以茂為廣積庫提舉侄孫為户部員外郎坐事當辟以營建工未就但黥其額後為藍黨猶得乘馬出入工畢盡録其家發遼陽戍籍其田數千頃每畝定賦九斗三升至今吳民糧額之重坐此近峯聞略大理少卿吳興楊先生復在南京時頗家貧畜三豕日命童子於後湖採蘋藻飼之有法司官家人與童子爭且毆之法司官以先生不能避嫌先生戲作一絶句云太平門外後湖邊不是君家祖上田一點浮萍容不得如何肚裏好撑船寓圃雜記成化間湖有苕溪社諸公則教授汪翁善侍講陳秉中封主事吳昻知縣汪善巡檢沈觀詩人邱吉唐廣吳玲沈祥陳鑾醫官李昻醫士王傑畫工畢文布衣范濬吳瓛史珣每嵗一月一會皆賦詩一章後有樂天鄉社乃致政諸公如斷事沈政知州陸震知縣俞敘縣丞史紀教諭王鑾復同義官尹政范淵俞敞王玭遊剛宣寧遊觀布衣張海范濬沈祥馬海包敏吳玲陳敬中張康孫敞范生輩不數年諸公代謝所存張馬范孫諸人為耆英會皆暮年無事素善文墨時泰家豐從容晏集以樂其生邱吉史珣即家貧草澤亦以斯文結好然不介意蓋先民風俗淳厚絶無世俗之態如此峴山志杭州戒壇焚毁朝命布按兩司重建所費甚廣因召湖州吳汝輝嘉興曹良數人勸募汝輝入見請問幾何方伯曰度得銀萬兩則可汝輝曰願一力當之憲長楊紀宗曰何易如此得無誑耶汝輝曰民有一子不肖雖有所積死後必為他人所取何如奉承勝事時兩司官皆在聞之稱歎既而汝輝以十木匣裝銀千錠詣獻於司憲長特設席於後堂邀請同僚共宴復以彩帳親送之寓圃雜記盛事述中子先父登進士者萬厯庚辰董禮部嗣成又三年癸未父道醇叔侄尚書閔少保圭宗伯如霖婦翁與壻同在大位者嘉靖中吳太保鵬為吏部尚書而壻董公份為學士無何亦遷工部尚書三代甲科同時俱在者禮部尚書董份辛丑子南工部給事中道醇癸未孫禮部郎中嗣成庚辰三代俱無恙四總河道者潘公季馴初以僉都理河道丁憂歸再以副都任三以副都御史往任以宫保尚書歸四復以右都御史任大臣眉夀者蔣恭靖瑶八十九劉清惠麟董宗伯份俱八十六顧宫保應祥八十三閔莊懿八十二早逹者蔡侍郎汝楠十八嵗第進士弇山堂别集閔元衢曰先宗伯于先莊懿為從孫非叔侄也刑部尚書閔圭讞獄不稱上旨怒甚一日與尚書劉大夏論及之劉與閔同年交厚且知其為人欲解救之而未敢言俟上諭畢對曰法司執法恩歸朝廷似未可深怪上曰爾第云古昔何人如此執法大夏見聖怒莫知所對上詰之對曰嘗聞孟子云舜為天子臯陶為士執之而已上默然久之怒意未解大夏竊意所對欠避諱心悔其失上徐曰朕亦知閔圭是老成人物欲求一人以易之不可得但此事執之太過耳明日奏下允刑部之議吁上之明燭人心而強於從善如此治世遺聞武宗駕至淮安太守薛贇沿河皆拆去民房以便扯船縴皆索民間絹帛兩淮為之大擾過揚州蔣瑶為揚州太守獨不拆房曰沿河非聖駕臨幸之地扯船自有河岸可行何必毁壞民居有罪知府自當之江彬傳旨要揚州報大戶蔣曰揚州止有四箇大戶其一是兩淮鹽運司其二是揚州府其三是揚州鈔關主事其四是江都縣揚州百姓窮别無大戶江又傳旨云朝廷要選繡女蔣曰揚州止有三箇繡女江問今在何處蔣曰民間並無知府有親女三人朝廷必欲選時可以備數江語塞其事遂寢揚州安堵如故後武宗崩薛贇治罪蔣纍官工部尚書四友叢説吳興蔣尚書瑶嘗為揚州太守抵任之日過一委巷適樓居幼女誤將盆水傾下濺公袍帶盡汚矣公無幾微動色頃之捕卒縛幼女父至公曰彼出不意中耳何罪立釋之復問曰得無驚幼女乎勞以金錢去越數載公以乏嗣從廣陵娶妾所娶即前女也舉二子昌公後謂非德報耶陸伯生樵史劉清惠公麟解尚書歸里常衣白布袍首烏紗巾徒步過其友定陶大尹趙公守家已而某參政者突至不知其為劉公也頗易之公逡巡一揖而退主人送客入參政問揖者為誰答曰南坦公也參政大慚沮時參政之輿從赫奕甚且相見不為禮故也大尹之子為余言又尚書少從大尹父館千户明經者授舉子業故與大尹善來則烹牛肚麵斤炊飲待之公所好如此客座贅語吳甘泉長興吕山人也博物洽聞於書無所不讀而尤精於數其學主先天加一倍法而以時日占之吉凶成敗之理具有左驗時都御史俞公諫撫吳郡牒報者日至公以為憂延甘泉而問焉甘泉以數推之曰賊必來來未及城而敗計其時蓋中秋節也已而果然余將舉山妻葬事而甘泉適至試以葬日隂晴卜之甘泉曰自午而前半隂晚乃雨至期卒如所料所著書數千卷時人稱之曰甘泉先生伍餘福莘野纂聞箬溪顧先生應祥官巡撫家居盛暑中有二司訪之呼田間一老奴揮扇奴取小兀坐先生後先生不覺也既覺詰之奴曰汝有風足矣何管我坐為主賔大笑此奴不可謂知禮然膴仕而風味若此山家真率了無官套令人嘆羡云見聞雜記武康張沂字希曽彈張后隂強陽弱外家不法事疏出屠吏部滽駭而謂之曰汝死於此矣不意孝宗允其奏屠使速去以避禍後孝宗思之曰某乃好官人何久不見復舉為南京工部名自此重暖姝山筆太宰默泉吳公鵬筮仕都水司主事提督徂徠泉前任為湖州陳公良謨公特訪之别時問曰兄何以教我陳公具一小册題曰交新忠告條於左曰某事吾所經畫頗當君宜仍之某事宜於前而今有弊吾欲改而未改君宜易之某人可用君用之弗疑某人不可用吾欲黜未黜凡十餘條吳公初至按册試一二衆以為宜乃遂悉措諸行人翕然稱善吳公後官冡宰以是與陳公為相知先進遺風孝豐吳封君南山公之父諱玒行八其人謹願畏法一日自外歸過其别墅望見東園中有人正在樹偷栗乃亟勒馬轉迂路三四里抵家語其故且曰設吾過而彼見之必倉皇墜地非死則重傷矣今恣其所取損吾幾何哉見聞紀訓歸安施相之佐翊之佑兄弟俱為知州致仕家居田産參差有唇齒之隙親友日為處分不能解同邑溪亭嚴公鳳素以孝友著聞事兄如父周恤保愛無所不至是時偶遇翊之于舟中語及産事公顰蹙謂曰吾兄懦吾正苦之使得如令兄之力量可以盡奪吾田吾復何憂因揮淚不已翊之乃惻然見聞紀訓駙馬都尉崔元以關説獄情為刑部主事陸澄所劾且并其名帖封入上曰刑官執法不容囑托自其職分何必以帖封奏竟置不問後澄以議不合見擯逮大禮既定乃自悔議禮之非初為人所詿誤後質於師王守仁而知張桂諸賢之是疏下吏部尚書桂蕚言澄修慝不隱事君不欺宜聼自新以風各司于是詔復其官後上閲明倫大典見澄原疏謂澄造悖理之論惑誘愚蒙又假以悔罪為辭悖惡姦巧仍謫之纍瓦編吕柟稱陸元靜人品甚髙其學問得於致良知者為獨深惜其矯情干譽所守不固為九重勘破也元衢山泉歸田之後以墳典為樂從一菴潯陽弇州諸公借書潯陽常兩評歐文而初本失之友人故借後本於山泉深致恨恨且云故書之不闕即故人之不可忘也其珍惜至此猶肯傳示於人視近之擁百城者雖懿戚素交不一假借相去何如哉弇州有慎侍御子正借書絶句云苕水穿階草滿除瀟然都似子雲居十年鉛槧頭堪白又乞邢家未校書閔元衢雙林寓牘吾湖前輩煞有眼力會看文字嘉靖戊戌會元袁公諱煒閔午塘先生所取也癸丑會元曺公大章董潯陽先生所取也丁未會元胡公正蒙則吳霽寰先生以正郎同考取之見聞雜記閔公午塘宦京都時得一棄宅人不敢居閔曰此宅幽暗故隂氣盛也乃揭瓦推壁使暴烈日中久之方修葺居之竟無恙蓋其隂氣已散故也説餘唐荆川厯數之學得箬溪顧尚書傳其法又得東臯周臺官印正嘗云知厯理又知厯數此吾之所以異於儒生知死數又知活數此吾之所以異於厯官金陵瑣事余為比部郎嘗與蔡子木徐子與吳明卿謝茂秦飲謝時再遊京師詩漸落子木數侵之已被酒髙歌其夔州諸咏亦平平耳甫發歌明卿輒鼾寢鼾聲與歌聲相低昻歌竟鼾亦止為若初醒者子木面色如土子與復與子木論文不合而罷後五嵗而子木以中丞撫河南子與守汝寧明卿謫歸德司李張肖甫謫裕州同知皆屬吏也子木張宴備賔主身行酒炙曰吾烏得有其一以慢三君子尋具疏薦之弇州巵言周氏紀言載唐一菴先生與衆友夜話將入寢問此時還有事當料理否衆曰無一菴謂今天盛寒吾輩飲酒樂甚諸從人尚未有寢所衆謝不及所以然者以此時惟欠伸思睡而已而一菴獨體悉於衆情之所勿察真仁人之言佛菩薩之慈悲也竹窗二筆有友人謁湖州唐一菴先生顔色雕瘁問治生之術何為而可一菴語之曰天生人以耳目手足能視聼行持此固天以治生之道付之足可養人惟不肯勤渠盡耳目手足之用是以貧苦耳君第勿惰其四肢當勿憂貧其人欣然謝而去後二年謁先生則已鮮美無向時貧窶色先生問之曰近年為童子師朝夕勤誨童子雲集賴此以充衣食吾人慎勿惰其四肢哉推篷寤語嘉靖乙丑吾湖張莊僖公掌院公子天秩偕余至會場前閲示鹽場侍御已出示不許舉人進柵內間走捕者因執張從一人欲送御史所張公子聲色不動其從者亦不曰吾御史大夫人也任縛去既而釋之可見莊僖公家法之謹飭而子若僕之間於教也吳小陵先生一儒于茅公坤為鄉同年戊戌同上春官又同邸寓茅舉進士小陵下第安其寓不徙且為茅書帖佐冗檢點他事得失進退之際漠然不介其懷也友人兄弟同寓於杭弟報捷兄茫茫遷他所去然則小陵之賢於人逺矣哉後庚戌成進士官至太平知府張莊僖公為給事中魏時亮所劾魏新進未知公之素而張之親吳某托公永吏部不得怨公而揭之魏者公既去衆知所自來吳考察奪官魏江右人後副院席莊僖子天德行取至京深慮舊郤魏聞之引見且謝曰少年入流言誤彈尊公終身為恨今乃得補過遂薦入臺湧幢小品壬戌都察院左都御史張永明以疾乞休許之令馳驛歸永明清謹自持在中臺頗以振飭紀綱為任是時文選郎中吳汝桂都給事中胡應嘉等鼓黨與干擅朝政公卿多畏避之永明不為撓遂為其黨魏時亮所醜詆竟不安於位而去公論惜之按是時永明爭部院見堂之禮選郎羅某見詘而其黨遂羣起而攻之雖以徐階當國而不能挽其去可謂介於石不終日者矣其後時亮謫官蓋償永明之無故見罷也而萬厯中舉朝無知前事者特起時亮官至尚書世廟識餘録吳俊伯如佛門中講師雖多而不識本來面目藝苑卮言評文徐幼文張來儀如鄉士女有質有情而乏體度張靜之如小棹急流一瞬而過無復雅觀劉元瑞如閩人強作齊語多不辨孫太初如雪夜偏師間道入蔡又如鳴蜩伏蚓聲振月露體滯泥壤施平叔如小邑民築室器物俱完蔡子木如驕女織流黃不知絲理強自斐然吳峻伯如子陽在蜀亦具威儀又如初地人見聲聞入大乘則逺藝苑巵言評詩吳興臧公繼芳嘗守吾郡以清白稱比遷楚臬使卒於官僚友檢其槖裝磬如也惟一竹簍封置空齋舉之頗重諸大夫疑曰此中有物乎護藏以候公子至則啓視之乃一藥磨也諸大夫且笑且嘆昔鬱林守載石壓舟以歸公其人矣陸伯生樵史歸安有蕭總管者淫祠也豪右欲詛有司輒先賽廟廟壯麗特甚戚南玄為令時一日過之值賽期入廟中列賽者階下諭以禍福恐其不解譬之曰天久不雨若能禱神得雨則善不爾廟且毁罪不赦也舁木偶道橋上竟不雨遂沉木偶如言又數日舟行忽木偶自水躍舟中侍人失色走曰蕭總管來蕭總管來君笑曰是未之焚也命繫之顧岸旁有社祠别遣黠𨽻易服入祠戒之曰伺水中人出械以來已而果然蓋䇿諸賽者必且賄沒人為之也羅念菴前刑科都給事中戚南玄狀蔡公汝南嘗為楚方伯一日徐子與吳明卿並過武昌公欵之黃鶴樓出詩草就正二君覽畢默然不出一語蔡大失望無何蔡公持中丞節撫洛二君皆以屬郡守入謁私相顧曰倘公記及黃鶴樓故事奈何反執手板進公笑曰二君我故人也可行此耶歡然擕手即命酌二君退而悔曰真可愧矣陸伯生樵史臧公堯山守吾郡值金澤盜丁彪聚衆百餘人販鹽湖海間撫臺議勦公曰盜本無他志兵一興當有玉石俱焚者請無議勦諭令自歸脅從者卒縛彪以獻雲間雜識徐文貞當國按院陳公文峰建青宫太師坊上扁之日按君率屬北向行四拜禮獨太守堯山臧公挺然獨立按君問曰府官何以不拜對曰此特相公空銜耳且通衢拜跪亦不雅觀按君默然上沈巽州先生工部亞卿鏡宇公之封翁也家教甚嚴子孫畏憚每夜膳畢子孫俱集燈下聽教必至更深寒暑無異一日李子過訪留飯先生安席鏡宇公居長執杯箸送先生主賔相對自始至終時先生四子俱侍並不聞一字出聲亦可謂難得之家法矣見聞雜記邵康山先生為學人家居不謁太府萬石梁公一日問唐師曰聞貴郡有邵春元何以不相見師曰他要講禮過然後見耳萬公曰禮不必講相見自然上坐遂投帖先拜邵邵答之此不惟見萬公禮賢下士之髙節而邵公之為人愈可想其清修自重矣嘉靖乙丑肅皇帝春秋髙矣臣范應期對策領回寓邸恭讀御批第一甲第一名成祖著有司遵奉改正蓋應期誤寫成祖文皇帝為太宗文皇帝故御批云云可見天生聖人其精明逈出前代彼閣部大臣烏能倣佛其萬一也凌公約言因閔午塘先生始識南渠吕先生本於都下凌時尚未領鄉薦也後數年入南雍肄業呂為少司成矣師生之分懸絶吕特訪之於寓又十餘年凌謁銓曺受全椒令吕入內閣凌執官銜帖子謁之吕趨迎曰何以套為必欲以生平禮延之上座凌固辭吕笑曰使汝作相終欲置吾傍坐耶令從者堅持其坐不能動凌竟當客禮焉吕公盛德何止加人一等見聞雜記按院臨湖太守萬公雲鵬率屬官入見安吉州守某偶稱按院為老爺蓋一時之誤非違衆足恭也太守面叱之曰不才按院亦色動既出烏程令前峯戴公歸安令南玄戚公白太守曰知州稱呼過誤老大人只宜退而教之面叱非禮萬公隨揖二令曰承教果是我過當了次日又至兩邑門外投侍生單帖囑門吏曰多上覆吾特來謝教公之勇於從諫類如此一守二令其皆有古人之風矣哉事在嘉靖七年間姥溪施運同名可大祖號鄰溪年六十餘鬚髮皤然矣與客對坐時有族叔在襁褓中者乳母抱而過焉鄰溪忽佇立客問曰何故答曰家叔過此成𢎞間人物而又深於詩禮者鍾祥育秀曽孫聨登科甲者二人徐子與先生好客尤好少年美麗者一客醜甚自負能詩介蔡子木先生薦之子與蔡作書盛言客自喜可喜狀以家人將之恐客之窺書而求易也子與得之大歡亟延入愕然笑吃吃不止贈以詩曰自信金聲能擲地誰知玉貌不如人客猶得意傳示為重湧幢小品隆慶四年九月大學士髙拱極論先朝得罪諸臣不宜概擢顯先帝之過上是而褒之浙江撫臣谷中虛乞加主事唐樞秩拱寢奏史概御史房寰督學南畿多物議忌海忠介剛正極力醜詆至目為天下大盜古今劇賊章再上進士彭旦陽顧涇凡諸敬陽不平連名劾寰掃滅公論排擠公忠乞賜罷黜寰有大援三臣皆得罪削籍南駉卿沈公繼山疏曰近一二年來今日以建言防人之口明日以出位加人之罪且移文各衙門譏察禁阻而進士觀政復令堂官約束教訓夫約束貪競等風可也而反約束其讜言直諫教訓忠良等語可也而反教訓其箝口緘唇此風一倡其弊何極諫官避禍市寵不言矣而庶官又不當言大臣持祿養交不言矣而小臣又不許言萬一有權姦大孽機密重情皇上孰從聞之然則今日約束教訓甚非國家之利也臣豈不知臣之言也是亦出位不蒙喜事之譏必受好名之罰然使舉朝俱不言事斯人盡不顧名世道將何所底止哉請復彭遵古等官務除壅蔽之習亟反依違之風疏上蒙旨切責寰復攻海沈二公肆言臣為善二十年既與沈思孝枘鑿不謀生平大節亦可概見又言臣曲謹木強無不如海瑞獨瑞崇詭飾虛希寵干進則不屑為即少世廟一疏又不敢效語絶詭誕天下共疾其罔上無恥竟獲優容豫謂四賢一不肖今再覩矣伍袁萃林居漫録李臨川先生以名諫僉臬投簮歸老朴儉一如寒素嘗謂豫曰今貴家子弟往往致飾精舍爐香瓶卉珍玩種種羅列於前而一經四籍未嘗觸目口語人曰此吾讀書處也余每憶少小為諸生時床前但燃一缸內人女紅余攤書共照每至夜分未嘗無得也此蓋先生所為錚錚林下者乎見只編李臨川先生初授新淦縣令蕭公廪方為御史有名過之先生來謁未即見先生曰柱史至縣界則令為主公為客令來謁則公為主我為客不得遲遲蕭頗愠曰偏只知縣過口既見色甚厲後會曾見臺談及言狀曾曰此賢令未可輕議蕭後再過李再見深引過謝之前輩風度如此湧幢小品德清有老人蔡四者余于丙子嵗見之年百有四齡矣余問何以得此夀老人曰童子欲夀乎然夀在天耳老子食色猶人三十病瘵氣不絶者一線若有人語豫曰鹿角膠三字以告吾妻妻問之醫往武林搆得食僅斤許遂完健如初自兹日服延算到今顧語之他人則不驗也豈非天乎時泗上趙卓菴侍御為令以粟帛禮待又四年而歿賢奕編神廟怒妖書離間意在必緝而錦衣百户崔德妄以皎生光邀功會審時皎已頻刑不能動舁至沈侍御裕前沈厲聲曰妖書是汝作如何不招皎舉首乞憐曰實不是小人作沈聲色愈厲皎怒目切齒恨而過之正法後沈出差行至半途得病沉重謂僕從曰吾生平自揣無愧惟審妖書時略涉孟浪原不該硬坐皎某今昏惑中每見某向我索命吾病其不起矣已而果卒史概但注造書東殿中書趙士禎之死而此則見於中涓劉若愚酌中志略然其時右少宗伯李九我頗羅織所斷十二欵以及始禍之崔何皆無報也王冏伯于沈與趙各有詩稱之豈亦誤于傳聞與病餘贅筆一説沈愚皎云爾姑承認我於臨期免爾死皎遂不辨沈之卒在德州上嵇竹城元夫川南太史之子也以簡傲忤嘉禾節推坐死髙中玄當國出太史門營解得免召入京中玄執手示六卿云此座主之子天下竒才也趨者輻輳却之不應商人以萬金求請亦不應髙失位隨至蘆溝橋檢囊中僅三十金付之歸貧甚嵗暮大雪坐涯次酌水給諫李臨川時家居謂侍兒曰此時嵇必大困載酒熾炭棹舟從之共醉贈資而歸未幾卒湧幢小品謝在杭司理吳興時太守北人極忌衣白或出遇白衣者輒置之法因前守卒於官甫蒞任盡撤其堂宇𪠘舍掘地數尺重為架造百姓苦之在杭作吳興竹枝詞數首有云五月新絲白勝綿輕羅織就雪花鮮為郎製得雙襠子官府頭行不敢穿又云臘盡春生年復年望郎長望太湖邊水門不閉聞簫鼓廽避黃堂採木船太守聞之不悅時當計吏遂隂中之調為東昌司理然民間盛傳其詩為口實也竹忩雜録胡彭述字信甫海鹽人性好書見異册至典質買之不靳吳興書賈每一來欣然豫之飲食有一賈疫舟中不能歸命老蒼頭搖櫓送歸去人以為笑勿顧也嘗論次所藏書作好古堂書目自立序海鹽圖經余鎮中御書閣相傳為宋髙宗南渡過此留徽宗畫鷹一幅而去又趙松雪滚馬圖一卷僧世守袁胥臺戍吾湖宿其處題曰御書閣下鷹還在明義菴中馬尚存明義菴一曰法華即御書所創處也今菴閣如故而二物失之已久且胥臺見時是嘉靖初年事失去是六十年前事蓋小沙彌竊去歸董氏質庫中僅得銀二兩事覺僧往還不可得訴於大宗伯潯陽公公厚贈留之然非所甚好為蒼頭持去不知歸何處乃孫青芝祠部問於祖不應細訪求絶無蹤迹蓋妙畫通靈必鬼神所寶化去久矣湧幢小品庚午雲間錢公之被逮也夢自俯伏於庭旁一人金盔紫袍揎袖而立又一人指之曰此救汝者問為誰曰姓閔適伯兄冡宰公初任總憲會讞間錢向公辨最深公必隨事折之而其議刑緩急獨衆異梁大司馬身在事外者也以危言相怵河南道御史吳屬官也至欲公書所議為據而公不為動也乃上疏報可是冬適停刑明年夏特旨釋而遣戍夢之靈至是哉錢公不勝感激聞公致政從戍所以書來謝云病餘贅筆梁名廷棟吳名阿衡皆中州人又同年也吳興備志卷二十九
