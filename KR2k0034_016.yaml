body:
  text: 吳興備志卷十六明董斯張撰田賦徵第十二唐嵗貢御服折造布二百二十端紫笋茶一萬串供上食厨糙糯米一千三百八十三石三斗三升黃糙米一百九十八石木瓜糝四坩木瓜煎三坩單黃杬子一千三百五十顆重黃杬子一千三百顆談志按新唐志湖州土貢御服烏眼綾折皂布綿紬布紵糯米黃榿紫笋茶木瓜杬子乳柑蜜金沙泉統記云龍德三年貢布三十端供御服折造布二百九十匹大厯六年始進木瓜糝大厯元年進木瓜煎單黃杬子二年進白蜜三石重黃杬子五年進以上州司並以兩稅錢和市充黃糙米貞元十三年進糙糯米十四年進砂盆十五年進元和五年減米六十六石本郡未嘗經兵火架閣典籍具在統記興國中攝本州長史左文質纂有可考據故所載年代數目可以補史之遺缺宋太平興國三年貢乳柑五百顆白編布二十匹紫笋茶一百角金砂泉一瓶其瓶浪銀打成并鎖鑰重五十六兩大中祥符間貢白編布二十匹乳柑五百箇熙寧中貢白紵二十匹漆器三十事紹興以來貢白紵編布二十匹竊考唐之嵗貢如烏眼綾綿紬布紵唐初所貢數雖不詳統記載龍德三年布三十端可見其不多矣供御服折造布與木瓜杬子茶蜜代宗大厯元年至六年始進惟是以兩稅錢和市供故不甚病民糯米黃糙與沙盆德宗貞元十三年至十五年始進至元和中米已三損其一乳柑不載所進之年紫笋茶大厯五年始於顧渚置貢茶院院側有碧泉湧沙粲如金星則金沙泉亦大厯後所進也唐自髙祖太宗以慈儉保養天下物貢有常未嘗妄取後嗣相承至於肅宗不聞更易大厯貞元間荐經兵革貴官用事至以口腹之奉責供於逺不憚煩費纍增不已亦足見唐室盛衰之政也入國朝吳越歸版圗于職方郡始修貢每歲惟貢編布乳柑茶角瓶泉如統記所載視唐數已大歉後又減茶泉故舊圖經惟載柑布二物後又免進柑故九域志惟載白紵漆器今止貢白編布而已列聖相承以節約為家法先王所謂物土之宜而致其利者代益以損可為萬世法以上並談志熙寧十年以前天下諸州商稅嵗額浙西路杭十三務十萬貫以上湖十務秀七務俱五萬貫以下酒課嵗額杭十務三十萬貫以上湖六務秀十七務俱十萬貫以上文獻通考張按浙西三郡湖最險僻十苕水不抗一錢唐即秀之殷贍濃華何翅天上而宋世稅額視杭且半實與秀衡湖民生此時寧無萇楚之嘆聖世曠然一蠲之何幸也紹興間三丁共納絹一匹為錢七貫省每丁計納兩貫三百以上細民重困多有轉徙三十二年轉運司行下給甲帖付人户自排丁名以是絶隱漏之弊數多增剩知州事陳之茂陳請乞以所增剩丁各抵元數從之自是五丁共絹一匹每丁僅納一貫三百文減幾及半民得小蘇然視他郡猶重也乾道八年知烏程縣事余端禮力請於朝丞相曽懷將相府别項錢抵納又減作七丁共捐納一匹今每丁納一貫省又折納官會率為錢五百是二公之德鄉人不可忘也談志景定四年賈似道以國計困於造楮富民困於和糴思有以變法而未得其説知臨安府劉良貴獻買公田之䇿春二月買公田于浙西臨安通判陳言往湖秀催督謝奕燾趙與訔王唐圭馬元演買田湖州浙西六郡買田三百五十餘萬畝初買田時務欲數多不計田之美惡及收入之際田畝或少或瘠佃人或貧或頑凡有所負及不足之數悉取償于田主於是六郡人莫不破家者矣通鑑續編張按癸辛雜志知郡謝奕燾寓公趙與訔撫幹王唐圭臨察判馬元演五月復立分司以董楷司安吉公田與訔即孟俯之父也元延祐元年秋詔江南民自實田先是張驢言浙江江西田多敗蔽請經理即命驢往限民四十日以所有田自實於官期限猝迫富民黠吏並緣為姦民不聊生樞密副使吳元圭入見言江南平幾四十年户有定籍田有定畝今經理者務增多為能元元困苦恐變生不測非國之福命遵舊制免江西浙江自實田租張驢在浙江復以括田迫民有死者御史臺纍言其害故有是詔函史洪武七年甲寅五月上以蘇松嘉湖四府租稅太重特令户部計其數如畝數稅七斗五升者除其半以蘇民力松江新志洪武十七年甲子七月命蘇松嘉湖四府以黃金代輸今年田租上建文二年三月翰林院侍書史仲彬疏曰國家有惟正之供賦役不均非所以為治江浙本賦重而蘇松嘉湖又以籍入沈萬三史有為黃旭紀定準租起稅此以懲一時之頑豈得據為定則乞悉減免以蘇民困竊照各處起科畝不過斗即使江南地饒亦何得倍之奈有重至石餘者臣往年面奏先帝賦斂太重蒙旨加勞特以臣本蘇人而史有為又臣之族屬也恐坐以私未敢盡言幸逢皇上明聖事每從寬敢竭愚忠伏聽採擇疏上報可致身録正統元年三月令浙江嘉湖直𨽻蘇松等府官田起科每畝秋糧四斗一升以上至一石者減作二斗七升二斗七升以上至四斗者減作二斗一升一斗至二斗者減作一斗從巡撫周忱之言也資治通鑑國朝湖州嵗貢南京殭蠶一十五斤乾葛五十斤桑白皮二十斤牛膽南星二斤烏梅三十斤蔓荆子三斤草決明五斤禮部殭蠶一百三十五斤烏梅三百七十斤乾葛五百五十斤桑白皮二百八十斤牛膽南星一十八斤蔓荆子二十七斤草決明四十五斤枳實三百八十斤浙江通志吳興備志卷十六
