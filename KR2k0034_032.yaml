body:
  text: 吳興備志卷三十二明董斯張撰匡籍訛第二十六羣書互閲頗有郢書張輒為是正之不敢依違瞢兹來學獲罪先逹無讓焉南史四則沈麟士隱吳差山時人語曰差山中有賢士張按郡志德清有吳羌山羌漢世寓公也以羌為差當正沈重字德厚見後周書李云子重誤顧歡吳郡鹽官人李以為吳興人誤庾信封武康縣侯見後周書若梁書庾肩吾未嘗有此封也南北史於其父子並云封此誤矣古詩所又獨歸肩吾緣不取四史合觀之故舊唐書三則德宗紀以湖州刺史常衮為福建觀察使誤張考衮傳云衮再貶為潮州紀誤寫耳錢起云吳人孟郊云洛陽人誤衢按姑蘇志載錢起仍其誤也姚思亷陳叔逹徐齊𥅆徐堅沈傅師皆不書吳興人誤姚陳徐皆自吳興入關沈自吳興徙吳新唐書一則宰相世系表以姚思聰為武康姚最子誤張按獨孤及祕書監姚子彥墓志云其先馮翊蓮勺人也至髙祖僧洪徙家河東祖思聰祕書少監父坦汝州梁縣丞豫讀後周書最父僧垣非僧洪則南仲裔本吳興而思聰自河東産非最子也當以志碑為證勞志亦仍其誤云姚之在吳興者皆思聰後云宋史五則俞汝尚孫俟敷文學士史以俟為侔誤俟字居易其非名侔審矣葉清臣自烏程徙吳中不書自烏程誤李心傳寓湖州史以為潮州誤詳寓公徴髙文虎平江府吳興縣主簿誤當作吳江莫汲字子及莫濟字子齊莫澄字子登則莫濛字子蒙無疑宋史新編從宋史刪出作子闕誤然無龜齡集如此亦不敢妄出己臆也真西山趙正惠希懌墓志云子三人與惁與勤與􅊸宋史希懌與􅊸各傳一曰燕王八世孫一曰燕王十世孫源流昧而世次乖柯氏新編附與􅊸於與歡亦不倫希懌子又有與願為寧宗所召立為皇太子改名詢西山不之及有所避也孟至孟垕孟奎栝蒼彚紀稱與願子談志稱與􅊸子陳涇通鑑續編一則宋景定四年遣謝奕買田湖州張按癸辛雜識知郡謝奕燾也作謝奕誤文獻通考一則考云陳舜俞嘉禾張按令舉烏程人罷官歸遷居秀之白牛村詳宋史吳興其枌榆也馬氏所載殊誤大明一統志亦誤仍之續文獻通考四則唐棣宜興人棣作杕宜興作吳興誤道學考沈文季作沈文考誤諡法考宗廟考云守吳興守劉太和有惠政立生祠於烏程學內張按郡乘及諸書俱未聞劉太和者明正德間劉莊襄公天和實稱吾湖循吏通考誤以天和為太和耳劉燾善書山谷稱之曰羊欣復生考以為劉誼誤太平御覽五則御覽引會稽典録沈震烏城人按郡國志未有以烏城名者烏程東漢順帝以前屬會稽郡烏城必烏程之轉誤也御覽所傳僅錫山本舛漏殊甚如邱靈鞠亦云烏城人沈崇傃乃云吳國人太守陸納之誤為吳納孝義吳逵之誤為吳逹不可縷述姚叔祥云秀水好事家有宋世所藏御覽千卷特精妙只少七卷如覔得一竒狀也顔魯公集一則吾烏程及福清俱有黃蘗山江淹為建安吳興令故有遊彼山詩自杼山碑有即淹賦詩之所語而談氏之志因之不觀其首云閩雲連越邊近得福州志為正其訛元衢吳興太守歷官記一則周文育子寶安孫䂮守吳興者僅寶安而兼及文育與䂮又以寶安為䂮子俱誤辨在官師徴杭志亦仍此大明一統志三則到仲舉以為陳仲舉武康人誤又名宦人物兩見尤可笑包融陸龜蒙沈括俱以為郡人誤别有辨錢廣晉吳興長城人與平陳敏亂志云宜興人誤浙江通志五則何叔度何敬容並吳郡太守云吳興悮戴顒知歸安志以顒為融誤常楙見宋史楙作𢡟誤姑蘇志勞浦唐三志武康志並誤陸龜蒙吳興郡佐寓長城志云郡人誤危楨知潮州見宋史志云知湖州誤勞志十二則志云元仲景遷吳興太守張按梁書元景仲非仲景也今正之志云陳仲舉長城令按陳到仲舉非陳也今正之吳興八絶只菰城嫗曹弗興兩人吳興産耳考陳夀志及張勃吳録吳範上虞人趙逹河南人皇象江都人劉惇平原人嚴武彭城人惟宋夀未詳此云吳範皇象福增鄉人劉惇松亭鄉人趙逹長興人嚴武宋夀震澤鄉人不知何據惇作淳亦誤沈鄷宋書自敘鄷字有邑旁諸生皆作豐非也又陵墓條云漢有尚書令禮墓金鵝山沈氏漢時止四墓一海昏侯戎一海昏長子尚書令鄷一海昏少子河間相􅕺一景子荆州刺史彥志云八聖寺梁青州節度使沈子真捨宅張按節度之名昉於唐今正刺史水晶宫本唐刺史楊漢公詩漢公字用又志云楊傑字次公誤次公號無為居士與東坡遊宋也未嘗守湖也沈君諒武后相見唐宰相世系表志云君亮誤黃龍光三字山谷書見輟耕録癸辛雜識徐氏掌故勞以為蘇仙書誤文同元豐中出守吳興至宛邱驛忽留不行沐浴衣冠正坐而逝未嘗屆仕也志混入名宦誤談志載歸安南園記碑吏部侍郎萬鍾家世錢塘卜宅橫塘之上洪邁為作記其人慶元時人也勞志以為宋季人且云國勢日危致仕家居元世祖三徴之卒不應以流寓為郡人以寧宗為季葉又以吏部侍郎為待制一事而三誤矣沈括居錢塘見宋史及王安石撰括父沈周墓志曾鞏撰括母夀昌許太君墓志其集名長興以括嘗封長興開國男也志以為郡人唐志以為武康人蓋據安石志中括四世祖從武康徙杭耳文獻通考云括之父曰周遘之父曰扶扶之父曰同皆以進士起家官皆至太常少卿王荆公集樂安翟太君二志文通及遼銘其伯父振之墓可考志以振亦郡人誤莫君陳子不知凡幾而其孫命名各由伯以及仲砥子仲虛仲圭觀談志進士表莫柯下注祖仲圭父漳可見勞志謂豫漳為伯虛子並未詳談於砥傳末注孫濛字義也如磻孫澄非伯鎔子亦别提出意其父必以仲名矣仲圭官侍郎著修行淨土法名後序見樂邦文類談志四則晉太常殷融誤以為齊吏部尚書宋寧朔將軍邱珍孫誤以為梁太守並正之見陵墓類陸修靜志以為德清人誤烏程令萬彧志以為萬瑊誤胡仔同父舜陟叔舜申寓湖談不言其流寓浦直言烏程人誤浦志八則志云知州事王回字深甫張按宋有三王回一字深甫閩人一字景深仙遊人皆神哲二廟時人此則南渡後又一王回字亞夫瑞安人見楊誠齋集非閩産也知州事王信字公亮誤張按公亮太原人宋初驍將屢立戰功此麗水人王信字誠之宋史可據也吳興舊志園第條載崔元亮故宅在長興縣西崔灣元和中為吳興刺史因家焉浦志亦同黃志則曰湖州刺史崔植籍我崔元亮字晦叔歷湖曺二州後為虢州刺史卒歸葬滏陽並無家於長興之説又考崔植字公修京兆人長慶初為宰相不曾出守湖州及查藏衍舊志云崔祐甫之後有居邑崔灣者家藏韓愈所作祐甫墓銘又藏崔逖崔植誥敕數軸理或然也以下三則見顧應祥長興志辨證宋末趙卯發權通判池州元兵渡江池守王起宗棄官去卯發攝州事繕壁聚糧為守禦計及元兵臨城都統張林已降卯發知不可守謂其妻雍氏曰城將破吾守臣不當去汝先出走雍氏曰君為命官我為命婦君為忠臣我獨不能為忠臣婦乎乃散其家資與弟姪僕婢悉遣之書几上曰君不可叛城不可降夫婦同死節義成雙與雍氏縊死於從容堂巴延入問太守何在左右以死對嘆息為具棺衾合葬祭其墓而去志因誤以節義成雙之詩為安吉太守趙良淳所作浦志遂謂趙良淳同妻雍氏縊死於集芳軒夫以卯發詩為良淳所作已誤矣以卯發妻為良淳妻使雍氏有知寧不忿於地下乎故特為之辨吳貴歸係孝豐魚池鄉人其父貴州當軍娶貴州婦生子帶回故名貴歸今其族裔甚繁即孝豐吳家也所據之山在吳氏相近西吳里語謬載正統十三年長興吳貴歸與安吉梅富作亂浦志又謂永樂十二年安吉梅富二長興吳貴歸合黨謀亂陽武侯薛祿帥兵討平之皆不考其實且安吉州志明載永樂間魚池鄉吳貴歸作亂長興安吉相繼騷動又與梅富生不同時今改正吳均傳云刺史桞惲辟為主簿誤按太守為刺史創隋唐間前此無是也浦志及歸安舊志咸淳十年狀元為趙良健按宋史則王龍澤也且勞志進士表止於七年浦唐當為施憲副儒姥溪創祠疏誤耳元衢張稚通有勝國歸安志係抄本借丁長孺而不及索衢托友人訪之亦無以應此書若在必多逸事而兩狀頭豈誤至此乎識以寓慨舊志紹定二年狀元黃朴歸安人福州志云侯官人癸辛雜識亦云是科省元陳松龍狀元黃朴皆福人故真文忠回黃啓云鰲頭並出於九仙元衢癸辛雜識云張先天聖八年進士志云康定不知康定無開科之嵗也以宋史及各郡參之自明元衢唐志二十則沈約宋書元嘉十九年白龜見餘杭吳興太守文道思以聞今第一卷云元嘉十年袁道思誤郡守杜孺休作杜孺林盛申甫作申輔誤郝鑒元湖州總管志中附安定墓下作郝鎰誤宋道判陳能千見建寧府志志作陳能誤江淹建安吳興令非苕也混入誤江秉之作江原之誤余端禮烏程令見宋史志以余為俞誤梁沈浚殉侯景之難志以為峻誤同時有一沈浚在南史文學傳志混為一人耳吳喜臨安人卜天與餘杭人臨安餘杭南宋俱為吳興今刪之沈重大同八年為博士入後周定鍾律志云天監中誤陳夷行志云長興人張考諸書及勞浦二志並不載唐宰相世系表云頴川陳忠不知所承忠即夷行父也志何據而入之按姚崇自吳興徙陜不踰五世自陳亡至武后不踰百年獨不可援沈括例志之乎捨元之而入夷行殊不可解施延字君子沛國人見後漢書順帝紀及太平御覽海鹽志當時或寓吳興非郡産也唐仍勞志之誤當正何栗仙井人志云郡人誤景定二年榜首方山京見宋史新編志以為方嵩誤勞志以為方景亦誤政和八年進士嘉王榜按文獻通考時朝廷以帝胄不可先多士擢第二人王昻為首志以嘉王為王嘉誤八閩通志以為重和元年寺觀類載恭惠王趙澧誤按秀王師揆贈太傅澧王諡恭惠見宋史古迹類孔姥墩以姥為老誤陵廟類載漢禮部郎中錢敞誤漢世但有尚書郎宇文氏始設禮部之名唐神堯初置禮部郎中兩漢無此官制也學校類載安定書院魯翀記按勞志安定書院夫子燕居堂碑銘江浙參政富珠哩翀撰今正志云令狐綯守湖州有惠政按新舊兩唐書綯為竒章黨人擠衛公不遺餘力其節度淮南時懦緩不為備賊龎勛偽降綯信之請假勛節鉞勛乘間擊綯大破之綯之出將入相乃爾可發一大噱又廣閲郡乘自談鑰而下數種並不言綯在湖有惠政乃新志别得之千載後乎此假殊不可解孟之縉妻趙氏名孟桂後為尼改名妙惠見癸辛雜識志云名妙惠誤掌故集十六則周喬傳王誕誤當作廣陵王誕袁玄瑛即袁秀字也集兩出似屬兩人誤顧憲西陵增稅議當入田賦考入宦業誤張搏為湖州刺史見新唐書談志云自中大夫拜徐云志以搏列在太守或自郡丞遷授何耶張按唐書職官志諸州有别駕一人長史一人司馬一人通典云至唐而郡丞廢矣唐書陸龜蒙傳亦僅云搏辟以自佐何據而以陸為郡丞耶按詩話總龜云磁湖鎮道士磯在楚中西塞山下薛能西塞山詩西塞收雲盡南湖片月斜宋書臧質敗走南湖以荷自蔽即此地也徐以為磁湖鎮道士磯並在吳興誤藝文載陶峴詩亦誤峴作現誤中之誤事見甘澤語載太平廣記第四百二十卷吳柔勝空城人初妻某氏生源泳流寓新市再妻吳興沈氏生淵潛其後淵之子復歸宣州今甲子孝亷吳休明柔勝後裔也自桑勝至休明十四世譜載甚詳故新市有狀元橋可據潛臨歿有湖州生循州死數語長谷公何據而改宣城為溧水且謂柔勝未嘗寓湖淵潛非新市産耶凌𢡟翁安吉人以為歸安誤程郃烏程人以薦入官以為歸安進士誤姚昌言靜海人姚鉉合肥人唐文粹序中云云志郡望也徐云吳興人誤愚齋集林靜所著見宋潛溪集徐云沈覬誤唐施肩吾之為湖人掌故據朝公武讀書志載之嚴州志謂肩吾分水人與同邑徐凝同舉進士學仙隱洪以書招凝莫知所終其裔施憲家藏及第告身題鄉貢進士施肩吾年三十五嵗注睦州分水縣桐峴鄉寶城里身為寄客習禮記雜文時務䇿據寄客二字當從吳興遷耶安吉太守趙公雙節之碑已辨誤在浦志萬嵗厯云太和中烏程閣下生蓮花張按太和晉廢帝紀年也徐以為唐憲宗且傅以臆説不知憲宗紀年元和也今正之宣和二十八年蘇湖大水誤按宣和僅七年耳考宋史湖秀諸州飢在紹興二十九年徐誤以紹興二十九年為宣和二十九年今正之卞山楚王神廟梁簡文帝作碑徐以為事佛不殺乃楚王英非項王也張按南齊書吳興有項羽神太守到郡必祀以軏下牛李安民奉佛法到郡不與神牛云云今簡文碑中所稱楚王𢎞兹釋教止獻車牛者正指李安民事也徐何據而以楚王英當之耶倪稱見文獻通考徐以稱為稱誤西吳里語十則後漢抗徐封烏程東鄉侯范曄書附度尚傳里語誤以為度上封當正之孟東野送從叔簡東歸詩載文苑英華里語云歸吳興何據簡平昌人常州刺史見唐書非苕人也唐人大都崇郡望是以有從叔稱耳唐詢字彥猷湖州守此云唐詢彥名與字混為一又少一猷字誤李商隱西亭詩不指地此云湖州西亭誤施宿之父元之歷左司諫見渭南集此云宿官司諌誤南齊書王僧孺傳虞義會稽人卒於晉安王侍郎邱國賔吳興人里語以邱國賔為晉安王侍郎大可笑張又按晉安閩郡名也宋晉安王子勳齊晉安王子𢡟可證里語乃以為晉之安王更可笑丁度知湖州民有抵茶禁者受千錢代鞭背此云盛度宋史兩人同傳恐誤憶耳釋通惠即贊寧兩出誤彭祖丁令威廉頗伍員荆軻藺相如蕭何嚴光石崇毛寶王僧辨狄仁傑俱云吳興人此何異盲婦弄琵琶演小説耶後周書樂俊兾遜湖州刺史按後魏廢帝元年以南襄州為湖州天和二年省洞州入湖州取楚洞庭為義非苕也里語混載之誤後周席固薛慎皇甫道周俱湖州刺史姚僧垣贈荆湖二州刺史不獨樂兾二人也長興志二則陳夷行誤入已辨在郡志趙卯發見宋史志以卯為昴誤宋德祐初元兵入四安鎮鎮將吳明死之志云陳明誤趙昻發作邛發亦誤臧衍長興志一則通鑑魏有安州刺史鉗耳康貿姓氏英賢傳梁天監初有鉗耳期陵自河南歸化父同祖光並仕魏為三品隋書有九門令鉗耳文徹唐書有鉗耳大福廣異記有竺山縣丞鉗耳含光北史後梁蕭綜嫁從父妹於鉗耳氏蓋夷姓也唐長興令鉗耳知命臧以鉗耳為姓名知命為字可笑德清志一則紫極觀沈道思所捨宅見勞志志以為文道思誤張按吳興劉宋時相繼有三守一文道思一沈道思一袁洵字道思每易淆誤故特表出之耳安吉志二則袁説友建安人寓苕中志以為安吉人誤胡長孺汲仲金華人志云胡碭山人誤苕霅野史王道隆一則沈炯亡身事仇王譏之良是然初明自內南還為陳世聞人卒諡曰恭子王云卒受顯僇不讀史之尤也峴山志一則衢按勞志寶元中滕宗諒于南國立五亭慶厯九年馬尋常宴六老於此以宋寶元為唐寶厯以宴客之馬尋即為宗諒俱誤烏青志二則烏重胤見唐書志載烏贊傳云仲胤當以唐書為證索度明王廟碑云孫氏世居湖郡考陳夀書堅世仕吳家於富春堅初封烏程侯其後皓亦封烏程未聞為郡人也張按漢世富春尚𨽻吳郡碑中湖字當為吳字無疑志又載索靖廟碑云孫權為張伯英之出尤誕謾不足據即如利濟院張循王香火院今遂訛以為睢陽矣三髙祠祀蘇子瞻米元章陳賢良也嘉禾圖經桐鄉志並以賢良為簡齋曾祖又大誤張按令舉烏程人簡齋則洛中八俊之一宋史犁然在也未窺史籍輒紀輿圖寧免旁觀者也書録解題一則方勺婺人詳泊宅編及吳思道集直齋云嚴瀨人徐長谷亦仍其誤米襄陽志林一則志林云蘇養直紳之後頌之族也殊可笑按頌即紳子也頌元祐中執政養直與其父堅俱從東坡遊若養直為紳之後則堅與頌實昆弟行頌其伯叔也稱親姪為疏族可乎七修類藁二則周密號泗水潛夫因霅溪合四水為一也更四為泗謂出山東魯縣誤又前有沈宋後有錢郎郎謂郎士元也以周郎等列之亦誤史書占俾一則南渡初尚書左丞葉夢得居辨山因號石林據水東日記載其所撰譜稱曾祖綱葬蘇州寶華山遂為吳郡人則宋史似非誤若與真西山同時撫州守祕書丞葉夢得自貴溪遷金溪石門别號是齋建石林書院性理大全引石林葉氏即斯人也胡元瑞乃地曰松陽官曰尚書且以二人皆徙湖州誤矣天聖間進士兩張先俱字子野其號張三影年八十二者湖州人其僅善筆札年四十八者博州人乃謂俱能詩俱夀考至歸三影於博何讀齊東野語及歐陽公集鹵莽至此甚矣著書之難也碧里雜存一則碧里雜存載成化間宫人周氏一詩云烏程周溥之姊溥以貢士至别駕考郡志貢士表無溥名以孝亷為别駕者沈溥也烏程新志載沈大姑事甚詳又載宫詞二首王氏耳談以為永陵沈太妃所作亦誤春渚紀聞一則何薳以余拂為南宫魁按馬端臨通考云元符三年進士省元狀元皆李釡紀聞云余拂誤北夢瑣言一則沈詢傳師子也孫光憲云沈侍郎亞之子也亞之官不至侍郎又一事而兩誤矣道山清話一則宋有兩張先俱字子野三影吳興人其一開封人孝章皇后戚黨歐陽公銘其墓者也見玉照新志清話云即三影誤史記正義一則吳太伯世家云中國之虞滅二世而夷蠻之吳興正義引杜預曰吳興烏程縣南也按子長之意謂虞滅而吳始興耳張守節遂以吳興郡名附會之大可笑函史二則吳澄傳附宇文諒按宇文子貞名公諒以公諒為諒誤長卿可稱曰司馬相耶史崇簡然字句有必不可刪處此類是也陳樞仕尚書員外郎見曾鞏志鄧直以為尚書誤南畿志亦然松雪齋集二則先侍郎阡表女孟艮集誤作孟銀松雪有手書今玄宰先生勒之鴻寶堂帖中可據也觀堂記澧王師撥誤撥當作揆此集在大同府署中訛字特多吾郡倘有同調刋之吳中足為水晶宫吐氣道園學古録三則牟隆山墓志云祖子才諡清惠按元史及黃溍隆山集序俱云子才諡清忠當以史為正志又云應龍字伯成按溍序及戴表元夀席詩序云字成甫虞公偶誤書耳元史亦然開國功臣録一則辛丑嵗十月張士誠趨長興劉成擊敗之禽其將宋元帥及甲辰十日又云獲其元帥宋興祖何耶今刪其一存甲辰所獲之名崇德志一則志稱時檄長于識鑒嘗擇壻淂湖州張孝祥後及第為時名士按宋史孝祥烏程人唱第後曹泳揖于殿廷以請婚為言孝祥不答又按萬姓通譜喻樗有二女富人交請婚不許及見汪洋張孝祥曰佳壻也遂以妻之以樗為檄何據兩浙名賢録亦仍此誤太平府志一則胡仔舜陟之子績溪人寓吳興以蔭入仕宋史徽志及浮溪集可證志以為當塗人且云崇寧五年進士俱誤氏族大全一則沈光號肉飛仙隋亡歸唐張按隋書光復仇殉化及之難楊氏忠臣也何緣歸唐耶萬姓統譜一則沈戎説降劇賊尹良封海昏侯辭不就見談志譜以尹良為烏程人封海昏大誤東林山志二則薛昻杭人諂事蔡京躐尚書左丞嘗誤呼京名自掌其面見宋史志云里人誤志云孟淳太平總管按守太平者淳父之縉也志誤劉鳳吳釋傳一則端師子居吳山之解空院乃長興之吳山傳屬之姑蘇誤陜西通志一則沈下賢居烏程小敷山見杜牧之垂吊詩自朝公武誤云長安人而志亦列之藝文矣廣西通志一則鋟胡銓封事者宜興進士吳師古見宋史志易為吳興誤臨川集一則沈遘封長興縣伯見西溪集臨川以長興為長安誤南豐集一則夀安縣君錢氏墓志云曾祖考宣德軍節度使湛誤湛當作偡見宋史吳興備志卷三十二
