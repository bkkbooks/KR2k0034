body:
  text: 吳興偹志卷二十二明董斯張撰經籍徴第十八寓公著述附吳太常姚信集二卷又周易註十卷昕天論一卷士緯二卷隋經籍志晉征西主籍邱道䕶集五卷沙門支曇諦集六卷松陽令鈕滔母孫瓊集二卷吳興孝亷鈕滔集五卷益陽令吳商集五卷又襍禮義十一卷禮答難十二卷襍議十二卷又禮誡襍記故事十三卷䘮襍事二十卷吳興太守沈充集十卷並上陸修靜道德經新說一卷髙似孫子畧征虜将軍沈林子集十卷隋經籍志給事中邱淵之集七卷太平御覽金紫光祿大夫沈演之集十卷侍中沈懐文集十二卷又隋王入沔記十卷南陽太守沈亮集七卷並上南越志七卷武康令吳興沈懷逺撰此五嶺諸書之最在前者也懷逺懷充之弟見宋書書錄解題司徒左長史沈勃集五卷隋經籍志太子舍人沈麟士集六卷又經傳義疏一卷國子博士邱遲集十卷又集鈔四十卷吳興孝亷劉氏集九卷並上特進沈約宋書一百卷齊記二十卷注梁武帝連珠一卷諡例十卷子鈔六卷襍鈔十卷珠叢一卷袖中畧記三卷袖中畧集三卷宋世文章志二卷梁新官品十六卷梁儀注十卷又俗說一卷襍記二卷四聲四卷隋經籍志奉朝請吳均集二十卷注後漢書九十卷齊春秋三十卷廟記十卷十二洲記十六卷吳郡錢塘先賢傳五卷續文說五卷續齊諧記二卷黄門郎沈璇集爾雅誌十卷揚州從事太史叔明孝經義一卷孝經發題四卷論語集解十卷後梁散騎常侍沈君攸集十三卷陳後主集十三卷沈后集十卷國子博士沈文阿春秋左氏經傳義畧二十五卷䘮服經傳義疏四卷䘮服發題四卷經典大義十二卷經典𤣥儒大義序錄二卷姚察文集三十卷文章始一卷梁書帝紀七卷沈炯前集七卷後集十三卷後周散騎常侍沈重樂律義四卷鐘律五卷姚僧垣集騐方十卷並上姚朂起予集四十卷舊唐書姚最梁後畧十卷本草音義三卷續畵品一卷述系傳一卷上最又有序行記十卷述行記十卷見經籍志徐堅集三十卷又註史記一百三十卷晉書一百一十卷大隱書三卷舊唐書姚思亷梁書五十六卷陳書三十六卷邱光庭兼明書十二卷規書一卷康教論一卷海潮論一卷海潮記一卷名賢姓氏相仝錄一卷陸羽警年十卷窮神記十卷茶記一卷教坊錄一卷沈既濟選舉志三卷江淮記亂一卷建中實錄十五卷陸龜䝉詩編十卷又賦六卷沈光集十五卷沈顔陵陽集五卷聱書十卷解聱十五卷沈亞之集十卷晁氏讀書志吳興襍錄七卷唐湖州刺史張文規撰文規張薦之後彦逺之父其為郡在會昌二年文獻通考宋璲苕川總載集十卷宋經籍志宋璲吳興人物志十卷璲字勝之烏程人唐藝文志詩式五卷詩議一卷唐長城皎然清晝撰髙僧傳張光安陸集一百卷癸辛襍志朱臨春秋統例二十卷春秋私記一卷春秋外傳十卷朱服文集十三卷校定六韜六卷校定孫子三卷校定司馬法三卷校定吳子二卷校定三畧三卷國子監文費令式一卷俞汝尚溪堂集四卷盧秉文集十卷又奏議三十卷萍洲可談二卷吳興朱彧無或撰春秋通訓十六卷五禮例宗共十卷直秘閣張大亨嘉父撰文獻通考朱肱内外二景圖三卷大隱翁酒經一卷南陽活人書二十卷朱肱撰並上吳興統記十卷攝湖州長史左文質撰分門别𩔖古事頗詳序稱甲辰嵗者本朝景德元年也南紀序五卷知漢陽軍于霆教授施士衡編何薳春渚紀聞十三卷孔子編年五卷新安胡仔元任撰其父舜陟命仔采摭經傳為之書錄解題葉清臣春秋纂𩔖十卷上石茂良靖康錄一卷朱勝非奏議十五卷葉夢得春秋讞三十卷春秋考三十卷春秋傳二十卷石林春秋八卷春秋指要總例二卷論語釋言十卷孟子道義二卷石林集一百卷又建康集八卷金石𩔖考若干卷宋經籍志石林書傳十卷葉夢得撰少藴博極羣書强記絶人書與春秋之學視諸儒最精書錄解題老子解二卷石林詞一卷維揚過江錄一卷俱葉夢得撰文獻通考葉石林上元古跡客座贅語沈琯南歸錄一卷文獻通考陳都官集三十卷陳舜俞撰上葛立方韻語陽秋三十卷歸愚集二十卷又歸愚詞一本信齋詞一卷葛郯謙問撰劉行簡詞一卷劉一止撰嘗為曉行詞盛傳於京師號劉曉行並上劉一止苕溪集五十卷宋經籍志劉寧止教忠堂類藁十卷葛邲文詞集二百卷詞業五十卷葛郛載德詩四卷朱勝非行状一卷劉岑撰朱勝非年表一卷勝非孫昱著倪思易訓三十卷中庸集議一卷論語義證二十卷合宫嚴父書一卷北征錄七卷並上齊齋䑓諫論二卷尚書霅川倪思正父撰書錄解題張有五聲韻譜一卷比常韻無悞學古編却掃編三卷徐度撰文獻通考建炎以來繫年要記二百卷工部侍郎李心傳微之撰葢與李巽岩長編相續亦嘗自隆興後相繼為之會蜀亂散失不可復得文獻通考建炎以來朝野甲乙集共四十卷李心傳撰上自帝系帝徳朝政國典下及見聞瑣碎皆錄之葢南渡以來野史之最詳者上孝宗要錄初草二十卷李心𫝊撰經籍志春秋考義十二卷舊聞証誤十五卷俱李心傳撰西陲泰定録九十卷李心傳撰丁丑三禮辨中興藝文志李心傳撰並上晦菴語録四十六卷著作佐郎陵陽李道傳貫之裒晦翁門人廖德明子晦而下三十二家刻之九江文獻通考晦菴續錄四十六卷李太史之弟樞宻性傳成之又得黄幹直卿而下四十一家及前録所無者刻之臨安志十五卷府帥吳興周淙彦廣撰並上施宿大觀法帖總釋二卷又石鼔音一卷宋經籍志沈樞通鑑總𩔖二十卷宜林集三十卷上沈詵東溪集二卷見勞志沈該神宗寳訓一百卷翰林學士年表一卷陰符經注一卷上程大昌集二十卷禹貢論五十二篇别有演繁露十四卷又六卷攷古編十六卷易原雍錄各十卷易老通言十卷文獻通考北邊偹對六卷程大昌撰上參政章良能有嘉林集百卷癸辛襍識劉光祖後溪集若干卷倪恕安陸酬唱集六卷莫君陳月河所聞一卷談氏家傳一卷談鑰撰沈复四益齋集若干卷見眞西山集晦岩集十二卷秘書丞沈清臣正卿撰錢几集二卷長興志周頡適菴集一百卷上朱煥文北山藳若干卷安吉志王洋東牟集二十九卷李迎遺藳一卷牟子才内制五卷外制三卷奏議二十卷經筵講義五卷口義二卷故事二卷偹邊三䇿近世厚徳錄四卷百鍊真隱李元綱國紀編沈濬道原為作序文獻通考姜䕫讀書譜一卷白石叢槀十卷絳帖評二十卷集古印譜十卷林洪字龍文德清柯山人有山家清供一卷說郛陳振孫書錄解題聚其家藏之書而評之振孫號直齋吳興人見文獻通考發端韋居聽輿一卷宋陳闕直齋之子霅川人說郛衢按直齋有子名造見齊東野語不知即此人否稿簡贅筆二卷承議郎章淵撰淵字伯深援之孫襄陽志四十卷宋郡守朐山髙䕫命教授吳興劉宗幕官上蔡任編纂為書詳偹志之佳者文獻通考昭明太子事實二卷知池州趙彦博富文編昭明廟食于池元祐賜額曰文孝書録觧題人彦博武康髙斯得徽宗長編孝宗實錄若干卷刋正杜佑通典若干卷續文獻通考恥堂集詩膚說儀禮合抄増損俱髙斯得撰䝉古偹錄一卷宋孟珙撰説郛閑治靜本論五卷将論五卷知樞宻院廣陵張岩肖翁撰書錄解題岩雖匪人然其才亦有可取惜不善用耳岩寓吳興程公許著塵缶文集内制外制奏議奉常議掖垣繳奏金華講義共若干卷寓山集三十卷吳興沈作喆明逺撰丞相該之姪紹興五年進士改官為江西運官常為悲扇工詩忤魏良臣陷以深文奪三官文獻通考仝菴集一卷吳興施士衡德求撰嘗試中教官為宣州簽幕坐廢雖牽復仕竟不進上宋釋贊寧鷲嶺聖賢錄一百卷宋髙僧傳三十卷僧史畧三卷要言一卷筍譜一卷傳載八卷宋經籍志元姚子敬選古今樂府一卷以夏英公喜遷鶯宫詞為冠升菴詞品王子中掛蓑吟三卷勞志周宻有浩然齋日鈔見本草綱目絶妙好詞見樂府指迷雲煙過眼錄見秘笈客談見歴代小史衛富益著四書考証易經雜說讀史纂要怡情録共若干卷王方叔有第一山人集松雪齋集宇文公諒著折桂集觀光集辟水集以齋書藁玉堂漫藁越中行藁共若干卷元史程郇栁軒退藁十卷上陳繹曾古文矜式二卷衢按繹曾又有翰林要訣見弇州法書苑趙孟頫印史二卷演琴賦一卷續文獻通考夏文彦字士良吳興人著圖繪寳鑑若干卷吳興志二十卷樞宻院編修郡人談鑰元時撰嘉泰元年也其為草未得為盡善並上吳惟信字仲孚吳興人有菊潭集癸辛襍識龎隆石舟詩話二卷篷忩吟藁一卷龎氏家乘周禮集說十卷吳興前溪陳友仁君復撰陸崑吳興名賢錄若干卷王道隆吳興名賢續錄六卷道隆又有苕霅野史若干卷經籍志嚴震直流芳錄三卷長洲陳頎景泰間分教湖州嘗取舊志編輯成書成化八年潯陽勞鉞廷器守湖與儒士張淵朝夕討論重加增補得二十二卷見彭華夏時正勞志序臧衍字有原與定山莊孔𤾉交著長興縣志閔珪莊懿公集十卷孫一元太白山人漫藁若干卷施侃菁陽集四卷凌震練溪集四卷施峻璉川詩集八卷文集六卷潘季馴留餘堂集十二卷河防一覽若干卷施儒西亭集十二卷沈節甫太僕主人集十六卷錢鎮淡菴集五十卷沈桐觀頤集二十卷劉麟南坦集十二卷國史經籍志閔元衢輯南坦未刻藁藏於家唐樞木鍾臺集三十二卷駱文盛兩溪集七卷董份泌園集三十二卷史記評鈔四十卷漢書評鈔四十卷後漢書評鈔二十卷茅坤鹿門集四十六卷史記鈔若干卷漢書鈔若干卷五代史鈔二十卷唐宋八大家文鈔一百四十四卷浙直分署紀事本末二卷顧應祥崇雅堂集十四卷讀易愚得一卷惜隂錄十二卷授時厯法撮要一卷勾股筭術一卷測圓筭術四卷弧矢筭術一卷歸田詩四卷人代紀畧四卷閔如霖午塘集十六卷蔡汝楠自知堂集二十四卷五經劄記若干卷徐中行天目集二十一卷陳良謨見聞紀訓二卷徐獻忠掌故集十七卷樂府原十五卷王豫隨槎集四卷四書識大錄若干卷朱長春甲集五十二卷乙集若干卷管子𣙜二十四卷許孚遠敬和堂集十卷學庸論語述五卷趙金淮獻集三卷浮休集一卷醫學經畧十畧吳惟嶽海岱集四卷天目山房歳編二十八卷董道醇黄門集一卷韓文評抄二十卷董嗣成青棠集十卷光祿遺編四卷慎䝉文則大成二十二卷名山記十六卷陳深十三經解話若干卷諸子品節若干卷諸史品節若干卷凌約言鳯笙閣簡抄四卷凌廸知萬姓統譜一百五十卷文林綺繡二十卷名世𩔖苑四十卷國朝名公翰藻五十二卷凌稚隆史記評林一百三十卷漢書評林一百卷左傳評註測義若干卷姚翼海屋集十四卷家規通俗編十二卷陳霆水南集續集雨山墨談唐餘紀傳緑鄉筆林水南閒居錄宣靖偹史渚山堂詩話詞話山堂瑣語仙潭志共一百餘卷吳興王雨舟濟人物髙逺刻意詩詞其所著有宫詞一卷有水南詞一卷有谷應集有鐵老吟餘其宫詞尤藴藉可喜夷白齋詩話濟倅横州采其風土物宜與域中異者為書二卷曰君子堂日詢手鏡載國朝典故劉清惠為作墓誌元衢李樂見聞雜記十卷烏青志若干卷臧懋修負苞堂集八卷古詩所五十六卷唐詩所四十七卷茅翁積芸暉館集十二卷茅國績菽園集二十卷鄭明選侯升集四十卷嵇元夫白鶴園集若干卷吳夢𤾉射堂詩鈔十四卷横塘集二卷屠隆寓湖著范汭湛園集四卷謝肇淛下菰集六卷又吳興友乘見曹能始石倉二藁朱國楨湧幢小品三十二卷又著國朝史㮣晩年精神所注事核而賅留資貽後僅劂其半識者有散佚之虞焉門人閔元衢識沈演止止齋集七十卷茅瑞徴澹樸齋初集十七卷禹貢滙疏十三卷閔夢得宦牒辜功十二卷駱從宇淡然齋存藁六卷吴興偹志卷二十二
