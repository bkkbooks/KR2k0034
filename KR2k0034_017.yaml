  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0034_WYG_017-1a, image: WYG0494/WYG0494-0465a.png}
body:
  text: 吳興備志卷十七明董斯張撰水利徵第十三三江既入震澤底定孔子以太湖為震澤而不名三江意若以北江中江與南江為三江在荆州之分漢沱參流則别為三在揚州之分因入于海則合于一所謂北江者今丹陽而下錢唐皆是也孔子本未嘗至吳故其解北江以自彭蠡江分為三入震澤為北江入海不知北江本與震澤相通以太湖為震澤亦非是周官九州有澤藪有川有浸揚州澤藪為具區其浸為五湖既以具區為澤藪則震澤即具區也太湖乃五湖之總名耳凡言藪者皆人資以為利故曰藪以富得名而浸則但水之所鍾也今平望八尺震澤之間水瀰漫而極淺與太湖相接而非太湖自是入於太湖自太湖入于海雖淺而瀰漫故積潦暴至無以泄之則溢而害田所以謂之震猶言三川皆震者然蒲魚蓮芡之利人所資者甚廣亦或可隄而為田與太湖異所以謂之澤藪他州之澤無水暴至之患則為一名而已而具區與三江通塞為利害故二名以别之禹貢方以既定為義是以言震澤而不言具區此非吳越之人不知而先儒皆北人但據文為說宜其顯然失之地理而不悟也避暑録三江與震澤相通者或泄震澤而入海或合震澤而入海其一為吳淞江固無疑矣其二不可名今青龍華亭崑山常熟皆有江通海與震澤連意必在其間韋昭言浙江浦陽松江者其妄固不待較而王氏言入者亦不可為入海凡言入于渭入于河皆由之以往言其終也三江既自為别水非有所從來前既未嘗言入于海不得直言入於島知入之為入海但文適同耳當如既陂既澤既導既瀦之類各就其水言之既入者言由地中行也凡傍海之江皆狹非大江比海水兩潮相往來始至而悍激則與沙俱至既退而後則留其沙而水獨返故不過三五嵗即淤浸障塞水不入於江則不能通于海知澤受之而為害若江水自由地中行各分而入海震澤安得有決溢耶避暑録唐憲宗元和中湖州刺史范傅正開平望官河淤澱吳江志按平望古屬吳興蘇軾言三吳之水瀦為太湖太湖之水溢為松江以入海海日兩潮潮濁而江清潮水常欲淤塞江路而江水清駛隨輒滌去海口常通則吳中少水患昔蘇州以東公私船皆以篙行無陸挽者自慶厯以來松江大築挽路建長橋以扼塞江路故今三吳多水欲鑿挽路為十橋以迅江勢亦不果用人皆以為憾宋史蘇文忠疏言吳中水利甚為切當𢎞治中工部侍郎徐公貫治水亦用此法先將吳江長橋一帶茭葦之地疏濬深闊後濬吳松諸江導水以入于海然後開湖州諸港泄天目諸山之水以入于湖數十年湖無水患今長橋一帶日漸塞又于各江釘樁以防海冦使江水不得迅駛海潮之沙停滯以致湖水不得泄去有志於經世者宜知之長興志張綸字公信汝隂人天禧中為江淮發運副使居二嵗增米八十萬疏五渠導太湖入海復租米六十萬合璧事類參宋史乾興元年五月丁亥詔蘇湖秀州積水害稼其發鄰郡兵疏導壅淤仍令發運使董之甲午遣尚書職方員外郎楊及往蘇湖秀州催督疏導姑蘇志慶厯二年守臣以松江風濤漕運多敗官舟遂築長堤界於松江太湖之間橫截五六十里又修荻塘通湖州凡九十里吳江志葛書舉字規叔江隂人熙寧中調餘杭縣主簿是時朝廷興修二浙水利議者謂苕霅二水出於天目之山而溢於太湖書曰三江既入震澤底定今二江並廢獨一松江入海故太湖之水壅而吳興被患遂欲廢北關長安二埭上塘之渠以與下塘相通又於餘杭之南股引苕溪之水達於漕渠穿錢唐之市而入於江以紓吳興之患時多以為然部使者檄君行視君以為吳興之水原於太湖太湖廣袤四萬八十餘頃旁占數郡其所灌輸非獨苕霅也書稱三江震澤說者不同就如議者之言則尋常溝瀆之流豈可以比二江之任祗益紛擾耳且錢塘二埭其來久矣大役之興古人所重固執不可議者不能奪其事遂寢故龍圖閣直學士李公常時守吳興聞君之說貽書嘉嘆部使者亦知君而交薦之秦觀葛宣德墓志熙寧六年沈括言浙西諸州水患久不疏障堤防川瀆皆湮廢之乞下司農貸錢募民興役從之文獻通考方道通判平江府嘗論太湖髙於運河當疏霅川浦漊之要者庶無饑嵗後湖守得其說為之果有功焉樓攻愧集紹興間兩浙轉運副使趙子潚知平江府蔣璨言太湖者數州之巨浸而獨泄於松江之一川勢有不逮是以昔人於常熟之北開二十四浦導之江崑山之東開一十二浦納之海後為潮汐沙積而開江之卒亦廢於是數州民田有淹沒之患詔監察御史任古視之西吳里語隆興三年八月詔江浙水利久不講修勢家圍田湮塞流水諸州守臣按視以聞於是知湖州鄭作肅等並乞開圍田濬港瀆詔湖州委朱夏卿宋通鑑徐誼論浙西水利曰昔下流不疏而水上溢故鑿直曲港還三江故道開宜興百瀆所以順導下流也惟髙亢田徑乃瀦堰之爾昔之言水如單鍔郟亶皆是也今開吳松江下流與宜興瀆屬之海者無慮數十百所異時浦港磬折以趨海今近浦之民多取徑直決蘇湖常秀舊為澤國比年雨或後至種且不入蓋圍田衆而疏導多也小人見利不畏其害圍於淺水既為髙田圍於茭蕩既為稻田二懼不已復有下腳始之重陂大半為土始之良田皆水自曬十日不雨農廢作業然且仍用舊說又將疏之失利害之實矣故舊田溝澮當濬治圍田下腳無輒開已開未填當捺合今之言水者能行是三說則髙原舊田還為衍沃而農不病矣葉水心徐誼墓志元大德元年徹爾為江浙行省平章政事時江浙稅糧甲天下平江嘉興湖州三郡當江浙十六七而其地極下水鍾為震澤東注由吳松江入海嵗久江淤塞豪民利之封土為田由是浸淫泛溢敗諸郡禾稼朝廷命行省疏導之發卒數萬人徹爾董其役凡四閲月畢工續文獻通考紹興間大理寺丞周環言臨安平江湖秀四州低下之田多緣清水浸灌蓋緣溪山諸處併居太湖水為二派東南一派由松江入于海東北一派由諸浦注于江其江泄水諸浦中惟白茅浦最大今為沙泥淤塞每嵗暑雨稍多則東北一派水必壅溢遂致浸傷農田欲望令有司相視於農隙開決白茅浦故道俾水勢分派流暢實為四州無窮之利近年以來浙西常有水患公私交病崇寧紹興間疏導故跡尚可尋訪乃未有建明者四十二灣古云九里為一灣一灣低一尺二百四十里到三江口三百六十里到大海三江口江面闊九里地勢低於震澤三丈潮水來時水髙三丈到震澤底定震澤即太湖也所以謂之平江三江口吳江水與湖水相㑹合之處謂之滙也名臣奏議隆慶四年二月從撫臣海瑞奏重濬南直𨽻之吳淞江白茒塘瑞因請量留各處贓罰銀漕糧二十萬石折銀濟工有㫖聽其動支蘇松常及杭嘉湖贓罪銀餘不許續文獻通考湖地春秋苦霖冬夏苦旱壠髙者病出畝下者病入然則治水奈何亦尋其源究其納而已矣源何在在天目山之隂苕溪東過安吉州入於郡北門與江渚滙合山之陽為餘不溪東過歸安縣入於郡南門亦與江渚滙合然則江渚滙者其衆流之所㑹乎滙而支流東徑駱駝橋出臨湖門復㑹入於毗山溪以納於太湖此我湖水勢之大略也然則太湖者其百川之所歸乎安吉孝豐陸地也遇泛則有懷襄之患烏程歸安諸邑水鄉也因漲則有田廬之厄水之害湖郡比他郡尤甚者此也然救之豈無術乎抑拯之者之因其習也夫習有可因古者常以竹為圍置石於中以捍廣苕之水今猶昨也亦因之而已矣若夫廣苕諸鄉豪縱於昔吾見塞源斷流髙者閘水以自便下者積水以畜魚一遇水發堤防壅塞不由故道此其發源受病一也濵湖諸民遍植杞栁填委諸漊日積月纍漸成蘆蕩窪者為魚池廣者為桑地漊港不得泄其歸啓閉無所因其候此其歸納受病一也宋守葉邦榮有水政書王回有啓閉漊閘碑侍郎徐貫之有疏參政周季麟有議今果能遵行否夫有規制以開其源毋壅蔽毋為勢家所占則水得以潤下有版閘以導其歸毋湮廢毋為小民所侵則水得以受納又能因其地形曲為堤防因其磽確預使儲水上游勿積下流勿壅諸經占佃者毅然使復還其故水患庶乎其少弭王道隆野史夫塘決海昌患在一邑耳往時當事諸賢顧役及外郡者何哉亦以地脈相因其利害之所關甚大也蓋海寧於吳為陲於越為首地形最髙故境內麻涇洛塘長水塘諸水皆從北流一從東北由松􅍩趨滬瀆江入海一從正北過吳江趨白茅港入江俗因指吳江塔巔與長安壩址相並則海寧之地髙於他郡邑其辨甚明故海寧之海一決注彼諸處如建瓴然嘉湖蘇松之民其不胥為魚鱉者幾希矣然則障海昌者亦所以障列郡塘之修廢其有關於東南利害甚切姚善海塘考吳興備志卷十七
