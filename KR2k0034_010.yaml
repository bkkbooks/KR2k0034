body:
  text: 吳興偹志卷十明董斯張撰人物徵第五之三唐施世瑛字玉華勇斷有才隋末天下大亂乃糾宗族及鄉里子弟聚糧自守聞唐髙祖起率衆從之髙祖賜金鐘一口錦五段敕書褒之拜為桞州刺史安吉志武德三年李子通攻陷武康四年七月以安吉人施世瑛使持節督諸軍事安州刺史征子通未行其年八月子通平施世瑛改杭州刺史餘杭志武德四年二月戊午王世充鄭州司兵沈悅遣使詣左武侯大將李世績請降左衛將軍王君廓夜引兵襲虎牢悅為內應遂拔之獲其荆王行本及長史戴胄悅君理孫也資治通鑑姚思亷字簡之父察思亷少受漢史其父能傳家業勤學寡欲未嘗言及家人産入隋為代王侑侍讀會義師克京城府寮奔駭惟思亷侍王不離其側兵將升殿思亷厲聲曰唐公舉義本匡王室卿等不宜無禮於王髙祖聞而義之貞觀初遷𢎞文學士列於十八學士圖令文學禇亮為之贊曰志苦辛勤紀言實録臨危殉義餘風勵俗又受詔書與魏徵同撰梁陳二史其編次筆削皆思亷功也太宗將幸九成宫思亷切諫太宗嘉之賜帛厯散騎常侍賜爵豐城縣男諡曰康子處平官至通事舍人處平子璹􅓨舊唐書家有閻博陵畫唐秦府十八學士各有真贊亦唐人書多與舊史不同姚柬字思亷舊史姚思亷字簡之避暑録姚璹字令璋武后世以直諫稱厯文昌左丞同平章事諡曰成姚班璹弟也舉明經纍封宣城郡公班嘗與璹數年間俱為定州刺史戶部尚書時人榮之班嘗以其曾祖察所撰漢書訓纂多為後之注漢書者隱沒名氏將為已説班乃撰漢書昭訓四十卷以發明舊義上班當作􅓨陜郡姚氏出自武康梁有征東將軍吳興郡公宣業宣業生安仁隋汾州刺史安仁生祥隋懷州刺史祥生懿雋州都督元之即懿子也唐宰相世系表張按元之自吳興入關不過五世自隋至武后不過百年吳興名賢元之當採入姚崇本名元崇字元之武后時以字行後避開元號更今名武后朝厯任夏官尚書張柬之等迎中宗復辟崇預謀先天二年以兵部尚書同中書門下三品時承武韋瀆政之後紀綱大壞宰相至十七人臺省要職乃至無限數崇先有司罷冗職修法而紀官任百必各當其官責成於下而權歸於上又吏事明敏朝機政務邊屯士馬皆默綜時決剖割不滯帝倚崇以大政而盧懷慎清謹得並相崇嘗疾謁告十餘日政事委積懷慎不能決入惶恐謝帝莞然曰朕以天下事付姚崇獨藉卿坐鎮雅俗耳崇既出須臾裁決立盡後病痁請告帝遣使勞問日數十輩會相懷慎薨源乾曜獨對所白善帝曰是必崇畫有不稱曰何不就崇識之遷崇四方館養疾聽家人入侍得就咨崇固辭帝曰設四方館為官吏徙君居之為社稷也恨不可使卿居禁中耳何庸辭已而請避位不許薦廣州都督宋璟自代乃得請進開府儀同三司而老諡文憲子奕修謹至尚書右丞彛光祿少卿異宗正少卿孫闕侍御史曾孫合朂咸知名唐書參函史朂見官師徵合能詩選極玄集傳世沈伯儀吳興人垂拱元年為太子右諭德初韋萬石議明堂大饗事上言議未能定於是伯儀等更議之厯祭酒𢎞文館學士唐書議載萟文武后光宅元年十月以右史武康沈君諒為正諌大夫同平章事垂拱元年君諒罷通鑑徐齊𣆀字將道湖州長城人父孝德以女為才人官至果州刺史齊𣆀八嵗能為文太宗召試賜所佩金削刀髙宗時纍遷蘭臺舍人唐書齊𣆀善於文誥甚為當時所稱髙宗愛其文令侍周王等屬文以職在樞劇仍敕間日來往焉以漏泄機密左授蘇州司馬睿宗即位追録舊恩纍禮部尚書舊唐書徐堅字元固齊𣆀子也幼有敏性聖厯中屬文典厚楊再思目為鳯閣舍人樣子厯黃門侍郎時觀察使李知古請兵擊姚州西二河蠻既降附又請築城重征稅之堅以蠻人生梗可以羈縻屬之未得同華夏之制勞師涉逺所獲不補所損獨建議以為不便睿宗不從令知古發劍南兵往築城將以列置州縣知古因是欲誅其豪傑子女以為奴婢蠻衆懼乃殺知古相率叛役徒奔潰姚雋路厯年不通纍遷光祿大夫堅多識典故前後修撰格式氏族及國史等時論美之徐堅多識典故凡七入書府大唐遺事徐齊莊齊𣆀弟也堅進爵東海郡公遷黃門侍郎又以刪定格令進爵二等堅請回授叔齊莊帝懷之封齊莊為長城縣子張九齡徐文公碑徐嶠字巨山堅子也開元中為駕部員外郎集賢院學士遷中書舍人內供奉外河南尹封慈源縣公父子相次為學士自祖及孫三世為中書舍人談志開元二十四年徐嶠為大理少卿德宗敦崇外族贈沈太后父吳興沈易直太師易直子庫部員外郎介福贈太傅介福子德州刺史士衡贈太保易直第二子祕書少監震贈太尉時沈氏封贈拜爵者百餘人貞元七年詔外曾祖隋陜令沈琳贈司徒追封徐國公與外祖贈太師易直等立五廟后無近屬惟族子房為近德宗用為金吾將軍新唐書沈震德清人御史中丞麟士二十葉孫沈恪太廟齋郎麟士十九葉孫顔真卿吳興沈氏祖德碑顔真卿為平原太守兼防禦使以前侍御史沈震為判官魯公行狀按此沈震豈即贈太尉者耶沈懷文吳興人舉孝亷為休寧主簿丁母憂三年廬墓側手植松柏二千株每一號慟衆鳥為之哀鳴翔集墓木山中舊多虎自此乃絶勞志沈嶠烏程人父卒廬墓六年不櫛不沐醎酸不入口哭則嘔血刺血書經年三十而卒有文集十卷上沈清烏程人婺州刺史大厯中李希烈陷汴州浙東西觀察使韓滉使清勒嘉興子弟四百人翼於潤州士衆發自升山逐逆黨至汴口力戰而死詔贈衛尉少卿兼左金吾衛將軍即發軍之地置祠以祀勞志髙仲武評錢起詩云員外詩體格新竒理致清贍右丞沒後員外為雄芟齊晉之浮遊削梁陳之靡嫚逈然特立莫之與羣且如鳥道挂疏雨人家殘夕陽牛羊上山小煙火隔林疏又長樂鐘聲花外盡龍池桞色雨中深皆特出意表標雅古今又窮達戀明主耕桑亦近郊則禮義充全忠孝兼至足可𢎞長名流為後楷式士林語曰前有沈宋後有錢郎按摩詰有送錢少府歸藍田詩錢亦於歸藍田舊居望終南别業屢形篇咏似流寓於秦至續玄怪録謂故華州刺史徽子方義家在華州則其後竟為秦人矣元衢錢徽字蔚章起子也厯翰林學士中書舍人加承旨拜禮部侍郎出刺江州初州有盜劫貢船捕吏取濱江惡少年二百人繫訊徽按其枉悉縱去數日舒州得真盜州有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕之偹可他用哉命代貧民租入轉湖州遷工部侍郎以吏部尚書致仕贈尚書右僕射子方義終太子賓客新唐書方義嘗為侍御史見續玄怪録詳徴錢徽子可復可及皆登進士第可復纍官至禮部尚書太和九年鄭注出鎮鳯翔李訓選名家中子以為賓佐授可復檢校兵部郎中兼御史中丞充鳯翔節度使訓敗可復為監軍使所害舊唐書錢珝字瑞夫徽幼子也善文辭宰相王溥薦知制誥進中書舍人溥得罪珝貶撫州司馬新唐書後唐崔沂初仕唐昭宗時纍遷至員外郎知制誥性抗厲守道而文藻非優嘗與同舍顔蕘錢珝俱秉筆見蕘珝贍速草制數十無妨笑談而沂自愧翌日謁相國訴曰沂疏淺不足以供詞翰之職移為諫議大夫册府元龜沈既濟博通羣書史筆尤工吏部侍郎楊炎見而稱之建中初召拜左拾遺史館修撰位終禮部郎唐書沈傳師字子言既濟子擢進士登制科乙第授中書舍人性恬退無競時翰林未有承旨次當傳師為之固稱疾宣召不起以本官兼史職俄兼御史中丞吏部侍郎上沈吏部傳師性和易不從流俗不矯亢觀察三郡去鎮無餘蓄京城居處隘陋不加一椽所辟賓僚無非名士身沒之後家至貧苦二子繼業並致時名人以報施不妄唐語林因話録傳師父既濟撰建中實録十卷為時所稱傳師在史館豫修憲宗實録未成亷察河南特詔齎一分史稿成于理所子樞詢皆登進士第舊唐書沈詢咸通中檢校戶部尚書昭義節度使為政簡易性本恬和奴歸秦通詢侍者將戮之未果結牙將為亂夜攻府第詢舉家遇害新唐書樞字仁偉官至丞郎人物酷似先德見北夢瑣言又唐詩紀事詢字誠之詢子舒舒子丹舒州團練教官丹子牢李氏饒州刺史見王安石貴池主簿沈君墓表吳興沈顔字可鑄傳師孫天復初進士為校書郎屬亂離奔湖南吳國為兵部郎知制誥翰林學士顔少有詞藻琴碁皆臻妙場中語曰下水船言為文敏速無不載也性間淡不樂世利嘗疾文章浮靡倣古著書百篇取元次山聱叟之説附已志而名書曰聱書其自序云自孟軻以後千餘年經百千儒者咸未有聞焉天厭其極付在鄙子其誇誕如此陳氏曰顔傳師之孫其文骫骳而自敘之語極其矜負文獻通考沈既濟舊志云德清人新舊兩唐書俱云吳人按王荆公貴池主簿沈君墓表云其先武康人武康族久顯至唐有既濟生傳師則既濟為吳興産昭昭矣又朝公武讀書志云吳興沈顔傳師之孫沈氏譜曰傳師自吳興徙吳德清志亦同譜説德清志云武康當既濟時析為德清久矣德清鄉賢祠首列傳師孟庭玢崑山尉庭玢三子郊鄷郢韓愈貞曜先生墓志楊衡吳興人字中師弱冠有竒才與蜀郡符載北海王簡言隴西李元象習業青城山樓潯陽廬阜以林壑相髙精綜六籍翺翔百氏為江湖間人尋擢第禮闈僑寓荆州官大理評事文苑英華沈光吳興人有洞庭樂賦韋岫曰此賦乃一片宫商此即為太白酒樓記者北夢瑣言以光為堯誤光厯閩從事侍御史沈亞之字下賢元和十年進士涇原李彚辟書記為祕書省正字長慶初補濼陽尉四年為福建都團練副使事徐晦後纍進殿中丞御史內供奉太和三年柏耆宣慰德州取為判官耆罷亞之貶南康尉終郢州掾亞之以文詞得名狂􅏥貪冒輔耆為惡故及於貶常遊韓愈門李賀杜牧李商隱俱有擬沈下賢詩亦當時名輩所稱許云朝公武讀書志周朴字太朴吳興人唐季避亂於福州烏石山僧寺假犬室以居不飲酒茹葷塊然獨處諸僧辰粥卯食朴亦擕巾盂厠諸僧下畢飯而退率以為常郡中豪貴設供率施僧錢朴即巡行拱手各丐一錢有以三錢與者朴止受其一了得十錢以偹茶藥之費將盡復然僧徒亦未嘗厭也性喜吟詩尤尚苦澀每遇景物搜竒抉思日旰忘返茍得一聯一句欣然自快與僧靈觀長官薛逢為友乾符七年黃巢陷城求得朴問曰能從我乎答曰我尚不仕天子焉能從賊巢怒殺之湧白膏數尺後人以為神祀烏石山詔賜廟號曰剛顯福州府志參唐詩紀事及唐詩品彚李升本徐氏湖州安吉人其父為安吉令先是其家有柑樹結一實大如斗其父異之將獻郡守有謂其父曰此果非常所有即上獻來年見徵安知復有此物不如勿獻其父然之因會鄰里將共食即席剖之有赤蛇在實中割者大驚投刃於地俄而赤蛇走其母榻下尋之了無所見未幾其母遂孕知誥吳越偹史陳水南臬憲嘗以南唐李升宜繼唐後遂改馬令南唐書為唐餘紀傳此猶蕭常以三國蜀志為續後漢書也然昭烈世系甚明猶覺以銖程鑑李升自祖父以上名稱皆當時文臣創造宋人已識及此更讀吳越偹史升本安吉寨將潘某之子升姓實潘也水南時特以五季篡祚短促不足繼統不若南唐聲名文物雄擅江左不愧唐後耳第溫公通鑑朱子綱目當時捉筆計必極下啇校當不俟水南為之也比余見陸遊南唐書及玉壺野史南唐近事諸書所載李氏種種陳書皆無豈水南未之見耶姚士麟見只編張按一升也而忽潘忽徐忽李何據乎余憶徐知誥為安吉産而十年廢學竟忘其出何書嘉平月二十五日康侯忽遣使録此紙遺豫乃知其為錢儼筆不減真珠船也馬陸兩書都以知誥為彭城人溫公云徐州李榮子豈南唐人為國諱務觀亦仍其説錢氏書反為實録耶姑存疑以俟博聞者甲子嵗斯張識沈韜文吳興人父攸常州刺史韜文性介潔好學能屬文吳越時為元帥典謁參軍機務有所裨益後命牧鄉郡以為湖州刺史甚有清名一統志金陵李氏始以唐號國錢文穆王問之曰金陵冒氏族于巨唐不亦駭人乎沈韜文曰此可取譬也且如鄉校間有姓孔氏者人則謂之孔夫子復何怪哉王大笑賞巵酒天中記韜文嘗為吳越司賓使有遊吳越詩曰菰米蘋花似故鄉遺一句不是不歸歸未得好風明月一思量武肅憫其思鄉授以湖州刺史古今詩話後唐長興四年順化節度使錢元珦驕縱不法每請事於王府不獲輒上書悖慢吳越王元瓘遣牙將仰仁詮詣明州召之仁詮左右慮元珦難制勸為之偹仁詮不從常服徑造廳事元珦見仁詮至股栗遂還錢唐幽於别第仁詮湖州人也資治通鑑沈承禮烏程人仕錢氏厯福州節制俶歸朝徙承禮鎮密州初秦王廷美之敗也有司按驗俶惟濬孫承祐及陳洪進皆常有贈遺獨承禮無焉宋史吳興偹志卷十
