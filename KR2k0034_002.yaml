body:
  text: 吳興偹志卷二明董斯張撰官師徴第四之一節度使制置使承宣使唐曰忠國軍吳越曰宣徳軍宋曰昭慶軍李師恱加建牙焉錢氏時屹為重鎮宋初節度使無所掌其政咸屬郡守命曰知軍州節度使特虚銜耳或以恩倖遥領之或為大臣責降散官承宣使制置使亦如之雖然其名未可湮也于是乎志唐李師恱工部尚書檢校太保忠國軍節度使談志乾寧三年徐州小吏李師恱得黄巢偽符璽獻于朝拜湖州刺史昭宗時授節度使西吳里語詳見郡守按温公通鑑師恱以中和將破巢功得刺湖與此小異李彦徽前綿州刺史起復襲父位權兵馬留後吳越偹史作繼徽按英華載張𤣥晏授李繼徽泰州節度使制則繼徽自一人當以彦徽為正乾寧四年命海昌鎮將髙彦為湖州制置使吳越偹史蔡卞字元度仙遊人紹聖中歴尚書左丞専托紹述中傷善𩔖徽宗時知樞宻院尋罷拜昭慶軍節度使進檢校少保開府儀同三司政和末贈太傅諡文正髙宗朝追貶單州團練副使宋史初欽宗内侍昭慶軍承宣使容機圍城中時乞致仕髙宗命起之右諫議大夫兼侍讀衛膚敏言自古帝王未有求閹寺于閒退而用者遂寢宋史錢偡檢校太尉宣徳軍節度使談志沂王柄領昭慶軍節度使贈太保諡靖恵宋史趙不儔宋宗室除昭慶軍節度使遷檢校少保贈髙平郡王宋史趙令碑宋宗室昭慶軍節度使趙明道墓志趙士歆宋宗室昭慶軍承宣使上趙不􅖊字仁仲濮王之裔紹興中進士歴江西轉運判官累昭慶軍承宣使居官所至有聲立朝好指畫天下事孝宗嘉其直諒毎與宴禁中帝顧謂皇太子曰此賢宗室也南昌府志不􅖊贈開府儀同三司崇國公見葉水心集韓世忠字良臣延安人歴檢校少保武寧昭慶軍節度使宋史叅新安文獻志張按宋之世忠安化武寧二鎮節度非昭慶軍也録以存疑楊存中本名沂中字正甫代州人張俊字伯英成紀人累功除檢校少保昭慶軍節度使南昌府志楊倓存中子簽樞昭慶軍節度使宋史紹興中太傅昭慶軍節度使開府儀同三司平樂郡王韋淵請建家廟賜以祭器文獻通考劉茂昭慶軍節度使周必大玉堂𩔖藁楊次山字仲甫上虞人恭聖仁烈皇后兄也歴太保授昭慶軍節度使改封㑹稽郡王上俞昭顯字紹明婺源人駙馬都尉乾道元年兼授武徳大夫昭慶保康保寜三鎮節度使控制河右徽州府志董仲永昭慶軍承宣使大慧語録霍汝弼昭慶軍承宣使見洪括進萬首唐詩絶句表丼昇内侍省押班遷昭慶軍承宣使玉堂𩔖藁紹興三十一年幸醫昭慶軍承宣使王繼先坐事貶福州居住上王徳謙嘉邸都監遷昭慶軍承宣使宋史淳熈十三年正月庚子以昭慶軍節度使士峴為開府儀同三司十六年三月甲寅進少保淳熈十六年正月戊寅以昭慶軍承宣使郭師禹為保大軍節度使安撫使安撫掌一路兵民以便宜裁斷吳興自錢信後不獲見非常員也浙江路帥府杭州要郡平江湖州次要郡秀州李忠定見議宋錢信太平興國三年授宣徳軍安撫使知湖州見談志碑碣𩔖又為節度使詳談志寺院𩔖元史樞字子明燕之永清人署安吉州安撫使時新附之民所在依險阻自保樞以誠信招懐之復業為民者以千萬計元史監司觀察使轉運使浙江提刑浙西提舉浙西亷訪僉事運判觀察判官秦有監察史監諸郡漢置諸州刺史常以八月廵行所部郡國録囚徒考殿最唐有採訪使觀察使宋有轉運使及浙西提刑檢察所部財賦訟獄舉刺官吏又置提舉常平茶鹽公事凡州縣之不加恤者皆劾以聞髙宗嘗曰監司朝廷耳目得其一人則一路安不可不擇明興以臬董之駐其地獄訟自鬼薪以上無不聞任綦重也前志闕焉無紀䝉竊惑焉今自唐以下摭其一二有闗吾湖者若明興賢監司不乏豐碑所紀耆彦所𫝊竢有事于志者唐湖州觀察使崔黯歐陽脩集古録大厯七年真卿刺是邦時浙西觀察判官殿中侍御史袁髙廵部至州㑹于杼山顔真卿杼山妙喜寺碑浙西觀察使韓臯封杖决湖州安吉令孫澥四月内死元稹集太平興國七年轉運使髙冕奏析烏程置歸安曾致堯為兩浙轉運使常上言去嵗所部秋租惟湖州一郡督納及期而蘓常潤三州悉有逋負請各按賞罰太宗以江淮頻年水灾蘓常特甚致堯所言刻薄不可行詔戒之倍加安撫勿得騷擾容齋隨筆曾致堯字正臣南豐人太平興國八年進士歴太常博士性剛率好言事前後屢上章奏詞多激訐真宗即位累遷户部員外郎因抗䟽狂躁被黜致堯頗好纂録所著有仙鳬羽翼廣中台志清邊前要西陲要紀為臣要紀宋史沈立字立之歴陽个遷兩浙轉運使蘓湖水民艱食縣戒强豪民發粟以賑立亟命還之而勸使自稱貸湏嵗稔官為責償茶禁害民山塲𣙜多在部内嵗抵罪者輙數萬而官僅得錢四萬立著茶法要覧乞行通商法三司使張方平上其議後罷𣙜法宋史劉從廣字景元歴浙西觀察使仁岳法師年老還鄉霅守請至祥符命從廣為奏從廣後贈昭慶軍節度使佛祖統紀叅宋史余端禮之宰烏程也有富估抵罪本部詳刑使者張宗堯以書解免之端禮不啟視竟置之法楊萬里余公墓志張宗堯字淵道泰州人朱熹榜進士見宋登科録秦檜深忌趙鼎張浚鼎謫吉陽軍門人故吏皆不敢通問惟廣西帥張宗元時饋醪米鼎既死而浚獨存未快其意江西運判張常先箋注前帥張宗元與浚詩言于朝連逮者數十家將誣以不軌獄既具檜死得免宋史通判江州豫州守張宗元忤檜或中以飛語事下漕臣張常先宗元道九江常先檄義問拘其舟義問投檄曰吾寜得罪不為不祥常先白檜罷去宋史張杓字定叟湖北提舉常平奏事帝大喜諭輔臣曰張浚有子如此改浙西督理荒政蘇湖二州皆缺守命兼攝焉有宰執姻黨閉糶杓首治之帝奬其不畏强禦遷兩浙轉運判官未幾以直徽猷閣陞副使宋史張體仁淳熈十六年提舉浙西常平行部捐米五百石于湖學收養貧民之棄其子者談志詳賑恤徴孫子秀字元寔餘杭人紹定進士為浙西提刑冐暑周行郡縣獄為之清安吉州婦人愬人殺其夫與二僕逮繫者拷掠莫得其寔子秀宻訪之乃婦賂宗室子殺其夫僕救之并殺以滅口一問即伏逺近稱神明後進太常少卿浙江通志黄氏日抄陳塤字和仲鄞人試禮部第一歴浙西提刑安吉州俞垓與丞相李宗勉有連恃勢黷貨塤禁革之弓手戴福以獲潘丙功為副尉宗勉倚為腹心暴横貪害民所不堪塤將捕治福聞風而遁塤遺宗勉書曰塤治福所以報丞相也𫝊聞走丞相府賢輔弼不宜有此宗勉荅書曰福罪惡貫盈非君不能治宗勉雖不才不敢庇奸凶惟君留意及獲福于隆興衆欲殺之塤曰若是則刑濫矣乃加之墨狥于市囚之圜土以吏部侍郎召及為國子司業諸生咸相慶以為得師宋史董敦逸字夢授永豐人第進士為湖州運判累遷侍御史瑶華秘獄成詔詣掖庭問敦逸察知寃狀上䟽謂臣恐得罪天下哲宗怒用他事出知興國軍徽宗立召為左諫議大夫敦逸極言蔡京蔡卞過惡遷户部侍郎宋史趙良淳知安吉州徳祐初元兵南下良渟日營守禦之偹尋以徐道隆為浙西提刑以輔良淳皆殉難道隆字伯謙武義人上韓鏞字伯髙濟南人天厯元年僉浙西亷訪司事繫奸暴黜貪墨時舉烏程縣尹于文𫝊治行為諸縣最所至郡縣為之肅然元史至元後二十三年八月蘇湖多雨傷稼百姓艱食浙西道提刑按察司雷應請于朝發廩米二十萬石賑之江淮行省以發米太多議存三之一應曰布宣皇澤恩養困窮行省臣職耳豈可效有司出納之吝耶行省不能奪悉給之通鑑行省右丞董摶霄磁州人以儒生起家為能吏㑹天下亂乃復以武功自奮從平章嘉琿征安豐奉命移軍援江南至徳清而杭州已䧟嘉琿問計摶霄曰賊見杭城子女玉帛必縱酒戯婦女不為偹宜急攻若退保賊乘鋭趨京口則江南不守矣諸將難之嘉琿不能决摶霄曰公江浙相君方面失䧟不能取誰任其咎㧞劍目諸將令必前曰相君在是慢令者斬進兵杭州賊迎敵摶霄麾壯士特前十戰七勝復杭州元史又詳見輟耕録郡守東晉太安二年石氷作亂前吳興内史顧祕起義兵討之祕檄葛洪為將兵都尉攻氷别帥破之遷伏波將軍氷平洪不論功賞徑至洛陽欲搜求異書以廣其學晉書叅恵帝紀及葛洪傳亦見抱朴子自叙周玘𫝊石氷畧有揚土玘及吳興太守顧祕都督揚州九郡軍事斬氷所置吳興太守區山顧衆吳人父祕曾蒞吳興吳興義故共遺衆錢二百萬一無所授後王敦欲以衆為吳興内史衆舉桓彛彛亦讓衆事並不行上顧祕字公真歴交州刺史陸機贈之以詩云顧侯體明徳清風肅已邁發跡翼藩后改授撫南裔晉百官名參陸士衡集周玘字宣佩義興人征西將軍處子也行建武將軍吳興太守諡忠烈並上初吳興人錢璯起兵誅陳敏朝廷命為建武將軍使率其屬㑹于京都璯至廣陵聞劉聰逼洛陽畏愞不進朝廷促以軍期璯乃反時王敦遷尚書當應徴與璯俱西璯隂欲殺敦藉以舉事敦聞之奔告于朝璯遂殺度支員外陳豐焚燒邸閣自稱平西將軍周玘率合鄉里義衆討平之周勰字彦和玘子也時中國亡官失守之士避亂來者多居顯位駕御吳人吳人頗怨勰因之欲起兵潜結吳興郡功曹徐馥馥家有部曲勰使馥矯稱叔父札命以合衆豪傑樂亂者翕然附之以討王導刁協為名孫皓族人弼亦起兵廣徳以應之馥殺吳興太守袁琇有衆數千將奉札為主時札以疾歸家聞而大驚乃告亂于義興太守孔侃勰知札不同不敢發兵馥黨懼攻馥殺之孫弼亦潰上沈陵永安人元帝為鎮東將軍陵叅軍事徐馥之亂陵討平之沈約自叙懐帝永嘉五年蝘鼠出延陵郭景純筮之曰此郡東之縣當有妖人欲稱制者亦尋自死矣其後吳興徐馥作亂殺太守袁琇馥亦尋滅是其應也晉五行志周札字宣李玘弟也性矜險好利外方内荏少以豪右自處州將辟命皆不就察孝亷除郎中徐馥平以札為奮武將軍吳興内史上周筵處孫也卓犖有才幹歴黄門侍郎時周勰謀作亂欲奉叔札為主札不應札子續潜聚衆應之馥已潰滅而續兵未解丞相睿議發兵討之王導謂發兵不易續從兄筵忠果有謀請獨使筵往足以誅續從之筵與義興太守孔侃協謀即侃坐上叱使人格殺之因欲誅勰札不聽而止筵不復過家省母長驅而去其公忠如此遷太子右衛率轉吳興内史王敦難作時叔札以右將軍都督石頭諸軍事筵聞札開門延盗憤叱慷慨形于詞色敦既得志忌周氏强盛于是筵與叔札兄懋皆遇害上㑹稽内史周札兄子筵吳興内史王敦使人告札及諸兄謀不軌殺之敦死札筵故吏頌其寃宜加贈諡下八座尚書卞壼議以札石頭之役開門延冦遂使賊敦志亂札之責也追贈義所未安懋筵兄弟宜復本位册府元龜周鎮字康時陳留尉氏人清約寡欲所在有異績罷臨州郡還都未及上住泊清溪渚王丞相往看之時夏日暴雨卒至舫至狹小而又大漏殆無復坐處王曰胡威之清何以過此即啟用為吳興郡晉中興書王羲之字逸少瑯琊臨沂人吳興太守歴右軍將軍㑹稽内史晉書王獻之字子敬羲之第七子也草𨽻骨力不及父而頗有媚趣才器髙邁風流為一時冠起家州主簿祕書丞尚新安公主除建威將軍吳興太守徴拜中書令諡曰憲晉書沈嘉字長茂吳興太守書記洞詮殷康陳郡人吳興太守有集五卷續晉陽秋參隋書謝安字安石陽夏人吳興太守歴太傅諡文靖有集十卷晉書穆帝升平二年八月以吳興太守謝萬為西中郎將豫州刺史晉書歴謝萬字萬石安弟散騎常侍謝萬作吳興郡其兄安時隨至郡中萬眠嘗晏起安清朝便往牀前叩屏風呼萬起俗說謝萬才器雋秀善自衒耀致有時譽兼善屬文能談論時人稱之晉中興書車𦙍字武子南平人隆安初遷吳興太守辭疾不拜加䕶國將軍丹陽尹晉書㑹稽王世子道子以西陽王羕𤣥孫珣之為後珣之歴吳興太守劉裕伐闗中以為諮議叅軍時帝道方墜珣之為宗室之羙與梁王珍之俱被害上桓𤣥簒晉使御史中丞祖台之奉輔國將軍司馬珣之居䘮無禮坐廢徙宋書謝邈字茂度安從子也性剛鯁無所屈撓頗有理識累遷侍中後為吳興太守上謝邈姪方明隨邈在吳興郡時孫恩冦東土諸郡皆響應吳興民邱尫胡桀郜驃破東遷縣方明勸邈避之不從賊至被害方明逃竄遂免初邈舅子長樂馮嗣之及北方學士馮翊門生仇𤣥逺俱往吳興投邈並舍之郡學禮待甚簡三人並愠與恩通及郜驃等攻郡並預其謀恩入海嗣之等不得同去方更聚謀方明結邈門生義故得百餘人掩討嗣之等悉擒而手刃之朱序字次倫義陽人孝武帝寜康二年長城錢歩射錢洪等作亂以序為中軍司馬吳興太守討擒之歴豫州刺史叅孝武帝紀及朱序傳王坦之字文度太原人歴左衛將軍坦之有風格尤非時俗放蕩不敦儒教著廢莊論簡文帝臨終詔大司馬温依周公故事坦之自持詔入于帝前毁之乃改詔焉温死與謝安共輔幼主遷中書令都督徐兖青三州諸軍事北中郎將諡曰獻上太談志云坦之吳興守出歴官記王胡之字修齡臨沂人弱冠有聲譽歴侍中郡守丹陽尹素有風痃疾發動甚數而神明不損石虎死朝廷欲綏輯河洛以胡之為西中郎將司州刺史假節以疾固辭未行而卒晉書胡之吳興太守見談志謝太傅稱王脩齡曰司州可與林澤遊或問林公司州何如二謝曰故當攀安提萬世說胡之性簡逹好𤣥言宋明帝文章志胡之治身清約以風操自居胡之列𫝊虞潭字思奥㑹稽人以討沈充功進爵零陵縣侯歴散騎常侍出為吳興内史徴拜尚書諡孝烈晉書吳興太守虞潭討蘇峻潭母孫氏謂潭曰吾聞忠臣出于孝子之門女當舍生取義勿以吾老為慮也盡遣家僮從軍鬻珮環以給軍實時㑹稽内史王舒遣子允之為督䕶與允之合勢潭乃率衆攻賊潭子名楚陶囬丹陽人吳興太守在郡四年徴拜散騎常侍囬性雅正不畏强禦徙䕶軍將軍封安樂伯諡曰威晉書囬字公淵見何氏語林江灌字道羣陳留人有才器與從兄逌名相亞仕尚書中䕶軍晉中興書灌吳興太守見晉書逌子蔚亦守吳興劉尹道江道羣不能言而能不言世說孔愉字敬康㑹稽人累遷吳興太守沈充反棄官還京師歴御史中丞尚書令恪勤貞固始終不渝尋除左光禄大夫諡貞晉書云入新安山中改姓孫氏孔坦字君平愉從子歴咸和中為吳興内史嵗饑運米以賑窮乏百姓賴之封晉安男加建威將軍尚書諡簡晉書叅杭州志孔坦遷侍中時成帝每幸丞相王導府拜導妻曹氏有同家人坦切諫及帝既加元服猶委政王導坦發憤以國事為己憂常從容言于帝曰陛下春秋已長聖敬日躋宜博納朝臣咨諏善道由是忤導出為廷尉上孔巖字彭祖愉從子有才學歴丹陽尹尚書西陽侯在朝多所匡正為吳興太守大得民和中興書嚴晉書巖作殷浩臨揚州請孔巖為别駕遷尚書左丞時朝廷崇樹浩以抗擬桓温温不平浩又引荒人謀立功于閫外嚴言于浩曰當今時事艱難使君屈已應務屬當其㑹聖懐所以日昃匪懈每欲深根固本靜邊寜國耳内外之任各有攸司深思亷藺屈伸之道平勃相和之義然後乃可保大定功平濟天下也哀帝踐祚太和中拜吳興太守加秩中二千石晉書簡文言謝安南清令不如其弟學義不及孔巖居然自勝世說胡巖字起祖左遷吳興太守談志張按晉書無胡巖豈孔巖字彭祖之誤耶姑以俟洽聞者孔廞㑹稽人琳之父吳興太守遷廷尉歴光祿大夫晉書叅南史庾義穆帝時為吳興内史晉書字義一作羲叔和張𤣥之字祖希吳郡太守澄之孫也少以學顯歴吏部尚書出為冠軍將軍吳興太守卒于郡續晉陽秋司空顧和與時賢共清言張𤣥之顧敷是中外孫年並七嵗在牀邊戯于時聞語神情如不相屬瞑于燈下二兒共叙客主之言都無遺失顧公越席提其耳曰不意衰宗復生此寳世說虞􅔎字思行歴尚書郎吳興太守徴為金紫光禄大夫王導常謂􅔎曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎晉書􅔎虞翻曽孫潭兄子也雖機幹不及潭而素行過之虞光祿𫝊王藴字叔仁太原人孝武定皇后父也補吳興太守屬郡荒人饑輙開倉賑恤朝廷以違科免藴官士庶詣闕訟之左降晉陵太守復有恵化定后立封建昌縣侯歴尚書左僕射上袁湛字士深陽夏人也少為謝安所知安以兄子𤣥女妻之義熈中守吳興蒞政和理為吏民所稱入補中書令累遷太尉司空諡敬上元興初桓𤣥反殺吳興太守髙素劉牢之北府舊將也上晉譚聨吳興内史萬姓統譜談全為吳興太守後辭疾隱武義小姬山金華府志呉興備志卷二
