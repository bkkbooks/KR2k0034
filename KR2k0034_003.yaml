body:
  text: 吳興備志卷三明董斯張撰官師徴第四之二郡守宋齊梁陳隋郡志載宋謝莊謝淡陳周文育周䂮沈君理張考沈約姚思亷李延夀三書莊君理皆吳郡守非吳興也淡及二周𫝊亦無守吳興語不敢濫入王秀之已載掌故劉子頊字孝列宋孝武第七子大明四年封歷陽王仍為冠軍將軍吳興太守歷雍州都督應晉安王子勛舉兵兵敗遇害以下並宋書劉子真字孝貞孝武第十一子大明五年封始安王仍為輔國將軍吳興太守劉景素建平王宏子也少愛文義太宗初為冠軍將軍吳興太守歷南徐州刺史元徽三年舉兵被殺劉休若孝建初封巴陵王大明五年為左右郎將吳興太守泰始元年領安東將軍督吳吳興晉陵三郡歷車騎大將軍江州刺史為太宗所忌徴還賜死以上四人並遙領太守劉韞字彥文長沙王孫宣城太守晉安王子勛為亂大衆屯據鵲尾攻逼宣城于是四方牧守莫不同逆惟韞棄郡赴朝廷太宗嘉其誠孝建初以為侍中南兖州刺史吳興太守升明二年以與討蕭道成遇害劉協字彥和韞弟侍中吳興太守劉皓字彥明協弟冠軍將軍吳興太守未拜元徽四年卒劉遵考宋武帝族弟也封營浦侯元嘉二十一年為五兵尚書遷吳興太守二十五年徴為領軍孝建元年魯爽臧質反為征虜將軍率衆屯臨沂縣仍除吳興太守明年徴為湘州刺史歷侍中左光祿大夫諡曰元公王裕之字敬宏胡之孫也晉世除太尉從事中郎出為吳興太守宋世歷吏部尚書諡文貞劉瑀字茂琳彭城人穆之孫式之子也少有才氣為太祖所知遷御史中丞瑀使氣尚人為憲司甚得志彈王僧達云藴籍髙華人才冗末朝士莫不畏其筆端尋轉右衛將軍瑀願為侍中不得謂所親曰人仕宦不出當入不入當出安能常居户限上因求益州遷吳興太守歷吏部尚書劉延孫彭城人孝建元年遷丹陽尹臧質叛上深以東土為憂出為冠軍將軍吳興太守置佐吏事平徴為右僕射歷尚書左僕射東昌侯諡文穆向靖字奉仁小字彌山陽人世居京口與髙祖少從游平京邑加寧逺將軍為吳興太守義熙十年髙祖北伐督北青州諸軍事髙祖受命封曲江縣侯彌治身儉約不營室宇無田園商賈之業時人稱之張永字景雲吳人能文章善𨽻書騎射兼善雜藝受知于文帝帝每得永表啓輒執玩咨嗟嘆供御者不及也歷御史中丞廢帝永光三年出為吳興太守太宗即位除吏部尚書復以為吳興太守未拜徙為吳郡太守以破薛索兒功封孝昌縣侯王惠字令明臨沂人恬靜不妄交游未嘗有雜事宋武帝聞其名以問其從兄誕誕曰惠後來秀令鄙宗之美也永初三年遷詹事轉尚書吳興太守歷吏部尚書王曇生臨沂人好文義以謙和見稱歷吏部尚書太常卿出為吳興太守明帝初與四方同逆戰敗歸降被宥王謙之字休光臨沂人晉司州刺史胡之曾孫也孝建初歷驍騎將軍御史中丞吳興太守以南下之功封石陽縣子贈前將軍諡肅謝瞻字宣逺陽夏人見弟晦權遇已重言于髙祖曰臣本素士父祖位不過二千石弟年始三十志用凡近榮冠臺府特乞降黜以保衰門前後屢陳髙祖以瞻為吳興郡又自陳請乃為豫章太守周嶠汝南安城人尚髙祖第四女宣城德公主二女適建平王宏廬江王禕以貴戚顯官元嘉末為吳興太守賊劭弒立隨王誕舉義于㑹稽劭加嶠冠軍將軍誕檄又至嶠素懼却回惑不知所從為府司馬丘珍孫所殺朝廷明其心國婚如故王韶之字休泰臨沂人晉世遷黃門侍郎領著作為晉史序王珣貨殖王廞作亂珣子𢎞廞子華並貴顯韶之懼為之陷深結徐羡之傅亮等景平元年為吳興太守羡之被誅王𢎞入為相領掦州刺史韶之在郡常慮為𢎞所繩夙夜勤厲政績甚美𢎞亦抑其私憾在任積年稱為良守加秩中二千石徴為吏部尚書元嘉十二年再為吳興太守謝述字景先陽夏人封吉陽縣侯歷中書侍郎左衛將軍補吳興太守在郡清省為吏民所懷卒官喪還未至都數十里殷景仁劉湛同乘迎赴望船流涕蕭惠明南蘭陵人思話次子也有世譽歷黃門郎御史中丞吳興太守殷沖字希逺陳郡長平人歷御史中丞出為吳興太守遷度支尚書孝武帝即位僞司𨽻校尉殷沖賜死沖為元凶劭草立符文又妃叔父也並上王奐字彥孫惠從孫升明末為吳興太守入齊歷左僕射出為雍州刺史參宋齊二書孔山士吳興太守歷丹陽尹見沈麟士及陸澄二𫝊宋書作山士歷顯位侍中㑹稽太守坐小弟駕部郎道穰逼掠良家子女白衣領郡宋書㑹稽孔愈愈子安國愈生靖靖子山士靈符四世五人為本郡太守邵道護黃門侍郎出為吳興太守談志梁大同七年東宫直沈文沖表曰祖吳興太守道思少耽𤣥默宅舍為觀即德清紫極觀也吳興統紀顧琛字𢎞偉吳人討元凶劭事平遷吳興太守孝建元年封永興縣五等侯大明中仍為吳興太守歷中散大夫宋書張瓌字祖逸永子也封平都侯遷侍中出為征虜將軍吳興太守烏程令顧昌言有罪瓌坐不糾免官後為光祿大夫孔靖字季恭㑹稽人晉義熙中吳興太守歷尚書令謝康樂有戲馬臺送孔令詩即靖也孔琳之字彥琳山隂人吳興太守歷御史中丞直法無所撓武帝行經蘭臺親加臨幸卒贈太常琳之不事産業家尤貧素張劭字茂宗吳人歷征虜將軍雍州刺史後為吳興太守諡簡伯子敷字景𦙍父在吳興亡報以疾篤敷往奔省自發都至吳興成服十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾世祖即位改其所居為孝張里沈文季武康人元徽中轉祕書監出為吳興太守文季飲酒至五斗妻王錫女亦至三斗文季在郡與妻對飲竟日而視事不廢升明元年沈攸之起兵齊髙帝加文季冠軍將軍督吳興錢塘軍事别詳人物徴禇淵字彥回陽翟人尚宋文帝女南郡公主駙馬都尉纍遷吏部尚書淵初為吳興太守齊髙帝餉物别淵語人曰此人才貌非常將來不可測也卒佐齊篡宋歷太宰司徒諡文簡王延之字希季裕之孫也宋世為後軍將軍吳興太守纍遷吏部尚書太祖輔政與王僧䖍中立無所去就時人語曰二王持平不送不迎入齊歷左僕射諡簡通志蕭子晉臨川王映長子歷東陽吳興二郡太守遷左民尚書王瑩字奉光臨沂人宋駙馬都尉入齊為吳興太守有能名召還太子詹事中領軍東昏時徐孝嗣誅瑩頗綜朝政啓取孝嗣所居宅從弟亮謂曰此非盛德也瑩怒曰我昔從東度為吳興束身登岸徐時為宰相不能見知相用為領軍長史今住其宅差少快意時人咸謂失德諡靖恭徐孝嗣字始昌小字遺奴東海郯人宋孝武時尚康樂公主仕齊轉御史中丞出為吳興太守王儉贈四言詩曰方軌叔茂追清彥輔柔亦不茹剛亦不吐時人以比蔡子尼行狀也歷吏部尚書封枝江縣侯南齊書徐孝嗣復故封使故吏吳興邱睿筮之當𫝊幾世睿曰恐不終尊身孝嗣容色甚惡徐曰緣有此慮故令卿决之東昏時賜死華林園和帝贈太尉諡文忠王敬則射陽人性倜儻好刀劍屠狗商販遍于三吳宋明帝以為直閣將軍齊髙帝受禪以佐命封潯陽公為吳興太守歷司空太尉武帝嘗令羣臣賦詩敬則曰臣若解詩不過作尚書都令史耳那得今日袁彖字偉才陽夏人少有風氣善談𤣥為冠軍將軍監吳興郡事彖性剛常以微言忤世祖又與王晏不協世祖在便殿用金柄刀子治瓜晏在側曰外間有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒久之彖到郡坐過用祿錢免官纍遷太子中庶子孔琇之山隂人靖孫有吏能歷尚書左丞左民尚書出監吳興郡尋拜太守政稱清嚴明帝輔政防偹諸藩致密㫖于上佐使便宜從事隆昌元年遷琇之晉熙王冠軍長史欲令殺晉熙王琇之辭不許遂不食而死張岱字景山永弟也宋泰始末為吳興太守齊武帝即位再為吳興太守岱晚節在吳興更以寬恕著名遷南兖州刺史何戢字慧景廬江人歷吏部尚書出為吳興太守尚山隂公主善姿容與禇淵善目為小禇諡懿子王僧䖍臨沂人泰始中出為輔國將軍吳興太守秩中二千石僧䖍不禮佞人阮佃夫佃夫言于明帝使御史中丞孫􅗥奏僧䖍前蒞吳興多有謬命檢到郡至遷凡用功曹五官主簿至二禮吏署三𫝊及度與弟子合四百四十八人又聽民何系先等一百十家為舊門委州檢削坐免官後歷開府儀同三司諡簡穆南齊書謝朏字敬冲陽夏人十嵗能屬文永明中遷都官尚書中書令侍中出為吳興太守歷司空諡靖朏在吳興論啓公事稽晚㵸輒代朏為啓上知非朏手跡被問見原初朏在吳興㵸于征虜渚送别朏指㵸口曰此中惟宜飲酒謝㵸字義潔遷司徒左長史出為吳興太守歷太子詹事諡簡長城縣民盧道優家遭劫誣同縣殷孝悌等四人為劫㵸收付縣獄考正孝悌母駱詣登聞訴稱孝悌為道優所誹謗橫劾為劫一百七十三人連名保徴在所不為申理㵸聞孝悌母訴乃啓建康獄覆道優理窮欵首依法斬首有司奏免㵸官王琨臨沂人初名昆崘宋始為吳興太守入齊歷光祿大夫南史琨𫝊吳郡太守琨守吳興别見吳慶之𫝊李安民南蘭陵人齊髙祖私人吳興太守封康樂侯歷尚書左僕射諡肅安民李延夀以唐諱易為安人今據齊書正之吳興有項羽神護郡聽事太守不得上太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又于聽上八關齊俄而牛死葬廟側今呼為李公牛塜蕭惠休蘭陵人永明四年為廣州刺史罷任獻奉傾資上敕茹法亮曰可問蕭惠休故當不侵私耶吾欲分受之也永元元年從吳興太守徴為尚書右僕射吳興郡項羽神舊酷烈人云惠休事神謹故得美遷于時朝士多見殺二年惠休還至平望帝令服藥而卒謝覽字景滌陽夏人㵸子也覽尚齊錢塘公主仕梁歷吏部尚書出為吳興太守卒于官贈中書令蕭子顯字景陽齊豫章王子也齊世封寧都侯入梁歷國子祭酒吏部尚書子顯簡通賔客不畏鬼神愛山水為伐社文以見其志飲酒數斗頗負才氣及掌選見九流賔客不與交言但舉扇一撝而已衣冠竊恨出為吳興太守以恃才傲物諡驕蕭正仁字公業為吳興太守有治能天監十年諡哀臨川王宏子蕭映字文明新渝侯普通二年為吳興太守郡纍不稔大通三年野榖生武康凡二十二處自此豐穰映製嘉榖頌以聞蕭昻字子明梁宗室普通四年出為吳興太守纍官領軍將軍封湘隂侯諡曰恭王彬字思文臨沂人闕文章習篆𨽻與兄志齊名時人語曰三真六草為天下寶尚齊高祖女臨海長公主入梁為吳興太守歷吏部尚書諡惠彬立身清白推賢進士有古君子風王騫字𤣥成臨沂人歷度支尚書中書令出為吳興太守復徴為尚書郎給事中諡安孫亷字思約東莞人天監初傾意貴要得為列卿歷晉陵吳興太守然處官平直遂以善政稱武帝嘗曰東莞謙亷而已謙即亷叔父也孟侯亶字世龍譙人歷都官尚書給事纍遷吳興太守豫州刺史豐城縣公諡襄元景仲魏文裔也以父法僧來歸封枝江縣公歷廣州刺史侯景作亂遣信誘之景仲乃舉兵將下應景㑹江西督護陳霸先等起兵攻之霸先狥其衆曰朝廷以元景仲與賊連從謀危社稷今使曲江公勃為刺史鎮撫此州衆聞之皆棄甲而散景仲乃自縊而死蕭琛字彥瑜蘭陵人守宣城後為吳興太守郡有項羽廟土人名為憤王甚有靈驗遂于郡㕔事安牀幕為神座公私請禱二千石皆于㕔拜祠而避居他室琛至著屐㕔事聞室中有叱聲琛厲色曰生不能與漢祖爭中原據此㕔事何也因徙之于廟琛歷特進光祿大夫諡曰平以下並梁書蔡撙字景節濟陽人歷侍中吳興太守纍遷中書令諡康張稷字公喬瓌弟也梁武起兵稷弒東昏迎梁武封江安縣子歷吳興太守徴僕射後為青冀二州刺史為州人所害張嵊字四山稷子也嘗為湘東王長史王暇日𤣥言因為之筮得節卦謂嵊曰卿後當東入為郡恐不得終其天年嵊曰貴得其所耳還為太府卿吳興太守殉侯景之難賊平元帝追贈侍中開府儀同三司諡忠貞子裴之橫字如嶽聞喜人少好賔重氣俠不事産業兄之髙乃為絞被疏食以激厲之橫嘆曰大丈夫富貴必作百幅被後為吳興太守作為百幅被以成其志後沒蘄城之難贈司空諡忠壯張纘字伯緒范陽人尚富陽公主封利亭侯起家祕書郎出為吳興太守歷雍州刺史侯景之難為嶽陽王察所害諡簡憲紹泰元年震州刺史杜龕舉兵攻信武將軍陳蒨于長城義興太守韋載據郡以應之丁丑韋載降義興平遣晉陵太守周文育率軍援長城太平元年正月鎮東將軍震州刺史杜龕降詔賜死曲赦吳興郡梁書王勱字公濟臨沂人博涉書史恬然清簡梁世以國子生舉髙第歷五兵尚書紹泰元年以侍中中書令兼丞相長史時吳中遭亂民多乏絶乃以勱監吳興郡入陳歷尚書左僕射諡曰溫以下陳書袁樞字踐言昻孫紹泰中歷吏部尚書吳興太守遷尚書左僕射諡簡懿吳明徹字通昭泰郡人天嘉元年遷吳興太守及引辭之郡帝謂曰吳興雖郡帝鄉之重故以相授後以功封南平郡公進司空南兖州刺史沈不害字孝和武康人大建中為戎昭將軍監吳興郡事徐度字孝節安陸人紹泰二年除信威將軍郢州刺史兼領吳興太守歷司空諡忠肅子敬成大建五年除貞威將軍吳興太守歷安州刺史諡忠杜稜字維盛錢塘人少落魄游嶺南從髙祖恆典書記陳受禪歷中領軍侍中天嘉元年封永城縣侯大建中出為鎮東將軍吳興太守纍官光祿大夫諡成桂陽王伯謀字深之大建十年出為持節都督吳興諸軍事中郎將吳興太守新安王伯固字牢之世祖第五子大建元年授使持節督吳興諸軍事平束將軍吳興太守武陵王伯禮字用之大建初為吳興太守在郡恣行暴掠為有司所劾徐綜稜威將軍駙馬都尉出為吳興太守談志綜堅之曽祖也見文苑英華别見宫闈徴周寶安字安民義興人父文育縶于王琳除員外散騎侍郎文育歸復除貞威將軍吳興太守文育為熊曇朗所害徴還天嘉二年重除雄信將軍吳興太守襲夀昌縣公歷衛尉卿諡成子䂮嗣位晉陵定逺二郡陳書寶南史安𫝊寶安兩任吳興觀史始曰除繼曰復除三曰重除自明若初任屬之文育則宜即書文育𫝊矣何文育逃歸下南史云請罪詔不問復其官爵陳書云尋授使持節散騎常侍鎮南將軍開府儀同三司耶談志能致疑而不能讀史并載其父子及孫三世又先䂮而後寶安殊可笑也元衢任忠字奉誠小字蠻奴汝隂人以戰功封梁信郡公出為吳興內史及隋師濟江忠自吳興入赴屯兵朱雀門忠議固守臺城苦請勿戰後主從孔範言乃戰及軍敗忠降隋胡頴字方秀吳興東遷人天嘉元年除散騎常侍吳興太守諡壯錢道戢大建二年除仁威將軍吳興太守未行改授郢州刺史常鼎字超盛杜陵人梁開府睿孫鼎博涉經史明隂陽逆制善相術仕梁起家湘東王參軍陳武帝受禪拜黃門侍郎大建中為聘周使歷臨海王長史行吳興郡事入為太府卿至德初鼎盡質貨田宅寓僧寺友人毛彪問其故答曰江東王氣盡此矣吾與爾當葬長安期運將及故破産耳初鼎聘周常與髙祖遇鼎曰觀公容貌不久必大貴貴則天下一家嵗一周天老夫當委贄願自愛及陳平馳召之授上儀同三司隋書李德林字公甫車博陵安平人德林能文章隋有天下為內史令封安平縣公每贊平陳之計後出為湖州刺史贈大將軍諡曰文隋書吳興備志卷三
