body:
  text: 吳興備志地理𩔖三都㑹郡縣之屬提要臣等謹案吳興備志三十二卷明董斯張撰斯張字遐周烏程人是編輯錄湖州故事分二十六徵曰帝胄曰宫闈曰封爵曰官師曰人物曰笄褘曰寓公曰象緯曰建置曰巖澤曰田賦曰水利曰選舉曰戰守曰賑䘏曰祥孽曰經籍曰遺書曰金石曰書畫曰清閟曰方物曰璅曰詭曰匡籍采摭極富于吴興一郡遺聞瑣事徵引畧備每門皆全錄古書載其原文有所考訂則附著于下葢張鳴鳳桂故桂勝體例如是而斯張因之雖意主博奧不無以泛濫為嫌然當時著書家影響附㑹之談剽竊撏撦之習實能一舉而空之故所摘錄𩔖皆典雅確核足資考据明季諸書此此為差有實際黄茅白葦之中可以謂之翹楚矣乾隆四十二年八月恭校總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部十一呉興備志目錄地理𩔖三都㑹郡縣之屬卷一帝胄徵宮闈徵封爵徵卷二官師徵卷三官師徵卷四官師徵卷五官師徵卷六官師徵卷七官師徵卷八人物徵卷九人物徵卷十人物徵卷十一人物徵卷十二人物徵卷十三笄褘徵寓公徵藝術徵卷十四象緯徵建置徵卷十五巖澤徵卷十六田賦徵卷十七水利徵卷十八選舉徵卷十九戰守徵卷二十賑恤徵卷二十一祥孽徵卷二十二經籍徵卷二十三遺書徵卷二十四金石徵卷二十五書畵徵清閟徵卷二十六方物徵卷二十七璅徵卷二十八璅徵卷二十九璅徴卷三十詭徴卷三十一詭徴卷三十二匡籍譌吳興偹志自序志吳興者韋昭而下若而人僅談氏見明志曰九江勞氏曰婁浦氏而鄉先生唐氏書後見浦之以帝紀紀郡非古也其剏為表志粲矣大率病勞氏之蕪求以簡勝而刻削不中程使人咨嗟焉往古之蹟浸以微此寓公徐長谷氏掌故之所由作也志金石山墟因乎談氏勞氏餘則仍其半而博取他𫝊記附益之其匠之獨者則水利土風雜攷之屬在唐志出較浦志如秦變周幾不可復識而間捃徐氏之什二漢沈瑜古遺孝也章華陳之又一泄冶也而不書堂邑令有諫顔尚書西亭有記録循良也陸魯望賦蠶刺時事也亦不書聞栗侯請志乎唐先生先生病矣無何竟不祿其門人王某李某輙成書詭先生草以報或曰其序例先生手定草也或曰否侯屬先王父序之王父遊先生之門懼失侯指不敢訟非唐氏書序中苐微言病不與聞云而郡之士大夫求故寔者愈藉藉長谷氏書嵗甲寅余始讀掌故甚偉之廼稍取史籍比勘其軼而未甄者不乏也已補之為一家言得六卷㑹病書竟罷今天啟甲子相去十年有問居士疾者語及此書惜余不竟其業數責余黽勉將事百許日再得七卷家苦少書間有儲久已佚去又病不能就人借借鮮應者閔子康侯氏聞而傷之遺予書曰夫人習乎近者其避古也若仇某及竑􅌢兄懐此舊矣足下不起而成此書足下起而成此書亦可與存古也即須書某及子京弟人生生甫姪為役乃出其藏書幾五百種示余又居恒齋中所讀書有闗郡事者立書赫蹏相寄或雪夕叩闗余輙起篝火冩之凡數月得十有六卷嗣張子殷子所借書亦皆至最後得叢録一書則康侯及其兄竑􅌢氏舊所輯也讎余書芟其複復益三卷其白法志及藝文補别行復如干卷而余之補徐氏書始克成嗟乎世之盗稱賢逹驕吝滿胸視成人尺寸之羙如騶虞殺竊脂榖者豈少哉康侯其幾於晰無我者也書成名曰偹志為徴者二十有六以匡籍譌終之凡某事出某書某人出某書眉列其下人不敢軒輊事不敢論斷以須夫志乎志者之采焉而已矣後之君子得是書為唐氏徐氏翼且復乎婁浦氏表志之故烺乎其足述哉然則志如是不已繁乎志也者外史氏上之太史者志而史偹志而志竑􅌢名光徳康侯名元衢子京名元京人生生甫名自寅及申皆余同邑人
