body:
  text: 吳興偹志卷二十一明董斯張撰祥孽徵第十七晉元帝永昌二年五月吳興大水晉書按元帝紀永昌止元年乃一書自相背而來書稱二年者亦不一元衢明帝太寧元年五月吳興大水宋書成帝咸和四年七月吳興大水晉書咸康二年四月戊午甘露降吳興武康縣庚申又降武康宋書廢帝太和中烏程閣下生蓮花萬嵗厯掌故誤以為唐太和詳匡籍訛安帝元興元年七月大飢人相食吳郡吳興户口減半又流奔而西者萬計晉書宋元嘉三年閏正月己丑甘露降吳興烏程太守王韶之以聞宋書元嘉十三年二月甘露降吳興武康董道益家園樹元嘉十九年二十年白龜兩見於吳興元嘉二十年七月吳興郡後池芙蓉二花一蒂太守孔山士以聞大明五年四月辛亥甘露降吳興安吉太守厯陽王子頊以聞大明七年春太湖邊忽多鼠其年夏水至悉變成鯉魚民人一日取轉得三五十斛明年大飢大明七年十二月辛丑朔甘露降吳興烏程令茍卞之以聞太始二年九月壬寅白烏降吳興烏程太守郤顒以獻明帝泰始中吳興東遷沈法符家雞有四距泰始六年九月己巳八眼龜見吳興故鄣太守禇淵以獻孝建三年七月庚午嘉禾生武康縣後廢帝元徽四年十一月乙巳吳興烏程余山道人慧獲蒼玉璧太守蕭惠開以獻升明二年十一月甘露降吳興卞山太守王涣以聞並上齊建元二年吳興大水故鄣縣楓樹連理兩株相去七尺大八圍去地一丈仍相合為樹泯如一木南齊書永明元年武康民沈崇家石榴連理太守楊文崇以聞永明二年七月烏程縣陳文則家槿樹連理永明五年夏吳興水雨傷稼吳興東遷民吳休家女人雙生二兒胸以下臍以上合蓋人疴也永明六年吳興大水並上梁中大通三年吳興野榖櫓生布滿山澤百姓獲利梁書唐太和五年六月辛卯蘇杭湖水害稼舊唐書太和七年十月辛酉潤常蘇湖四州水害稼開成三年夏蘇湖二州水溢入城並上乾符五年黃巢破宣州以清明前二日入長城居民匿山谷間避之幸脫禍因以清明後補節一日相慶長興志天祐二年冬十月有獸入吳興一角麟趾吳越偹史宋熙寧八年長興旱太湖水退數里見古街衢井竈焉長興志元祐四年夏兩浙旱文獻通考元祐五年浙西水六年兩浙水宋史大觀元年十月蘇湖水災並上政和五年八月蘇湖水災紹興六年湖秀海風害民田紹興三十二年六月浙西大霖雨談庚安吉布衣也紹興中言本邑去秋園瓜並蒂合而為一此皇帝孝治天下故見祥瑞以昭天意氏族大全隆興元年秋湖州螟為榖災隆興二年七月蘇湖大水乾道元年春湖秀大飢殍徙者不可勝計州縣為糜食之乾道六年冬湖秀飢乾道十一年江東浙西諸州水淳熙八年七月不雨至於十一月湖常旱並上開禧二年四月長興地生毛狀如馬鬣或蒼或赤或白濵湖皆有之長數寸焚之臭如燎毛西吳里語開禧三年夏秋久旱大蝗羣飛蔽天先是浙西郡縣首種不入或種豆粟皆既於蝗時韓托胄開邉兵連禍結故有此孽文獻通考嘉泰二年正月二十二日午刻有村媪擕幼稚百十成羣驚走聲言有盜捕嬰兒祭江閧然傳播泛湖入山藏避宰尉禁約方止長興志嘉泰二年浙西大蝗若煙霧蔽天其墮亘十餘里宋史嘉定七年六月浙郡蝗嘉定十一年六月浙西大霖雨開慶十年八月安吉武康水淳祐二年六月盛夏積雨浙右大水並上咸淳十年八月癸丑大霖雨天目山崩水湧流安吉臨安餘杭民溺死者無算武林紀事元世祖中統二十五年三月湖秀水壞田稼元史中統二十九年六月湖州路水並上大德四年秋兩浙飢函史趙子昻别業在德清龍洞山元大德庚子嵗紫芝生其遊亭戴表元為記剡源集成宗元貞元年五月湖州烏程縣水二年湖州嘉興路飢並上天厯二年冬大雨雪太湖氷厚數尺人履氷上如平地研北雜志景泰五年郡大水飢御製城隍廟祭文命巡撫尚書孫原貞祀勞志成化九年二月甘露降東林里人陳政家庭樹越旬始晞東林山志嘉靖二十四年旱太湖水縮民有得軒轅鏡於其岸者長興志嘉靖三十二年六月初十日鄉中羣小兒驚走入市言有捕嬰童祭江者有司禁之乃止上隆慶四年八月浙江湖州山崩成湖續文獻通考吳興偹志卷二十一
